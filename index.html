:"jg_6_원가_34","q":"㈜삼일은 여러 사업부를 운영하고 있는 기업이며, 20X1년의 당기순이익은 1,000,000원이다. 여러 사\n업부 중에서 사업부 갑의 공헌이익은 300,000원이고, 사업부 갑에 대한 공통원가 배분액은 100,000원\n이다. 공통원가배분액 중 70,000원은 사업부 갑을 폐지하더라도 계속하여 발생하는 것이다. 만약 회사\n가 사업부 갑을 폐지하였다면 20X1년 당기순이익은 얼마로 변하였겠는가?","a":["700,000원","730,000원","770,000원","800,000원"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (730,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_35","q":"㈜삼일은 최근 고객사로부터 제품 400단위를 단위당 30,000원에 구입하겠다는 제안을 받았다. 이 주\n문의 수락여부와 회사의 이익에 미치는 영향으로 옳은 것은(단, 제품과 관련된 자료는 다음과 같으며\n동 주문을 수락하더라도 고정원가에는 아무런 영향을 초래하지 않는다)?\n제품단위당 원가\n직접재료원가 22,000원\n직접노무원가(변동원가) 4,000원\n변동제조간접원가 2,500원\n고정제조간접원가 3,000원\n변동판매비와관리비 500원\n고정판매비와관리비 1,000원\n33,000원","a":["수락, 400,000원의 이익 증가","수락, 800,000원의 이익 증가","거절, 400,000원의 손실 증가","거절, 800,000원의 손실 증가"],"c":0,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '수락, 400,000원의 이익 증가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_원가_36","q":"다음 중 자본예산을 편성하기 위해 현금흐름을 추정할 때 주의해야 할 사항으로 옳지 않은 것은?","a":["세금을 납부하는 것은 현금의 유출에 해당하므로 세금을 차감한 후의 현금흐름을 기준으로 추정하 여야 한다.","현금흐름의 추정시에는 이자비용이 전혀 없는 상황을 가정하여 현금흐름을 추정해야 한다.","감가상각비를 계상함으로써 발생하는 세금의 절약분인 감가상각비 감세 효과는 현금흐름을 파악할 때 고려해서는 안된다.","증분기준에 의한 현금흐름을 추정하여야 한다."],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '감가상각비를 계상함으로써 발생하는 세금의 절약분인 감가상각비 감세 효과는 현금흐름을 파악할 때 고려해서는 안'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_원가_37","q":"㈜삼일의 경영진은 새로운 투자안을 검토 중이며, 경영진이 분석한 이 투자안의 NPV는 0보다 큰 값이\n산출되었다. 그러나 재무담당자인 갑의 분석에 의하면 이 투자안은 경제성이 없는 것으로 판단된다.\n갑의 분석이 옳다고 했을 때, 이 기업의 경영진은 경제성분석 과정에서 어떤 오류를 범하였겠는가?","a":["투자종료시점의 투자안의 처분가치를 너무 낮게 추정하였다.","자본비용을 너무 높게 추정하였다.","투자시점의 투자세액공제액을 현금흐름에 포함시키지 않았다.","현금영업비용을 너무 낮게 추정하였다."],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '현금영업비용을 너무 낮게 추정하였다.'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_6_원가_38","q":"㈜삼일은 35,000원에 기계를 구입할 예정이며, 기계를 사용할 때 연간 원가절감액은 아래의 표와 같\n다. 연중 현금흐름이 고르게 발생한다고 가정하고 이 투자안의 회수기간을 계산하면 얼마인가?\n연도 1년 2년 3년 4년\n연간 원가절감액 8,500원 9,000원 9,500원 10,000원","a":["2.75년","2.95년","3.75년","3.80년"],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번 (3.80년). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_39","q":"㈜삼일은 분권화된 사업부 갑과 을을 이익중심점으로 설정하고 있다. 사업부 갑에서 생산되는 제품 A\n는 사업부 을에 대체하거나 외부시장에 판매할 수 있으며, 관련된 원가자료는 다음과 같이 제시되어\n있다. 사업부 을은 제품 A를 주요부품으로 사용하여 완제품을 생산하고 있으며, 공급처는 자유로이 선\n택할 수 있다. 현재 사업부 갑은 500,000 단위의 제품 A를 생산하여 전부 외부시장에 판매하고 있으\n며, 사업부 을에서는 연간 300,000 단위의 제품 A를 단위당 980 원의 가격으로 외부공급업자로부터 구\n입하고 있다. 만일 사업부 갑이 제품 A를 사업부 을에 사내대체하여야 하고, 이 경우 단위당 60 원의\n판매비와관리비를 절감할 수 있다면 제품 A의 사내대체가격은 어느 범위에서 결정되겠는가(단, 사업부\n을에서 제품 A를 이용해 생산한 완제품의 순실현가치는 제품 A의 외부구입가보다 크다)?\n제품 A의 원가자료\n단위당 외부판매가격 1,000 원\n단위당 변동원가 620 원 (변동판매비와관리비 포함)\n연간 고정원가 100,000,000 원\n연간 최대생산능력 500,000 단위","a":["620 원과 920 원 사이","920 원과 980 원 사이","940 원과 980 원 사이","980 원과 1,000 원 사이"],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '940 원과 980 원 사이'. 전부원가계산은 고정제조간접원가를 제품원가에 포함하고, 변동원가계산은 기간비용으로 처리합니다. ","src":"cbt"},{"id":"jg_6_원가_40","q":"보증수리비, 손해배상비, 반품비(반품의 운송, 재작업, 재검사 포함), 판매기회상실에 따른 기회비용\n등은 품질원가항목 중 어떤 영역에 포함되는 원가들인가?","a":["예방원가","평가원가","내부실패원가","외부실패원가"],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '외부실패원가'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_7_재무_1","q":"다음 중 국제회계기준의 특징에 관한 설명으로 옳은 것은?","a":["국제회계기준은 규정중심의 회계기준으로 상세하고 구체적인 회계처리 방법을 제시한다.","국제회계기준의 적용으로 자산 및 부채에 대한 공정가치 측정대상이 확대되었다.","국제회계기준을 적용한 후 주석공시 양이 줄어들었다.","국제회계기준은 별도재무제표를 기본 재무제표로 제시하고 있다."],"c":1,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. '국제회계기준의 적용으로 자산 및 부채에 대한 공정가치 측정대상이 확대되었다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_재무_2","q":"재무보고를 위한 개념체계 중 일반목적재무보고의 목적에 관한 설명으로 옳지 않은 것은?","a":["현재 및 잠재적 투자자, 대여자 및 기타 채권자는 일반목적재무보고서가 대상으로 하는 주요 이용자 이다.","보고기업의 경제적 자원과 청구권의 성격 및 금액에 대한 정보는 정보이용자가 보고기업의 재무적 강 점과 약점을 식별하는 데 도움을 줄 수 있다.","보고기업의 경제적 자원과 청구권의 변동은 그 기업의 재무성과에 의해서만 발생한다.","보고기업의 경영진도 해당 기업에 대한 재무정보에 관심이 있지만, 경영진은 그들이 필요로 하는 재 무정보를 내부에서 구할 수 있기 때문에 일반목적재무보고서에 의존할 필요가 없다."],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '보고기업의 경제적 자원과 청구권의 변동은 그 기업의 재무성과에 의해서만 발생한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_3","q":"다음 중 재무정보의 질적특성에 관한 설명으로 옳지 않은 것은?","a":["원가는 재무보고로 제공될 수 있는 정보에 대한 포괄적 제약요인이다.","정보가 유용하기 위해서는 목적적합하고 나타내고자 하는 바를 충실하게 표현해야 한다.","보강적 질적특성은 정보가 목적적합하지 않거나 나타내고자 하는 바를 충실하게 표현하지 않더라도, 그 정보를 유용하게 할 수 있다.","목적적합한 재무정보는 정보이용자의 의사결정에 차이가 나도록 할 수 있다."],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '보강적 질적특성은 정보가 목적적합하지 않거나 나타내고자 하는 바를 충실하게 표현하지 않더라도, 그 정보를 유'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_4","q":"다음 중 포괄손익계산서의 작성에 관한 설명으로 옳지 않은 것은?","a":["재분류조정은 당기나 과거 기간에 당기손익으로 인식되었으나 기타포괄손익으로 재분류된 금액을 말 한다.","단일 포괄손익계산서 또는 별개의 손익계산서와 포괄손익계산서 중 하나의 양식을 선택할 수 있다.","비용을 기능별로 분류하는 기업은 감가상각비, 기타 상각비와 종업원급여비용을 포함하여 비용의 성 격별 분류에 대한 추가 정보를 주석에 공시한다.","포괄손익은 크게 당기손익과 기타포괄손익으로 구성된다."],"c":0,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '재분류조정은 당기나 과거 기간에 당기손익으로 인식되었으나 기타포괄손익으로 재분류된 금액을 말 한다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_5","q":"다음 중 재고자산에 관한 설명으로 옳지 않은 것은?","a":["재고자산이란 정상적인 영업과정에서 사용하기 위하여 보유 중이거나 생산 중인 자산을 의미한다.","재고자산의 취득원가는 매입원가, 전환원가 및 재고자산을 현재의 장소에 현재의 상태로 이르게 하는 데 발생한 기타원가 모두를 포함한다.","판매원가는 재고자산의 취득원가에 포함될 수 없으며 발생기간의 비용으로 인식한다.","생물자산에서 수확한 농림어업 수확물로 구성된 재고자산은 순공정가치로 측정하여 수확시점에 최초 인식한다."],"c":0,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '재고자산이란 정상적인 영업과정에서 사용하기 위하여 보유 중이거나 생산 중인 자산을 의미한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_6","q":"㈜삼일은 재고자산의 단위원가 결정방법으로 선입선출법을 채택하고 있다. ㈜삼일의 20X1년 재고자산과\n관련된 자료를 바탕으로 ㈜삼일이 20X1년 말 재무상태표에 표시할 기말재고자산금액은 얼마인가(단, 재\n고자산 감모손실은 없다.)?\n구 분 단 위 단 위 원 가\n기초재고(1.1) 100개 @ 100\n매입(3.5) 250개 @ 200\n매출(6.15) 300개\n매입(11.10) 100개 @ 225\n매출(12.22) 100개\n실사 결과 재고수량(12.31) 50개","a":["5,000원","9,750원","10,000원","11,250원"],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번 (11,250원). 매출총이익률법: 매출원가 = 매출액 × (1-매출총이익률). 재고손실 = 장부상재고 - 실사재고. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_7","q":"다음 자료에서 재고자산평가손실은 ㈜삼일의 재고자산이 진부화되어 발생하였다. ㈜삼일의 20X2년 포괄\n손익계산서상 재고자산과 관련하여 비용으로 계상될 금액은 얼마인가(단, 기초에 재고자산 평가충당금은\n없다)?\n20X1년 12월 31일 재고자산 500,000원\n20X2년 매입액 2,000,000원\n20X2년 재고자산평가손실 200,000원\n20X2년 재고자산감모손실 100,000원\n20X2년 12월 31일 재고자산(평가손실과 감모손실 차감 후) 1,300,000원","a":["1,200,000원","1,300,000원","1,400,000원","1,500,000원"],"c":0,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (1,200,000원). 매출총이익률법: 매출원가 = 매출액 × (1-매출총이익률). 재고손실 = 장부상재고 - 실사재고. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_8","q":"다음 중 수정을 요하는 보고기간 후 사건에 해당하지 않는 것을 모두 고른 것은?\nㄱ. 보고기간 말에 존재하였던 현재의무가 보고기간 후에 소송사건의 확정에 의해 확인되는 경우\nㄴ. 보고기간 말에 이미 자산손상이 발생되었음을 나타내는 정보를 보고기간 후에 입수하는 경우\nㄷ. 보고기간 말과 재무제표 발행승인일 사이에 당기손익-공정가치 측정 금융자산의 공정가치가 하\n락하는 경우\nㄹ. 재무제표가 부정확하다는 것을 보여주는 부정이나 오류를 발견한 경우","a":["ㄷ","ㄱ, ㄷ","ㄷ, ㄹ","ㄱ, ㄴ, ㄷ"],"c":0,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. 'ㄷ'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_9","q":"㈜삼일은 사용 중이던 차량운반구를 ㈜부산이 사용하던 기계장치와 교환하였다. 이 교환과 관련하여\n㈜삼일은 공정가치의 차액 1,000,000원을 현금으로 지급하였다. 이 경우 ㈜삼일이 동 교환거래에서 인식\n해야 할 기계장치의 취득원가는 얼마인가(단, 동 교환거래는 상업적 실질이 있다고 가정하며, 차량운반\n구의 공정가치가 기계장치의 공정가치보다 명백하다)?\n차량운반구 기계장치\n취득원가 4,000,000원 5,000,000원\n감가상각누계액 3,500,000원 2,500,000원\n공정가치 2,000,000원 3,000,000원","a":["2,000,000원","2,500,000원","3,000,000원","3,500,000원"],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (3,000,000원). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_10","q":"다음 중 유형자산의 재평가모형 회계처리에 관한 설명으로 옳지 않은 것은?","a":["자산의 장부금액이 재평가로 인하여 증가된 경우 원칙적으로 그 증가액은 기타포괄이익으로 인식한 다.","자산의 장부금액이 재평가로 인하여 감소한 경우 원칙적으로 그 감소액은 당기손실로 인식한다.","재평가의 빈도는 재평가되는 유형자산의 공정가치 변동에 따라 달라진다.","당해 자산이 폐기되거나 제거될 때에는 해당 자산과 관련하여 자본(기타포괄손익누계액)에 계상된 재평가잉여금은 당기손익으로 재분류조정한다."],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '당해 자산이 폐기되거나 제거될 때에는 해당 자산과 관련하여 자본(기타포괄손익누계액)에 계상된 재평가잉여금은 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_11","q":"다음 중 유형자산의 감가상각에 관한 설명으로 옳지 않은 것은?","a":["재평가모형을 선택할 경우 취득일 이후 재평가일의 공정가치로 해당 자산금액을 수정하고, 당해 공 정가치에서 재평가일 이후 감가상각누계액과 손상차손누계액을 차감한 금액을 장부금액으로 한다.","유형자산의 잔존가치와 내용연수는 적어도 매 회계연도말에 재검토한다. 재검토결과 추정치가 종전 추정치와 다르다면 그 차이는 회계추정의 변경으로 회계처리한다.","감가상각방법은 자산의 미래경제적효익이 소비될 것으로 예상되는 형태를 반영한다.","감가상각방법은 적어도 매 회계연도 말에 재검토하며, 재검토 결과 자산에 내재된 미래경제적효익의 예상되는 소비형태에 유의적인 변동이 있다면 이를 반영하기 위하여 감가상각방법을 변경하고, 회계 정책의 변경으로 회계처리한다."],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '감가상각방법은 적어도 매 회계연도 말에 재검토하며, 재검토 결과 자산에 내재된 미래경제적효익의 예상되는 소비'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_12","q":"20X1년 중 ㈜삼일은 연구 및 개발활동과 관련하여 총 500억원을 지출하였다. 새로 개발한 무형자산이\n20X1년 11월 1일부터 사용가능할 것으로 예측된 경우 연구 및 개발활동과 관련하여 20X1년 말 재무상\n태표에 표시될 무형자산의 장부금액은 얼마인가(단, 무형자산의 내용연수는 5년, 잔존가치 0원, 정액\n법으로 상각한다)?\n구분 금액 비고\n연구단계\n300억원\n(20X1.1.1~20X1.3.31)\n개발단계 자산인식요건 충족 90억원\n200억원\n(20X1.4.1~20X1.10.31) 자산인식요건 미충족110억원\n합계 500억원","a":["72억원","87억원","90억원","106억원"],"c":1,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (87억원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_13","q":"다음 중 내부적으로 창출한 무형자산에 관한 설명으로 옳지 않은 것은?","a":["내부적으로 창출한 고객목록, 브랜드 등은 무형자산으로 인식하지 않는다.","재료, 장치, 제품, 공정, 시스템이나 용역에 대한 여러 가지 대체안을 탐색하는 활동에서 발생한 지 출은 연구단계 지출에 해당한다.","내부 프로젝트의 연구단계에서는 미래경제적효익을 창출할 무형자산이 존재한다는 것을 제시할 수 없기 때문에, 내부 프로젝트의 연구단계에서 발생한 지출은 발생시점에 비용으로 인식한다.","무형자산을 창출하기 위한 내부 프로젝트를 연구단계와 개발단계로 구분할 수 없는 경우에는 그 프 로젝트에서 발생한 지출은 모두 개발단계에서 발생한 것으로 본다."],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '무형자산을 창출하기 위한 내부 프로젝트를 연구단계와 개발단계로 구분할 수 없는 경우에는 그 프 로젝트에서 발'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_14","q":"다음 중 투자부동산에 관한 설명으로 옳지 않은 것은?","a":["투자부동산은 임대수익이나 시세차익 또는 두 가지 모두를 얻기 위하여 소유자가 보유하거나 리스이 용자가 사용권자산으로 보유하고 있는 부동산을 의미한다.","투자부동산은 공정가치모형과 원가모형 중 하나를 선택하여 모든 투자부동산에 적용한다.","투자부동산의 공정가치모형 적용시 공정가치 변동으로 발생하는 손익은 당기손익에 반영한다.","투자부동산으로 분류된 건물에 대하여 공정가치모형을 적용할 경우 잔여 내용연수동안 공정가치에 기초하여 감가상각한다."],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '투자부동산으로 분류된 건물에 대하여 공정가치모형을 적용할 경우 잔여 내용연수동안 공정가치에 기초하여 감가상각'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_15","q":"다음 중 재무상태표에 표시될 현금및현금성자산의 잔액을 계산하면 얼마인가?\nㄱ. 요구불예금 1,650,000원\nㄴ. 타인발행수표 2,500,000원\nㄷ. 취득일로부터 상환일까지의 기간이 2개월인 상환우선주 1,000,000원\nㄹ. 결산일로부터 만기일이 1개월 남은 1년 만기 정기예금 1,220,000원\nㅁ. 당좌개설 보증금 2,000,000원","a":["4,150,000원","5,150,000원","6,370,000원","7,150,000원"],"c":1,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (5,150,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_16","q":"㈜삼일은 20X1년 1월 1일에 다음과 같은 조건의 회사채를 취득하였다. 이 사채를 기타포괄손익-공정가\n치 측정 금융자산으로 분류할 경우 20X2년 12월 31일에 인식해야 할 이자수익은 얼마인가(단, 소수점\n이하는 절사한다)?\nㄱ. 발행일 : 20X1년 1월 1일\nㄴ. 액면가액 : 1,000,000원\nㄷ. 만기일 : 20X3년 12월 31일\nㄹ. 표시이자율 : 연 8 % (매년 말 지급조건)\nㅁ. 취득원가 : 950,266원(유효이자율 연 10 % )","a":["80,000원","95,267원","96,529원","100,000원"],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (96,529원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_17","q":"다음 중 상각후원가측정금융자산에 관한 설명으로 옳지 않은 것은?","a":["상각후원가측정금융자산은 계약상 현금흐름이 원리금으로만 구성되어 있고, 사업모형이 계약상 현금 흐름을 수취하는 것인 금융자산을 의미한다.","상각후원가측정금융자산 취득시 지출된 거래원가는 취득원가에 가산한다.","상각후원가측정금융자산은 유효이자율법을 적용하여 상각후원가로 측정한다.","상각후원가측정금융자산의 손상차손은 당기비용으로 처리하고, 기타포괄손익에서 조정한다."],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '상각후원가측정금융자산의 손상차손은 당기비용으로 처리하고, 기타포괄손익에서 조정한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_18","q":"㈜삼일은 20X1년 1월 1일 액면금액 1,000,000원, 표시이자율 연 10 %, 만기 2년인 사채를 966,199원\n에 할인발행하였다. 사채의 발행당시 유효이자율이 연 12 % 일 때 ㈜삼일이 사채발행으로 인하여 만기\n2년 동안 인식해야 할 총 이자비용은 얼마인가?","a":["187,543원","200,000원","233,801원","256,240원"],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (233,801원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_19","q":"다음 중 사채의 회계처리에 관한 설명으로 옳지 않은 것은?","a":["사채발행비는 사채의 발행금액에서 차감한다.","사채발행비가 없는 상황에서, 사채를 조기상환하는 경우 상환일의 시장이자율이 발행일의 시장이자 율보다 높으면 사채상환이익이 발생한다.","사채할인발행차금은 유효이자율법을 적용하여 상각하고 상각액을 사채이자에서 차감한다.","사채할증발행차금은 당해 사채의 액면금액에 부가하는 형식으로 기재한다."],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '사채할인발행차금은 유효이자율법을 적용하여 상각하고 상각액을 사채이자에서 차감한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_20","q":"다음 중 충당부채의 회계처리에 관한 설명으로 옳은 것은?","a":["미래의 예상 영업손실은 충당부채로 인식하지 아니한다.","충당부채의 명목금액과 현재가치의 차이가 중요한 경우에도 현재가치로 평가하지 않는다.","충당부채로 인식하는 금액은 현재의무의 이행에 소요되는 지출에 대한 보고기간말 현재의 최선의 추 정치이어야 하며 이 경우 관련된 사건과 상황에 대한 불확실성은 고려하지 않는다.","충당부채란 과거사건이나 거래의 결과에 의한 현재의무로서 그 의무를 이행하기 위하여 자원이 유출 될 가능성이 높고 지출 금액이 불확실하지만, 지출 시기는 확정되어 있는 의무를 의미한다."],"c":0,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '미래의 예상 영업손실은 충당부채로 인식하지 아니한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_재무_21","q":"다음 중 자기주식의 취득 및 처분 회계처리에 관한 설명으로 옳지 않은 것은?","a":["자기주식을 소각하는 경우 액면금액과 취득원가와의 차액을 감자차손익으로 자본에 반영한다.","자기주식을 처분하는 경우 처분가액과 취득원가와의 차액을 자기주식처분손익으로 자본에 반영한다.","자기주식을 보유하고 있는 기간동안 자기주식에 대한 평가손익은 기타포괄손익으로 반영한다.","자기주식을 취득한 경우 취득원가를 자본에서 차감하는 형식으로 기재한다."],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '자기주식을 보유하고 있는 기간동안 자기주식에 대한 평가손익은 기타포괄손익으로 반영한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_22","q":"다음 중 자본거래가 자본항목에 미치는 영향에 관한 설명으로 옳지 않은 것은?\n현금배당 무상증자 주식분할","a":["이익잉여금 감소 감소가능 불변","주식수 불변 증가 증가","자본금 불변 증가 불변","총자본 불변 불변 불변"],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '총자본 불변 불변 불변'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_23","q":"다음 중 고객과의 계약에서 생기는 수익에 관한 설명으로 옳지 않은 것은?","a":["계약에서 약속한 재화나 용역이 별도로 구별되기 위해서는 고객이 재화나 용역 그 자체에서 효익을 얻거나 고객이 쉽게 구할 수 있는 다른 자원과 함께하여 그 재화나 용역에서 효익을 얻을 수 있어야 하며, 고객에게 재화나 용역을 이전하기로 하는 약속을 계약 내의 다른 약속과 별도로 식별해 낼 수 있어야 한다.","거래가격이란 고객에게 약속한 재화나 용역을 이전하고 그 대가로 기업이 받을 권리를 갖게 될 것으 로 예상하는 금액이며, 부가가치세처럼 제3자를 대신해 회수한 금액은 제외한다.","고객과의 계약에 따라 합의한 지급시기 때문에 유의적인 금융효익이 고객에게 제공되는 경우 화폐의 시간가치를 반영하여 거래가격을 조정한다.","판매자가 고객에게 지급하거나 지급이 예상되는 금액은 고객이 판매자에게 별도 재화나 용역을 공급 하고 지급하는 대가일 경우 수익에서 차감한다."],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '판매자가 고객에게 지급하거나 지급이 예상되는 금액은 고객이 판매자에게 별도 재화나 용역을 공급 하고 지급하는'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_24","q":"㈜삼일은 고객에게 제품 A와 B를 이전하고 그 대가로 100,000원을 받는 계약을 체결하였다. 제품A와\n제품B의 인도는 각각이 수행의무이며, 인도시점에 고객에게 통제가 이전된다. 계약상 특약으로 제품A\n를 먼저 인도하고 제품A의 인도대가는 제품B의 인도를 지급조건으로 한다. 20X1년 10월 1일에 제품\nA를 외상으로 인도하였으며, 20X2년 2월 1일에 제품B를 인도하였다. 20X1년말 ㈜삼일의 재무상태표\n에 표시될 계약자산은 얼마인가(단, 상대적 개별 판매가격에 기초하여 제품A에 대한 대가로 40,000원,\n제품B에 대한 대가로 60,000원을 배분하였다)?","a":["0원","40,000원","60,000원","100,000원"],"c":1,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (40,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_25","q":"㈜삼일은 20X1년 2월 5일에 ㈜부산과 공장 건설계약을 체결하였다. 총공사계약금액은 120,000,000원\n이며 ㈜삼일은 누적발생계약원가에 기초하여 진행률을 산정하여 진행기준에 따라 수익을 인식한다. 건\n설계약과 관련한 20X1년 말 자료는 다음과 같다. ㈜삼일의 20X1년 말 재무상태표에 표시될 계약자산\n또는 계약부채의 금액은 얼마인가?\n누적발생원가 추정총계약원가 공사대금청구액\n40,000,000원 100,000,000원 54,000,000원","a":["계약자산 6,000,000원","계약자산 8,000,000원","계약부채 6,000,000원","계약부채 8,000,000원"],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (계약부채 6,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_26","q":"다음 중 기타포괄손익으로 인식되는 순확정급여부채(자산)의 재측정요소를 구성하는 항목이 아닌 것은?","a":["보험수리적손익","제도개정이나 축소로 인해 발생하는 확정급여채무 현재가치의 변동인 과거근무원가","순확정급여부채(자산)의 순이자에 포함된 금액을 제외한 사외적립자산의 수익","순확정급여부채(자산)의 순이자에 포함된 금액을 제외한 자산인식상한 효과의 변동"],"c":1,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. '제도개정이나 축소로 인해 발생하는 확정급여채무 현재가치의 변동인 과거근무원가'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_27","q":"㈜삼일은 20X1년 1월 1일 종업원에게 다음과 같은 조건의 주식결제형 주식선택권 30,000개를 부여하\n였다. 이 경우 20X1년과 20X2년 포괄손익계산서에 계상할 주식보상비용은 각각 얼마인가?\nㄱ. 기본조건 : 20X3년 12월 31일까지 의무적으로 근무할 것\nㄴ. 행사가능기간 : 20X4년 1월 1일 - 20X6년 12월 31일\nㄷ. 주식선택권의 공정가치 정보\n20X1년 1월 1일 : 10,000원/개\n20X1년 12월 31일 : 8,000원/개\n20X2년 12월 31일 : 9,000원/개\n20X1년 20X2년","a":["100,000,000원 80,000,000원","100,000,000원 100,000,000원","80,000,000원 80,000,000원","80,000,000원 100,000,000원"],"c":1,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (100,000,000원 100,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_28","q":"다음 중 법인세회계에 관한 설명으로 옳지 않은 것은(단, 미래에 충분한 과세소득이 발생한다고 가정한\n다)?","a":["가산할 일시적 차이는 이연법인세부채를 발생시킬 수 있다.","차감할 일시적차이는 이연법인세자산을 발생시킬 수 있다.","이연법인세자산과 부채는 현재가치로 평가하지 않는다.","미사용 세무상결손금과 세액공제는 이연법인세부채를 발생시킬 수 있다."],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '미사용 세무상결손금과 세액공제는 이연법인세부채를 발생시킬 수 있다.'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_29","q":"다음은 ㈜삼일의 20X1년 말과 20X2년 말의 법인세회계와 관련된 내역이다. 20X2년에 ㈜삼일이 계상하\n여야 할 법인세비용은 얼마인가?\n20X1년 말 20X2년 말\n이연법인세자산 50,000원 80,000원\n이연법인세부채 10,000원 40,000원\n20X2년 당기법인세 200,000원","a":["130,000원","200,000원","240,000원","270,000원"],"c":1,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (200,000원). 이연법인세자산/부채 = 일시적차이 × 세율. 차감할 일시적차이는 이연법인세자산, 가산할 일시적차이는 이연법인세부채를 인식합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_30","q":"㈜삼일은 재고자산의 원가흐름에 대한 가정을 평균법에서 선입선출법으로 변경하였다. 재고자산에 대해\n선입선출법을 적용하는 것이 신뢰성 있고 더 목적적합한 정보를 제공하는 경우 해당 원가흐름에 대한\n가정의 변경은 다음 중 어디에 해당하는가?","a":["오류수정","회계추정의 변경","회계정책의 변경","관련법규의 개정"],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '회계정책의 변경'. 재고자산은 판매목적으로 보유하는 자산으로, 취득원가와 순실현가능가치 중 낮은 금액으로 평가합니다(저가법). ","src":"cbt"},{"id":"jg_7_재무_31","q":"㈜삼일의 20X3년 말 회계감사과정에서 발견된 기말재고자산 관련 오류사항은 다음과 같다. 오류사항을\n수정하기 전 20X3년 말 이익잉여금은 100,000 원, 20X3년 당기순이익은 30,000 원이었다. 오류를 수정\n한 후의 20X3년 말 이익잉여금과 20X3년 당기순이익은 각각 얼마인가(단, 오류는 중요한 것으로 가정\n한다)?\n20X2년 말 20X3년 말\n2,000 원 과대 3,000 원 과소\n이익잉여금 당기순이익","a":["97,000원 25,000원","97,000원 35,000원","103,000원 25,000원","103,000원 35,000원"],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번 (103,000원 35,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_32","q":"다음은 ㈜삼일의 20X1년 회계연도(20X1년 1월 1일 - 20X1년 12월 31일) 당기순이익과 자본에 대한\n자료이다. ㈜삼일의 20X1년 회계연도 기본주당순이익은 얼마인가(단, 유통보통주식수는 월할계산을 가\n정한다)?\nㄱ. 당기순이익: 120,000,000원\nㄴ. 보통주식수 내역\n기초(1월 1일) 보통주식수 20,000주\n기중(7월 1일) 무상증자 10,000주","a":["4,000원","4,800원","5,000원","6,200원"],"c":0,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (4,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_33","q":"다음 중 관계기업투자주식의 회계처리에 관한 설명으로 옳지 않은 것은?","a":["관계기업투자주식을 취득한 시점에는 취득원가로 기록한다.","피투자기업이 배당금 지급을 결의한 경우, 투자회사가 수취하게 될 배당금 금액을 관계기업투자주식 에서 직접 차감한다.","관계기업에 관련된 영업권은 정액법으로 상각한다.","피투자자의 당기순손익 중 투자자의 지분에 해당하는 금액을 당기손익으로 처리한다."],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '관계기업에 관련된 영업권은 정액법으로 상각한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_34","q":"20X1년 1월 1일 ㈜삼일은 ㈜용산의 보통주 30 % 를 800,000원에 취득하여 유의적인 영향력을 행사하\n게 되었으며, 취득 당시 ㈜용산의 순자산 장부금액과 공정가치는 2,000,000원으로 동일하였다. 20X1년\n및 20X2년 ㈜용산의 자본은 아래와 같으며, 당기순이익 이외에 자본의 변동은 없다고 가정한다. 20X2\n년 말 ㈜삼일의 재무상태표에 표시될 관계기업투자주식의 장부금액은 얼마인가?\n20X1년 1월 1일 20X1년 12월 31일 20X2년 12월 31일\n자본금 900,000 원 900,000 원 900,000원\n이익잉여금 1,100,000 원 1,300,000 원 1,600,000원\n합계 2,000,000 원 2,200,000 원 2,500,000원","a":["820,000원","860,000원","890,000원","950,000원"],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번 (950,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_35","q":"원화를 기능통화로 사용하고 있는 ㈜삼일은 20X1년 10월 1일에 중국 현지공장에서 재고자산을 CNY\n2,000에 매입하여 기말까지 보유하고 있다. 이 재고자산의 기말 순실현가능가치는 CNY 1,800이다.\nCNY 대비 원화의 환율이 다음과 같을 때 ㈜삼일이 20X1년 말에 상기 재고자산에 대하여 인식할 재고자\n산평가손실 금액은 얼마인가?\n∙ 20X1년 10월 1일: CNY 1 = 110원\n∙ 20X1년 12월 31일: CNY 1 = 130원","a":["0원","14,000원","20,000원","26,000원"],"c":0,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (0원). 매출총이익률법: 매출원가 = 매출액 × (1-매출총이익률). 재고손실 = 장부상재고 - 실사재고. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_36","q":"다음 중 위험회피회계에 관한 설명으로 옳지 않은 것은?","a":["공정가치위험회피회계는 원칙적으로 위험회피수단에 대한 손익과 위험회피대상항목의 회피대상위험 에 대한 손익을 당기손익으로 반영한다.","현금흐름위험회피회계는 위험회피수단에 대한 손익 중 위험회피에 효과적인 부분은 기타포괄손익으 로 인식하여 자본(기타포괄손익누계액)으로 처리하고 위험회피에 효과적이지 않은 부분은 당해 회계 연도에 당기손익으로 인식한다.","현금흐름위험회피회계란 위험회피대상항목이 자산, 부채, 확정계약으로서 당해 항목의 공정가치변동 을 상쇄하기 위하여 파생상품 등을 이용하는 것을 말한다.","위험회피회계란 위험회피대상항목과 위험회피수단에 대한 손익이 상쇄되어 동일한 회계기간에 보고 될 수 있도록 위험회피대상항목과 위험회피수단을 대칭적으로 인식하고 평가하는 회계처리를 말한 다."],"c":2,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '현금흐름위험회피회계란 위험회피대상항목이 자산, 부채, 확정계약으로서 당해 항목의 공정가치변동 을 상쇄하기 위'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_37","q":"다음 중 리스에 관한 설명으로 옳지 않은 것은?","a":["리스란 대가와 교환하여 기초자산의 사용권을 일정기간 이전하는 계약이나 계약의 일부를 말한다.","리스제공자는 각 리스를 운용리스나 금융리스로 분류하여 유형별로 다른 회계처리를 한다.","리스이용자는 리스개시일에 사용권자산과 리스부채를 인식하는 것을 원칙으로 한다.","단기리스와 소액 기초자산 리스는 사용권자산과 리스부채를 인식할 수 없으며, 리스료를 비용으로만 인식한다."],"c":3,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '단기리스와 소액 기초자산 리스는 사용권자산과 리스부채를 인식할 수 없으며, 리스료를 비용으로만 인식한다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_38","q":"다음은 제조업을 영위하는 ㈜삼일의 현금 유출입 거래를 현금흐름표상 영업활동, 투자활동 및 재무활동\n현금흐름으로 나타낸 것이다. 옳지 않은 것은?","a":["배당금의 지급에 따른 현금유출 – 투자활동 현금흐름","자금차입에 따른 현금유입 – 재무활동 현금흐름","유형자산의 취득에 따른 현금유출 – 투자활동 현금흐름","원재료 구입에 따른 현금유출 – 영업활동 현금흐름"],"c":0,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '배당금의 지급에 따른 현금유출 – 투자활동 현금흐름'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_재무_39","q":"아래에 제시된 ㈜삼일의 재무제표 관련 자료만을 이용하여 영업활동현금흐름을 계산하면 얼마인가 (단,\n㈜삼일은 이자수취를 투자활동으로 분류하고 있다)?\n항목 금액 항목 금액\n당기순이익 200,000원 매출채권 감소 15,000원\n이자수익 20,000원 매입채무 감소 12,000원\n사채상환이익 35,000원 미수이자 증가 6,000원","a":["148,000원","154,000원","162,000원","174,000원"],"c":0,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (148,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_재무_40","q":"다음은 ㈜삼일의 재무상태표 중 매출채권과 대손충당금에 관한 부분이다. 20X2년 포괄손익계산서 상의\n매출액은 560,000원이며, 현금흐름표 상의 매출활동으로 인한 현금유입액은 610,000원이다. 포괄손익\n계산서 상의 대손상각비는 얼마인가?\n구 분 20X2년 12월 31일 20X1년 12월 31일\n매출채권 400,000원 500,000원\n대손충당금 (50,000원) (70,000원)","a":["25,000원","30,000원","40,000원","45,000원"],"c":1,"s":"재무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (30,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_1","q":"다음 중 조세의 개념에 관한 설명으로 옳은 것은?","a":["공공단체가 공공사업에 필요한 경비에 충당하기 위하여 부과하는 공과금도 조세에 해당한다.","조세는 위법행위에 대한 제재에 목적을 두고 있는 과태료와 그 성격이 매우 유사하다.","납세는 국민의 당연한 의무이므로 조세의 과세요건은 법률로 규정할 필요가 없다.","조세는 국가 또는 지방자치단체의 경비충당을 위한 재정수입을 조달할 목적으로 부과된다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '조세는 국가 또는 지방자치단체의 경비충당을 위한 재정수입을 조달할 목적으로 부과된다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_세무_2","q":"다음의 국세기본법상 기간과 기한 및 서류의 송달에 관한 설명으로 옳지 않은 것은?","a":["전자신고의 경우 해당 신고서 등이 국세청장에게 전송된 때에 신고되거나 청구된 것으로 본다.","공시송달의 경우 서류의 주요 내용을 공고한 날부터 14일이 지나면 서류송달이 된 것으로 본다.","교부·우편송달은 송달받아야 할 자에게 도달한 때부터 효력이 발생한다.","서류의 송달은 발신주의를, 우편신고의 경우에는 도달주의를 원칙으로 한다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '서류의 송달은 발신주의를, 우편신고의 경우에는 도달주의를 원칙으로 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_3","q":"국세부과의 원칙 중 법적 형식이나 외관에 관계없이 실질에 따라 세법을 해석하고 과세요건사실을 인정\n해야 한다는 것은 어떤 원칙에 입각한 것인가?","a":["소급과세금지의 원칙","조세법률주의","실질과세의 원칙","신의성실의 원칙"],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '실질과세의 원칙'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_7_세무_4","q":"다음 중 국세기본법상 무신고가산세 또는 과소신고가산세 부과시 부정행위로 보는 것이 아닌 것은?","a":["이중장부의 작성","재산의 은닉","신고기한까지 신고를 하지 아니하는 경우","거짓 증빙의 작성"],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '신고기한까지 신고를 하지 아니하는 경우'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_5","q":"다음 중 법인세법상 과세소득에 관한 설명으로 옳지 않은 것은?","a":["토지 등 양도소득에 대한 법인세는 주택, 별장 및 비사업용 토지의 양도소득에 대해서만 과세하며 비과세법인을 제외한 모든 법인이 부담해야 한다.","청산소득이란 영리내국법인이 해산(합병 또는 분할에 의한 해산 제외)하는 경우에 발생하는 소득을 말한다.","각 사업연도 소득이란 회계학상 계속기업의 가정 아래 매기마다 반복적으로 계산되는 소득을 말한 다.","법인세법상 소득금액은 각 사업연도의 법인의 순자산증가액을 화폐적 수치로써 표시한 가액을 말한 다."],"c":0,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '토지 등 양도소득에 대한 법인세는 주택, 별장 및 비사업용 토지의 양도소득에 대해서만 과세하며 비과세법인을 '는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_6","q":"다음 중 법인세법상 세무조정에 관한 설명으로 옳지 않은 것은?","a":["결산조정사항은 회사장부에 비용으로 계상해야만 손금으로 인정되나 신고조정사항은 장부에 비용으 로 계상하지 않아도 인정된다.","신고조정사항은 경정청구 대상에서 제외되나 결산조정사항은 경정청구의 대상이 된다.","결산조정사항을 당해 사업연도에 비용으로 계상하지 아니한 경우라도 그 이후 사업연도에 결산상 비 용으로 계상하면 손금으로 인정된다.","고유목적사업준비금이나 비상위험준비금은 잉여금 처분에 의한 신고조정사항이다."],"c":1,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. '신고조정사항은 경정청구 대상에서 제외되나 결산조정사항은 경정청구의 대상이 된다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_7","q":"다음 중 법인세법상 익금으로 인정되는 금액의 합계액은 얼마인가?\n(1) 부가가치세 매출세액 200,000 원\n(2) 법인세환급액 100,000 원\n(3) 채무면제이익 100,000 원\n(4) 상품판매로 받은 금액 300,000 원\n(5) 자기주식의 양도금액 100,000 원","a":["300,000 원","400,000 원","500,000 원","700,000 원"],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (500,000 원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_8","q":"다음 중 법인세법상 업무무관경비 손금불산입에 관한 설명으로 옳지 않은 것은?","a":["업무무관부동산의 취득·관리에 따른 비용은 손금불산입한다.","소액주주인 임원이 사용하고 있는 사택의 유지비는 손금불산입한다.","업무무관자산을 취득하기 위하여 지출한 자금의 차입과 관련된 비용은 손금불산입한다.","형법상 뇌물에 해당하는 금전은 손금불산입한다."],"c":1,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. '소액주주인 임원이 사용하고 있는 사택의 유지비는 손금불산입한다.'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_9","q":"㈜삼일은 다음 항목을 손익계산서에 비용으로 처리하였다. ㈜삼일의 제 24기(2024년 1월 1일 ~ 2024\n년 12월 31일) 각 사업연도 소득금액 계산시 손금불산입으로 세무조정해야 하는 금액은 얼마인가?\nㄱ. 국세의 체납으로 인한 강제징수비 5,000,000원\nㄴ. 고용보험료(사용자부담분) 12,000,000원\nㄷ. 법인지방소득세 6,000,000원\nㄹ. 제23기 사업연도에 상법상 소멸시효가 완성된 외상매출금 2,000,000원\nㅁ. 파손으로 인한 재고자산의 평가손실 10,000,000원","a":["11,000,000원","13,000,000원","23,000,000원","24,000,000원"],"c":1,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (13,000,000원). 매출총이익률법: 매출원가 = 매출액 × (1-매출총이익률). 재고손실 = 장부상재고 - 실사재고. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_10","q":"다음 중 법인세법상 손익의 귀속시기에 관한 설명으로 옳지 않은 것은?","a":["손익의 귀속사업연도는 법인세법의 규정을 우선 적용하고 법인세법에 규정되지 않는 사항에 대해서 는 회계기준 등을 따르도록 하고 있다.","위탁판매의 경우 수탁자가 상품을 판매한 날에 손익을 인식한다.","부동산 양도의 경우 소유권이전등기일이 대금청산일보다 빠르더라도 대금청산일이 속하는 사업연도 를 손익의 귀속시기로 한다.","배당소득의 귀속시기는 소득세법상 배당소득의 수입시기를 귀속시기로 한다."],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '부동산 양도의 경우 소유권이전등기일이 대금청산일보다 빠르더라도 대금청산일이 속하는 사업연도 를 손익의 귀속시'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_11","q":"다음 중 법인세법상 감가상각과 관련된 설명으로 옳지 않은 것은?","a":["내용연수는 경제적 내용연수를 추정하여 사용한다.","건물에 엘리베이터 또는 냉난방장치의 설치를 위하여 지출한 금액은 자본적 지출에 해당한다.","재해를 입은 자산에 대한 외장의 복구ㆍ도장 및 유리의 삽입을 위한 지출은 수익적 지출에 해당한 다.","감가상각방법으로 정액법·정률법·생산량비례법을 허용한다."],"c":0,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '내용연수는 경제적 내용연수를 추정하여 사용한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_12","q":"㈜삼일(사업연도 : 1.1 ~ 12.31)은 2023년 1월 1일에 기계장치를 100,000,000원에 취득하였다. 회사\n는 세법상 기계장치에 대한 감가상각방법을 정액법으로, 내용연수는 5년으로 신고하였으며 잔존가치는\n없다. 회사가 2024년 감가상각비로 16,000,000원을 계상한 경우, 다음 각 상황에 따른 세무조정으로\n옳은 것은?\n상황1. 전기 상각부인액이 5,000,000원이 있는 경우\n상황2. 전기 시인부족액이 5,000,000원이 있는 경우\n상황1 상황2","a":["손금산입 4,000,000원 손금산입 4,000,000원","손금산입 5,000,000원 세무조정 없음","손금산입 5,000,000원 손금산입 4,000,000원","손금산입 4,000,000원 세무조정 없음"],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '손금산입 4,000,000원 세무조정 없음'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_세무_13","q":"다음 자료를 이용하여 ㈜삼일의 일반기부금 한도초과액을 계산하면 얼마인가?\nㄱ. 특수관계 없는 종교단체(일반기부금 대상)로부터 시가 300,000,000원의 건물을 438,000,000원\n에 매입하였다.\nㄴ. 특수관계 없는 사회복지법인(일반기부금 대상)에게 장부가액 150,000,000원(시가 300,000,000\n원)의 토지를 180,000,000원에 양도하였다.\nㄷ. 위 매매거래는 모두 정당한 사유가 없으며, 당기 일반기부금 한도액은 45,000,000원이라고 가정\n한다.","a":["33,000,000원","63,000,000원","213,000,000원","243,000,000원"],"c":0,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (33,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_14","q":"다음은 ㈜삼일의 제24기(2024년 1월1일 ~ 2024년 12월31일) 기업업무추진비 보조원장을 요약 정리\n한 것이다. 다음 중 ㈜삼일의 제24기 세무조정으로 옳은 것은(단, 법인세법상 기업업무추진비 한도액\n은 20,000,000원이다)?\n기업업무추진비 보조원장\n적 요 금 액 비 고\n거래처 기업업무추진비(1건) 450,000원 증빙 미수취분\n거래처 기업업무추진비(1건) 20,000원 영수증 수취분\n거래처 기업업무추진비(25건) 22,300,000원 신용카드매출전표 수취분\n합 계 22,770,000원","a":["(손금불산입) 증빙없는 기업업무추진비 470,000원(상여)","(손금불산입) 기업업무추진비 한도초과액 2,750,000원(기타사외유출)","(손금불산입) 증빙없는 기업업무추진비 450,000원(상여) (손금불산입) 기업업무추진비 한도초과액 2,320,000원(기타사외유출)","(손금불산입) 증빙없는 기업업무추진비 470,000원(상여) (손금불산입) 기업업무추진비 한도초과액 2,300,000원(기타사외유출)"],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '(손금불산입) 증빙없는 기업업무추진비 450,000원(상여) (손금불산입) 기업업무추진비 한도초과액 2,32'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_세무_15","q":"법인세법상 다음에 해당하는 지급이자 손금불산입의 유형은 무엇인가?\n사업용 유형자산 및 무형자산의 매입·제작·건설에 소요되는 차입금에 대한 건설기간 중의 지급이\n자 또는 이와 유사한 성질의 지출금을 말한다. 이는 자산의 취득원가에 가산하도록 규정되어 있다.","a":["채권자불분명 사채이자","건설자금이자","비실명채권·증권의 이자상당액","업무무관자산 등에 대한 지급이자"],"c":1,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. '건설자금이자'. 유형자산은 취득원가로 인식 후 감가상각을 통해 내용연수에 걸쳐 비용화합니다. ","src":"cbt"},{"id":"jg_7_세무_16","q":"다음 중 법인세법상 퇴직금 및 퇴직급여충당금과 관련된 설명으로 옳지 않은 것은?","a":["법인의 임원이 연임된 경우에는 현실적 퇴직으로 보지 아니한다.","퇴직급여충당금의 손금산입은 결산조정사항이다.","퇴직급여충당금 전입액은 일정한 한도 내에서만 손금으로 인정된다.","법인세법상 한도를 초과하여 설정된 퇴직급여충당금은 손금불산입되고 기타사외유출로 소득처분된 다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '법인세법상 한도를 초과하여 설정된 퇴직급여충당금은 손금불산입되고 기타사외유출로 소득처분된 다.'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_17","q":"다음 중 법인세법이나 조세특례제한법상의 준비금에 대한 설명으로 옳지 않은 것은?","a":["준비금은 조세정책 목적에서 조세의 납부를 일정기간 유예하는 조세지원제도이다.","준비금은 손금에 산입한 후 환입하거나 비용과 상계하기 때문에 손금에 산입하는 사업연도에는 조세 부담을 경감시키는 효과가 있다.","보험사업을 하는 내국법인은 법인세법에 따라 비상위험준비금을 손금에 산입할 수 있다.","비영리내국법인은 법인세법에 따라 손실보전준비금을 손금에 산입할 수 있다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '비영리내국법인은 법인세법에 따라 손실보전준비금을 손금에 산입할 수 있다.'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_18","q":"㈜삼일은 대표이사에게 보유 중이던 비상장법인인 ㈜용산의 주식을 양도하였다. 다음 자료를 이용하여\n㈜삼일에 대하여 부당행위계산의 부인을 적용할 경우 세무조정으로 옳은 것은?\n(1) 양도주식수는 10,000주이며, 양도가액은 주당 7,000원이다.\n(2) 감정평가법인인 한국감정원에서 양도일부터 3개월 전에 ㈜용산의 주식을 감정평가하였는데,\n1주당 평가액은 9,000원이었다.\n(3) 양도 당시 장외시장에서 거래되는 ㈜용산의 주식의 1주당 거래가격은 10,000원이며,\n이 금액은 법인세법상 시가로 인정되는 금액이다.","a":["세무조정없음","익금산입 20,000,000원","익금산입 25,000,000원","익금산입 30,000,000원"],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번 (익금산입 30,000,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_19","q":"다음은 중소기업인 ㈜삼일의 제24기(2024년 1월 1일 ~ 2024년 12월 31일) 세무조정계산서의 일부이\n다. 담당 회계사의 검토를 받던 중 회사는 아래와 같은 항목이 세무조정 시 누락된 것을 확인하고 이를\n수정하기로 했다. 수정 후 올바른 과세표준은 얼마인가?\n(단위 : 원)\n(101)결산서상당기순손익 01 200,000,000","a":["각 (102)익 금 산 입 02 20,000,000 소득조정금액 사 (103)손 금 산 입 03 35,000,000 업 연 (104)차가감 소득금액 (101＋102－103) 04 185,000,000 도 소 (105)기부금한도초과액 05 0 득 계 (106)기부금한도초과 이월액손금산입 54 0 산 (107)각 사업연도 소득금액 (104＋105-106) 06 185,000,000 (108)각 사업연도 소득금액 (108=107) 185,000,000","과 (109)이 월 결 손 금 07 0 세 표 (110)비 과 세 소 득 08 0 준 계 (111)소 득 공 제 09 0 산 (112)과 세 표 준 (108－109－110－111) 10 185,000,000 <누락사항> ㄱ. 이월결손금 2007년(제 7기) 50,000,000원 2016년(제 16기) 30,000,000원 2018년(제 18기) 15,000,000원 ㄴ. 일반기부금 한도초과액 15,000,000원 ① 105,000,000원 ② 125,000,000원","145,000,000원","155,000,000원"],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '155,000,000원'. 세무조정은 기업회계 이익을 세법상 과세소득으로 전환하는 과정으로, 익금산입·손금불산입 등을 통해 조정합니다. ","src":"cbt"},{"id":"jg_7_세무_20","q":"다음 중 법인세법상 법인세 신고와 납부에 관한 설명으로 옳은 것은?","a":["중간예납의무가 있는 모든 법인은 직전 사업연도의 실적을 기준으로 중간예납세액을 계산하여 납부 하여야 한다.","성실신고확인서를 제출하는 내국법인은 각 사업연도의 종료일이 속하는 달의 말일부터 5개월 이내 에 법인세 과세표준과 세액을 신고하여야 한다.","법인세 과세표준 신고시 법인세 과세표준 및 세액신고서를 제출한 경우 재무상태표를 제출하지 않아 도 무신고로 보지 않는다.","법인세 납부세액이 1천만원을 초과하는 경우 납부기한이 지난 날부터 1개월(중소기업은 2개월) 이 내에 분납할 수 있다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '법인세 납부세액이 1천만원을 초과하는 경우 납부기한이 지난 날부터 1개월(중소기업은 2개월) 이 내에 분납할'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_세무_21","q":"다음 중 소득세와 관련된 설명으로 옳지 않은 것은?","a":["개인의 세금부담능력(담세력)은 소득의 증가에 비례하여 누진적으로 증가하므로 누진과세를 채택하 고 있다.","이자소득은 유형별 포괄주의를 채택하고 있으므로 이자소득으로 열거된 것과 유사한 것으로서 금전 사용에 따른 대가로서의 성격이 있는 것은 법령에 열거되어 있지 않아도 이자소득으로 본다.","퇴직소득 및 양도소득은 다른 소득과 합산하지 않고 별도로 과세하는 분류과세 방식이 적용된다.","소득세는 납세의무자가 과세표준확정신고를 하더라도 소득세가 확정되지 않고 정부가 결정함으로서 비로소 확정된다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '소득세는 납세의무자가 과세표준확정신고를 하더라도 소득세가 확정되지 않고 정부가 결정함으로서 비로소 확정된다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_22","q":"다음 중 소득세법상 금융소득에 관한 설명으로 옳지 않은 것은?","a":["법원보증금의 이자는 무조건 종합과세한다.","비실명으로 가입한 저축 등에서 발생하는 이자소득은 높은 세율로 과세하기 위해 무조건 분리과세 한다.","보통예금의 이자소득은 원칙적으로 실제로 지급받은 날을 수입시기로 한다.","금융소득 종합과세란 이자소득과 배당소득을 종합소득에 합산하여 과세하는 제도이다."],"c":0,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '법원보증금의 이자는 무조건 종합과세한다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_23","q":"다음은 2024년 김삼일씨의 상가임대 관련 소득 내역이다. 김삼일씨의 2024년 부동산임대 관련 사업소\n득의 총수입금액을 계산하면 얼마인가(단, 임대보증금은 없는 것으로 가정한다)?\nㄱ. 임대기간 : 2024년 8월 1일 - 2025년 7월 31일\nㄴ. 임 대 료 : 60,000,000원(2024년 7월 1일에 선불로 수령함)","a":["25,000,000원","30,000,000원","60,000,000원","100,000,000원"],"c":0,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (25,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_24","q":"다음 자료에 의하여 거주자 김삼일씨의 2024년 근로소득금액을 계산하면 얼마인가?\nㄱ. 월급여：2,000,000원\nㄴ. 상여：월급여의 500 %\nㄷ. 실비변상적 성격의 자가운전보조금：월 200,000원\nㄹ. 중식대：월 200,000원(식사를 제공받지 않음)\nㅁ. 연간 연월차수당 총합계：1,000,000원\n* 김삼일씨는 당해 1년 동안 계속 근무하였다.\n연간급여액 근로소득공제액\n1,500만원 초과 4,500만원 이하 750만원 ＋ 1,500만원 초과액×15 %\n4,500만원 초과 1억원 이하 1,200만원 ＋ 4,500만원 초과액×5 %","a":["21,330,000원","23,650,000원","24,500,000원","25,520,000원"],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (24,500,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_25","q":"다음 중 연금소득에 관한 설명으로 옳지 않은 것은?","a":["개인이 가입한 연금계좌에서 연금수령한 사적연금소득도 연금소득으로 과세된다.","국민연금법에 따라 받는 유족연금은 연금소득으로 과세되지 않는다.","연금소득금액 계산시 필요경비인정방식과 연금 소득공제방식 중 선택하여 적용 가능하다.","공적연금소득에 대한 수입시기는 연금을 지급받기로 한 날로 한다."],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '연금소득금액 계산시 필요경비인정방식과 연금 소득공제방식 중 선택하여 적용 가능하다.'는 잘못된 설명입니다. 소득세법상 필요경비 인정 범위를 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_26","q":"다음 중 소득세법상 인적공제에 관한 설명으로 옳은 것은?","a":["기본공제는 생계를 같이하는 가족 1명당 150만원을 공제하는 것으로 본인은 공제대상에 포함하지 않는다.","기본공제를 적용하는 경우 장애인은 소득금액요건을 적용하지 않는다.","경로우대자 공제는 기본공제대상자의 연령이 만 65세 이상인 경우 적용한다.","종합소득금액이 3천만원 이하인 여성거주자가 배우자가 있는 경우 부녀자 공제를 받을 수 있다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '종합소득금액이 3천만원 이하인 여성거주자가 배우자가 있는 경우 부녀자 공제를 받을 수 있다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_세무_27","q":"다음은 근로소득자(일용근로자 아님)인 이주원씨가 자녀들을 위하여 지출한 교육비와 관련한 자료이다.\n연말정산시 세액공제대상 교육비는 모두 얼마인가(단, 제시된 자료 외에는 없는 것으로 가정한다)?\nㄱ. 자녀의 연령 및 소득\n- 장남 : 29세(대학원생), 소득금액 없음\n- 차남 : 23세(대학생), 사업소득금액 80 만원\n- 장녀 : 15세(중학생), 소득금액 없음\nㄴ. 자녀의 교육비 지출액\n- 장남의 대학원 수업료 12,000,000 원\n- 차남의 대학교 수업료 12,000,000 원\n- 장녀의 고등학교 수업료 5,000,000 원","a":["5,000,000원","12,000,000원","17,000,000원","29,000,000원"],"c":1,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (12,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_28","q":"다음 중 소득세법상 원천징수에 관한 설명으로 옳지 않은 것은?","a":["원천징수는 납세의무자 입장에서 세금부담을 가중시킨다.","원천징수는 징세비용절약과 징수사무의 간소화를 기한다.","원천징수는 조세수입의 조기확보와 정부재원조달의 평준화를 기한다.","완납적 원천징수에 해당하면 별도의 확정신고가 불필요하다."],"c":0,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '원천징수는 납세의무자 입장에서 세금부담을 가중시킨다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_29","q":"다음 중 양도소득세 과세대상은 몇 개인가?\nㄱ. 골프회원권을 양도한 경우\nㄴ. 토지를 무상이전한 경우\nㄷ. 자산총액 중 토지와 건물의 합계액이 90 % 인 골프장을 직접 경영하는 법인의 주식을 양도하는\n경우\nㄹ. 부동산 상의 권리와 함께 양도하는 영업권","a":["1개","2개","3개","4개"],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '3개'. 양도소득세는 자산의 양도차익에 대해 과세하며, 장기보유특별공제 등 각종 공제가 적용됩니다. ","src":"cbt"},{"id":"jg_7_세무_30","q":"다음은 소득세법상 중간예납에 관한 설명으로 옳지 않은 것은?","a":["중간예납은 1 년간 소득에 대한 소득세를 분할 예납하게 하여 정부의 세수조기확보 및 납세자의 자 금부담을 분산시킬 수 있다.","소득세 중간예납대상자는 종합소득이 있는 거주자 중 사업소득이 있는 자이다.","중간예납세액이 50만원 미만일 경우 중간예납세액을 징수하지 아니한다.","중간예납기간은 매년 1월 1일부터 6월 30일까지의 기간으로 하며 납부기한은 9월 30일이다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '중간예납기간은 매년 1월 1일부터 6월 30일까지의 기간으로 하며 납부기한은 9월 30일이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_31","q":"원재료 생산업자가 생산한 원료를 ㈜삼일에게 2,000,000원에 판매하고, ㈜삼일은 제품을 생산하여 도매\n업자인 ㈜용산에게 5,000,000원에 판매하였다. 그 후 ㈜용산은 소매업자인 ㈜강남에게 7,000,000원에\n판매하고, ㈜강남은 소비자 김삼일에게 10,000,000원에 판매한 경우 전체 거래에서 창출된 총 부가가치\n금액을 구하면 얼마인가?","a":["8,000,000원","10,000,000원","22,000,000원","24,000,000원"],"c":1,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (10,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_32","q":"다음 중 부가가치세법상 사업자등록에 관한 설명으로 옳지 않은 것은?","a":["부가가치세 면세사업자는 부가가치세법상 사업자등록의무가 없다.","신규로 사업을 개시하고자 하는 자는 사업개시일 전이라도 사업자등록을 할 수 있다.","다수의 사업장을 가진 사업자단위과세사업자는 사업장마다 사업개시일부터 20일 내에 사업자 등록 신청을 하여야 한다.","사업자등록신청을 받은 세무서장은 원칙적으로 2일 이내에 사업자등록증을 발급하여야 한다."],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '다수의 사업장을 가진 사업자단위과세사업자는 사업장마다 사업개시일부터 20일 내에 사업자 등록 신청을 하여야 '는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_33","q":"다음 중 부가가치세법상 과세기간에 관한 설명으로 옳지 않은 것은?","a":["일반과세자가 간이과세자로 변경되는 경우 과세유형이 변경되는 해에 간이과세규정이 적용되는 과세 기간은 1월 1일부터 12월31일까지이다.","간이과세자의 경우 과세기간을 1월 1일부터 12월 31일로 적용한다.","신규사업자의 경우 사업개시일부터 사업개시일이 속하는 과세기간의 종료일까지를 최초 과세기간으 로 한다.","폐업자는 폐업일이 속하는 과세기간 개시일부터 폐업일까지를 최종 과세기간으로 한다."],"c":0,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '일반과세자가 간이과세자로 변경되는 경우 과세유형이 변경되는 해에 간이과세규정이 적용되는 과세 기간은 1월 1'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_34","q":"다음 중 부가가치세의 납세지에 관한 내용으로 옳지 않은 것은?","a":["사업장은 사업자가 사업을 하기 위하여 거래의 전부 또는 일부를 하는 고정된 장소로 한다.","직매장이란 사업자가 자기의 사업과 관련하여 생산하거나 취득한 재화를 직접 판매하기 위하여 특별 히 판매시설을 갖춘 장소를 말하며, 직매장은 사업장으로 본다.","재화를 보관하고 관리할 수 있는 시설만 갖춘 장소로서 하치장으로 신고된 장소는 사업장으로 보지 아니한다.","사업자단위과세제도에 따라 사업자단위 신고·납부를 하는 경우에도 세금계산서의 발급과 수령은 본 점 또는 주사무소에서 수행할 수 없고 각 사업장에서 수행해야 한다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '사업자단위과세제도에 따라 사업자단위 신고·납부를 하는 경우에도 세금계산서의 발급과 수령은 본 점 또는 주사무'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_35","q":"다음 중 부가가치세 과세대상에 관한 설명으로 옳은 것을 모두 고르면?\nㄱ. 재화 또는 용역의 공급은 부가가치세 과세대상이며, 재화의 수입은 부가가치세 과세대상에 해당\n되지 않는다.\nㄴ. 고용관계에 의해 근로를 제공하는 것은 부가가치세 과세대상인 용역의 공급이 아니다.\nㄷ. 용역의 무상공급은 부가가치세법상 용역의 공급으로 보지 않지만 특수관계인에게 무상으로 제공\n하는 부동산임대용역은 용역의 공급으로 본다.\nㄹ. 건설업의 경우 건설업자가 건설자재의 전부 또는 일부를 부담하는 경우 재화의 공급으로 본다.","a":["ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄹ","ㄷ, ㄹ"],"c":1,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. 'ㄴ, ㄷ'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_세무_36","q":"다음 중 부가가치세법상 재화·용역의 공급시기에 관한 내용으로 옳지 않은 것은?","a":["통상적인 용역공급 : 역무의 제공이 완료되는 때","재화의 장기할부판매 : 계약에 따라 대가의 각 부분을 받기로 한 때","재화의 위탁판매 : 수탁자 또는 대리인의 공급시기","재화의 반환부조건판매 : 재화를 인도하는 때"],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '재화의 반환부조건판매 : 재화를 인도하는 때'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_37","q":"다음 중 부가가치세법에 따른 영세율과 면세에 관한 설명으로 옳지 않은 것은?","a":["영세율의 목적은 소비지국 과세원칙의 구현 등에 있고, 면세의 목적은 부가가치세의 역진성 완화 등 에 있다.","영세율 적용대상자는 부가가치세법에 따른 납세의무자이지만, 면세 적용대상자는 부가가치세법에 따 른 납세의무자가 아니다.","면세사업자가 영세율을 적용받기 위해서는 면세를 포기하여야 한다.","면세가 적용되는 경우에는 매입세액을 환급받을 수 있는 반면, 영세율이 적용되는 경우에는 매입세 액을 환급받을 수 없다."],"c":3,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '면세가 적용되는 경우에는 매입세액을 환급받을 수 있는 반면, 영세율이 적용되는 경우에는 매입세 액을 환급받을'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_세무_38","q":"다음 자료를 이용하여 과세사업을 영위하는 ㈜삼일의 2024년 제 2기 예정신고기간의 부가가치세 과세\n표준을 구하면 얼마인가?\nㄱ. 특수관계가 없는 자에 대한 외상매출액 200,000,000원\n(매출에누리 5,000,000원, 매출할인 10,000,000원이 차감되어 있음)\nㄴ. 특수관계인에 대한 재화매출액(시가 60,000,000원) 40,000,000원\nㄷ. 상가건물의 처분액 700,000,000원\nㄹ. 하치장 용도로 사용하던 토지의 처분액 15,000,000원","a":["250,000,000원","940,000,000원","960,000,000원","975,000,000원"],"c":2,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (960,000,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_39","q":"다음 자료를 이용하여 음식점업을 영위하고 있는 일반과세자인 김삼일씨의 제2기 예정신고기간의 매입\n세액공제액을 계산하면 얼마인가(음식점업(과세유흥장소 아님)의 의제매입세액공제율은 108분의 8이\n며, 공제한도를 초과하지 않는다고 가정한다)?\nㄱ. 세금계산서 수령 매입액(부가가치세 제외금액) : 50,000,000원\nㄴ. 세금계산서 수령분 중 기업업무추진비 관련 매입액(부가가치세 제외금액) : 5,000,000원\nㄷ. 면세로 구입한 농산물(계산서 수령) : 27,000,000원\nㄹ. 영수증 수령 비품매입액(부가가치세 포함) : 4,400,000원","a":["6,500,000원","6,900,000원","7,000,000원","7,400,000원"],"c":0,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (6,500,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_세무_40","q":"다음 중 부가가치세법상 가산세에 관한 설명으로 옳지 않은 것은?","a":["세금계산서불성실가산세(미발급은 제외)와 매출처별세금계산서합계표 불성실가산세에 동시에 해당하 는 경우 두가지 모두 적용한다.","신규로 사업을 개시한 사업자가 기한 내에 사업자등록을 신청하지 아니한 경우 사업개시일부터 등록 신청일의 직전일까지의 공급가액에 대하여 1 % 를 미등록가산세가 부과된다.","예정신고시 제출하지 않은 매출처별세금계산서합계표를 확정신고시에 제출한 경우에 가산세를 납부 하여야 한다.","세금계산서의 필요적 기재사항의 전부 또는 일부가 적혀있지 아니한 경우 가산세가 부과된다."],"c":0,"s":"세무회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '세금계산서불성실가산세(미발급은 제외)와 매출처별세금계산서합계표 불성실가산세에 동시에 해당하 는 경우 두가지 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_1","q":"다음 중 원가회계의 한계점에 관한 설명으로 옳지 않은 것은?","a":["비화폐성 정보와 질적인 정보는 제공하지 못한다.","특정한 시점에서 모든 의사결정에 목적적합한 원가정보를 제공할 수는 없다.","경영자의 목적에 따라 다양한 회계절차를 적용해야 하는 어려움이 있다.","객관적으로 측정가능한 회계자료를 기초로 수익과 비용을 인식해야 하므로 자료수집에 어려움이 있 다."],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '객관적으로 측정가능한 회계자료를 기초로 수익과 비용을 인식해야 하므로 자료수집에 어려움이 있 다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_2","q":"다음은 ㈜삼일의 20X1년 한 해 동안의 제조원가 자료이다. ㈜삼일의 20X1년 손익계산서상의 매출원가\n를 계산하면 얼마인가?\n기 초 기 말\n직접재료 4,000원 6,000원\n재공품 10,000원 5,000원\n제 품 12,000원 10,000원\n직접재료 매입액 25,000원\n가공원가 발생액 32,000원","a":["58,000원","60,000원","62,000원","68,000원"],"c":2,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (62,000원). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_3","q":"원가배분은 공통원가를 원가대상에 합리적으로 대응시키는 과정을 말한다. 다음 중 원가배분기준 선택\n에서 가장 먼저 고려할 사항은?","a":["각 원가대상의 효율성 제고","원가동인과의 인과관계 고려","각 원가대상에 균등하게 배분","입수비용이 가장 저렴한 배부기준"],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. '원가동인과의 인과관계 고려'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_7_원가_4","q":"㈜삼일은 보조부문에 대하여 단계배부법에 의하여 보조부문원가를 배부하며, 두개의 제조부문(제조A\n부, 제조B부)과 두 개의 보조부문(보조X부, 보조Y부)을 두고 있다. 다음 자료에 따라 제조B부에 배\n부되는 보조Y 부문의 원가는 얼마인가(단, 보조X부를 먼저 배분한다)?\n용역사용부문 제조부문 보조부문\n합계\n용역제공부문\nA부 B부 X부 Y부\n보조X부 50 % 30 % 20 % 100 %\n보조Y부 20 % 60 % 20 % 100 %\n발생원가 800,000원 400,000원","a":["240,000원","420,000원","600,000원","640,000원"],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (420,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_5","q":"다음 중 개별원가계산에 관한 설명으로 옳지 않은 것은?","a":["원가계산 자료가 단순하고 명료하여 오류 발생 가능성이 낮다.","간접원가의 배부 절차가 반드시 필요하다.","개별작업에 집계되는 실제원가를 예산액과 비교하여 미래예측에 이용할 수 있다.","수요자의 요구에 따라 개별적으로 제품을 생산하는 업종에서 주로 사용한다."],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '원가계산 자료가 단순하고 명료하여 오류 발생 가능성이 낮다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_6","q":"㈜삼일은 과거 원가자료를 분석하여 아래와 같은 제조간접원가 예산식을 만들었다.\n연간 제조간접원가예산 = ￦200,000 + @200 X 직접노동시간\n회사가 총직접노동시간을 1,000시간으로 예상하고 있을 때, 제조간접원가 예정배부율은 얼마인가?","a":["직접노동시간당 300 원","직접노동시간당 400 원","직접노동시간당 500 원","직접노동시간당 600 원"],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. '직접노동시간당 400 원'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_7_원가_7","q":"다음 자료를 읽고 문제에 답하시오.\nㄱ. ㈜삼일에는 두 개의 제조부문(A, B)이 있다. 다음은 당기의 자료이다.\nA부문 B부문 합 계\n제조간접원가 500,000원 640,000원 1,140,000원\n직접노무시간 2,000시간 8,000시간 10,000시간\nㄴ. 당기 중 착수하여 완성된 #2052 작업의 원가자료는 다음과 같다.\nA부문 B부문 합 계\n직접재료원가 30,000원 20,000원 50,000원\n직접노무원가 20,000원 32,000원 52,000원\n직접노무시간 120시간 240시간 360시간\nㄷ. 회사는 직접노무시간을 기준으로 제조간접원가를 배부하고 있다.\n부문별 제조간접원가 배부율을 사용할 경우 #2052의 가공원가는 얼마인가?","a":["93,040원","99,200원","100,000원","101,200원"],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번 (101,200원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_8","q":"다음 중 종합원가계산에 관한 설명으로 옳지 않은 것은?","a":["기초재공품이 없을 경우, 선입선출법에 의한 제품제조원가가 평균법에 의한 제품제조원가보다 적게 나타난다.","원가요소별 단위당 원가는 완성품환산량에 기초하여 계산된다.","원가관리 및 통제가 공정이나 부문별로 수행되므로 원가에 대한 책임중심점이 명확해진다.","동일한 과정을 거쳐서 생산된 제품은 동질적이기 때문에 각 제품의 단위당 원가도 동일하다고 가정 한다."],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '기초재공품이 없을 경우, 선입선출법에 의한 제품제조원가가 평균법에 의한 제품제조원가보다 적게 나타난다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_9","q":"㈜삼일은 선입선출법을 이용한 종합원가계산제도를 채택하고 있다. 당월 완성품환산량 단위당 원가는\n재료원가 10원, 가공원가 5원이며, 당월 중 생산과 관련된 자료는 다음과 같다.\n기초재공품 500단위 (완성도 40 %)\n기말재공품 800단위 (완성도 50 %)\n당기완성품 4,200단위\n이 회사의 당월 실제 발생한 가공원가는 얼마인가(단, 재료원가는 공정초기에 전량투입되고 가공원가는\n공정전반에 걸쳐 균등하게 발생한다고 가정한다)?","a":["21,500원","22,000원","22,500원","45,000원"],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (22,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_10","q":"㈜삼일은 평균법을 이용한 종합원가계산제도를 채택하고 있다. 재료는 공정초기에 전량 투입되며, 가공\n원가는 공정전반에 걸쳐 균등하게 발생한다. 당기 완성품원가와 기말재공품원가를 계산하면 얼마인가?\n<수량>\n기초재공품 80개(완성도 40 %) 당기완성품 400개\n당기투입량 420개 기말재공품 100개(완성도 40 %)\n<원가> 재료원가 가공원가\n기초재공품원가 8,000,000원 5,720,000원\n당기발생원가 32,260,000원 28,556,000원\n당기완성품원가 기말재공품원가","a":["63,368,000원 11,168,000원","63,368,000원 15,842,000원","67,760,000원 12,266,000원","67,760,000원 16,940,000원"],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (63,368,000원 11,168,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_11","q":"다음 중 정상원가계산에 관한 설명으로 옳은 것을 모두 고르면?\nㄱ. 실제원가계산에 비하여 제품의 원가계산이 지연된다는 문제점이 있다.\nㄴ. 직접재료원가와 직접노무원가를 실제원가로 측정한다.\nㄷ. 원가계산제도를 실제원가계산, 정상원가계산, 표준원가계산으로 구분하는 것은 제품원가의\n구성항목에 따른 것이다.","a":["ㄴ","ㄱ,ㄴ","ㄴ,ㄷ","ㄱ,ㄴ,ㄷ"],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. 'ㄴ'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_원가_12","q":"다음 중 표준 직접재료원가 결정에 관한 설명으로 옳지 않은 것은?","a":["표준 소비수량은 제품 생산에 필요한 각종 재료의 종류, 품질, 가공방법 등을 고려하여 결정한다.","표준 직접재료비는 직접재료의 종류별로 제품 단위당 표준 소비수량과 표준 소비가격을 설정하고 이 를 곱하여 산정한다.","표준 소비수량은 과학적·통계적 조사에 의하여 결정하여야 하며, 여기에 정상적인 공손 및 감손은 제외한다.","표준 소비가격은 과거 및 현재의 시장가격과 장래에 예측되는 가격 동향이나 거래관습 등 제반 여건 을 고려하여 결정한다."],"c":2,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '표준 소비수량은 과학적·통계적 조사에 의하여 결정하여야 하며, 여기에 정상적인 공손 및 감손은 제외한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_13","q":"다음 중 차이분석에 관한 설명으로 올바른 것은 모두 몇 개인가?\n가. 차이분석이란 표준원가와 실제원가를 비교하여 그 차이를 분석하는 것으로서, 일종의 투입-\n산출 분석이다.\n나. 직접재료원가 차이분석시 표준투입량은 사전에 미리 설정해 놓은 최대 조업도에 대한 표준투\n입량이다.\n다. 가격차이는 실제원가와 실제투입량에 대한 표준원가와의 차이이다.\n라. 능률차이는 실제투입량에 대한 표준원가와 표준투입량에 대한 표준원가와의 차이이다.","a":["1개","2개","3개","4개"],"c":2,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '3개'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_원가_14","q":"㈜삼일의 직접재료원가에 관한 자료가 다음과 같을 때 직접재료원가 능률차이를 계산하면 얼마인가?\n제품실제생산량 2,000개\n제품 1개당 실제투입수량 6 kg\nkg당 실제재료원가 400원\n제품 1개당 표준투입수량 5 kg\n직접재료원가 kg당 표준가격 300원","a":["300,000원(유리)","300,000원(불리)","600,000원(유리)","600,000원(불리)"],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번 (600,000원(불리)). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_15","q":"㈜삼일의 변동제조간접원가와 관련한 자료가 다음과 같을 때 변동제조간접원가 능률차이를 계산하면 얼\n마인가?\n변동제조간접원가 실제 발생액 7,000,000원\n실제작업시간기준 변동제조간접원가 예산 7,235,000원\n실제생산량에 허용된 변동제조간접원가 예산 7,100,000원","a":["135,000원(불리)","135,000원(유리)","235,500원(불리)","235,500원(유리)"],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (135,000원(불리)). 예산차이 = 실제원가 - 예산원가. 조업도차이와 능률차이로 세분화할 수 있습니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_16","q":"다음 중 원가부착개념(cost attach concept)에 근거를 둔 원가계산에서 재고자산가액에 포함되는 항목\n을 모두 고르면?\nㄱ. 직접재료원가\nㄴ. 직접노무원가\nㄷ. 변동제조간접원가\nㄹ. 고정제조간접원가\nㅁ. 변동판매비와관리비","a":["ㄱ","ㄱ,ㄴ,ㄷ","ㄱ,ㄴ,ㄷ,ㄹ","ㄱ,ㄴ,ㄷ,ㅁ"],"c":2,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. 'ㄱ,ㄴ,ㄷ,ㄹ'. 재고자산은 판매목적으로 보유하는 자산으로, 취득원가와 순실현가능가치 중 낮은 금액으로 평가합니다(저가법). ","src":"cbt"},{"id":"jg_7_원가_17","q":"다음 중 변동원가계산, 전부원가계산 및 초변동원가계산에 관한 설명으로 옳지 않은 것은?","a":["표준원가는 변동원가계산에는 사용될 수 없고 전부원가계산에서만 사용된다.","전부원가계산에서 계산된 영업이익은 판매량뿐만 아니라 생산량의 변화에도 영향을 받는다.","변동원가계산은 기업의 내부계획 및 단기의사결정 목적으로 활용된다.","초변동원가계산에서는 혼합원가의 주관적 구분이 불필요하다."],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. 전부원가계산은 고정제조간접원가를 제품원가에 포함합니다. 변동원가계산은 변동제조원가만 제품원가로, 고정제조간접원가는 기간비용으로 처리합니다. 재고 증가 시 전부원가이익 > 변동원가이익.","src":"cbt"},{"id":"jg_7_원가_18","q":"㈜삼일의 6월 중 아래 영업자료를 참고하여 전부원가계산과 변동원가계산에 의한 순이익을 비교한 것으\n로 옳은 것은(재고자산은 평균법으로 평가한다)?\n생 산 량 1,200개 판매량 800개\n판매단가 100원 기초재고량 200개\n(단위당 고정제조간접원가 27원)\n고정제조간접원가 24,000원 고정판매관리비 12,000원\n단위당 변동판매관리비 15원 단위당 변동제조원가 30원","a":["전부원가계산에 의한 순이익이 변동원가계산에 의한 순이익보다 6,600원 더 많다.","전부원가계산에 의한 순이익이 변동원가계산에 의한 순이익보다 7,200원 더 많다.","전부원가계산에 의한 순이익이 변동원가계산에 의한 순이익보다 12,600원 더 많다.","전부원가계산에 의한 순이익이 변동원가계산에 의한 순이익보다 12,600원 더 적다."],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. 전부원가계산은 고정제조간접원가를 제품원가에 포함합니다. 변동원가계산은 변동제조원가만 제품원가로, 고정제조간접원가는 기간비용으로 처리합니다. 재고 증가 시 전부원가이익 > 변동원가이익.","src":"cbt"},{"id":"jg_7_원가_19","q":"㈜삼일의 초변동원가계산에 의한 영업이익이 5,000,000원이라고 할 때 아래의 자료를 이용하여 변동원\n가계산에 의한 영업이익을 구하면 얼마인가(단, 기초와 기말 재공품 재고는 존재하지 않으며, 각 원가\n항목별 단가의 변동은 없음을 가정한다)?\n기초제품재고수량 3,000개\n기말제품재고수량 2,000개\n제품단위당 고정제조간접원가 500원\n제품단위당 변동제조간접원가 300원\n제품단위당 직접노무원가 200원","a":["4,400,000원","4,500,000원","5,400,000원","5,500,000원"],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (4,500,000원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_20","q":"변동원가계산에 의한 공헌이익 손익계산서 작성 자료가 아래와 같을 경우 공헌이익을 계산하면 얼마인\n가?\n판매수량 3,500개\n단위당 판매가격 4,200원\n단위당 변동제조원가 2,300원\n단위당 변동판매비와관리비 300원\n고정제조간접원가 2,000,000원\n고정판매비와관리비 500,000원","a":["3,600,000원","3,780,000원","5,600,000원","6,650,000원"],"c":2,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (5,600,000원). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_21","q":"다음 활동기준원가계산(ABC)의 절차를 올바르게 나타낸 것은 무엇인가?\nⓐ 원가대상별 원가계산\nⓑ 활동분석\nⓒ 제조간접원가 배부율 계산\nⓓ 활동별 원가동인(배부기준의 결정)\nⓔ 각 활동별로 제조간접원가를 집계","a":["ⓔ－ⓑ－ⓓ－ⓒ－ⓐ","ⓑ－ⓒ－ⓓ－ⓔ－ⓐ","ⓑ－ⓔ－ⓒ－ⓓ－ⓐ","ⓑ－ⓔ－ⓓ－ⓒ－ⓐ"],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. 'ⓑ－ⓔ－ⓓ－ⓒ－ⓐ'. 활동기준원가계산(ABC)은 활동별로 원가를 추적·배부하여 더 정확한 제품원가를 산정합니다. ","src":"cbt"},{"id":"jg_7_원가_22","q":"다음 중 원가추정방법에 관한 설명으로 옳지 않은 것은?","a":["공학적 방법은 과거의 원가 자료를 이용할 수 없는 경우 적용이 불가능하다.","계정분석법은 분석자의 주관적 판단이 개입될 수 있는 원가추정방법이다.","고저점법은 최고조업도와 최저조업도의 원가자료를 이용하여 원가함수를 추정하는 방법이다.","회귀분석법에 의한 추정에 있어 통계적 가정이 충족되지 않을 때는 무의미한 결과가 산출될 수 있 다."],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '공학적 방법은 과거의 원가 자료를 이용할 수 없는 경우 적용이 불가능하다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_23","q":"다음 중 영업레버리지에 관한 설명으로 옳지 않은 것은?","a":["영업레버리지란 영업고정원가가 지렛대의 작용을 함으로써 매출액의 변화율보다 영업이익의 변화율 이 확대되는 효과이다.","영업고정원가의 비중이 큰 기업은 영업레버리지가 크며, 영업고정원가의 비중이 작은 기업은 영업 레버리지가 작다.","고정원가가 없는 기업은 영업레버리지 효과가 없기 때문에 영업레버리지도는 0(영)이다.","일반적으로 한 기업의 영업레버리지도는 손익분기점 부근에서 가장 크며, 매출액이 증가함에 따라 점점 작아진다."],"c":2,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '고정원가가 없는 기업은 영업레버리지 효과가 없기 때문에 영업레버리지도는 0(영)이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_24","q":"다음 중 CVP분석에 관한 설명으로 옳은 것은?","a":["조업도와 원가의 변화가 이익에 어떠한 영향을 미치는가를 분석하는 기법이다.","생산량과 판매량은 다르다고 가정한다.","기초적인 CVP분석에 있어 원가함수는 선형이라는 가정이 필요하지만, 수익함수는 선형이라는 가정 이 필요하지 않다.","공헌이익률은 원가구조와 밀접한 관련이 있으며, 총원가 중 변동원가 비중이 높으면 공헌이익률도 높게 나타난다."],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '조업도와 원가의 변화가 이익에 어떠한 영향을 미치는가를 분석하는 기법이다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_원가_25","q":"㈜삼일은 야구공을 제조하여 개당 10,000원에 판매하고 있다. 야구공 제조에 사용되는 변동원가는 개\n당 5,000원이고 월고정원가는 2,000,000원이다. ㈜삼일이 월 1,500,000원의 세후이익을 얻기 위해서\n는 몇 개의 야구공을 생산ㆍ판매하여야 하는가(단, ㈜삼일은 20 % 의 단일 법인세율을 적용받는다)?","a":["387개","400개","700개","775개"],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '775개'. 전부원가계산은 고정제조간접원가를 제품원가에 포함하고, 변동원가계산은 기간비용으로 처리합니다. ","src":"cbt"},{"id":"jg_7_원가_26","q":"기업은 미래의 불확실성에 대처하기 위하여 계획을 수립하며, 이러한 계획의 일부분으로서 예산을 편\n성한다. 예산은 다양하게 분류할 수 있는데 조업도의 변동에 따라 조정되어 작성되는 예산을 무엇이라\n하는가?","a":["종합예산","운영예산","고정예산","변동예산"],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '변동예산'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_7_원가_27","q":"다음 중 책임회계제도에 관한 설명으로 옳지 않은 것은?","a":["책임회계제도가 그 기능을 효율적으로 수행하기 위해서는 각 책임중심점의 경영자가 권한을 위임받 은 원가항목들에 대해 통제권을 행사할 수 없어야 한다.","책임중심점이란 경영관리자가 특정활동에 대해 통제할 책임을 지는 조직의 부문을 말한다.","책임회계제도 하에서는 권한을 위임 받은 관리자가 책임범위 내에서 독자적인 의사결정을 내릴 수 있다.","책임중심점은 책임의 성격 및 책임범위에 따라 원가중심점, 수익중심점, 이익중심점 및 투자중심점 으로 분류할 수 있다."],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '책임회계제도가 그 기능을 효율적으로 수행하기 위해서는 각 책임중심점의 경영자가 권한을 위임받 은 원가항목들에'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_28","q":"다음 중 책임중심점과 책임범위에 대하여 잘못 짝지어진 것은?","a":["원가중심점 – 통제가능한 원가","수익중심점 – 매출액, 매출원가","이익중심점 – 수익, 원가","투자중심점 – 수익, 원가, 투자 의사결정"],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번. '수익중심점 – 매출액, 매출원가'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_7_원가_29","q":"다음 중 사업부별 성과평가에 관한 설명으로 옳은 것은?","a":["통제가능원가와 통제불능원가는 구분의 실익이 없다.","특정사업부로의 추적가능성에 따른 사업부별 추적가능고정원가와 공통고정원가는 구분하지 않는 것 이 바람직하다.","여러 사업부에 공통으로 관련되는 공통고정원가를 특정사업부에 임의로 배분하는 경우 성과의 왜곡 이 발생할 수 있다.","특정사업부의 경영자에 대한 성과평가시 통제불능원가를 포함하는 것이 바람직하다."],"c":2,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '여러 사업부에 공통으로 관련되는 공통고정원가를 특정사업부에 임의로 배분하는 경우 성과의 왜곡 이 발생할 수 '이 올바른 설명입니다. 원가행태에 따라 변동원가(조업도에 비례)와 고정원가(조업도와 무관)로 분류합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_원가_30","q":"㈜삼일이 판매하고 있는 제품 A와 제품 B에 관련된 자료는 다음과 같다.\n제품 A 제품 B\n단위당 예산공헌이익 2,000원 3,000원\n예산매출수량 700단위 300단위\n실제매출수량 950단위 250단위\n㈜삼일의 매출배합차이는 얼마인가?","a":["110,000원 유리","110,000원 불리","460,000원 유리","460,000원 불리"],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (110,000원 불리). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_31","q":"다음 중 판매부서의 성과평가에 관한 설명으로 옳지 않은 것은?","a":["판매부서의 성과평가는 수익중심점보다 이익중심점으로 운영하는 것이 바람직하다.","판매부서의 성과보고서에는 일반적으로 예산매출액과 실제매출액의 비교가 포함된다.","매출총차이는 매출가격차이와 매출조업도차이로 구분된다.","매출조업도차이는 매출배합차이와 시장점유율차이로 구분된다."],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '매출조업도차이는 매출배합차이와 시장점유율차이로 구분된다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_32","q":"㈜삼일은 흠집이 있는 제품 A를 4개 보유하고 있다. 흠집이 없는 정상적 제품 A의 판매가격은 300원\n이다. 제품A의 생산에는 단위당 변동제조원가 80원과 단위당 고정제조원가 20원이 투입되었다. 흠집\n이 있는 제품 A를 외부에 단위당 150원에 처분하려면 단위당 판매관리비가 15원이 소요될 것으로 추\n정된다. 이 의사결정에 고려될 관련원가로 옳은 것은?","a":["정상판매가격 300원","단위당 변동제조원가 80원","단위당 고정제조원가 20원","단위당 판매관리비 15원"],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '단위당 판매관리비 15원'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_7_원가_33","q":"㈜삼일은 제품 제조에 사용되는 부품 10,000단위를 자체 생산하여 왔다. 10,000단위 생산수준에서 부\n품을 제조하는데 소요되는 단위당 원가는 다음과 같다.\n금 액\n직접재료원가 180원\n직접노무원가 120원\n변동제조간접원가 60원\n고정제조간접원가 40원\n제품단위당원가 400원\n동일한 부품을 생산하고 있는 ㈜용산이 이 부품 10,000단위를 공급하겠다고 제안하였을 경우 ㈜삼일이\n최대한 허용할 수 있는 부품의 단위당 구입가격은 얼마인가(단, 부품을 외부에서 구입할 경우 고정제조\n간접원가는 전혀 회피할 수 없다)?","a":["180원","300원","360원","400원"],"c":2,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번 (360원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_34","q":"다음은 철수와 친구 동철이의 대화내용이다. 의사결정과 관련하여 괄호 안에 들어갈 원가용어로 옳은\n것은?\n철수 : 동철아, 아직 결혼 소식 없어?\n동철 : 그러게 말야. 더 이상 나이 먹기 전에 결혼을 해야겠는데 영희는 결혼 생각이 없는 거 같아.\n헤어져야 할지 말아야 할지 고민이야.\n철수 : 잘 생각해서 판단해. 네가 영희와 사귀기 위해 쓴 데이트비용, 시간 등이 정말 많은데 헤어\n지면 너무 아깝지 않겠어?\n동철 : 물론 아깝긴 하지. 그러나, 그런 것들은 전부 ( ) 일 뿐이야. 이미 과거에 지출된 원\n가라서 내가 영희와 헤어질 것인가를 결정하는 것과는 관계가 없어. 하지만 알면서도 자꾸\n미련이 남아.","a":["기회원가","추적가능원가","추적불능원가","매몰원가"],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '매몰원가'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_7_원가_35","q":"지난해 ㈜삼일의 사업부 X의 공헌이익은 75,000 원이고, 사업부 X에 대한 공통원가 배분액은 80,000\n원이었다. 공통원가배분액 중 45,000 원은 사업부 X를 폐지하더라도 계속하여 발생하는 것이다. 만약\n회사가 사업부 X를 폐지한다면 회사전체의 순이익은 어떻게 변화하는가?","a":["40,000 원 감소","40,000 원 증가","50,000 원 감소","50,000 원 증가"],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번. '40,000 원 감소'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_7_원가_36","q":"다음 중 자본예산에 관한 설명으로 옳지 않은 것은 ?","a":["자본예산이란 고정자산에 대한 효율적인 투자 수행을 위해 투자안의 타당성을 평가하고 투자안의 현금흐름이나 이익에 미치는 영향을 평가하는 기법이다.","현금흐름은 원칙적으로 증분기준, 세후기준으로 추정된다.","자본예산모형에는 화폐의 시간적 가치를 고려하는 할인모형과 화폐의 시간적 가치를 고려하지 않는 전통적 방법인 비할인모형이 있다.","회수기간법과 회계적 이익률법은 할인모형에 해당한다."],"c":3,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 4번. '회수기간법과 회계적 이익률법은 할인모형에 해당한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_7_원가_37","q":"㈜삼일은 내용연수가 3년인 기계장치에 투자하려고 하고 있다. 기계장치를 구입하면, 1년째에는\n5,000,000원, 2년째에는 4,000,000원, 그리고 3년째에는 3,000,000원의 현금지출운용비를 줄일 것\n으로 판단하고 있다. 회사의 최저필수수익률은 12 % 이고 기계장치에 대한 투자액의 현재가치는\n8,000,000원 이라고 할 때, 기계장치에 대한 투자안의 순현재가치(NPV)는 얼마인가(단, 이자율 12 %\n의 1원당 현재가치는 1년은 0.9, 2년은 0.8, 3년은 0.7이며 향후 현금지출의 감소는 매년 말에 발\n생하고 법인세는 없는 것으로 가정한다)?","a":["1,800,000원","1,900,000원","2,000,000원","2,100,000원"],"c":0,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 1번 (1,800,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_38","q":"㈜삼일은 10,000원에 기계를 구입할 예정으로, 회수기간법을 이용하여 동 투자안을 평가하고자 한다.\n이 기계는 정액법에 의하여 5년간 감가상각되며, 잔존가치는 없을 것으로 추정하고 있다. 이 기계는\n매년 법인세비용 차감 전 기준으로 5,000원의 현금유입을 발생시킬 수 있다. 이 투자안의 회수기간은\n얼마인가(단, 감가상각비 이외에 추가적인 비용은 발생하지 않으며, 법인세율은 40 % 이다)?","a":["약 3.65년","약 2.63년","약 4.11년","약 4.25년"],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (약 2.63년). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_39","q":"㈜삼일은 A 사업부와 B 사업부로 구성되어 있다. B 사업부는 A 사업부에서 생산되는 부품을 가공하여\n완제품을 제조한다. B 사업부에서 부품 한 단위를 완제품으로 만드는데 소요되는 추가가공원가는 450\n원이며, 완제품의 단위당 판매가격은 1,150원이다. 부품의 외부시장가격이 단위당 650원인 경우, B\n사업부가 받아들일 수 있는 최대대체가격을 계산하면 얼마인가?","a":["450원","650원","700원","1,150원"],"c":1,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 2번 (650원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_7_원가_40","q":"다음 중 제품의 검사 및 시험, 현장 및 라인검사 등으로 인하여 소요되는 지출로서 불량품을 적발하기\n위하여 발생하는 품질원가를 의미하는 것으로 옳은 것은?","a":["내부실패원가","외부실패원가","평가원가","예방원가"],"c":2,"s":"원가관리회계","y":"2024년 7월","exam":"jaegyeong","exp":"정답 3번. '평가원가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_재무_1","q":"다음 중 ‘재무보고를 위한 개념체계’의 목적과 위상에 관한 설명으로 옳지 않은 것은?","a":["개념체계와 한국채택국제회계기준이 상충될 경우에는 개념체계가 우선한다.","개념체계는 한국회계기준위원회가 향후 새로운 한국채택국제회계기준의 제‧개정을 검토할 때에 도움 을 준다.","감사인이 재무제표에 대한 의견을 형성하는 데 도움을 준다.","재무제표 작성자가 한국채택국제회계기준을 적용하고 한국채택국제회계기준이 미비한 주제에 대한 회 계처리를 하는 데 도움을 준다."],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. 개념체계와 K-IFRS가 상충할 경우 K-IFRS(한국채택국제회계기준)가 우선합니다. 개념체계는 기준서가 아니므로 개별 기준서에 우선할 수 없습니다. 개념체계의 역할은 기준 제정의 기초를 제공하는 것입니다.","src":"cbt"},{"id":"jg_9_재무_2","q":"다음 중 유용한 재무정보의 근본적인 질적특성에 관한 설명으로 옳지 않은 것은?","a":["목적적합한 재무정보는 정보이용자의 의사결정에 신뢰성이 있어야 한다.","완벽한 표현충실성을 위해서는 서술은 완전하고 중립적이며 오류가 없어야 한다.","예측가치를 갖는 정보는 확인가치도 갖는 경우가 많다.","정보가 누락되거나 잘못 기재된 경우 특정 보고기업의 재무정보에 근거한 정보이용자의 의사결정에 영향을 줄 수 있다면 그 정보는 중요한 것이다."],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '목적적합한 재무정보는 정보이용자의 의사결정에 신뢰성이 있어야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_3","q":"다음 중 재무상태표의 작성기준에 관한 설명으로 옳지 않은 것은?","a":["한국채택국제회계기준에서 요구하거나 허용하지 않는 한 자산과 부채 그리고 수익과 비용은 상계하지 않는다.","재고자산평가충당금과 매출채권에 대한 대손충당금과 같은 평가충당금을 차감하여 관련 자산을 순액 으로 측정하는 것은 상계표시에 해당하지 아니한다.","보고기간 후 12개월 이상 부채의 결제를 연기할 수 있는 무조건의 권리를 가지고 있지 않은 경우 비 유동부채로 분류한다.","기업이 정상영업주기 내에 실현될 것으로 예상되거나 정상영업주기 내에 판매하거나 소비될 의도가 있는 자산은 유동자산으로 분류한다."],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '보고기간 후 12개월 이상 부채의 결제를 연기할 수 있는 무조건의 권리를 가지고 있지 않은 경우 비 유동부채'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_4","q":"다음 중 중간재무보고에 관한 설명으로 옳지 않은 것은?","a":["중간재무보고서는 당해 중간보고기간 말과 직전 연차보고기간 말을 비교하는 형식으로 작성한 재무상 태표를 포함하여야 한다.","중간재무보고서는 당해 회계연도 누적기간을 직전 회계연도의 동일기간과 비교하는 형식으로 작성한 포괄손익계산서를 포함하여야 한다.","중간재무보고서는 당해 회계연도 누적기간을 직전 회계연도의 동일기간과 비교하는 형식으로 작성한 자본변동표를 포함하여야 한다.","중간재무보고서는 당해 회계연도 누적기간을 직전 회계연도의 동일기간과 비교하는 형식으로 작성한 현금흐름표를 포함하여야 한다."],"c":1,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '중간재무보고서는 당해 회계연도 누적기간을 직전 회계연도의 동일기간과 비교하는 형식으로 작성한 포괄손익계산서를'는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_5","q":"다음 중 특수관계자 공시에 대한 설명으로 옳지 않은 것은?","a":["주요 경영진의 보상에는 단기종업원급여, 퇴직급여, 기타 장기종업원급여, 해고급여 및 주식기준보상 을 포함한다.","최상위 지배자와 지배기업이 다른 경우에는 최상위 지배자의 명칭도 공시한다.","지배기업과 그 종속기업 사이의 관계는 거래가 존재할 경우에만 공시한다.","기업과 보고기업이 동일한 연결실체 내의 일원인 경우 기업은 보고기업의 특수관계자에 해당한다."],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '지배기업과 그 종속기업 사이의 관계는 거래가 존재할 경우에만 공시한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_6","q":"다음 중 재고자산의 취득원가에 포함되어야 할 항목으로 옳은 것은?\nㄱ. 매입원가\nㄴ. 재고자산의 판매와 관련된 원가\nㄷ. 후속 생산과정에 투입하기 전에 보관이 필요해서 발생한 보관원가\nㄹ. 제조원가 중 비정상적으로 낭비된 부분","a":["ㄱ","ㄱ,ㄴ","ㄱ,ㄷ","ㄱ,ㄹ"],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. 'ㄱ,ㄷ'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_재무_7","q":"다음 중 재고자산의 평가에 관한 설명으로 옳지 않은 것은?","a":["선입선출법에 의하면 실지재고조사법과 계속기록법 중 어느 것을 사용하는지와 관계없이 한 회계기간 에 계상될 기말재고자산 및 매출원가의 금액이 동일하게 산정된다.","재고자산을 순실현가능가치로 감액한 평가손실과 모든 감모손실은 감액이나 감모가 발생한 기간에 비 용으로 인식한다.","완성될 제품이 원가 이상으로 판매될 것으로 예상하는 경우에는 그 생산에 투입하기 위해 보유하는 원재료를 감액한다.","순실현가능가치를 추정할 때 재고자산의 보유목적도 고려하여야 한다."],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '완성될 제품이 원가 이상으로 판매될 것으로 예상하는 경우에는 그 생산에 투입하기 위해 보유하는 원재료를 감액'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_8","q":"㈜삼일은 공장을 신축하기로 하였다. 이와 관련하여 20X1년 3월 1일 24,000,000원을 지출하였고, 공장\n은 20X3년 중에 완공될 예정이다. ㈜삼일은 공장신축을 위해서 아래와 같이 특정목적으로 차입을 하였으\n며, 일반차입금은 없다. ㈜삼일이 공장신축과 관련된 차입원가를 자본화할 때 20X1년 말 재무상태표에\n표시될 공장신축과 관련된‘건설중인자산’의 장부금액은 얼마인가(단, 편의상 월할 계산 한다고 가정한\n다)?\n차입금액 차입기간 연이자율 비고\n24,000,000원 20X1년3월1일 ~ 20X2년6월30일 3 % 공장신축을 위한 특정차입금","a":["24,600,000원","24,700,000원","24,800,000원","24,960,000원"],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (24,600,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_9","q":"다음 중 유형자산의 재평가모형에 관한 설명으로 옳지 않은 것은?","a":["보고기간 말에 자산의 장부금액이 공정가치와 중요하게 차이나지 않도록 매년 말 또는 주기적으로 재 평가를 수행하여야 한다.","자산을 사용함에 따라 재평가된 금액에 근거한 감가상각액과 최초 취득원가에 근거한 감가상각액의 차이에 해당하는 재평가잉여금의 일부를 이익잉여금으로 대체할 수 있다.","자산의 장부금액이 재평가로 증가된 경우에 동일한 자산에 대하여 이전에 당기손익으로 인식한 재평 가감소액이 있다면 그 금액을 한도로 재평가증가액 만큼 당기손익으로 인식하고, 나머지 금액을 재평 가잉여금의 과목으로 기타포괄손익으로 인식한다.","재평가모형을 적용하는 경우 감가상각은 수행하지만, 손상의 징후가 존재할 경우에도 손상차손은 인 식하지 않는다."],"c":3,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '재평가모형을 적용하는 경우 감가상각은 수행하지만, 손상의 징후가 존재할 경우에도 손상차손은 인 식하지 않는다'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_10","q":"다음 중 유형자산에 관한 설명으로 옳지 않은 것은?","a":["유형자산 취득에 필수적으로 수반되는 유가증권의 매입 시 동 증권의 현재가치와 취득가액의 차액은 유형자산의 취득을 위하여 불가피하게 지출한 금액이므로 당해 유형자산의 원가로 계상하여야 한다.","자산취득 관련 정부보조금은 관련 자산의 장부금액에서 차감하는 방법과 이연수익(부채)으로 표시하 는 방법 중 한 가지 방법을 선택하여 처리할 수 있다.","토지만 사용할 목적으로 토지와 건물을 일괄구입하는 경우 일괄구입대가를 개별자산의 공정가치비율 로 안분하여 토지의 원가는 유형자산으로 인식하고, 건물의 원가는 비용으로 인식한다.","복구원가란 해당 유형자산의 경제적 사용이 종료된 후에 원상회복을 위하여 그 자산을 제거, 해체하 거나 또는 부지를 복원하는데 소요될 것으로 추정되는 비용이 부채의 인식요건을 충족하는 경우 그 지출의 현재가치를 말하며 동 복구원가는 유형자산의 원가에 포함시켜야 한다."],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '토지만 사용할 목적으로 토지와 건물을 일괄구입하는 경우 일괄구입대가를 개별자산의 공정가치비율 로 안분하여 토'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_11","q":"다음은 ㈜삼일의 건물과 관련된 자료이다. ㈜삼일은 20X1년 말 건물과 관련하여 손상차손을 인식하였\n다. 20X1년 결산시점에 ㈜삼일이 건물과 관련하여 인식해야 할 유형자산손상차손은 얼마인가?\nㄱ. 20X1년 초 건물의 취득원가 60,000,000원\nㄴ. 20X1년 말 건물의 순공정가치 42,000,000원\nㄷ. 20X1년 말 건물의 사용가치 40,000,000원\nㄹ. 20X1년 초 건물의 내용연수 6년\nㅁ. 건물의 잔존가치 0원\nㅂ. ㈜삼일은 건물에 대하여 정액법으로 감가상각비를 인식함","a":["7,000,000원","8,000,000원","9,000,000원","10,000,000원"],"c":1,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (8,000,000원). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_12","q":"다음 중 무형자산에 관한 설명으로 옳지 않은 것은?","a":["무형자산은 식별이 불가능하지만 통제 가능하고 미래경제적효익을 가져다 주는 비화폐성자산을 말한 다.","내부적으로 창출한 영업권은 무형자산으로 인식하지 않는다.","내용연수가 비한정인 무형자산은 상각하지 않고, 매년 일정시기 및 무형자산의 손상을 시사하는 징 후가 있을 때마다 손상검사를 수행한다.","내용연수가 유한한 무형자산은 경제적효익이 소비되는 형태를 신뢰성 있게 결정할 수 없는 경우에는 정액법을 사용하여 상각한다."],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '무형자산은 식별이 불가능하지만 통제 가능하고 미래경제적효익을 가져다 주는 비화폐성자산을 말한 다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_13","q":"다음은 ㈜삼일의 20X1년 연구 및 개발활동 지출 내역이다. ㈜삼일이 20X1년 개발단계에 속하는 활동으\n로 분류해야 하는 금액은 얼마인가?\nㄱ. 새로운 지식을 얻고자 하는 활동 100,000원\nㄴ. 생산이나 사용 전의 시제품과 모형을 제작하는 활동 150,000원\nㄷ. 연구결과 또는 기타 지식을 탐색, 평가, 최종 선택 및 응용하는 활동 300,000원\nㄹ. 새로운 기술과 관련된 공구, 금형, 주형 등을 설계하는 활동 200,000원\nㅁ. 상업적 생산 목적으로 실현가능한 경제적 규모가 아닌 시험공장을 건설하는 활동 300,000원","a":["300,000원","450,000원","550,000원","650,000원"],"c":3,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번 (650,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_14","q":"제조업을 영위하는 ㈜삼일은 임대수익을 얻기 위한 목적으로 20X1년 1월 1일 건물을 100,000,000원에\n취득하였다. 투자부동산에 대해 공정가치모형을 적용할 경우 동 건물과 관련한 회계처리가 ㈜삼일의\n20X2년 당기순이익에 미치는 영향은 얼마인가(단, ㈜삼일은 내용연수 5년, 잔존가치 0원, 정액법을 적\n용하여 감가상각한다)?\n<건물의 공정가치>\n20X1년 말 : 102,500,000원\n20X2년 말 : 90,000,000원","a":["5,000,000원 감소","12,500,000원 감소","20,000,000원 감소","23,750,000원 감소"],"c":1,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (12,500,000원 감소). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_15","q":"다음 중 한국채택국제회계기준에 의한 금융상품의 발행자가 금융상품을 금융부채(financial liability)\n와 지분상품(equity instrument)으로 분류할 때에 관한 설명으로 옳지 않은 것은?","a":["잠재적으로 불리한 조건으로 거래상대방과 금융자산이나 금융부채를 교환하기로 한 계약상 의무는 금융부채로 분류한다.","인도할 자기지분상품의 수량이 변동가능한 비파생상품은 지분상품으로 분류한다.","발행자가 보유자에게 미래의 시점에 확정된 금액을 의무적으로 상환해야 하는 의무가 있는 우선주는 금융부채로 분류한다.","기업의 자산에서 모든 부채를 차감한 후의 잔여지분을 나타내는 모든 계약은 지분상품으로 분류한 다."],"c":1,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '인도할 자기지분상품의 수량이 변동가능한 비파생상품은 지분상품으로 분류한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_16","q":"㈜삼일은 20X1년 4월 1일 ㈜용산의 보통주식을 2,000,000원에 취득하고, 취득에 따른 거래비용 50,000\n원을 지급하였다. 20X1년 말 ㈜용산의 보통주식 공정가치는 1,500,000원 이었으며, ㈜삼일은 20X2년 3\n월 10일 ㈜용산의 보통주식을 1,200,000원에 처분하였다. ㈜용산의 보통주식을 당기손익-공정가치 측정\n금융자산 혹은 기타포괄손익-공정가치 측정 금융자산으로 분류한 경우, ㈜삼일의 회계처리에 관한 설명\n으로 옳지 않은 것은(단, 처분과 관련한 거래비용은 발생하지 않았다)?","a":["당기손익-공정가치 측정 금융자산으로 분류할 경우 취득원가는 2,000,000원이다.","당기손익-공정가치 측정 금융자산으로 분류할 경우 20X1년말 공정가치 평가에 대한 회계처리로 인 하여 ㈜삼일의 20X1년 당기순이익은 500,000원 감소한다.","기타포괄손익-공정가치 측정 금융자산으로 분류할 경우 20X1년말 공정가치 평가에 대한 회계처리로 인하여 ㈜삼일의 20X1년 기타포괄이익은 550,000원 감소한다.","기타포괄손익-공정가치 측정 금융자산으로 분류할 경우 20X2년 처분에 대한 회계처리로 인하여 ㈜삼일의 20X2년 당기순이익은 850,000원 감소한다."],"c":3,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '기타포괄손익-공정가치 측정 금융자산으로 분류할 경우 20X2년 처분에 대한 회계처리로 인하여 ㈜삼일의 20X'는 잘못된 설명입니다. 실제로는 감소가 아니라 증가하는 관계입니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_17","q":"다음 중 금융자산의 분류에 관한 설명으로 옳지 않은 것은?","a":["원리금 수취만의 목적으로 보유하는 채무상품에 대해 회계불일치를 제거하기 위해 최초 인식 시점에 당기손익-공정가치 측정 금융자산으로 지정할 수 있다.","계약상 현금흐름이 원리금만으로 구성되어 있지 않다면 일반적으로 금융자산을 당기손익-공정가치 측정 금융자산으로 분류한다.","계약상 현금흐름이 원리금으로만 구성되어 있고, 사업모형이 계약상 현금흐름의 수취와 금융자산 매 도의 목적을 모두 가지고 있는 경우 당기손익-공정가치 측정 금융자산으로 분류한다.","단기매매 목적 외의 지분상품에 대한 공정가치 변동을 기타포괄손익으로 인식하기로 최초 인식시점 에 선택한 경우 기타포괄손익-공정가치 측정 금융자산으로 분류한다."],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '계약상 현금흐름이 원리금으로만 구성되어 있고, 사업모형이 계약상 현금흐름의 수취와 금융자산 매 도의 목적을 '는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_18","q":"㈜삼일은 20X1년 1월 1일 사채(액면 1,000,000원, 표시이자율 연 10 %, 이자지급일 매년 12월 31일\n후급, 만기 3년)를 951,963원에 발행하였다. ㈜삼일이 동 사채를 20X2년 1월 1일 848,000원에 상환\n할 경우 이로 인한 사채상환손익을 계산하면 얼마인가(계산과정에서 단수차이가 발생할 경우 가장 근사\n치를 선택하며, 20X1년 1월 1일의 시장이자율은 연 12 % 이며, 사채할인발행차금은 유효이자율법으로\n상각한다)?","a":["사채상환이익 118,199원","사채상환손실 118,199원","사채상환이익 152,822원","사채상환손실 152,822원"],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (사채상환이익 118,199원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_19","q":"다음 중 전환사채에 관한 설명으로 옳지 않은 것은?","a":["전환사채는 전환사채소유자가 일정한 조건 하에 전환권을 행사할 수 있는 사채로서, 전환권을 행사 하면 보통주로 전환되는 사채이다.","전환권에 대한 대가가 자본으로 분류되는 전환사채는 복합금융상품에 해당한다.","전환사채의 발행금액에서 독립적으로 측정한 전환권(자본)의 가치를 차감하여 일반사채(부채)의 가 치를 측정한다.","전환권조정은 사채할인발행차금과 마찬가지로 상환기간동안 유효이자율법을 적용하여 상각하고 상각 된 금액은 이자비용으로 인식한다."],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '전환사채의 발행금액에서 독립적으로 측정한 전환권(자본)의 가치를 차감하여 일반사채(부채)의 가 치를 측정한다'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_20","q":"다음 중 충당부채로 인식될 수 있는 사례로 옳지 않은 것은(단, 해당 의무를 이행하기 위하여 필요한\n금액을 신뢰성 있게 추정할 수 있다고 가정한다)?","a":["오염된 토지를 정화하여야 한다는 법규가 아직 제정되지 않았으나, 법룰제정이 거의 확실한 경우","제품에 대해 만족하지 못하는 고객에게 법적의무가 없음에도 불구하고 환불해주는 정책을 펴고 있으 며, 고객에게 이 사실이 널리 알려져 있는 경우","회사의 소비자 소송사건에 대하여 패소가능성이 높다는 법률전문가의 의견이 있는 경우","사업부를 매각하였으나 아직 구조조정에 대한 공식적이며 구체적인 계획이 없는 경우"],"c":3,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '사업부를 매각하였으나 아직 구조조정에 대한 공식적이며 구체적인 계획이 없는 경우'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_21","q":"결산일이 12월 31일인 ㈜삼일의 유상증자 관련 자료가 다음과 같을 때 유상증자가 ㈜삼일의 총자본에\n미치는 영향은 얼마인가?\nㄱ. 20X1년 5월 1일에 현금을 납입받고 보통주 2,000주를 유상증자하였다.\nㄴ. 주당 액면금액과 발행금액은 각각 5,000원과 7,000원이다.\nㄷ. 유상증자와 직접 관련된 원가 200,000원이 발생하였다.\nㄹ. 장부에 1,000,000원의 주식할인발행차금이 계상되어 있다.","a":["10,000,000원 증가","12,800,000원 증가","13,800,000원 증가","14,000,000원 증가"],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (13,800,000원 증가). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_22","q":"다음 중 자본에서 차감되는 항목으로 옳은 것은?","a":["재평가잉여금","주식발행초과금","자기주식","기타포괄손익-공정가치 측정 금융자산 평가이익"],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '자기주식'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_재무_23","q":"다음 중 고객과의 계약에서 생기는 수익에 관한 설명으로 옳지 않은 것은?","a":["기업이 고객에게 재화나 용역을 이전하기 전에 고객이 대가를 지급하거나 기업이 대가를 받을 무조 건적인 권리를 갖고 있는 경우에 기업은 지급받은 때나 지급받기로 한 때에 그 계약을 환불부채로 표시한다.","고객이 대가를 지급하기 전이나 지급기일 전에 기업이 고객에게 재화나 용역의 이전을 수행하는 경 우에, 그 계약에 대해 수취채권으로 표시한 금액이 있다면 이를 제외하고 계약자산으로 표시한다.","계약체결 증분원가란 고객과 계약을 체결하기 위해 발생한 원가로, 계약을 체결하지 않았다면 발생 하지 않는 원가이다.","계약이행원가는 고객과의 계약을 이행할 때 드는 원가이다."],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '기업이 고객에게 재화나 용역을 이전하기 전에 고객이 대가를 지급하거나 기업이 대가를 받을 무조 건적인 권리를'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_24","q":"다음 중 수익인식 기준에 관한 설명으로 옳지 않은 것은?","a":["라이선스 계약이 사용권에 해당하면 일정기간 동안 권리를 부여하는 수행의무가 부여된 것이므로 그 기간에 걸쳐 수익을 인식한다.","고객충성제도를 시행하는 경우 보상점수에 배분하는 대가는 상대적 개별판매가격에 따라 배분된 금 액이다.","기업이 수행하여 만들어지거나 가치가 높아지는 대로 고객이 통제하는 자산을 기업이 만들거나 그 자산 가치를 높이는 경우에는 기간에 걸쳐 수익을 인식한다.","고객이 보증을 별도로 구매할 수 있는 선택권이 있는 경우에는 용역유형의 보증으로 본다."],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '라이선스 계약이 사용권에 해당하면 일정기간 동안 권리를 부여하는 수행의무가 부여된 것이므로 그 기간에 걸쳐 '는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_25","q":"㈜삼일은 ㈜부산과 총공사계약금액 13,000,000원에 공장건설계약을 체결하였다. 총공사기간은 계약일로\n부터 3년이고 건설계약과 관련된 연도별 자료는 다음과 같다. 진행률은 누적발생계약원가에 기초하여\n계산한다고 할 때, 20X2년에 인식할 계약손익은 얼마인가?\n20X1년 20X2년 20X3년\n당기발생원가 3,000,000원 5,400,000원 3,600,000원\n추가예정원가 7,000,000원 3,600,000원 -\n대금청구액 4,000,000원 4,500,000원 1,500,000원\n대금회수액 3,500,000원 4,000,000원 2,500,000원","a":["200,000원 계약손실","200,000원 계약이익","500,000원 계약손실","700,000원 계약이익"],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (200,000원 계약손실). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_26","q":"다음 중 회계변경에 관한 설명으로 옳은 것은?","a":["회계추정치의 변경은 재무제표의 작성과 보고에 적용하던 회계정책을 다른 회계정책으로 바꾸는 것 을 말한다.","재고자산 항목의 순실현가능가치를 변경하는 것은 회계추정치의 변경에 해당한다.","회계변경이 회계정책의 변경인지 회계추정치의 변경인지 구분하는 것이 어려운 경우에는 이를 회계 정책의 변경으로 본다.","중요한 전기오류를 수정할 경우에는 과거에 보고된 비교표시 재무제표에 대하여 어떠한 수정도 하지 않는다."],"c":1,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '재고자산 항목의 순실현가능가치를 변경하는 것은 회계추정치의 변경에 해당한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_재무_27","q":"㈜삼일은 확정급여제도를 채택하여 시행하고 있다. ㈜삼일의 사외적립자산과 관련된 자료가 다음과 같\n을 때, ㈜삼일이 사외적립자산과 관련하여 20X1년도에 인식할 기타포괄손익은 얼마인가?\nㄱ. 20X1년 초 사외적립자산의 잔액은 500,000원 이다.\nㄴ. 20X1년도의 사외적립자산에 대한 기여금 불입액은 300,000원 이다.\nㄷ. 20X1년도의 사외적립자산에 대한 이자수익은 50,000원 이다.\nㄹ. 20X1년 말에 사외적립자산 150,000원이 퇴직종업원에게 현금으로 지급되었다.\nㅁ. 20X1년 말 현재 사외적립자산의 공정가치는 650,000원 이다.","a":["50,000원 손실","100,000원 손실","50,000원 이익","100,000원 이익"],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (50,000원 손실). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_28","q":"다음 중 주식결제형 주식기준보상 회계처리에 관한 설명으로 옳지 않은 것은?","a":["가득기간 중 각 회계기간에 인식할 주식보상비용은 당기말 인식할 누적보상원가에서 전기말까지 인 식한 누적보상원가를 차감하여 계산한다.","주식선택권 행사로 신주가 발행되는 경우 행사가격이 액면금액을 초과하는 부분은 주식발행초과금으 로 처리한다.","지분상품의 공정가치는 부여일 현재로 측정하고 이후의 기간에 공정가치가 변동하는 경우에도 변동 분을 반영하지 않는다.","주식선택권의 권리를 행사하지 않아 소멸되는 경우에는 과거에 인식한 보상원가를 환입한다."],"c":3,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '주식선택권의 권리를 행사하지 않아 소멸되는 경우에는 과거에 인식한 보상원가를 환입한다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_29","q":"다음 중 법인세회계에 관한 설명으로 옳은 것은?","a":["이연법인세자산 ․ 부채는 일시적 차이의 소멸시기에 따라 유동 및 비유동항목으로 구분하여 재무상 태표에 표시한다.","가산할 일시적차이가 사용될 수 있는 미래과세소득의 발생 가능성이 높은 경우에 이연법인세자산을 인식한다.","화폐의 시간가치가 중요한 경우에도 이연법인세자산 ․ 부채는 현재가치로 평가하지 않는다.","일시적차이가 발생한 연도의 평균세율을 적용하여 이연법인세자산·부채를 측정한다."],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '화폐의 시간가치가 중요한 경우에도 이연법인세자산 ․ 부채는 현재가치로 평가하지 않는다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_재무_30","q":"20X1년에 영업을 개시한 ㈜삼일의 과세소득과 관련된 다음 자료를 이용하여 20X1년도 포괄손익계산서\n의 법인세비용을 계산하면 얼마인가?\n법인세비용차감전순이익 4,000,000원\n가산(차감)조정\n일시적차이가 아닌 차이 (600,000)원\n일시적차이 900,000원\n과세표준 4,300,000원(당기세율 : 25 % )\n< 추가자료 >\nㄱ. 일시적차이가 사용될 수 있는 미래과세소득의 발생가능성은 높다고 가정한다.\nㄴ. 일시적차이는 20X2년 이후에 소멸하며, 일시적차이가 소멸될 것으로 예상되는\n기간의 과세소득에 적용될 것으로 기대되는 평균세율은 30 % 이다.\nㄷ. 자본에 직접 인식되는 법인세비용은 없다고 가정한다.","a":["805,000원","850,000원","1,115,000원","1,345,000원"],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (805,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_31","q":"㈜삼일은 20X1년 1월 1일에 취득한 내용연수 5년의 기계장치 100,000원을 정액법으로 감가상각하여\n오던 중 20X3년 1월 1일에 정률법으로 감가상각방법을 변경하기로 하였다. ㈜삼일이 취득한 기계장치\n의 내용연수 종료시점의 잔존가치는 없으며, 정률법의 상각률이 40 % 일 경우 ㈜삼일이 20X3년 인식할\n감가상각비는 얼마인가?","a":["12,000원","14,400원","24,000원","40,000원"],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (24,000원). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_32","q":"다음은 ㈜삼일의 제11기(20X1년 1월 1일 ~ 20X1년 12월 31일) 당기순이익과 자본금 변동상황에 대\n한 자료이다. 이를 이용하여 ㈜삼일의 20X1년도 기본주당순이익을 계산하면 얼마인가(단, 가중평균유통\n보통주식수는 월할로 계산한다)?\nㄱ. 당기순이익 : 27,000,000원\nㄴ. 자본금변동사항(액면금액 500원)\n보통주자본금\n기 초 5,000주 2,500,000원\n4월1일 공정가치로 유상증자 2,000주 1,000,000원\nㄷ. 20X1년 7월 1일에 자기주식(보통주) 1,000주를 1,000,000원에 취득","a":["3,000원","3,500원","4,000원","4,500원"],"c":3,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번 (4,500원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_33","q":"다음 중 관계기업투자주식의 회계처리에 관한 설명으로 옳지 않은 것은?","a":["유의적인 영향력을 판단할 때에는 투자자가 아닌 다른기업이 보유한 잠재적 의결권은 고려하지 않는 다.","유의적인 영향력을 판단함에 있어 피투자자에 대한 의결권은 투자자의 지분율과 종속기업이 보유하 고 있는 지분율의 단순합계로 계산한다.","투자자가 직접 또는 간접으로 피투자자에 대한 의결권의 20 % 이상을 소유하고 있다면 유의적인 영 향력이 있는 것으로 본다.","투자자와 관계기업 사이의 상향거래나 하향거래에서 발생한 당기손익에 대하여 투자자는 그 관계기 업에 대한 투자지분과 무관한 손익까지만 투자자의 재무제표에 인식한다."],"c":0,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '유의적인 영향력을 판단할 때에는 투자자가 아닌 다른기업이 보유한 잠재적 의결권은 고려하지 않는 다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_34","q":"20X1년 초에 ㈜삼일은 ㈜용산의 주식 30 % 를 1,000,000원에 취득하면서 ㈜용산에 대해 유의적인 영향\n력을 갖게 되었다. 20X1년 초 ㈜용산의 순자산 장부금액은 3,000,000원이었으며, 토지를 제외한 자산\n과 부채에 대해서는 공정가치와 장부금액이 일치하였다. 동 토지의 공정가치는 장부금액보다 200,000원\n높게 평가되었으며, 20X1년 말 현재 ㈜용산이 계속 보유하고 있다, ㈜용산의 20X1년 당기순이익이\n300,000원일 경우, ㈜삼일의 20X1년 말 재무상태표에 표시될 관계기업투자주식의 장부금액은 얼마인\n가?","a":["98,000원","1,078,000원","1,090,000원","1,102,000원"],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (1,090,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각
