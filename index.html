우 법인 뿐만 아니라 개인도 사업자에 해당한다.","주사업장총괄납부사업자는 본점 또는 주사무소에서 모든 사업장의 부가가치세를 총괄하여 신고 및 납부할 수 있다.","면세사업자는 부가가치세법에 따른 사업자 등록의무가 없다."],"c":2,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '주사업장총괄납부사업자는 본점 또는 주사무소에서 모든 사업장의 부가가치세를 총괄하여 신고 및 납부할 수 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_33","q":"다음 중 부가가치세 과세기간에 관한 설명으로 옳지 않은 것은?","a":["계속 사업을 하고 있는 일반과세자의 과세기간은 제1기는 1월 1일부터 6월 30일까지, 제2기는 7월 1일부터 12월 31일까지로 한다.","일반과세자가 간이과세자로 변경되는 경우 과세유형이 변경되는 해에 간이과세 규정이 적용되는 기 간은 그 변경 이후 7월 1일부터 12월 31일까지이다.","신규사업자가 사업개시일 전에 사업자등록을 신청한 경우에는 사업개시일부터 신청일이 속하는 과세 기간의 종료일까지를 최초 과세기간으로 한다.","폐업자는 폐업일이 속하는 과세기간 개시일부터 폐업일까지를 최종 과세기간으로 한다."],"c":2,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '신규사업자가 사업개시일 전에 사업자등록을 신청한 경우에는 사업개시일부터 신청일이 속하는 과세 기간의 종료일까'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_34","q":"다음 중 부가가치세법상 사업장에 관한 설명으로 옳지 않은 것은?","a":["부동산임대업은 그 부동산의 등기부상의 소재지를 사업장으로 한다.","제조업은 최종 제품을 완성하는 장소를 사업장으로 하며, 따로 제품의 포장만을 하거나 용기에 충전 만을 하는 장소는 사업장으로 보지 아니한다.","무인자동판매기를 통하여 재화 ․ 용역을 공급하는 사업은 그 사업에 관한 업무총괄장소를 사업장으 로 한다.","재화의 보관 ․ 관리 시설만을 갖춘 장소로서 사업자가 관할세무서장에게 그 설치신고를 한 하치장은 별개의 사업장으로 본다."],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '재화의 보관 ․ 관리 시설만을 갖춘 장소로서 사업자가 관할세무서장에게 그 설치신고를 한 하치장은 별개의 사업'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_35","q":"다음 중 부가가치세법상 재화의 공급에 해당하지 않는 것은?","a":["구입시 매입세액공제를 받지 못한 재화를 외상 판매한 경우","사용인에게 경조사와 관련하여 연간 10만원 이하의 재화를 제공한 경우","교환계약에 의하여 재화를 인도한 경우","대물변제계약에 따라 채무를 변제하기 위하여 재화의 소유권을 이전하는 경우"],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '사용인에게 경조사와 관련하여 연간 10만원 이하의 재화를 제공한 경우'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_36","q":"다음은 제조업을 영위하는 ㈜삼일의 거래내역이다. 2024년 제1기 예정신고기간(2024년 1월 1일 ~\n2024년 3월 31일)의 과세표준은 얼마인가?\nㄱ. 2023년 12월 5일에 제품을 반환조건부로 판매(인도)하고, 그 대금 2,000,000원을 수령함.\n2024년 1월 5일에 반환기간이 종료되어 판매가 확정됨.\nㄴ. 2024년 1월 5일에 제품을 장기할부판매하고 그 대금을 1월 5일부터 20회에 걸쳐\n매월 1,000,000원씩 회수하기로 약정함.\nㄷ. 2024년 1월 5일에 제품을 다음의 조건으로 판매함.\n가. 계약금 2,000,000원을 2024년 1월 5일에 수령\n나. 중도금 3,000,000원을 2024년 3월 5일에 수령\n다. 잔금 5,000,000원을 2024년 6월 5일에 수령하고 제품을 인도","a":["3,000,000원","5,000,000원","8,000,000원","10,000,000원"],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (5,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_37","q":"다음 중 부가가치세법상 영세율이 적용되는 거래에 해당하는 것을 모두 고르면?\nㄱ. 재화의 수출\nㄴ. 용역의 국외공급\nㄷ. 선박·항공기의 외국항행 용역\nㄹ. 내국신용장에 의하여 공급하는 재화","a":["ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. 'ㄱ, ㄴ, ㄷ, ㄹ'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_세무_38","q":"다음은 제조업을 영위하는 일반과세자인 ㈜삼일의 2024년 제2기 예정신고기간(2024년 7월 1일 ~\n2024년 9월 30일)에 대한 자료이다. ㈜삼일의 2024년 제2기 예정신고기간의 부가가치세 과세표준은\n얼마인가(단, 다음 자료의 금액에는 부가가치세가 포함되지 않음)?\nㄱ. 7월 1일：제품을 12,000,000원에 인도하고 대금은 7월 31일부터 6개월 간 매달 말일에\n2,000,000원씩 받기로 하였다.\nㄴ. 7월 25일：기계유지보수 계약을 맺고 7월 25일부터 24개월 간 매달 25일에 1,000,000원씩\n받기로 하였다.\nㄷ. 8월 14일：제품(매입세액공제분)을 거래처에 판매장려물품(제조원가：800,000원, 시가：\n1,000,000원)으로 증여하였다.\nㄹ. 9월 30일：공급에 대한 대가의 지급이 지체되어 거래처로부터 연체이자 800,000원을 받았다.","a":["15,000,000원","16,000,000원","16,800,000원","19,000,000원"],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (16,000,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_39","q":"다음은 제조업을 영위하는 과세사업자인 ㈜삼일의 2024년 10월 1일부터 12월 31일까지의 매입내역이\n다. 2024년 제 2기 확정신고시 공제받을 수 있는 매입세액을 계산하면 얼마인가(단, 모두 세금계산서\n를 수령하였다)?\n매입내역 매입가액 매입세액\n기계장치 80,000,000원 8,000,000원\n기업업무추진비 40,000,000원 4,000,000원\n토지 조성을 위한\n20,000,000원 2,000,000원\n자본적 지출\n소모품 10,000,000원 1,000,000원","a":["8,000,000원","9,000,000원","11,000,000원","15,000,000원"],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (9,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_40","q":"다음 중 부가가치세의 신고 및 납부, 환급에 관한 설명으로 옳지 않은 것은?","a":["일반 환급의 경우 환급세액은 확정신고기한이 지난 후 30일 이내에 환급한다.","조기환급을 신청한 경우 환급세액은 신고기한이 지난 후 10일 이내에 환급받을 수 있다.","사업설비(감가상각자산)를 신설·취득·확장 또는 증축하는 때에는 조기환급대상이 된다.","2024년 4월 19일에 폐업한 사업자는 2024년 5월 25일까지 확정 신고를 하여야 한다."],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '조기환급을 신청한 경우 환급세액은 신고기한이 지난 후 10일 이내에 환급받을 수 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_1","q":"다음은 ㈜삼일의 20X1년 제조원가명세서 중 일부이다. 다음 자료를 이용하여 (a)기초원가와 (b)가공원\n가를 계산하면 얼마인가?\n제조원가명세서\n20X1년 1월 1일 ~ 20X1년 12월 31일\nⅠ. 직접재료원가 50,000원\nⅡ. 직접노무원가 40,000원\nⅢ. 제조간접원가 120,000원\nⅣ. 당기총제조원가 210,000원\n(a)기초원가 (b)가공원가","a":["120,000원 210,000원","50,000원 90,000원","120,000원 90,000원","90,000원 160,000원"],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (90,000원 160,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_2","q":"㈜삼일의 원가 관련 자료가 다음과 같을 경우, 당기제품제조원가를 계산하면 얼마인가?\n․ 재료 매입액 8,000원 ․ 기초 원재료 재고 4,000원\n․ 생산직 노무원가 12,000원 ․ 기말 원재료 재고 2,000원\n․ 공장설비 감가상각비 3,000원 ․ 기초 재공품 재고 5,000원\n․ 본사건물 감가상각비 5,000원 ․ 기말 재공품 재고 2,000원\n․ 기타 제조경비 6,000원","a":["28,000원","32,000원","34,000원","42,000원"],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (34,000원). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_3","q":"다음 중 원가배분기준에 관한 설명으로 옳지 않은 것은?","a":["공정성과 공평성기준은 공정성과 공평성에 따라 공통원가를 원가배분대상에 배분해야 한다는 원칙을 강조하는 포괄적인 기준이다.","부담능력기준은 원가대상이 원가를 부담할 수 있는 능력에 따라 원가를 배분하는 기준으로, 품질검 사원가를 품질검사시간을 기준으로 배분하는 경우가 대표적인 예이다.","인과관계기준은 원가대상과 배분대상원가 간의 인과관계에 따라 원가를 배분하는 기준이다.","수혜기준은 원가배분대상이 공통원가로부터 제공받은 경제적 효익의 크기에 따라 원가를 배분하는 기준으로 수익자 부담의 원칙에 입각한 배분기준이다."],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '부담능력기준은 원가대상이 원가를 부담할 수 있는 능력에 따라 원가를 배분하는 기준으로, 품질검 사원가를 품질'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_4","q":"㈜삼일은 보조부문에 대하여 직접배분법에 의하여 보조부문원가를 배부하며, 두개의 제조부문(제조A\n부, 제조B부)과 두 개의 보조부문(보조X부, 보조Y부)을 두고 있다. 다음 자료에 따라 제조B부에 배\n분되는 보조부문의 원가는 얼마인가?\n용역사용부문 제조부문 보조부문\n합계\n용역제공부문\nA부 B부 X부 Y부\n보조X부 50 % 30 % 20 % 100 %\n보조Y부 20 % 60 % 20 % 100 %\n발생원가 200,000원 100,000원","a":["25,000원","120,000원","150,000원","180,000원"],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (150,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_5","q":"다음 중 개별원가계산에 관한 설명으로 옳은 것은?","a":["개별원가계산은 동종의 제품을 반복적으로 생산하는 업종에 적합한 원가제도이다.","개별원가계산은 제품별로 원가를 집계하기 때문에 직접원가와 간접원가의 구분이 중요하다.","개별원가계산을 적용할 경우 개별작업에 집계되는 실제원가와 예산을 비교할 수 없다.","개별원가계산은 도 ․ 소매업, 화학산업, 조선업 등에 적합하다."],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '개별원가계산은 제품별로 원가를 집계하기 때문에 직접원가와 간접원가의 구분이 중요하다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_원가_6","q":"㈜삼일은 개별원가계산제도를 채택하고 있으며, 직접노무원가를 기준으로 제조간접원가를 배분한다.\n20X1년의 제조간접원가배분율은 200 % 이며, 제조지시서 #11와 관련된 총제조원가는 59,000원이다. 제\n조지시서 #11는 20X1년 중에 시작되어 완성되었으며, 원가 발생 세부내역은 다음과 같다. B부문 제조\n간접원가 배분액을 계산하면 얼마인가?\n구분 A부문 B부문\n직접재료원가 8,000원 6,000원\n직접노무원가 6,000원 ?\n제조간접원가 12,000원 ?","a":["18,000원","20,000원","24,000원","28,000원"],"c":0,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번 (18,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_7","q":"㈜삼일은 개별원가계산을 적용하고 있다. 작업 #A는 전기부터 작업이 진행되어 오고 있고, 작업 #B와\n#C는 당기에 착수되었다. 당기 중 작업 #A와 #B는 완성되었으나, 작업 #C는 미완성이다. 완성된 작업\n#A는 판매가 완료되었고, #B는 제품 재고로 전량 남아 있다. 당기 제조간접원가는 직접노무원가를 이\n용하여 배부한다. 다음 자료에 관한 설명으로 옳지 않은 것은?\n구분 작업 #A 작업 #B 작업 #C 합계\n기초재공품 원가 22,500원 - - 22,500원\n당기투입 원가\n직접재료원가 300,000원 125,000원 ? 500,000원\n직접노무원가 25,000원 ? ? 50,000원\n제조간접원가 ? 50,000원 ? 200,000원","a":["당기제품제조원가는 796,000원이다.","당기총제조원가는 750,000원이다.","기말재공품원가는 137,500원이다.","매출원가는 447,500원이다."],"c":0,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번 (당기제품제조원가는 796,000원이다.). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_8","q":"㈜삼일은 평균법에 의한 종합원가계산을 채택하고 있다. 기초와 기말의 재공품 물량은 동일하나 기초에\n비하여 재공품 기말 잔액이 증가하였다. 다음 중 이 현상을 설명할 수 있는 것으로 옳은 것은?","a":["전년도에 비해 판매량이 감소하였다.","기초보다 기말의 재공품 완성도가 감소하였다.","전년도에 비해 노무임률이 감소하였다.","전년도에 비해 제조간접원가가 증가하였다."],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '전년도에 비해 제조간접원가가 증가하였다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_원가_9","q":"제2공정에서 재료 X는 60 % 진행시점에서 투입되며 가공원가는 공정이 진행됨에 따라 균등하게 투입된\n다. 50 % 가 완료된 재공품의 완성품환산량에는 다음 중 어떤 원가가 포함되는가?\n재료원가 가공원가 재료원가 가공원가","a":["불포함 불포함","불포함 포함","포함 불포함","포함 포함"],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '불포함 포함'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_11_원가_10","q":"㈜삼일은 선입선출법에 따라 종합원가계산을 하고 있다. 당월 완성품환산량 단위당 원가는 재료원가 5\n원, 가공원가 10원이며, 당월 중 생산과 관련된 자료는 다음과 같다.\n기초재공품 200단위 (완성도 20 %)\n기말재공품 900단위 (완성도 80 %)\n당기완성품 3,500단위\n재료는 공정초기에 전량 투입된다고 할 때 이 회사의 당월에 실제 발생한 재료원가는 얼마인가?","a":["18,500원","20,000원","21,000원","22,500원"],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (21,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_11","q":"다음 중 정상원가계산에 관한 설명으로 옳지 않은 것은?","a":["제품원가를 정상원가로 측정하는 원가계산제도로서 평준화원가계산이라고도 한다.","직접재료원가와 직접노무원가는 실제원가로 측정하지만 제조간접원가는 사전에 정해 놓은 예정배부 율에 의해 배부된 원가로 측정한다.","제조간접원가의 배부가 기말까지 지연되어 제품원가계산이 지연되는 표준원가계산의 문제점을 보완 하기 위한 원가계산제도이다.","제조간접원가 예정배부율에 의한 배부를 함으로써 특정 작업이 종료됨과 동시에 제품원가를 계산할 수 있도록 하고 매월 제품원가가 변동하지 않도록 하는 원가계산제도이다."],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '제조간접원가의 배부가 기말까지 지연되어 제품원가계산이 지연되는 표준원가계산의 문제점을 보완 하기 위한 원가계'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_12","q":"다음 중 표준원가와 표준원가계산제도에 관한 설명으로 옳은 것은?","a":["표준원가계산제도는 원가절감을 위한 원가통제를 포함한다.","표준원가는 한번 설정되면 기업 내적인 요소나 기업 외부환경이 변화하더라도 변경되어서는 안된다.","표준지표로 이상적 표준을 사용하게 되면 종업원들에게 강한 동기를 부여하는 효과가 있다.","사전에 설정된 표준원가를 사용함으로써 예산편성을 위한 원가자료를 수집하는 데 소요되는 시간이 늘어나게 된다."],"c":0,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '표준원가계산제도는 원가절감을 위한 원가통제를 포함한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_원가_13","q":"다음 자료는 구입시점에서 직접재료원가 가격차이를 분리하기 위한 자료이다. 직접재료원가의 단위당\n표준가격은 얼마인가?\n기초재고액 145,000원\n기말재고액 160,000원\n생산공정 투입액 400,000원\n단위당 실제 구입가격 200원\n불리한 가격차이 41,500원","a":["160원","180원","195원","220원"],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (180원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_14","q":"㈜삼일의 3월 중 직접노무원가에 대한 자료이다. 직접노무원가 실제발생액은 얼마인가?\n직접노무원가 표준임률 : 2,000원\n실제 생산량 : 200단위\n생산량 단위당 표준직접노동시간 : 4시간\n직접노무원가 능률차이 : 36,000원(유리)\n직접노무원가 가격차이 : 40,000원(불리)","a":["1,245,000원","1,347,000원","1,560,000원","1,604,000원"],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (1,604,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_15","q":"다음 중 원가차이의 배분방법에 관한 설명으로 옳지 않은 것은?","a":["매출원가조정법이란 모든 원가차이를 매출원가에 가감하는 방법으로서, 재공품과 제품계정은 모두 실제원가로 기록된다.","기타손익법은 비배분법에 해당하며, 불리한 차이는 기타비용 항목으로, 유리한 차이는 기타수익 항 목으로 처리한다.","총원가 비례배분법은 재고자산 계정과 매출원가 계정의 총원가(기말잔액)를 기준으로 원가차이를 배 분하는 방법이다.","원가요소별 비례배분법은 재고자산 계정과 매출원가 계정의 원가요소를 기준으로 각 해당되는 원가 요소의 원가차이를 배분하는 방법이다."],"c":0,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '매출원가조정법이란 모든 원가차이를 매출원가에 가감하는 방법으로서, 재공품과 제품계정은 모두 실제원가로 기록된'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_16","q":"다음 중 괄호 안에 들어갈 알맞은 용어를 옳게 짝지은 것은?\n전부원가계산제도는 ( A )개념에 근거를 두고 있다. ( A )개념이란 제품생산과 관련한 원가는\n원가의 행태에 관계없이 모두 제품의 원가로 보는 것이다. 변동원가계산제도는 ( B )개념에 근\n거를 두고 있다. ( B )개념이란 발생한 원가가 미래에 동일한 원가의 발생을 방지할 수 없다면\n그 원가는 자산성을 인정할 수 없다는 것이다.\nA B A B","a":["원가회피 기간원가","원가회피 원가부착","원가부착 기간원가","원가부착 원가회피"],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '원가부착 원가회피'. 전부원가계산은 고정제조간접원가를 제품원가에 포함하고, 변동원가계산은 기간비용으로 처리합니다. ","src":"cbt"},{"id":"jg_11_원가_17","q":"다음은 ㈜삼일의 7월 한달간 변동원가계산에 관한 자료이다. 7월의 총매출액을 계산하면 얼마인가?\n제품 단위당 판매가격 6,000원\n단위당 변동원가 2,000원\n총고정원가 1,500,000원\n영업이익 12,000,000원","a":["16,274,000원","17,350,000원","20,250,000원","25,000,000원"],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (20,250,000원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_18","q":"다음은 ㈜삼일의 원가자료이다. 전부원가계산 방법에 의한 영업이익이 변동원가계산방법에 의한 영업이\n익보다 2,000원 더 큰 경우 당기의 재고 증감량은 몇 개인가(단, 전기의 고정제조간접원가는 당기와 동\n일한 금액이 발생한 것으로 가정한다)?\n․ 당기 생산량 1,000개 ․ 변동제조간접원가 단위당 50원\n․ 기말 재고수량 100개 ․ 변동판매비와관리비 단위당 20원\n․ 기초 재고수량 ? ․ 고정제조간접원가 20,000원\n․ 판매가격 단위당 150원 ․ 고정판매비와관리비 3,000원","a":["변동 없음","50개 감소","50개 증가","100개 증가"],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (100개 증가). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_19","q":"㈜삼일의 20X1년 손익에 대한 자료가 다음과 같을 경우 (a) 변동원가계산에 따른 공헌이익, (b) 초변동\n원가계산에 따른 재료처리량공헌이익은 각각 얼마인가?\n․ 단위당 판매가격 4,000원 ․ 고정제조간접원가 1,200,000원\n․ 단위당 직접재료원가 1,000원 ․ 고정판매비와관리비 900,000원\n․ 단위당 직접노무원가 500원 ․ 기초제품 없음\n․ 단위당 변동제조간접원가 200원 ․ 생산량 1,000개\n․ 단위당 변동판매비와관리비 300원 ․ 판매량 1,000개","a":["(a) 1,300,000원 (b) 2,500,000원","(a) 2,000,000원 (b) 3,000,000원","(a) 2,500,000원 (b) 3,200,000원","(a) 2,700,000원 (b) 3,500,000원"],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 ((a) 2,000,000원 (b) 3,000,000원). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_20","q":"다음 중 초변동원가계산에서 재고자산가액에 포함되는 원가항목을 모두 나열한 것으로 옳은 것은?","a":["직접재료원가","직접재료원가, 직접노무원가","직접재료원가, 직접노무원가, 변동제조간접원가, 고정제조간접원가","직접재료원가, 직접노무원가, 제조간접원가, 판매비와관리비"],"c":0,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '직접재료원가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_원가_21","q":"다음 중 활동기준원가계산(ABC)에 관한 설명으로 옳지 않은 것은?","a":["활동 및 활동원가의 분석을 통하여 원가통제를 보다 효과적으로 수행할 수 있다.","개별원가계산제도와는 결합되어 함께 사용될 수 있으나, 종합원가계산제도와는 함께 사용될 수 없 다는 한계점이 존재한다.","제조간접원가의 비중이 과거보다 커진 것이 활동기준원가계산제도를 도입하는 주된 배경이다.","일반적으로 활동기준원가계산은 전통적 원가계산제도보다 더 다양한 원가동인 요소를 고려한다."],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '개별원가계산제도와는 결합되어 함께 사용될 수 있으나, 종합원가계산제도와는 함께 사용될 수 없 다는 한계점이 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_22","q":"다음 중 원가추정에 관한 설명으로 옳은 것은?","a":["원가추정은 조업도와 원가 사이의 관계를 규명하여 원가행태를 결정하는 것이다.","회귀분석법에서는 독립변수가 한 단위 변화함에 따른 종속변수의 평균적 변화량을 측정하여 원가함 수를 추정하며, 통계적 가정이 충족되지 않아도 유의미한 결과를 산출할 수 있는 것이 장점이다.","공학적 방법은 과거의 자료가 없어도 적용 가능하므로 주로 제조간접원가의 추정에 활용된다.","고저점법은 상대적으로 적은 노력으로 원가함수를 추정할 수 있다는 장점이 있는 반면, 분석자의 주관이 크게 개입될 수 있다는 단점이 있다."],"c":0,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '원가추정은 조업도와 원가 사이의 관계를 규명하여 원가행태를 결정하는 것이다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_원가_23","q":"다음 중 CVP 분석 시 적용하는 가정사항으로 옳지 않은 것은?","a":["복수의 제품을 생산할 경우 매출배합은 항상 일정하다고 가정한다.","모든 원가는 변동원가와 고정원가로 구분할 수 있다고 가정한다.","화폐의 시간가치를 고려하지 않는다.","생산량과 판매량이 다르다고 가정한다."],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '생산량과 판매량이 다르다고 가정한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_24","q":"㈜삼일은 수제피자를 단위당 판매가격 7,500 원에 판매하고 있다. 수제피자 단위당 변동원가는 3,500\n원이고 연간 고정원가는 150,000,000 원이다. ㈜삼일의 연간 손익분기점 판매량은 몇 단위인가?","a":["31,300 단위","33,000 단위","37,500 단위","40,000 단위"],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '37,500 단위'. 전부원가계산은 고정제조간접원가를 제품원가에 포함하고, 변동원가계산은 기간비용으로 처리합니다. ","src":"cbt"},{"id":"jg_11_원가_25","q":"다음 중 영업레버리지도(Degree of Operating Leverage)에 관한 설명으로 옳지 않은 것은(단, 모든 경\n우에 영업이익은 0 보다 크다고 가정한다)?","a":["영업레버리지란 고정원가로 인하여 매출액의 변화율보다 영업이익의 변화율이 확대되는 효과이다.","영업레버리지도가 높다는 것은 대체로 영업이익 규모가 양호함을 의미한다.","고정원가가 감소하면 영업레버리지도는 낮아진다.","영업레버리지도는 손익분기점 부근에서 가장 크다."],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '영업레버리지도가 높다는 것은 대체로 영업이익 규모가 양호함을 의미한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_26","q":"다음 중 예산에 관한 설명으로 옳지 않은 것은?","a":["기업의 공식적인 경영계획을 화폐단위로 표시한 것이다.","조직구성원에게 동기를 부여함과 동시에 의사전달과 조정의 역할을 수행한다.","예산편성 방법에 따라 예산을 분류함에 있어, 조업도의 변동을 고려하지 않고 작성되는 예산을 재 무예산이라고 한다.","예산편성 대상에 따라 종합예산과 부문예산으로 구분된다."],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '예산편성 방법에 따라 예산을 분류함에 있어, 조업도의 변동을 고려하지 않고 작성되는 예산을 재 무예산이라고 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_27","q":"다음 중 효율적인 성과평가제도를 설계하기 위해 고려해야 할 사항에 관한 설명으로 옳지 않은 것은?","a":["각 책임중심점들의 이익극대화가 기업 전체적인 이익극대화로 이어지지 않도록 설계되어야 한다.","성과평가치의 성과측정 오류가 최소화 되도록 설계되어야 한다.","적시성과 경제성을 적절히 고려하여야 한다.","각 책임중심점의 행동에 미치는 영향을 적절히 고려하여야 한다."],"c":0,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '각 책임중심점들의 이익극대화가 기업 전체적인 이익극대화로 이어지지 않도록 설계되어야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_28","q":"다음 중 책임회계제도에 관한 설명으로 옳지 않은 것은?","a":["책임회계제도는 실제 성과와 예산과의 차이를 쉽게 파악할 수 있게 해줌으로써 예외에 의한 관리가 가능하다.","책임중심점은 책임의 성격 및 책임범위에 따라 원가중심점, 수익중심점, 이익중심점 및 투자중심점 으로 분류할 수 있다.","이익중심점은 원가와 수익에 대해서 통제책임을 지는 책임중심점이다.","책임회계제도가 그 기능을 효율적으로 수행하기 위해서는 각 책임중심점의 경영자가 권한을 위임받 은 원가항목들에 대해 통제권을 행사할 수 없어야 한다."],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '책임회계제도가 그 기능을 효율적으로 수행하기 위해서는 각 책임중심점의 경영자가 권한을 위임받 은 원가항목들에'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_29","q":"다음 자료를 이용하여 ㈜삼일의 시장규모차이를 계산하면 얼마인가?\n단위당 예산평균공헌이익 500원\n실제시장점유율 35 %\n예산시장점유율 30 %\n실제시장규모 150,000개\n예산시장규모 200,000개","a":["7,500,000원(유리)","7,500,000원(불리)","8,750,000원(유리)","8,750,000원(불리)"],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (7,500,000원(불리)). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_30","q":"다음 중 투자수익률법(return on investment : ROI)에 관한 설명으로 옳지 않은 것은?","a":["투자규모가 다른 투자중심점을 상호 비교하기가 용이하다.","사업부의 이익뿐만 아니라 투자액도 함께 고려하는 성과평가 기준이다.","고정원가가 존재할 경우, 매출액이 증가해도 투자수익률은 증가하지 않는다.","준최적화 현상이 발생하지 않도록 유의하여야 한다."],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '고정원가가 존재할 경우, 매출액이 증가해도 투자수익률은 증가하지 않는다.'는 잘못된 설명입니다. 실제로는 증가가 아니라 감소하는 관계입니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_31","q":"다음 자료를 기초로 하여 경제적부가가치(EVA)를 계산하면 얼마인가?\n세후순영업이익 100억원\n투하자본 400억원\n타인자본비용 6 %\n자기자본비용 12 %\n부채비율(부채/자본) 100 %\n세율 20 %","a":["52.8억원","56.4억원","62.8억원","66.4억원"],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (66.4억원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_32","q":"㈜삼일은 6개월 전에 차량을 3,000,000원에 구입하였으나 침수로 인해 이 차량을 더 이상 사용할 수\n없게 되었다. 회사는 동 차량에 대하여 수리비용 1,500,000원을 들여 2,000,000원에 팔거나 현재 상\n태로 거래처에 1,000,000원에 팔 수 있다. 이런 경우에 총매몰원가는 얼마인가?","a":["1,000,000원","1,500,000원","2,000,000원","3,000,000원"],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (3,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_33","q":"㈜삼일은 단위당 27,000원에 판매 중인 제품을 단위당 22,000원에 500단위 구입하겠다는 특별주문을\n받았다. 주문을 수락하더라도 기존 판매가격이나 고정원가에는 아무런 영향을 주지 않으며 유휴생산능\n력은 충분하다. 단위당 원가가 다음과 같을 경우, ㈜삼일의 특별주문 수락여부와 회사의 이익에 미치\n는 영향으로 옳은 것은?\n금액\n직접재료원가 8,500원\n직접노무원가(변동비) 3,500원\n변동제조간접원가 7,000원\n고정제조간접원가 5,000원\n제품단위당 원가 24,000원","a":["거절, 1,000,000원의 추가손실 발생","거절, 2,500,000원의 추가손실 발생","수락, 1,500,000원의 추가이익 발생","수락, 3,000,000원의 추가이익 발생"],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '수락, 1,500,000원의 추가이익 발생'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_원가_34","q":"A, B, C 3개의 사업부를 운영하는 ㈜삼일은 20X1년 당기순이익으로 1,500,000원을 보고하였으며, 최\n근 수익성이 악화되고 있는 A사업부의 폐지를 고려 중이다. A사업부의 공헌이익은 180,000원이고, A\n사업부에 대한 공통원가 배분액은 210,000원이다. 공통원가배분액 중 90,000원은 A사업부를 폐지하더\n라도 계속하여 발생한다. A사업부를 폐지하는 경우 20X1년 당기순이익은 얼마인가?","a":["1,380,000원","1,440,000원","1,560,000원","1,670,000원"],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (1,440,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_35","q":"㈜삼일은 제품 A, B, C를 생산하여 판매하고 있다. 이 세 제품에 공통으로 필요한 재료 S는 품귀현상\n이 발생하여 당분간 구입이 불가능하다. ㈜삼일의 재료 S 보유량은 600 kg이며, 해당 재료가 소진되면\n더 이상 제품을 생산할 수 없다. ㈜삼일은 의무적으로 각 제품을 최소 수량까지는 생산하여야 한다.\n다음 자료를 이용하여 ㈜삼일의 최대 공헌이익을 산출하면 얼마인가(단, A, B, C 세 제품의 시장 수요\n는 충분하다고 가정한다)?\n구분 제품A 제품B 제품C\n의무생산 수량 10단위 10단위 30단위\n공헌이익 250원 200원 150원\n단위당 재료 S 사용량 4 kg 5 kg 2 kg","a":["42,750원","48,250원","52,500원","57,500원"],"c":0,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번 (42,750원). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_36","q":"장기의사결정시에는 미래 현금흐름을 추정하는 것이 중요하다. 다음 중 장기의사결정을 위한 현금흐름\n추정의 기본원칙으로 옳지 않은 것은?","a":["이자비용은 현금유출이므로 현금흐름 산정시 항상 이자비용을 차감한 금액을 기준으로 한다.","감가상각비 감세효과는 현금흐름을 추정할 때 고려해야 한다.","명목현금흐름은 명목할인율로 할인해야 하며, 실질현금흐름은 실질할인율로 할인해야 한다.","법인세를 납부하는 것은 현금유출에 해당하므로, 현금흐름을 파악할 때에는 법인세를 차감한 후의 금액을 기준으로 한다."],"c":0,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '이자비용은 현금유출이므로 현금흐름 산정시 항상 이자비용을 차감한 금액을 기준으로 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_37","q":"㈜삼일은 내용연수가 3년인 기계장치에 1,000,000원을 투자할 예정이다. 기계장치를 구입하면, 아래\n의 표와 같이 현금운영비를 줄일 것으로 판단하고 있다. 회사의 자본비용은 12 % 라고 할 때 ㈜삼일의\n신규 기계장치 투자에 대한 순현재가치(NPV)를 계산하면 얼마인가(단, 현금운영비의 감소효과는 매년\n말에 발생하며 법인세 및 기계장치의 잔존가치는 없다고 가정한다)?\n1년 2년 3년\n현재가치요소(이자율 12 %) 0.89 0.80 0.71\n현금운영비 감소액 600,000원 700,000원 400,000원","a":["284,000원","378,000원","534,000원","1,284,000원"],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (378,000원). 자본변동 = 당기순이익 + 기타포괄손익 - 배당금 ± 자본거래. 회계등식(자산=부채+자본)을 기반으로 분석합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_38","q":"㈜삼일은 70,000원에 기계를 구입할 예정이며, 기계를 사용할 때 연간 원가절감액은 아래의 표와 같\n다. 연중 현금흐름이 고르게 발생한다고 가정하고 이 투자안의 회수기간을 계산하면 얼마인가(단, 법\n인세는 없다고 가정한다)?\n연도 1년 2년 3년 4년 5년\n연간 원가절감액 17,000원 16,000원 20,000원 15,000원 10,000원","a":["3.75년","3.80년","4.20년","4.75년"],"c":2,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (4.20년). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_원가_39","q":"기업 내 사업부 간에 이루어지는 이전거래의 가격을 대체가격이라고 한다. 다음 중 각 대체가격결정방\n법에 대한 설명으로 옳지 않은 것은?","a":["시장가격기준 : 거래될 재화에 대한 완전경쟁시장이 존재하고 각 사업부의 의사결정이 자율성을 가 진다면, 목표일치성 및 성과평가 측면에서의 공정성을 대체로 만족시킨다고 본다.","원가기준 : 공급사업부의 비능률이 모두 수요사업부에 전가되기 때문에 원가통제에 대한 동기부여 가 어렵다.","원가기준 : 준최적화 현상이 나타날 가능성이 존재한다.","협상가격기준 : 각 사업부 관리자의 자율성을 저해한다는 단점이 있으나, 협상과정에서 시간의 소 요가 적다는 장점이 존재한다."],"c":3,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '협상가격기준 : 각 사업부 관리자의 자율성을 저해한다는 단점이 있으나, 협상과정에서 시간의 소 요가 적다는 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_원가_40","q":"다음 중 수명주기원가계산(LCC)에 관한 설명으로 옳지 않은 것은?","a":["수명주기원가계산(life-cycle costing：LCC)이란 제품수명주기동안 연구개발, 설계, 제조, 마케팅, 유통, 고객서비스에서 발생하는 모든 원가를 제품별로 집계하는 원가계산제도이다.","제조이후단계에서 대부분의 제품원가가 결정된다는 인식을 토대로 생산단계와 마케팅단계에서 원가 절감을 위한 노력을 기울여야 한다는 것을 강조한다.","장기적 관점의 원가절감 및 원가관리에 유용하다.","프로젝트와 관련하여 언제 어떤 가치사슬단계에서 얼마만큼의 원가가 발생하는지를(비율로) 알게 됨으로써 상이한 가치사슬단계에서 원가발생의 상호관계 파악이 가능하다."],"c":1,"s":"원가관리회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '제조이후단계에서 대부분의 제품원가가 결정된다는 인식을 토대로 생산단계와 마케팅단계에서 원가 절감을 위한 노력'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_1","q":"다음 중 재무회계와 관리회계에 관한 설명으로 옳지 않은 것은?","a":["재무회계는 법적 강제력을 가지지만 관리회계는 법적 강제력이 없다.","재무회계는 일반적으로 인정된 회계원칙에 따라 작성되지만 관리회계는 경제·경영·통계 등 다양한 정보를 활용하여 작성된다.","관리회계는 재무제표라는 양식으로 보고하지만 재무회계는 일정한 양식이 없다.","재무회계는 기업외부의 정보이용자를 위한 회계인 반면 관리회계는 기업내부의 정보이용자를 위한 회 계이다."],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '관리회계는 재무제표라는 양식으로 보고하지만 재무회계는 일정한 양식이 없다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_2","q":"다음 중 재무상태표의 기본요소에 관한 설명으로 옳지 않은 것은?","a":["재무상태의 측정에 직접적으로 관련되는 요소는 자산, 부채 및 자본이다.","일반적으로 지출의 발생과 자산의 취득은 밀접하게 관련되어 있다.","자본은 자산에서 부채를 차감한 후의 잔여지분에 해당한다.","미래에 특정 자산을 취득하겠다는 경영진의 의사결정은 기업에 현재 의무를 발생시킨다."],"c":3,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '미래에 특정 자산을 취득하겠다는 경영진의 의사결정은 기업에 현재 의무를 발생시킨다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_3","q":"다음 중 재무정보의 질적 특성에 관한 설명으로 옳지 않은 것은?","a":["목적적합성과 표현충실성은 근본적 질적 특성에 해당한다.","비교가능성, 검증가능성, 적시성, 이해가능성은 보강적 질적 특성에 해당한다.","보강적 질적 특성은 가능한 극대화되어야 하는 것이므로 하나의 보강적 질적특성이 다른 질적 특성의 극대화를 위해 감소될 수는 없다.","원가는 재무보고로 제공될 수 있는 정보에 대한 포괄적 제약요인이다."],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '보강적 질적 특성은 가능한 극대화되어야 하는 것이므로 하나의 보강적 질적특성이 다른 질적 특성의 극대화를 위'는 잘못된 설명입니다. 실제로는 감소가 아니라 증가하는 관계입니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_4","q":"다음 중 주석(footnote)에 관한 설명으로 옳지 않은 것은?","a":["주석은 전체 재무제표의 범위에 포함된다.","적용한 유의적인 회계정책은 주석으로 공시하여야 할 사항이다.","비재무적인 항목은 주석공시사항에 포함되지 않는다.","기업에 중요한 우발부채나 약정사항이 존재한다면 동 내용을 주석에 기재하여야 한다."],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '비재무적인 항목은 주석공시사항에 포함되지 않는다.'는 잘못된 설명입니다. 실제로는 포함되는 항목입니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_5","q":"다음 중 특수관계자 공시에 관한 설명으로 옳지 않은 것은?","a":["보고기업에 유의적인 영향력을 행사할 수 있는 개인은 보고기업과 특수관계에 있다.","최상위 지배자와 지배기업이 다른 경우에는 최상위 지배자의 명칭도 공시한다.","주요 경영진에 대한 보상의 총액과 각 분류별 금액을 공시한다.","지배기업과 그 종속기업 사이의 관계는 거래가 없을 경우 공시를 생략할 수 있다."],"c":3,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '지배기업과 그 종속기업 사이의 관계는 거래가 없을 경우 공시를 생략할 수 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_6","q":"물가가 상승하고 기말재고수량이 기초재고수량보다 크거나 같다고 가정할 경우, 기말재고의 평가에 있어\n서 선입선출법을 적용했을 경우와 총평균법을 적용했을 경우에 관한 설명으로 옳지 않은 것은?","a":["선입선출법을 적용하는 경우와 총평균법을 적용하는 경우의 매출액은 동일하다.","선입선출법을 적용할 때 매출원가가 보다 높게 계상된다.","선입선출법을 적용할 때 기말재고금액이 보다 높게 계상된다.","선입선출법을 적용할 때 당기순이익이 보다 높게 계상된다."],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. 물가 상승 시 선입선출법은 먼저 들어온 낮은 원가를 먼저 매출원가로 배분하므로: ①매출액은 재고평가방법과 무관하게 동일합니다. 선입선출법 적용 시 매출원가↓, 기말재고↑, 당기순이익↑이 됩니다.","src":"cbt"},{"id":"jg_12_재무_7","q":"다음 자료를 토대로 재고자산과 관련하여 ㈜삼일의 20X2년 포괄손익계산서에 비용으로 보고되는 금액을\n계산하면 얼마인가(단, 비정상감모손실은 발생하지 않았다)?\nŸ 20X1년 12월 31일 재고자산 200,000원\nŸ 20X2년 매입액 180,000원\nŸ 20X2년 재고자산평가손실 73,000원\nŸ 20X2년 재고자산감모손실(정상감모) 14,000원\nŸ 20X2년 12월 31일 재고자산(평가손실 및 감모손실 차감 후) 100,000원","a":["266,000원","280,000원","353,000원","367,000원"],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (280,000원). 매출총이익률법: 매출원가 = 매출액 × (1-매출총이익률). 재고손실 = 장부상재고 - 실사재고. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_8","q":"재고자산은 매년 결산일 현재의 순실현가능가치와 취득원가를 비교하여 둘 중 낮은 금액으로 측정한다.\n다음 중 이와 관련된 설명으로 옳지 않은 것은?","a":["저가법은 원칙적으로 재고자산 항목별로 적용한다.","한번 감액된 재고자산은 그 후속기간에 환입될 수 없다.","기업은 매 후속기간에 순실현가능가치를 재평가한다.","순실현가능가치의 중요한 하락은 물리적 손상뿐만 아니라 기술적 진부화에 의해서도 발생할 수 있다."],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '한번 감액된 재고자산은 그 후속기간에 환입될 수 없다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_9","q":"다음 중 유형자산의 취득원가에 포함되는 요소로만 올바르게 짝지어진 것은?\nㄱ. 설치장소 준비를 위한 지출 ㄴ. 최초의 운송 및 취급관련 원가\nㄷ. 보유중인 건물에 대하여 부과되는 재산세 ㄹ. 취득세\nㅁ. 매입할인","a":["ㄱ, ㄴ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"],"c":0,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. 'ㄱ, ㄴ, ㄹ'. 유형자산은 취득원가로 인식 후 감가상각을 통해 내용연수에 걸쳐 비용화합니다. ","src":"cbt"},{"id":"jg_12_재무_10","q":"다음은 ㈜삼일이 사용 중인 기계장치와 관련된 내용이다. ㈜삼일이 기계장치와 관련하여 20X2년에 인식\n할 감가상각비는 얼마인가(단, 기계장치는 정액법으로 상각하고, 잔존가치는 0원이라고 가정한다)?\nㄱ. 20X1년 말 현재 기계장치 장부금액(손상차손 인식전) : 60,000,000원\nㄴ. 20X1년 말 현재 기계장치의 순공정가치 : 25,000,000원\nㄷ. 20X1년 말 현재 기계장치의 사용가치 : 30,000,000원\nㄹ. 20X1년 말 현재 기계장치의 잔존내용연수 : 10년\nㅁ. ㈜삼일은 20X1년 말 상기 기계장치에 대해서 손상차손을 인식함","a":["2,500,000원","3,000,000원","3,500,000원","3,888,889원"],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (3,000,000원). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_11","q":"다음 중 유형자산의 손상을 시사하는 징후로서 옳지 않은 것은?","a":["자산의 사용가치를 계산하는데 영향을 미치는 시장이자율이 하락함","기업경영환경에 중요한 영향을 미치는 법률이 불리한 방향으로 개정됨","기업의 순자산 장부금액이 당해 시가총액을 상회함","해당 유형자산을 이용한 경제적 성과가 기대에 비해 저조할 것으로 예측됨"],"c":0,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '자산의 사용가치를 계산하는데 영향을 미치는 시장이자율이 하락함'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_12","q":"다음 중 무형자산의 상각에 관한 설명으로 옳은 것은?","a":["내용연수가 유한한 무형자산의 내용연수는 경제적 내용연수와 법적 내용연수 중 긴 것으로 결정된 다.","내용연수가 유한한 무형자산의 경제적 효익이 소비되는 형태를 신뢰성있게 결정할 수 없는 경우에는 정액법으로 상각한다.","내용연수가 유한한 무형자산의 잔존가치는 해당 자산의 장부금액과 같을 수는 있으나 큰 금액으로 증가할 수는 없다.","내용연수가 비한정인 무형자산은 상각 및 손상검사를 수행하지 않는다."],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '내용연수가 유한한 무형자산의 경제적 효익이 소비되는 형태를 신뢰성있게 결정할 수 없는 경우에는 정액법으로 상'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_재무_13","q":"다음은 ㈜삼일의 프로젝트 개발활동과 관련된 지출내용이다. ㈜삼일의 프로젝트 개발활동과 관련하여\n무형자산(개발비)으로 회계처리가 가능한 금액은 얼마인가?\n프로젝트 금 액 내 용\n가 350,000원 프로젝트 연구단계에서의 지출\n나 900,000원 프로젝트 개발단계에서의 지출로 자산 인식조건을 만족시킴\n다 1,000,000원 프로젝트 개발단계에서의 지출로 자산 인식조건을 만족시키지 못함","a":["900,000원","1,250,000원","1,900,000원","2,250,000원"],"c":0,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (900,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_14","q":"다음 중 투자부동산의 후속적 측정에 관한 설명으로 옳지 않은 것은?","a":["원가모형으로 측정해 오던 투자부동산이 매각예정으로 분류된다면 별도의 기준서에 따라 처리하여야 한다.","최초 인식 이후 투자부동산의 평가방법을 원가모형으로 선택한 경우에는 원칙적으로 모든 투자부동 산에 대하여 원가모형을 적용한다.","공정가치모형에서 공정가치를 산정할 때에는 매각, 또는 다른 형태의 처분으로 발생할 수 있는 거래 원가를 차감하여야 한다.","공정가치모형을 선택한 경우에는 해당 투자부동산이 감가상각대상자산인 경우에도 감가상각은 수행 하지 않는다."],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '공정가치모형에서 공정가치를 산정할 때에는 매각, 또는 다른 형태의 처분으로 발생할 수 있는 거래 원가를 차감'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_15","q":"다음 중 상각후원가 측정 금융자산에 관한 설명으로 옳지 않은 것은?","a":["원칙적으로 지분상품은 상각후원가 측정 금융자산으로 분류될 수 없다.","상각후원가 측정 금융자산은 유효이자율법을 적용하여 상각후원가로 평가한다.","상각후원가 측정 금융자산으로 분류되기 위해서는 계약상 현금흐름을 수취할 목적으로 보유하는 금 융자산이어야 한다.","상각후원가 측정 금융자산 취득시 지출된 거래원가는 취득원가에서 우선 차감한 후 유효이자율법에 의해 이자수익에 가감된다."],"c":3,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '상각후원가 측정 금융자산 취득시 지출된 거래원가는 취득원가에서 우선 차감한 후 유효이자율법에 의해 이자수익에'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_16","q":"다음 중 금융자산의 신용이 손상된 증거로 볼 수 없는 것은?","a":["이자지급이나 원금상환의 불이행이나 지연과 같은 계약 위반","차입자의 재무적 어려움에 관련된 경제적 또는 법률적 이유로 인한 당초 차입조건의 불가피한 완화","금융자산 보유자의 파산이나 기타 재무구조조정의 가능성이 높은 상태가 된 경우","금융자산 발행자의 중요한 재무적 어려움"],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '금융자산 보유자의 파산이나 기타 재무구조조정의 가능성이 높은 상태가 된 경우'. 금융자산은 사업모형과 현금흐름 특성에 따라 AC, FVOCI, FVPL로 분류하여 측정합니다. ","src":"cbt"},{"id":"jg_12_재무_17","q":"다음 중 당기손익-공정가치 측정 금융부채로 분류하기에 옳지 않은 것은?","a":["주로 단기간 내에 재매입할 목적으로 발행하는 금융부채","최초 인식시점에 당기손익인식 항목으로 지정한 금융부채","공매자(차입한 금융자산을 매도하고 아직 보유하고 있지 않은 자)가 차입한 금융자산을 인도할 의무","위험회피수단으로 지정되고 위험회피에 효과적인 파생상품"],"c":3,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '위험회피수단으로 지정되고 위험회피에 효과적인 파생상품'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_18","q":"㈜삼일은 20X1년 1월 1일 액면금액 1,000,000원, 표시이자율 연 10 %, 만기 2년인 사채를 1,035,665\n원에 할증발행하였다. 사채의 발행당시 유효이자율이 연 8 % 일 때 ㈜삼일이 사채발행으로 인하여 만기\n2년 동안 인식해야 할 총 이자비용은 얼마인가?","a":["164,335원","200,000원","235,665원","256,240원"],"c":0,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (164,335원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_19","q":"다음 중 전환사채에 관한 설명으로 옳지 않은 것은?","a":["전환사채의 발행금액에는 전환권대가가 포함되어 있다.","전환권대가는 전환사채의 총발행금액에서 전환권이 없는 일반사채의 가치를 차감한 금액으로 한다.","상환할증금 지급조건의 경우 액면이자율이 보장수익률보다 높다.","전환사채는 부채요소와 자본요소를 모두 가지고 있는 복합금융상품이다."],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '상환할증금 지급조건의 경우 액면이자율이 보장수익률보다 높다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_20","q":"다음 중 손실부담계약에 관한 설명으로 옳지 않은 것은?","a":["손실부담계약을 체결한 경우에는 관련된 현재의 의무를 충당부채로 인식한다.","손실부담계약은 계약상 의무에 따른 회피 불가능한 원가가 당해 계약에 의하여 받을 것으로 기대되 는 경제적 효익을 초과하는 계약을 뜻한다.","손실이 예상되는 확정매입계약은 손실부담계약이 될 수 없다.","회피 불가능한 원가는 계약을 이행하기 위하여 필요한 원가와 계약을 이행하지 못하였을 때 지급하 여야 할 보상금 중 작은 금액이다."],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '손실이 예상되는 확정매입계약은 손실부담계약이 될 수 없다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_21","q":"다음 중 이익잉여금의 처분거래가 아닌 것은?","a":["자기주식의 처분","현금배당","주식배당","이익준비금의 적립"],"c":0,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '자기주식의 처분'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_22","q":"다음 중 자본거래가 자본항목에 미치는 영향에 관한 설명으로 옳지 않은 것은?\n유상증자 무상증자 주식분할","a":["이익잉여금 불변 감소가능 불변","주식수 증가 증가 증가","자본금 증가 증가 증가","총자본 증가 불변 불변"],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '자본금 증가 증가 증가'는 잘못된 설명입니다. 실제로는 증가가 아니라 감소하는 관계입니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_23","q":"다음 중 고객과의 계약에서 생기는 수익에 관한 설명으로 옳지 않은 것은?","a":["고객에게 이전할 재화나 용역에 대하여 받을 권리를 갖게 될 대가의 회수가능성이 높지 않더라도 계 약에 상업적 실질이 존재하고 이전할 재화나 용역의 지급조건을 식별할 수 있으면 고객과의 계약으 로 회계처리한다.","수익을 인식하기 위해서는 [고객과의 계약 식별-수행의무 식별-거래가격 산정-거래가격을 계약 내 수행의무에 배분-수행의무를 이행할 때 수익인식]의 단계를 거친다.","거래가격 산정시 제 3자를 대신해서 회수한 금액은 제외하며, 변동대가, 비현금대가 및 고객에게 지급할 대가 등이 미치는 영향을 고려하여야 한다.","고객에게 약속한 재화나 용역을 이전하여 수행의무를 이행할 때, 즉 고객이 자산을 통제할 때 수익 을 인식한다."],"c":0,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '고객에게 이전할 재화나 용역에 대하여 받을 권리를 갖게 될 대가의 회수가능성이 높지 않더라도 계 약에 상업적'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_24","q":"㈜삼일은 20X1년 1월 1일 ㈜용산에 상품을 할부로 판매하였다. 상품의 원가는 8,000,000원 이며, 할\n부대금은 매년 말 4,000,000원 씩 3년간 회수하기로 하였다. 또한 시장이자율은 12 % 이며, 연금현가\n계수(12 %, 3년)는 2.40183이다. 동 할부매출과 관련하여 ㈜삼일이 20X1년에 인식할 이자수익과 매출\n액은 각각 얼마인가(단, 소수점 이하는 반올림한다)?\n이자수익 매출액","a":["960,000원 9,607,320원","960,000원 12,000,000원","1,152,878원 9,607,320원","1,152,878원 12,000,000원"],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (1,152,878원 9,607,320원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_25","q":"다음 중 고객충성제도의 회계처리에 관한 설명으로 옳지 않은 것은?","a":["보상점수를 부여한 매출거래에는 재화 등의 제공과 보상점수의 제공이라는 별도의 수행의무가 존재 한다고 본다.","기업이 직접 보상을 제공하는 경우 보상점수에 배분된 거래가격은 계약부채로 인식한 후 보상을 제 공한 때 수익으로 인식한다.","제3자가 보상을 제공하고 기업이 자기의 계산으로 대가를 회수하는 경우에는 보상점수에 배분되는 총 대가로 수익을 측정하고 보상과 관련하여 의무를 이행한 때 수익을 인식한다.","제3자가 보상을 제공하고 기업이 제3자를 대신하여 대가를 회수하는 경우에는 보상점수에 배분된 총 대가를 수익으로 측정하고 대가를 받을 권리를 가지게 될 때 수익을 인식한다."],"c":3,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '제3자가 보상을 제공하고 기업이 제3자를 대신하여 대가를 회수하는 경우에는 보상점수에 배분된 총 대가를 수익'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_26","q":"㈜삼일건설은 ㈜용산과 20X1년 7월 1일 총공사계약액 60,000,000원의 공장신축공사계약을 체결하였\n다. 회사가 누적발생계약원가에 기초하여 진행률을 측정하여 진행기준으로 수익을 인식한다면 ㈜삼일건\n설의 20X2년 계약손익은 얼마인가?\n20X1년 20X2년\n당기발생계약원가 12,000,000원 28,000,000원\n추정총계약원가 40,000,000원 40,000,000원\n공사대금청구액(연도별) 25,000,000원 35,000,000원","a":["이익 10,000,000원","이익 14,000,000원","이익 15,000,000원","이익 20,000,000원"],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (이익 14,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_27","q":"다음 중 확정급여형 퇴직급여제도와 관련하여 당기손익으로 인식되는 항목이 아닌 것은?","a":["당기근무원가","과거근무원가와 정산으로 인한 손익","순확정급여부채의 순이자","재측정요소"],"c":3,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '재측정요소'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_28","q":"㈜삼일은 20X1년 1월 1일 임원 10명에게 용역제공조건으로 주식결제형 주식선택권을 부여하였다. 주\n식결제형 주식기준보상과 관련하여 20X2년 주식보상비용 계산시 필요한 정보로 옳지 않은 것은?","a":["용역제공기간(가득기간)","부여된 지분상품의 수량","보고기간말 현재 주가차액보상권의 공정가치","연평균기대권리소멸률"],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '보고기간말 현재 주가차액보상권의 공정가치'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_29","q":"다음은 ㈜삼일의 20X1년과 20X2년 말의 이연법인세자산·부채의 내역이다. ㈜삼일이 20X2년에 인식할\n법인세비용은 얼마인가(20X2년 과세소득에 대하여 부담할 법인세액은 300,000원이다)?\n<각 회계연도 말 재무상태표 금액>\n구 분 20X1년 말 20X2년 말\n이연법인세자산 50,000원 -\n이연법인세부채 - 150,000원","a":["300,000원","350,000원","400,000원","500,000원"],"c":3,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번 (500,000원). 이연법인세자산/부채 = 일시적차이 × 세율. 차감할 일시적차이는 이연법인세자산, 가산할 일시적차이는 이연법인세부채를 인식합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_30","q":"다음 중 법인세회계에 관한 설명으로 옳지 않은 것은?","a":["이연법인세자산 ․ 부채는 일시적 차이의 소멸시기와 관계없이 비유동항목으로 구분하여 재무상태표 에 표시한다.","차감할 일시적차이가 사용될 수 있는 미래과세소득의 발생 가능성이 높은 경우에 이연법인세자산을 인식한다.","화폐의 시간가치가 중요한 경우에도 이연법인세자산 ․ 부채는 현재가치로 평가하지 않는다.","일시적차이가 발생한 연도의 평균세율을 적용하여 이연법인세자산·부채를 측정한다."],"c":3,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '일시적차이가 발생한 연도의 평균세율을 적용하여 이연법인세자산·부채를 측정한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_31","q":"다음 중 회계변경과 오류수정에 관한 설명으로 옳지 않은 것은?","a":["회계정책의 변경을 반영한 재무제표가 거래, 기타 사건 또는 상황이 재무상태, 재무성과 또는 현금 흐름에 미치는 영향에 대하여 신뢰성 있고 더 목적적합한 정보를 제공하는 경우에는 회계정책을 변 경할 수 있다.","측정기준의 변경은 회계추정치 변경이 아니라 회계정책의 변경에 해당한다.","회계정책의 변경과 회계추정치 변경을 구분하는 것이 어려운 경우에는 회계정책의 변경으로 본다.","과거의 특정기간에 대한 회계정책의 변경으로 인한 누적효과를 합리적으로 결정하기 어려운 경우에 실무적으로 소급적용이 가능한 가장 이른 회계기간에 반영한다."],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '회계정책의 변경과 회계추정치 변경을 구분하는 것이 어려운 경우에는 회계정책의 변경으로 본다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_32","q":"다음은 ㈜삼일의 20X1회계연도(20X1년 1월 1일 ~ 20X1년 12월 31일) 당기순이익과 자본금 변동상황\n에 관한 자료이다. ㈜삼일의 20X1회계연도 보통주 기본주당순이익은 얼마인가(단, 소수점 이하는 반올\n림한다)?\nㄱ. 당기순이익 : 265,000,000원\nㄴ. 자본금 변동사항(액면 5,000원)\n보통주자본금\n- 1.1 기초 50,000주 250,000,000원\n- 4.1 유상증자(30 %) 15,000주 75,000,000원\n* 유통보통주식수 계산시 월할계산을 가정함\n* 4.1 유상증자시 시가이하로 유상증자 하지 아니함\nㄷ. 20X1회계연도 이익에 대한 배당(현금배당)\n- 우선주 : 20,000,000원","a":["3,769원","4,000원","4,077원","4,327원"],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (4,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_33","q":"20X1년초 ㈜삼일은 ㈜한양의 보통주 40 % 를 800,000원에 취득하여 유의적인 영향력을 행사하게 되었\n다. 주식취득일 현재 ㈜한양의 순자산장부금액은 2,000,000원으로 공정가치와 동일하였다. ㈜한양은\n20X1년 중 중간배당으로 50,000원을 지급하였고, ㈜삼일은 이 중 20,000원을 수령하였다. ㈜한양의\n20X1년 당기순이익이 300,000원이며, 기타포괄손실이 100,000원이라 할 때 20X1년 말 ㈜삼일의 재무\n상태표에 기록될 관계기업투자주식(지분법적용투자주식)의 장부금액은 얼마인가?","a":["860,000원","880,000원","900,000원","920,000원"],"c":0,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (860,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_34","q":"다음 중 관계기업투자 및 지분법회계처리에 관한 설명으로 옳지 않은 것은?","a":["유의적인 영향력을 판단함에 있어 피투자자에 대한 의결권은 투자자의 지분율과 종속기업이 보유하 고 있는 지분율의 단순합계로 계산한다.","투자자와 관계기업 사이의‘상향’거래나‘하향’거래에서 발생한 당기손익 중 그 관계기업에 대한 투자지분과 무관한 손익은 투자자의 재무제표에 인식할 수 없다.","기업이 해당 피투자자에 대하여 유의적인 영향력이 있는지 여부를 평가할 때에는, 다른 기업이 보유 한 잠재적 의결권을 포함하여 현재 행사할 수 있거나 전환할 수 있는 잠재적 의결권의 존재와 영향 을 고려하여야 한다.","관계기업이 유사한 상황에서 발생한 동일한 거래와 사건에 대하여 투자자의 회계정책과 다른 회계정 책을 사용한 경우, 투자자는 관계기업의 회계정책을 투자자의 회계정책과 일관되도록 적절히 수정해 야 한다."],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '투자자와 관계기업 사이의‘상향’거래나‘하향’거래에서 발생한 당기손익 중 그 관계기업에 대한 투자지분과 무관한'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_35","q":"한국에서 영업을 하는 ㈜서울의 미국 현지법인인 ㈜엘에이의 재무제표이다. ㈜엘에이는 20X1년 초 설립\n되었으며, ㈜엘에이의 기능통화인 달러화로 작성한 20X1년 말 재무상태표는 다음과 같다. ㈜엘에이의\n재무상태표를 ㈜서울의 표시통화인 원화로 환산할 경우 기타포괄손익으로 인식되는 외환차이는 얼마인\n가(단, 수익 및 비용은 평균환율을 적용하고, 자본금은 모두 설립시 발생한 것으로 가정한다)?\n(1) 20X1년 말 달러화로 작성한 재무상태표\n부채 $ 1,000\n자본금 $ 2,000\n자산 $ 4,000\n이익잉여금\n$ 1,000\n(당기순이익)\n합계 $ 4,000 합계 $ 4,000\n(2) 환율정보\n일자 20X1년 초 20X1년 말 20X1년 평균\n환율( \\ / $ ) 1,000 1,200 1,050","a":["400,000원","450,000원","500,000원","550,000원"],"c":3,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '550,000원'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_12_재무_36","q":"㈜삼일은 외국의 수입업자에게 $ 10,000의 상품을 판매하기로 20X1년 11월 1일에 약정하고, 상품은\n20X2년 2월 1일에 인도하기로 하였다. ㈜삼일은 대금결제에 대비하기 위하여 판매계약시점에서 3개월\n후에 $ 1당 1,000원으로 $ 10,000를 매도할 수 있는 통화선도계약을 체결하였다. 20X1년 11월 1일의\n선도환율은 $ 1당 1,000원이었으나, 20X1년말 선도환율은 $ 1당 900원이다. 통화선도계약의 공정가치\n변동분 중 80 % 는 위험회피에 효과적이라고 가정할 때, ㈜삼일이 통화선도계약과 관련하여 20X1년에\n당기손익으로 인식할 파생상품평가손익을 계산하면 얼마인가(단, 파생상품의 공정가치 측정시 현재가치\n평가는 생략하기로 한다)?","a":["파생상품평가이익 200,000원","파생상품평가손실 200,000원","파생상품평가이익 800,000원","파생상품평가손실 800,000원"],"c":0,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (파생상품평가이익 200,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_37","q":"㈜삼일은 20X1년 1월 1일 ㈜용산리스로부터 기계장치를 3년간 리스하기로 하고, 매년 말 고정리스료\n로 1,000,000원씩 지급하기로 하였다. 리스계약을 체결하는 과정에서 ㈜삼일은 50,000원의 리스개설직\n접원가를 지출하였고, ㈜용산리스는 100,000원의 리스개설직접원가를 지출하였다. 동 기계장치는 원가\n모형을 적용하고 내용연수는 5년이며 정액법으로 감가상각한다. 리스기간 종료시 동 기계장치는 ㈜용산\n리스에 반환하는 조건이다. 리스개시일 현재 ㈜용산리스의 내재이자율은 알 수 없으며, ㈜삼일의 증분\n차입이자율은 연 10 % 이다. ㈜삼일이 리스개시일에 인식할 사용권자산을 계산하면 얼마인가?\n단일금액 1원의 현재가치 정상연금 1원의 현재가치\n기간\n(할인율 10 %) (할인율 10 %)\n3년 0.7513 2.4869","a":["2,486,900원","2,536,900원","2,586,900원","2,636,900원"],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (2,536,900원). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_38","q":"다음 중 현금흐름표에 관한 설명으로 옳지 않은 것은?","a":["직접법을 적용하여 표시한 영업활동 현금흐름은 간접법에 의한 영업활동 현금흐름에서는 파악할 수 없는 정보를 제공하기 때문에 미래현금흐름을 추정하는데 보다 유용한 정보를 제공한다.","영업활동은 기업의 주요 수익창출활동, 그리고 투자활동이나 재무활동이 아닌 기타의 활동을 말한 다.","투자활동은 유ㆍ무형자산, 지분상품이나 채무상품 등의 발행과 상환활동, 제3자에 대한 대여 및 회 수활동 등을 포함한다.","현금흐름표는 회계기간 동안 발생한 현금흐름을 영업활동, 투자활동 및 재무활동으로 분류하여 보고 한다."],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '투자활동은 유ㆍ무형자산, 지분상품이나 채무상품 등의 발행과 상환활동, 제3자에 대한 대여 및 회 수활동 등을'는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_재무_39","q":"다음은 ㈜삼일의 매입활동과 관련된 재무상태표와 포괄손익계산서의 일부이다. ㈜삼일의 모든 매입은\n외상으로 이루어지고, 모든 선급금은 원재료 매입과 관련되었다고 할 때, 20X1년 중 ㈜삼일이 매입처에\n지급한 현금을 계산하면 얼마인가?\nㄱ. 재무상태표 일부\n20X0년 12월 31일 20X1년 12월 31일\n매입채무 5,000,000원 15,000,000원\n선급금 7,000,000원 3,000,000원\nㄴ. 당기 재고자산 매입액은 150,000,000원이다.","a":["132,000,000원","136,000,000원","144,000,000원","156,000,000원"],"c":1,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (136,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_재무_40","q":"㈜삼일의 20X1년 재무제표 관련 자료를 이용하여 현금흐름표에 보고될 간접법에 의한 영업활동현금흐름\n을 계산하면 얼마인가(단, 이자의 지급은 재무활동으로 분류한다)?\n당기순이익 20,000원 감가상각비 4,600원\n매출채권의 증가 15,000원 재고자산의 감소 2,500원\n매입채무의 증가 10,400원 유형자산처분손실 2,400원\n사채상환이익 4,000원 이자비용 100원","a":["20,100원","20,900원","21,000원","22,500원"],"c":2,"s":"재무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (21,000원). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_1","q":"다음 중 조세의 분류에 관한 설명으로 옳지 않은 것은?","a":["부가가치세는 과세권자가 국가인 국세에 해당한다.","소득세는 납세자의 인적사정이 고려되는 인세에 해당한다.","교육세는 세수의 용도를 특정하여 징수하는 목적세에 해당한다.","농어촌특별세는 독립적인 세원에 대하여 부과되는 독립세에 해당한다."],"c":3,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '농어촌특별세는 독립적인 세원에 대하여 부과되는 독립세에 해당한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_2","q":"다음 중 국세기본법상 기간과 기한에 관련된 설명으로 옳지 않은 것은?","a":["국세기본법 또는 세법에서 규정하는 기간의 계산은 국세기본법 또는 그 세법에 특별한 규정이 있는 것을 제외하고는 민법에 따른다.","기한은 일정시점의 도래로 인하여 법률효과가 발생ㆍ소멸하거나 또는 일정한 시점까지의 의무를 이 행하여야 하는 경우에 그 시점을 말한다.","주, 월 또는 연의 처음으로부터 기간을 기산하지 아니하는 때에는 최후의 주, 월 또는 연에서 그 기 산일에 해당한 날의 다음 날로 기간이 만료한다.","월 또는 연으로 기간을 정한 경우에 최종의 월에 해당일이 없는 때에는 그 월의 말일로 기간이 만료 한다."],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '주, 월 또는 연의 처음으로부터 기간을 기산하지 아니하는 때에는 최후의 주, 월 또는 연에서 그 기 산일에 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_3","q":"과세의 대상이 되는 소득, 수익, 재산, 행위 또는 거래의 귀속이 명의(名義)일 뿐이고 사실상 귀속되는\n자가 따로 있을 때에는 사실상 귀속되는 자를 납세의무자로 하여 세법을 적용한는 것은 다음 중 어떤\n원칙과 관련된 것인가?","a":["소급과세금지의 원칙","실질과세의 원칙","조세법률주의","신의성실의 원칙"],"c":1,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '실질과세의 원칙'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_12_세무_4","q":"세무조사결과통지 또는 과세예고통지를 받은 자가 통지를 받은 날부터 30일 이내에 통지를 한 세무서장\n이나 지방국세청장에게 통지 내용의 적법성에 관한 심사를 청구할 수 있도록 한 제도는?","a":["심판청구","심사청구","과세전적부심사","이의신청"],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '과세전적부심사'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_12_세무_5","q":"다음 중 법인세와 관련된 설명으로 옳지 않은 것은?","a":["토지 등 양도소득에 대한 법인세는 주택, 별장, 주택을 취득하기 위한 권리로서 조합원 입주권 및 분양권 그리고 비사업용 토지의 양도소득에 대해 과세한다.","청산소득이란 영리내국법인이 해산(합병 또는 분할에 의한 해산 제외)하는 경우에 발생하는 소득을 말한다.","상호출자제한기업집단에 속하는 내국법인과 자기자본이 500억원을 초과하는 내국법인은 미환류소득 에 대한 법인세 납세의무를 진다.","법인세법상 소득금액은 각 사업연도의 법인의 순자산증가액을 화폐적 수치로써 표시한 가액을 말한 다."],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '상호출자제한기업집단에 속하는 내국법인과 자기자본이 500억원을 초과하는 내국법인은 미환류소득 에 대한 법인세'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_6","q":"다음 중 「자본금과 적립금조정명세서(을)」에 기재해야 하는 세무조정 사항에 해당하는 것은?","a":["감가상각비한도초과액의 손금불산입","자본잉여금으로 계상한 자기주식처분이익의 익금산입","임원퇴직급여한도초과액의 손금불산입","특례기부금한도초과액의 손금불산입"],"c":0,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '감가상각비한도초과액의 손금불산입'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_세무_7","q":"다음 중 법인세법상 익금으로 인정되지 않는 금액은 얼마인가?\n(1) 종합부동산세의 과오납금 환급금이자 1,000,000원\n(2) 손금불산입된 법인세의 환급액 2,000,000원\n(3) 채무면제이익(이월결손금 없음) 3,000,000원\n(4) 손금에 산입된 재산세의 환급액 4,000,000원","a":["3,000,000원","4,000,000원","5,000,000원","9,000,000원"],"c":0,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (3,000,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_8","q":"다음 자료에 의할 경우 ㈜삼일의 제24기(2024년 1월 1일 ~ 2024년 12월 31일)에 김삼일 이사(주주\n에 해당함)의 인건비 중 손금불산입되는 금액은 얼마인가?\nㄱ. 김삼일 이사는 ㈜삼일에 4년 9개월간 근무하다가 2024년 12월 31일에 퇴직하였다.\nㄴ. ㈜삼일은 김삼일 이사에게 퇴직급여 20,000,000원을 지급하였다. ㈜삼일은 퇴직급여충당금을\n설정하지 않으며, 임원퇴직급여 규정도 두고 있지 않다.\nㄷ. 퇴직 직전 1년간 김삼일 이사에게 지급한 급여액은 24,000,000원이며 상여금은 10,000,000\n원(정관규정의 지급한도를 초과한 4,000,000원 포함)이다.\nㄹ. 급여액 등 인건비는 모두 손익계산서상 비용으로 회계처리되었다.","a":["4,000,000원","4,750,000원","5,750,000원","9,750,000원"],"c":3,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번 (9,750,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_9","q":"제조업을 영위하는 ㈜삼일의 제24기(2024년 1월 1일 ~ 2024년 12월 31일) 손익계산서에 계상한 비\n용이다. ㈜삼일의 제24기 세무조정시 손금불산입되는 금액으로 옳은 것은?\n(1) 직장체육비 1,000,000원\n(2) 벌금 2,000,000원\n(3) 임직원에 대한 사회통념상 타당한 범위에서 지급하는 경조금 3,000,000원\n(4) 소액주주가 아닌 출자자인 임원이 사용하는 사택유지비 4,000,000원\n(5) 형법상 뇌몰 5,000,000원","a":["7,000,000원","8,000,000원","11,000,000원","12,000,000원"],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (11,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_10","q":"㈜삼일의 제24기 사업연도(2024년 1월 1일 ~ 2024년 12월 31일)의 국내은행에 가입한 정기적금 미\n수이자 계정은 다음과 같다.\n정기적금 미수이자\n기초잔액 3,000,000원 당기감소 -\n당기증가 4,000,000원 기말잔액 7,000,000원\n합계 7,000,000원 합 계 7,000,000원\n정기적금은 2023년초에 가입하였으며, 2025년초에 만기가 된다. 만기시 이자를 받을 때 은행에서 법인\n세와 법인지방소득세를 원천징수한다. ㈜삼일의 정기적금 미수이자에 대한 제24기 사업연도의 세무조\n정으로 옳은 것은?","a":["(익금산입) 3,000,000원","(익금산입) 4,000,000원","(익금불산입) 3,000,000원","(익금불산입) 4,000,000원"],"c":3,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '(익금불산입) 4,000,000원'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_세무_11","q":"다음 중 법인세법상 감가상각에 관한 설명으로 옳지 않은 것은?","a":["전화기(휴대용 전화기 포함) 및 개인용 컴퓨터(그 주변기기 포함)는 그 사업에 사용한 날이 속하는 사업연도에 손비로 계상하면 이를 손금에 산입한다.","자산 취득가액이 거래단위별로 100만원 이하인 경우로서 그 고유업무의 성질상 대량으로 보유하는 자산은 시부인계산 과정을 거치지 않고 전액 손금으로 인정한다.","시간의 경과에 따라 그 가치가 감소되지 아니하는 자산은 감가상각자산에 포함하지 아니한다.","광업권에 대하여 감가상각방법을 신고하지 않은 경우 생산량비례법을 적용한다."],"c":1,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '자산 취득가액이 거래단위별로 100만원 이하인 경우로서 그 고유업무의 성질상 대량으로 보유하는 자산은 시부인'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_12","q":"다음은 ㈜삼일이 2024년 10월 1일에 취득한 기계장치에 관한 자료이다. 이 자료를 기초로 제24기\n(2024년 1월 1일 ~ 2024년 12월 31일) 사업연도의 기계장치 상각범위액을 계산하면 얼마인가?\nㄱ. 기계장치의 취득가액: 4억원\nㄴ. 2024.12.1에 발생한 기계장치에 대한 자본적 지출: 2억원\nㄷ. 감가상각방법: 정액법\nㄹ. 신고내용연수: 5년(정액법 상각률 0.2)","a":["25,000,000원","30,000,000원","35,000,000원","40,000,000원"],"c":1,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (30,000,000원). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_13","q":"중소기업인 ㈜삼일(사회적기업 아님)의 제24기 사업연도(2024년 1월 1일 ~ 2024년 12월 31일) 기부\n금 세무조정을 위한 자료이다. 제24기 각 사업연도 소득금액을 계산하면 얼마인가?\n(1) 차가감소득금액은 40,000,000원이다.\n(2) 손익계산서에 계상된 기부금의 내역은 다음과 같다.\n가. 천재지변으로 인한 이재민을 위한 구호금품：16,000,000원\n나. 사회복지법인에 고유목적사업비로 지출한 기부금：20,000,000원\n(3) 제24기 과세표준 계산시 공제 가능한 이월결손금은 50,000,000원이다.\n(4) 제23기 사업연도의 특례기부금 손금한도초과액이 4,000,000원 있다.","a":["60,700,000원","61,700,000원","62,700,000원","63,700,000원"],"c":1,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (61,700,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_14","q":"다음 중 법인세법상 기업업무추진비에 관한 설명으로 옳지 않은 것은?","a":["광고·선전목적으로 달력 등을 불특정 다수인에게 기증한 것은 일반적으로 기업업무추진비로 보지 않고 전액 손금으로 인정한다.","기업업무추진비를 금전이 아닌 현물로 제공한 경우에는 ‘시가와 장부금액 중 큰 금액’을 기업업무 추진비로 본다.","특정 거래처에게 광고선전물품으로 30,000원 상당의 달력과 30,000원 상당의 컵을 기증하였다면 60,000원을 기업업무추진비로 본다.","기업업무추진비 관련 VAT매입세액 불공제액은 기업업무추진비로 본다."],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '특정 거래처에게 광고선전물품으로 30,000원 상당의 달력과 30,000원 상당의 컵을 기증하였다면 60,0'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_15","q":"다음 중 법인세법상 지급이자 손금불산입 규정과 관련된 설명으로 옳지 않은 것은?","a":["일반차입금에 대한 건설자금이자는 자본화 할 수 없다.","건설자금이자의 계상대상에 투자자산과 제조 등에 장기간이 소요되는 재고자산은 포함되지 아니한 다.","비실명 채권·증권의 이자상당액은 건설자금이자보다 우선하여 지급이자 손금불산입 규정을 적용한 다.","업무무관자산등에 대한 지급이자를 계산할 때, 업무무관자산가액은 취득가액에 의하여 계산한다."],"c":0,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '일반차입금에 대한 건설자금이자는 자본화 할 수 없다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_16","q":"다음은 제조업을 영위하는 ㈜삼일의 제 24기(2024년 1월 1일 ~ 2024년 12월 31일) 대손충당금과 관\n련된 자료이다. 이 자료를 이용하여 대손충당금에 대한 세무조정 결과를 ‘자본금과 적립금조정명세서\n(을)’에 기입하고자 할 때, 빈칸에 들어갈 금액으로 옳은 것은?\n<자료1> 대손충당금 관련 자료\nㄱ. 결산서상 대손충당금 내역\n대손충당금\n*매출채권 8,000,000원 기초잔액 20,000,000원\n기말잔액 22,000,000원 추가설정액 10,000,000원\n계 30,000,000원 계 30,000,000원\n*당기에 소멸시효가 완성된 채권\nㄴ. 전기 대손충당금 부인액 3,000,000원\nㄷ. 당기 말 세법상 대손충당금 설정대상 채권금액 500,000,000원\nㄹ. 당기 대손실적률은 2 % 임\n<자료2> 자본금과 적립금조정명세서(을)\n당기중증감\n과목 또는 사항 기초잔액 기말잔액\n감소 증가\n대손충당금한도초과액 3,000,000 (ㄱ) xxx (ㄴ)\n(ㄱ) (ㄴ)","a":["0 22,000,000","3,000,000 22,000,000","0 12,000,000","3,000,000 12,000,000"],"c":3,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '3,000,000 12,000,000'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_세무_17","q":"다음 중 법인세법상 손금으로 인정되는 준비금으로 옳지 않은 것은?","a":["해약환급금준비금","고유목적사업준비금","배당평균준비금","책임준비금"],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '배당평균준비금'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_18","q":"㈜삼일은 2024년 9월 1일에 회사의 전무이사로부터 시가 10억원인 토지를 13억원에 매입하며 다음과\n같이 회계처리하였다. 토지 매입과 관련하여 2024년에 필요한 세무조정으로 옳은 것은?\n(차변) 토지 13 억원
