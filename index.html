3번. '김영희 : 중소기업은 부가가치세 조기환급 신청이 가능합니다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_32","q":"다음 중 부가가치세 납세의무자인 사업자에 관한 설명으로 옳은 것은?","a":["영세율을 적용받는 사업자는 부가가치세법상의 사업자 등록의무가 없다.","면세사업자는 부가가치세법에 따른 사업자 등록의무가 있다.","주사업장총괄납부사업자는 본점 또는 주사무소에서 모든 사업장의 부가가치세를 총괄하여 신고 및 납부할 수 있다.","사업상 독립적으로 재화 또는 용역을 공급하는 경우 법인 뿐만 아니라 개인도 사업자에 해당한다."],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '사업상 독립적으로 재화 또는 용역을 공급하는 경우 법인 뿐만 아니라 개인도 사업자에 해당한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_세무_33","q":"다음 중 부가가치세 과세기간에 관한 설명으로 옳지 않은 것은?","a":["계속사업자인 간이과세자의 과세기간은 1년을 제 1기 과세기간과 제 2기 과세기간으로 나누어 각 과세기간 별로 신고·납부하여야 한다.","일반과세자가 간이과세자로 변경되는 경우 과세유형이 변경되는 해에 간이과세 규정이 적용되는 기 간은 그 변경 이후 7월 1일부터 12월 31일까지이다.","신규사업자가 사업개시일 전에 사업자등록을 신청한 경우에는 사업자등록 신청일부터 신청일이 속하 는 과세기간의 종료일까지를 최초 과세기간으로 한다.","폐업자는 폐업일이 속하는 과세기간 개시일부터 폐업일까지를 최종 과세기간으로 한다."],"c":0,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '계속사업자인 간이과세자의 과세기간은 1년을 제 1기 과세기간과 제 2기 과세기간으로 나누어 각 과세기간 별로'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_34","q":"다음 중 부가가치세 납세지인 사업장에 관한 설명으로 옳은 것은?","a":["직매장과 하치장은 별도의 사업장으로 본다.","부동산매매업의 경우 부동산의 등기부상의 소재지를 사업장으로 한다.","제조업의 경우 최종제품을 완성하는 장소를 사업장으로 하며, 이 경우 따로 제품의 포장만을 하거나 용기에 충전만을 하는 장소를 포함한다.","무인자동판매기를 통하여 재화ㆍ용역을 공급하는 사업의 경우 그 사업에 관한 업무를 총괄하는 장소 를 사업장으로 한다."],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '무인자동판매기를 통하여 재화ㆍ용역을 공급하는 사업의 경우 그 사업에 관한 업무를 총괄하는 장소 를 사업장으로'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_세무_35","q":"다음 중 부가가치세법상 재화의 공급에 관한 설명으로 옳지 않은 것은?","a":["사업자 단위과세를 적용받는 사업자가 자기사업과 관련하여 생산 또는 취득한 재화를 타인에게 직접 판매할 목적으로 다른 사업장에 반출하는 경우에는 재화의 공급으로 보지 아니한다.","사업자가 자기의 과세사업과 관련하여 취득한 재화(매입세액을 공제받지 않음)를 자기의 면세사업에 전용한 경우에는 재화의 공급으로 본다.","주사업장총괄납부 신청을 한 사업자가 판매목적으로 타사업장에 반출하는 경우에는 이를 재화의 공 급으로 보지 아니한다.","사업자가 자기의 사업과 관련하여 취득한 재화(매입세액공제를 받음)를 직장 연예 및 직장 문화 관 련으로 사용한 경우에는 재화의 공급으로 보지 아니한다."],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '사업자가 자기의 과세사업과 관련하여 취득한 재화(매입세액을 공제받지 않음)를 자기의 면세사업에 전용한 경우에'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_36","q":"다음 중 부가가치세법상 재화의 공급시기에 관한 설명으로 옳지 않은 것은?","a":["간주공급 중 개인적공급은 재화를 사용하거나 소비하는 때를 재화의 공급시기로 본다.","폐업시 잔존재화의 공급시기는 폐업일이다.","내국신용장에 의하여 공급하는 재화의 공급시기는 인도일이다.","공급단위를 구획할 수 없는 재화를 계속적으로 공급하는 경우에는 예정신고기간 또는 과세기간 종료 일이 공급시기이다."],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '공급단위를 구획할 수 없는 재화를 계속적으로 공급하는 경우에는 예정신고기간 또는 과세기간 종료 일이 공급시기'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_37","q":"다음은 김삼일씨의 2024년 5월 가계부 지출내역이다. 지출금액에 포함된 부가가치세 합계를 계산하면\n얼마인가(단, 공급자는 부가가치세법에 따라 적법하게 부가가치세를 거래징수 하였다고 가정한다)?\n일 자 적 요 지 출 금 액\n1월 14일 딸기 구입 11,000원\n1월 21일 생수 구입 22,000원\n1월 27일 시내버스요금 33,000원\n1월 30일 프로야구 입장권 구입 44,000원","a":["4,000원","6,000원","9,000원","10,000원"],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (6,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_세무_38","q":"다음 자료를 이용하여 부가가치세 과세표준을 구하면 얼마인가?\nㄱ. 외상매출액(매출에누리 2,000,000원이 차감되지 않은 금액) 100,000,000원\nㄴ. 거래처 파산으로 인한 대손금 4,000,000원\nㄷ. 금전으로 지급한 판매장려금 3,000,000원\nㄹ. 외상매출금의 지급지연으로 인해 수령한 연체이자 2,000,000원","a":["94,000,000 원","98,000,000 원","100,000,000 원","101,000,000 원"],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (98,000,000 원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_세무_39","q":"택시사업과 시내버스사업을 운영하는 ㈜삼일은 두 사업에 공통으로 사용할 목적으로 기계장비를 2024년\n1월 15일에 30,000,000원(부가가치세 제외)에 매입하였다. ㈜삼일의 공급가액의 내역이 다음과 같을\n때 2024년 제1기 확정신고에 있어서 이 기계장비의 매입세액 중 불공제되는 금액은?\n구분 2024년 1월 1일 ~ 3월 31일 2024년 4월 1일 ~ 6월 30일 합계\n택시사업 3억 2억 5억\n시내버스사업 7억 8억 15억\n합계 10억 10억 20억","a":["100,000 원","125,000 원","150,000 원","200,000 원"],"c":2,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '150,000 원'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_5_세무_40","q":"다음 중 부가가치세의 신고 및 납부, 환급에 관한 설명으로 옳지 않은 것은?","a":["일반환급의 경우 환급세액은 확정신고기한이 지난 후 30일 이내에 환급한다.","조기환급을 신청한 경우 환급세액은 신고기한이 지난 후 15일 이내에 환급받을 수 있다.","당해 과세기간 중 대손이 발생하였거나 대손금이 회수되었을 경우 확정신고시에 대손세액을 가감한 다.","2024년 4월 16일에 폐업한 사업자는 2024년 6월 25일까지 확정 신고를 하여야 한다."],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '2024년 4월 16일에 폐업한 사업자는 2024년 6월 25일까지 확정 신고를 하여야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_1","q":"원가는 경영자의 의사결정 목적에 따라 여러 가지로 분류할 수 있다. 다음 중 원가 분류에 관한 설명으\n로 옳은 것은?","a":["원가의 추적가능성에 따라 직접원가와 고정원가로 분류할 수 있다.","원가의 행태에 따라 변동원가와 기간원가로 분류할 수 있다.","수익과의 대응관계에 따라 제품원가와 기간원가로 분류할 수 있다.","경영자의 의사결정과의 관련성에 따라 역사적원가와 예정원가로 분류할 수 있다."],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '수익과의 대응관계에 따라 제품원가와 기간원가로 분류할 수 있다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_원가_2","q":"㈜삼일은 매출총이익을 매출액의 30 % 로 설정하고 있다. 다음의 자료를 이용하여 ㈜삼일의 기말재공품\n을 계산하면 얼마인가?\n직접재료원가 1,500,000원 직접노무원가 900,000원\n제조간접원가 1,100,000원 당기매출액 8,000,000원\n기초제품 4,000,000원 기말제품 1,200,000원\n기초재공품 1,250,000원 기말재공품 ?","a":["1,500,000원","1,550,000원","1,750,000원","1,950,000원"],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번 (1,950,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_3","q":"다음 내용에서 설명하고 있는 원가배분방법은 무엇인가?\n보조부문원가의 배분순서를 정하여 그 순서에 따라 보조부문원가를 다른 보조부문과 제조부문에\n배분하는 방법","a":["직접배분법","단계배분법","상호배분법","간접배분법"],"c":1,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. 단계배분법은 보조부문 원가를 배분순서를 정해 순차적으로 배분하는 방법입니다. 한번 배분된 부문에는 다시 배분하지 않습니다. 직접배분법(상호용역 무시), 상호배분법(완전 반영)과 구별됩니다.","src":"cbt"},{"id":"jg_5_원가_4","q":"㈜삼일은 두 개의 제조부문 C, D와 두 개의 보조부문 A, B를 두고 있다. 보조부문 A와 B의 발생원가\n는 각각 480,000원과 540,000원이며, 각 부문의 용역수수관계는 다음과 같다. 직접배분법을 사용할 경\n우 D가 배분받은 보조부문 원가를 계산하면 얼마인가?\n사용 보조부문 제조부문\n제공\nA B C D\nA － 20 % 30 % 50 %\nB 40 % － 40 % 20 %","a":["410,000원","450,000원","480,000원","510,000원"],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (480,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_5","q":"다음 중 개별원가계산에 관한 설명으로 옳지 않은 것은?","a":["제조간접원가는 개별작업과 관련하여 직접적으로 추적할 수 없으므로 이를 배부하는 절차가 필요하 다.","개별원가계산은 제조간접원가의 배부절차가 반드시 필요하므로, 개별원가계산을 사용하면서 변동원 가계산제도를 채택할 수 없다.","개별원가계산은 제품원가를 개별작업별로 구분하여 집계하므로 제조직접비와 제조간접비의 구분이 중요하다.","각 작업별로 원가가 계산되기 때문에 원가계산자료가 상세하고 복잡하여 오류가 발생할 가능성이 높 아진다."],"c":1,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '개별원가계산은 제조간접원가의 배부절차가 반드시 필요하므로, 개별원가계산을 사용하면서 변동원 가계산제도를 채택'는 잘못된 설명입니다. 실제로는 필요한 사항입니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_6","q":"㈜삼일은 직접노동시간을 기준으로 제조간접원가를 예정배부하고 있으며, 연간 제조간접원가는 2,000,000\n원, 연간 직접노동시간은 20,000시간으로 예상하고 있다. 20X1년 12월 중 작업지시서 #A와 #B를 시작하\n여 #A만 완성하였다면 제품제조원가(a)와 기말 재공품원가(b)는 각각 얼마인가(단, 월초에 재공품은 없다\n고 가정한다)?\n#A #B 계\n직접재료원가 130,000원 90,000원 220,000원\n직접노무원가 60,000원 50,000원 110,000원\n직접노동시간 2,400시간 1,600시간 4,000시간","a":["a : 430,000원, b : 300,000원","a : 300,000원, b : 430,000원","a : 730,000원, b : 0원","a : 0원, b : 730,000원"],"c":0,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번 (a : 430,000원, b : 300,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_7","q":"㈜삼일은 제조간접원가를 직접노동시간에 비례하여 실제배부한다. 1월 중 발생한 원가자료가 다음과 같\n을 경우 작업지시서 #03와 관련된 총제조원가는 얼마인가?\nŸ 1월 중 발생한 제조간접원가 총액 : 2,400,000원\nŸ 1월 중 발생한 실제직접노무시간 : 200시간\nŸ 작업지시서 #03에 투입된 직접노무시간 : 150시간\nŸ 작업지시서 #03 직접재료원가 : 1,340,000원\nŸ 작업지시서 #03 직접노무원가 : 760,000원","a":["3,900,000원","4,000,000원","4,260,000원","4,500,000원"],"c":0,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번 (3,900,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_8","q":"다음 중 평균법과 선입선출법에 의한 종합원가계산의 차이점에 관한 설명으로 옳지 않은 것은?","a":["선입선출법은 완성품환산량 산출시 기초재공품의 기완성도를 고려한다.","평균법의 완성품환산량 단위당 원가에는 전기의 원가가 포함되어 있다.","선입선출법의 원가배분대상액은 기초재공품원가와 당기투입원가의 합계액이다.","선입선출법은 완성품환산량 산출시 기초재공품과 당기투입량을 구분한다."],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '선입선출법의 원가배분대상액은 기초재공품원가와 당기투입원가의 합계액이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_9","q":"㈜삼일은 평균법에 의한 종합원가계산시스템을 도입하고 있다. 직접재료는 공정의 초기에 전량 투입되\n고 가공원가는 공정 전반에 걸쳐 균등하게 발생된다. ㈜삼일은 원가계산을 위해 다음과 같은 자료를 수\n집하였다. 하기 자료를 이용하여 기말재공품 가공원가의 완성도를 계산하면 얼마인가?\n직접재료원가 완성품환산량 5,000개\n가공원가의 완성품환산량 4,550개\n당기완성품수량 3,500개","a":["50%","60%","70%","80%"],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (70%). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_10","q":"다음은 ㈜삼일의 원가자료이다. 원재료는 공정시작 시점에서 전량 투입되고 가공원가는 공정전반에 걸\n쳐 균등하게 투입된다.\n< 수량 >\n기초재공품수량 500개(40 %) 완성수량 1,800개\n착수수량 2,000개 기말재공품수량 700개(60 %)\n평균법과 선입선출법을 적용하여 각각 종합원가계산을 하는 경우 두 방법의 가공원가 완성품환산량 차\n이는 얼마인가?","a":["평균법이 100개 더 크다.","평균법이 100개 더 작다.","선입선출법이 200개 더 크다.","선입선출법이 200개 더 작다."],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번 (선입선출법이 200개 더 작다.). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_11","q":"다음에서 설명하고 있는 표준원가의 종류로 옳은 것은?\n정상적인 조업수준이나 능률수준에 대하여 설정된 표준원가로서, 경영활동에서 이상 또는 우발\n적인 상황을 제거한 것을 의미","a":["현실적 표준","이상적 표준","중간적 표준","정상적 표준"],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '정상적 표준'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_원가_12","q":"다음 중 표준원가계산에 관한 설명으로 옳지 않은 것은?","a":["표준원가제도는 전부원가계산 및 변동원가계산제도 모두에 적용할 수 있다.","표준원가계산제도를 채택할 경우 계량적인 정보를 무시할 가능성이 있다.","원가발생의 예외를 관리하여 통제하기에 적절한 원가계산방법이다.","원가표준은 기본적으로 수량표준과 가격표준으로 이루어진다."],"c":1,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '표준원가계산제도를 채택할 경우 계량적인 정보를 무시할 가능성이 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_13","q":"다음은 ㈜삼일의 20X1년 1월 직접노무원가에 관한 자료이다.\n실제직접노무원가 20,000원\n직접노무원가 가격차이 2,000원(불리)\n직접노무원가 능률차이 1,800원(불리)\n1월의 실제직접노무시간이 1,000 시간이었을 때 실제생산량에 허용된 표준작업시간은 얼마인가?","a":["750 시간","875 시간","900 시간","1,000 시간"],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (900 시간). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_14","q":"다음은 ㈜삼일의 직접재료 관련 자료이다. 다음 자료를 이용하여 직접재료원가의 가격차이와 능률차이\n를 계산하면 얼마인가?\n항 목 소비량(단위: kg) 단 가\n표 준 원 가 2,200kg 20원/kg\n실 제 원 가 2,500kg 22원/kg\n가격차이 능률차이","a":["5,000원(불리) 6,000원(불리)","5,000원(불리) 6,000원(유리)","6,000원(유리) 5,000원(불리)","6,000원(유리) 5,000원(유리)"],"c":0,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번 (5,000원(불리) 6,000원(불리)). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_15","q":"다음은 ㈜삼일의 20X1년 3월 직접노무원가에 관한 자료이다. 직접노무원가 실제발생액을 계산하면 얼\n인가?\nŸ 직접노무원가 표준임률 : 1,600원\nŸ 실제 생산량 : 300단위\nŸ 생산량 단위당 표준직접노동시간 : 7시간\nŸ 직접노무원가 능률차이 : 360,000원(불리)\nŸ 직접노무원가 가격차이 : 400,000원(유리)","a":["3,000,000 원","3,270,000 원","3,320,000 원","3,400,000 원"],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (3,320,000 원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_16","q":"다음 중 직접재료원가와 직접노무원가는 실제원가로, 제조간접원가는 사전에 정해놓은 예정배부율로 측\n정하는 원가계산방법은 무엇인가?","a":["전부원가계산","종합원가계산","표준원가계산","정상원가계산"],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '정상원가계산'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_5_원가_17","q":"다음 중 변동원가계산의 유용성에 관한 설명으로 옳지 않은 것은?","a":["일반적으로 인정된 회계원칙으로 기업회계측면의 외부보고자료로서 이용될 수 있다.","특정기간의 이익이 생산량에 의해 영향을 받지 않는다.","이익계획과 예산편성에 필요한 원가－조업도－이익에 관련된 자료를 변동원가계산제도에 의한 공헌 손익계산서로부터 쉽게 얻을 수 있다.","이익이 매출액과 동일한 방향으로 움직이므로 경영자의 입장에서 이해하기 쉽다."],"c":0,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '일반적으로 인정된 회계원칙으로 기업회계측면의 외부보고자료로서 이용될 수 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_18","q":"㈜삼일은 당기 초에 영업활동을 시작하여 당기에 제품 1,100단위를 생산하였으며, 당기의 원가자료는\n다음과 같다. 당기 판매량이 800단위였다면, 전부원가계산에 의한 매출원가를 계산하면 얼마인가?\nŸ 단위당 직접재료원가 800원\nŸ 단위당 직접노무원가 300원\nŸ 단위당 변동제조간접원가 100원\nŸ 단위당 변동판매비와관리비 300원\nŸ 고정제조간접원가 220,000원\nŸ 고정판매비와관리비 110,000원","a":["420,000원","960,000원","1,120,000원","1,200,000원"],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (1,120,000원). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_19","q":"다음 자료를 참고하여 ㈜삼일의 전부원가계산에 따른 매출총이익, 변동원가계산에 따른 공헌이익, 초변\n동원가계산에 따른 재료처리량공헌이익을 각각 올바르게 계산한 것은 어느 것인가?\nŸ 제품단위당 직접재료원가 100원\nŸ 제품단위당 직접노무원가 120원\nŸ 제품단위당 변동제조간접원가 50원\nŸ 제품단위당 변동판매비와관리비 40원\nŸ 고정제조간접원가 400,000원\nŸ 고정판매비와관리비 800,000원\n기초제품과 기말제품은 없으며 ㈜삼일은 당기 10,000개를 생산하여 전량 판매하였다. 제품 단위당 판매\n가격은 1,400원이다.\n전부원가계산 변동원가계산 초변동원가계산\n매출총이익 공헌이익 재료처리량공헌이익","a":["11,300,000원 11,300,000원 13,000,000원","11,300,000원 11,300,000원 11,800,000원","10,900,000원 10,900,000원 13,000,000원","10,900,000원 10,900,000원 11,800,000원"],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (10,900,000원 10,900,000원 13,000,000원). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_20","q":"기초재고액보다 기말재고액이 작은 경우에 변동원가계산에 의한 순이익과 전부원가계산에 의한 순이익\n을 비교한 결과로 옳은 것은(단, 단위당 고정제조간접원가는 매년 동일하다고 가정한다)?","a":["변동원가계산에 의한 순이익이 더 크다.","전부원가계산에 의한 순이익이 더 크다.","순이익은 같다.","상황에 따라 이익의 크기가 달라진다."],"c":0,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '변동원가계산에 의한 순이익이 더 크다.'이 올바른 설명입니다. 원가행태에 따라 변동원가(조업도에 비례)와 고정원가(조업도와 무관)로 분류합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_원가_21","q":"다음 중 활동기준원가계산의 도입배경에 관한 설명으로 옳지 않은 것은?","a":["최근에는 종전에 비해 원가개념이 확대되어 연구개발, 제품설계 등의 기타원가를 포함한 정확한 원 가계산이 요구되었다.","제조환경의 변화로 단일배부기준에 의한 원가의 배부가 원가의 왜곡현상을 초래하였다.","컴퓨터통합시스템의 도입으로 제조와 관련된 활동에 대한 원가를 수집하는 것이 용이해졌다.","직접노무원가와 같은 직접원가의 증가로 인해 새로운 원가배부기준이 필요하게 되었다."],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '직접노무원가와 같은 직접원가의 증가로 인해 새로운 원가배부기준이 필요하게 되었다.'는 잘못된 설명입니다. 실제로는 증가가 아니라 감소하는 관계입니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_22","q":"다음 중 원가추정방법에 관한 설명으로 옳지 않은 것은?","a":["계정분석법은 분석자의 전문적 판단에 따라 각 계정과목에 기록된 원가를 변동원가와 고정원가로 분석하여 원가함수를 추정하는 방법으로 분석자의 주관적 판단이 개입될 여지가 없다.","공학적방법은 투입과 산출사이의 관계를 계량적으로 분석하여 원가함수를 추정하는 방법으로서 과 거의 자료를 이용할 수 없는 경우에도 이용 가능한 방법이다.","공학적방법은 제조간접원가의 추정에 어려움이 있다.","고저점법은 최고조업도와 최저조업도의 원가자료를 이용하여 원가함수를 추정하는 방법이다."],"c":0,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '계정분석법은 분석자의 전문적 판단에 따라 각 계정과목에 기록된 원가를 변동원가와 고정원가로 분석하여 원가함수'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_23","q":"다음 중 CVP분석에 필요한 가정에 관한 설명으로 옳지 않은 것은?","a":["화폐의 시간가치를 고려하는 분석 방법이다.","모든 원가는 변동원가와 고정원가로 분류할 수 있다.","제품의 종류가 복수인 경우 판매량 변화에 따른 매출배합은 일정하다.","생산량이 모두 판매된 것으로 가정함으로써 기초재고자산과 기말재고자산의 변화가 손익에 영향을 미치지 않는 것으로 본다."],"c":0,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '화폐의 시간가치를 고려하는 분석 방법이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_24","q":"㈜삼일의 20X1년 손익분기점 매출액은 150,000원이었다. 20X1년 실제 발생한 총변동원가가 100,000\n원이고, 총고정원가가 90,000원이었다면, 영업이익은 얼마인가(단 동 기간동안 생산능력의 변동은 없\n다)?","a":["40,000원","60,000원","80,000원","100,000원"],"c":1,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (60,000원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_25","q":"㈜삼일은 회계프로그램을 판매하는 회사로 단위당 판매가격은 100원이며, 단위당 변동원가는 40원이\n다. 연간 고정원가는 60,000원이며 당기에 30,000원의 이익을 목표로 하고 있다. 다음 설명 중 옳지\n않은 것은(단, 법인세 효과는 고려하지 않는다)?","a":["공헌이익률은 60 % 이다.","단위당 공헌이익은 60원이다.","목표이익을 달성하려면 150,000원의 매출이 발생하여야 한다.","손익분기점을 달성하기 위한 매출수량은 1,500단위이다."],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '손익분기점을 달성하기 위한 매출수량은 1,500단위이다.'. 전부원가계산은 고정제조간접원가를 제품원가에 포함하고, 변동원가계산은 기간비용으로 처리합니다. ","src":"cbt"},{"id":"jg_5_원가_26","q":"㈜삼일의 20X1년 영업이익은 100,000원이고 영업레버리지도(DOL)는 5 이다. 만일 경기호황으로 인하\n여 20X2년 판매량이 20 % 증가한다면 영업이익은 얼마가 될 것으로 예상되는가(단, 20X1년과 20X2년\n의 단위당 판매가격, 단위당 변동원가, 총고정원가는 동일하다고 가정한다.)?","a":["120,000원","140,000원","200,000원","240,000원"],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (200,000원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_27","q":"㈜삼일의 제 1사업부는 계산기를 생산하여 판매하고 있다. 투자중심점으로 운영되는 ㈜삼일의 제 1사\n업부의 계산기 생산 및 판매에 관한 예상자료는 다음과 같다.\nŸ 제 1사업부 연간 총고정비 200,000,000원\nŸ 계산기 단위당 변동비 30,000원\nŸ 계산기 연간 판매대수 50,000대\nŸ 제 1사업부 평균 총영업자산 500,000,000원\n제 1사업부의 목표 투자수익률 10 % 를 달성하기 위한 계산기의 단위당 최소판매가격은 얼마인가?","a":["33,000 원","35,000 원","40,000 원","45,000 원"],"c":1,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (35,000 원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_28","q":"기업은 미래의 불확실성에 대처하기 위하여 계획을 수립하며, 이러한 계획의 일부분으로서 예산을 편\n성한다. 예산은 다양하게 분류할 수 있는데 조업도 변동에 따라 작성되는 예산으로 실제원가를 실제조\n업도 수준의 예산원가와 비교하는 예산으로 옳은 것은?","a":["종합예산","재무예산","변동예산","고정예산"],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '변동예산'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_원가_29","q":"다음 자료를 이용하여 ㈜삼일의 시장규모차이를 계산하면 얼마인가?\nŸ 단위당 예산평균공헌이익 100원\nŸ 실제시장점유율 25 %\nŸ 예산시장점유율 30 %\nŸ 실제시장규모 100,000개\nŸ 예산시장규모 120,000개","a":["500,000원(유리)","500,000원(불리)","600,000원(유리)","600,000원(불리)"],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번 (600,000원(불리)). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_30","q":"다음 중 투자중심점의 성과평가에 관한 설명으로 옳지 않은 것은?","a":["투자중심점은 원가 및 수익뿐만 아니라 투자의사결정에 대해서도 책임을 지는 책임중심점으로서 가 장 포괄적인 책임중심점이다.","투자중심점은 투자수익률, 잔여이익, 경제적부가가치 등으로 성과를 평가한다.","잔여이익은 투자규모가 서로 다른 투자중심점의 성과를 상호 비교하기가 용이하다는 장점이 있다.","투자수익률은 준최적화 현상을 유발할 수 있다는 문제점이 있다."],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '잔여이익은 투자규모가 서로 다른 투자중심점의 성과를 상호 비교하기가 용이하다는 장점이 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_31","q":"다음 중 경제적부가가치(EVA)에 관한 설명으로 옳은 것은?","a":["다른 조건이 동일한 경우 영업이익이 감소하면 경제적부가가치(EVA)는 증가한다.","재고자산회전율을 높이면 일반적으로 경제적부가가치(EVA)는 증가한다.","투하자본에 대한 자본비용이 높아지고, 세후순영업이익의 변동이 없다면 경제적부가가치(EVA)는 일 반적으로 증가한다.","경제적부가가치(EVA)를 증가시키기 위해서는 영업이익률을 높이거나, 투하자본의 회전율을 낮추는 것이 바람직하다."],"c":1,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '재고자산회전율을 높이면 일반적으로 경제적부가가치(EVA)는 증가한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_원가_32","q":"다음 중 부품의 자가제조 또는 외부구입 의사결정 시 고려해야 하는 비재무적 정보에 관한 설명으로\n옳지 않은 것은?","a":["부품을 자가제조 할 경우 부품의 공급업자에 대한 의존도를 줄일 수 있는 장점이 있다.","부품을 자가제조 할 경우 기존 외부공급업자와의 유대관계를 상실하게 되는 단점이 있다.","부품을 외부구입 할 경우 향후 주문량의 변동에 유연하게 대응할 수 있다는 장점이 있다.","부품을 외부구입 할 경우 제품에 특별한 지식이나 기술이 요구될 때 품질을 유지하기 위한 관리가 어렵다는 단점이 있다."],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '부품을 외부구입 할 경우 제품에 특별한 지식이나 기술이 요구될 때 품질을 유지하기 위한 관리가 어렵다는 단점'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_33","q":"다음은 신인가수 발굴 오디션에서 일어난 심사위원과 지원자 김삼일의 인터뷰 내용이다. 의사결정 기\n초개념과 관련하여 밑줄 친 (ㄱ), (ㄴ)에 가장 적절하게 대응되는 용어는 무엇인가?\n심사위원 : 오디션에 합격하면 (ㄱ) 현재의 직장을 포기해야 하는데도 가수를 하실 생각이신가요?\n김 삼 일 : 과거에 (ㄴ) 직장에 들어가기 위해 많은 노력을 했습니다. 하지만, 오디션에 합격하여\n어릴 적 꿈이었던 가수로서 제 2의 인생을 살고 싶습니다.","a":["(ㄱ) 기회원가 (ㄴ) 매몰원가","(ㄱ) 매몰원가 (ㄴ) 기회원가","(ㄱ) 기회원가 (ㄴ) 간접원가","(ㄱ) 지출원가 (ㄴ) 매몰원가"],"c":0,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '(ㄱ) 기회원가 (ㄴ) 매몰원가'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_5_원가_34","q":"A, B, C 3개의 사업부를 운영하는 ㈜삼일은 20X1년 당기순이익으로 500,000원을 보고하였으며, 최근\n수익성이 악화되고 있는 A사업부의 폐지를 고려중이다. A사업부의 공헌이익은 70,000원이고, A사업\n부에 대한 공통원가 배분액은 90,000원이다. 공통원가배분액 중 40,000원은 A사업부를 폐지하더라도\n계속하여 발생한다. A사업부를 폐지하는 경우 20X1년 당기순이익은 얼마인가?","a":["450,000원","460,000원","470,000원","480,000원"],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번 (480,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_35","q":"㈜삼일은 유행이 지난 의류 500벌을 보유하고 있다. 이 제품에 대한 총제조원가는 20,000,000원이었으\n나 현재로는 의류 한벌당 30,000원에 처분하거나 8,000,000원을 투입하여 개조한 후 의류 한벌당\n50,000원에 판매할 수 밖에 없는 상황이다. 다음 설명 중 옳은 것은?","a":["총제조원가 20,000,000원은 두 가지 대안 중 한 가지 대안을 선택할 경우에 고려하여야 하는 관련원 가이다.","그대로 의류 한벌당 30,000원에 처분하면 2,500,000원의 손실이 발생한다.","개조하여 판매하는 것이 그대로 처분하는 것보다 2,000,000원만큼 유리하다.","8,000,000원의 추가비용을 지출하지 않고 한벌당 30,000원에 판매하는 것이 가장 유리하다."],"c":2,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '개조하여 판매하는 것이 그대로 처분하는 것보다 2,000,000원만큼 유리하다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_원가_36","q":"다음 중 자본예산을 편성하기 위한 현금흐름추정의 기본원칙에 관한 설명으로 옳지 않은 것은?","a":["증분기준에 의한 현금흐름을 추정해야하므로 이미 현금유출이 이루어진 매몰원가는 현금흐름추정 시 고려하지 않는다.","이자비용은 명백한 현금의 유출에 해당하므로 현금흐름추정 시 현금의 유출로 반영해야 한다.","감가상각비는 비현금거래에 해당하므로 현금흐름추정 시 현금의 유출로 보지 않는다.","법인세와 관련된 비용은 명백한 현금의 유출에 해당하므로 현금흐름추정 시 반영해야 한다."],"c":1,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '이자비용은 명백한 현금의 유출에 해당하므로 현금흐름추정 시 현금의 유출로 반영해야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_원가_37","q":"㈜삼일은 자료처리의 신속·정확화를 위해 새로운 전산정보시스템을 설치하고자 한다. 이 설비의 초기\n투자액은 480,000원이며, 설비이용으로 인하여 연간 400,000원의 노무비를 절약할 수 있을 것으로 기\n대된다. 그러나 설비의 유지보수와 교육훈련을 위하여 추가로 200,000원의 운영경비가 증가하게 된\n다. 이 설비의 내용연수는 6년, 잔존가치는 없으며, 정액법으로 감가상각한다. 법인세율이 40 % 인 경\n우, ㈜삼일의 연간순현금유입액을 계산하면 얼마인가?","a":["120,000원","152,000원","168,000원","210,000원"],"c":1,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (152,000원). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_38","q":"㈜삼일은 당기 초 새로운 투자안에 600,000원을 투자하였다. 회사는 이 투자안으로부터 앞으로 5년\n동안 매년 말 250,000원의 현금유입을 예측하고 있다. 회사의 최저필수수익률이 연 12 % 일 경우 이\n투자안의 순현재가치(NPV)는 얼마인가?\n연 12 %\n5년 현가계수 0.57\n5년 연금현가계수 3.60","a":["300,000원","558,000원","720,000원","900,000원"],"c":0,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번 (300,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_39","q":"㈜삼일의 부품생산부분은 최대생산량인 360,000단위를 생산하여 외부시장에 전량 판매하고 있다. 부품\n생산부분의 관련정보는 다음과 같다.\nŸ 단위당 외부판매가격 100 원\nŸ 단위당 변동제조원가 60 원\nŸ 단위당 변동판매비 6 원\nŸ 단위당 고정제조원가 14 원\nŸ 단위당 고정관리비 10 원\n단위당 고정비는 최대생산량 360,000 단위 기준의 수치이다. 부품생산부문의 이익을 극대화시키기 위해\n내부대체를 허용할 수 있는 단위당 최소대체가격을 계산하면 얼마인가(단, 내부대체에 대해서는 변동판\n매비가 발생하지 않는다.)?","a":["60 원","66 원","90 원","94 원"],"c":3,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번 (94 원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_5_원가_40","q":"다음 중 품질원가계산에 관한 설명으로 옳지 않은 것은?","a":["허용가능품질관점에서는 통제원가와 실패원가 사이에는 상반관계가 존재하는 것으로 본다.","일반적으로 원재료나 제품의 검사 및 시험 비용은 예방원가로 분류된다.","일반적으로 재작업 및 재검사 비용은 내부실패원가로 분류된다.","일반적으로 보증기간 내 보증수리 및 교환 비용은 외부실패원가로 분류된다."],"c":1,"s":"원가관리회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '일반적으로 원재료나 제품의 검사 및 시험 비용은 예방원가로 분류된다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_1","q":"다음 중 일반목적재무보고에 관한 설명으로 옳지 않은 것은?","a":["일반목적재무보고의 목적은 기업에 자원을 제공하는 것에 대한 의사결정을 할 때 유용한 보고기업의 재무정보를 제공하는 것이다.","현재 및 잠재적인 투자자, 대여자와 그 밖의 채권자가 일반목적재무보고의 주요 이용자에 해당한다.","감독당국 및 일반 대중도 일반목적재무보고를 유용하게 활용할 수 있다.","경영진은 필요한 재무정보를 기업내부에서 얻을 수 없으므로 의사결정을 위하여 일반목적재무보고서 에 의존한다."],"c":3,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '경영진은 필요한 재무정보를 기업내부에서 얻을 수 없으므로 의사결정을 위하여 일반목적재무보고서 에 의존한다.'는 잘못된 설명입니다. 실제로는 필요한 사항입니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_2","q":"다음 중 목적적합성과 표현충실성에 관한 설명으로 옳지 않은 것은?","a":["재무정보가 유용하기 위해서는 목적적합하고 나타내고자 하는 바를 충실하게 표현해야 한다.","완벽한 표현충실성을 위해서는 서술이 완전하고, 중립적이며, 오류가 없어야 할 것이다.","목적적합한 재무정보는 정보이용자의 의사결정에 차이가 나도록 할 수 있다.","재무정보가 예측가치와 확인가치를 모두 가지는 경우에만 의사결정에 차이가 나도록 할 수 있다."],"c":3,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '재무정보가 예측가치와 확인가치를 모두 가지는 경우에만 의사결정에 차이가 나도록 할 수 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_3","q":"다음 중 자산의 측정방법에 관한 설명으로 옳은 것은?","a":["사 용 가 치 : 시장참여자 사이의 정상거래에서 자산을 매도할 때 받게 될 가격","역사적원가 : 자산의 취득 또는 창출에 발생한 원가의 가치로서, 자산을 취득 또는 창출하기 위하여 지급한 대가와 거래원가","공 정 가 치 : 측정일 현재 동등한 자산의 원가로서 측정일에 지급할 대가와 그 날에 발생할 거래원가","현 행 원 가 : 자산의 사용과 처분으로 얻을 것으로 기대하는 현금흐름"],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '역사적원가 : 자산의 취득 또는 창출에 발생한 원가의 가치로서, 자산을 취득 또는 창출하기 위하여 지급한 대'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_재무_4","q":"다음 중 주석(footnote)에 관한 설명으로 옳지 않은 것은?","a":["주석은 전체 재무제표의 범위에 포함된다.","현대 기업회계에서는 주석공시에 대한 중요성을 강화하는 추세에 있다.","비재무적인 항목은 주석공시사항에 포함되지 않는다.","기업에 우발부채나 약정사항이 존재한다면 동 내용을 주석에 기재하여야 한다."],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '비재무적인 항목은 주석공시사항에 포함되지 않는다.'는 잘못된 설명입니다. 실제로는 포함되는 항목입니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_5","q":"다음 중 재무제표 보고기간후사건에 관한 설명으로 옳지 않은 것은?","a":["수정을 요하는 보고기간후사건의 예로 보고기간 말과 재무제표 발행 승인일 사이에 발견한 보고기간 말 재무제표가 부정확하다는 것을 보여주는 오류를 들 수 있다.","수정을 요하지 않는 보고기간후사건으로서 중요한 것은 그 범주별로 사건의 성격이나 재무적 영향에 대한 추정치 등을 공시하여야 한다.","수정을 요하는 보고기간후사건의 예로 보고기간 말 이전에 구입한 자산의 취득원가나 매각한 자산의 대가를 보고기간 후에 결정하는 경우 등을 들 수 있다.","수정을 요하지 않는 보고기간후사건이란 보고기간 말에 존재하였던 상황에 대해 증거를 제공하는 사건을 말한다."],"c":3,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '수정을 요하지 않는 보고기간후사건이란 보고기간 말에 존재하였던 상황에 대해 증거를 제공하는 사건을 말한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_6","q":"다음은 ㈜삼일의 20X1년 재고수불부이다. ㈜삼일은 20X1년 1월 1일에 설립되었으며, ㈜삼일의 김사장\n은 기말재고자산을 총평균법으로 평가할지 선입선출법으로 평가할지 고민 중이다. 재고자산평가방법에\n관한 설명으로 옳지 않은 것은?\n수량 단가 금액\n5/5 구입 3,000개 2,000원 6,000,000원\n6/6 구입 7,000개 3,000원 21,000,000원\n9/9 판매 8,500개\n기 말 1,500개\n(단, 매출총이익률 = 매출총이익/매출액)","a":["기말재고자산금액은 선입선출법을 적용했을 때보다 총평균법을 적용하였을 경우 450,000원만큼 작 다.","매출총이익률은 선입선출법을 적용했을 때보다 총평균법을 적용했을 경우 상대적으로 더 작다.","매출원가는 선입선출법을 적용했을 때보다 총평균법을 적용하였을 경우 450,000원만큼 작다.","매출총이익은 선입선출법을 적용했을 때보다 총평균법을 적용하였을 경우 450,000원만큼 작다."],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '매출원가는 선입선출법을 적용했을 때보다 총평균법을 적용하였을 경우 450,000원만큼 작다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_7","q":"다음 중 재고자산의 취득원가에 관한 설명으로 옳은 것은?","a":["재고자산을 현재의 장소에 현재의 상태로 이르게 하는데 기여하지 않은 관리간접원가는 취득원가에 포함하지 않는다.","후속 생산단계에 투입하기 전에 보관이 필요한 경우에 발생하는 보관원가는 취득원가에 포함하지 않 는다.","판매시 발생한 판매수수료는 취득원가에 포함한다.","매입할인 및 리베이트는 매입원가를 결정할 때 차감하지 않는다."],"c":0,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '재고자산을 현재의 장소에 현재의 상태로 이르게 하는데 기여하지 않은 관리간접원가는 취득원가에 포함하지 않는다'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_재무_8","q":"㈜삼일의 재고자산과 관련하여 20X1년 포괄손익계산서에 비용으로 계상될 금액은 얼마인가(단, 기초재고\n자산에 포함된 재고자산평가충당금은 없다.)?\n20X1년 판매가능상품(=기초재고자산+당기매입액) 500,000원\n20X1년 재고자산평가손실 50,000원\n20X1년 재고자산감모손실 60,000원\n20X1년 12월 31일 재고자산(재고자산평가충당금 차감 후) 100,000원","a":["400,000원","450,000원","500,000원","550,000원"],"c":0,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번 (400,000원). 매출총이익률법: 매출원가 = 매출액 × (1-매출총이익률). 재고손실 = 장부상재고 - 실사재고. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_9","q":"다음 중 유형자산의 취득원가에 포함되는 요소만 바르게 짝지은 것은?\nㄱ. 설치장소 준비를 위한 지출 ㄴ. 최초의 운송 및 취급관련 원가\nㄷ. 보유중인 건물에 대하여 부과되는 재산세 ㄹ. 취득시 부담한 관세 및 환급불가능한 세금","a":["ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. 'ㄱ, ㄴ, ㄹ'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_10","q":"통신업을 영위하고 있는 ㈜삼일은 20X1년 7월 1일 5억원에 취득하여 사용해 오던 건물 A(내용연수 5\n년, 연수합계법 상각, 잔존가치 0원)를 20X4년 1월 1일 2억원에 처분하였다. 다음 중 ㈜삼일이 건물\nA 의 처분과 관련하여 20X4년 포괄손익계산서에 인식할 계정과 금액으로 가장 옳은 것은(단, ㈜삼일은\n건물을 원가모형으로 후속측정하며, 감가상각비는 월할 계산한다)?","a":["유형자산처분이익 25,000,000원","유형자산처분이익 50,000,000원","유형자산처분손실 25,000,000원","유형자산처분손실 50,000,000원"],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (유형자산처분이익 50,000,000원). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_11","q":"다음 중 유형자산의 손상에 관한 설명으로 옳지 않은 것은?","a":["기업은 매 보고기간 말마다 자산손상을 시사하는 징후가 있는지를 검토하여야 한다.","자산의 회수가능액은 사용가치와 순공정가치 중 큰 금액이다.","유형자산에 대해 재평가모형을 적용하는 경우에는 손상차손을 인식하지 아니한다.","자산손상을 시사하는 징후가 있는지를 검토할 때는 내부정보와 외부정보를 모두 고려한다."],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '유형자산에 대해 재평가모형을 적용하는 경우에는 손상차손을 인식하지 아니한다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_12","q":"㈜삼일은 신제품 개발 프로젝트와 관련하여 당기 중 90억원을 지출하였다. 동 지출 중 20억원은 새로\n운 지식을 얻고자 하는 활동으로 소요되었고 70억원은 사용 전의 시제품을 설계, 제작 및 시험하는 활\n동으로 소요되었다. 다음 중 이에 관한 회계처리로 옳은 것은?","a":["20억원은 무형자산으로 인식하고, 70억원 중 무형자산인식기준을 충족하지 못하는 것은 발생시점에 비용으로 인식하고, 무형자산 인식기준을 충족하는 것은 무형자산으로 인식한다.","신제품개발 프로젝트와 관련하여 발생한 90억원은 전액 개발단계에 속하는 활동이므로 무형자산으 로 인식한다.","신제품개발 프로젝트와 관련하여 발생한 90억원은 전액 연구단계에 속하는 활동이므로 현금지출시 점에 비용으로 인식한다.","개발단계에서 지출한 금액은 무형자산을 완성해 그것을 판매하려는 기업의 의도가 없는 경우 무형자 산으로 인식할 수 없다."],"c":3,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '개발단계에서 지출한 금액은 무형자산을 완성해 그것을 판매하려는 기업의 의도가 없는 경우 무형자 산으로 인식할'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_재무_13","q":"다음 중 무형자산의 상각에 관한 설명으로 옳지 않은 것은?","a":["내용연수가 비한정인 무형자산은 상각하지 않으며, 매년 일정시기와 손상을 시사하는 징후가 있을 때에 손상검사를 수행하여야 한다.","내용연수가 유한한 무형자산은 자산을 사용할 수 있는 날과 실제 사용한 날 중 늦은 날부터 상각한 다.","내용연수가 유한한 무형자산의 경제적 효익이 소비되는 형태를 신뢰성 있게 결정할 수 없는 경우에 는 정액법을 적용한다.","내용연수가 유한한 무형자산의 상각기간은 적어도 매 회계연도 말에 검토한다."],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '내용연수가 유한한 무형자산은 자산을 사용할 수 있는 날과 실제 사용한 날 중 늦은 날부터 상각한 다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_14","q":"㈜삼일은 20X1년 3월 1일에 임대수익을 얻을 목적으로 건물을 1,000,000원에 취득하여 공정가치 모형\n을 적용하여 회계처리하기로 하였다. ㈜삼일은 동 건물을 20X2년 10월 1일에 본사사옥으로 사용 목적\n을 변경하고, 즉시 사용하기 시작하였다. 동 건물의 20X1년 12월 31일과 20X2년 10월 1일의 공정가\n치는 각각 900,000원과 1,000,000원 이었으며, 유형자산으로 대체된 상기 건물에 대해서 ㈜삼일은 원\n가모형을 적용하기로 하였다. 20X2년 10월 1일 현재 동 건물의 잔존내용연수는 10년이고, 잔존가치는\n없는 것으로 추정하였다. 상기 건물에 대한 회계처리가 ㈜삼일의 20X2년 당기순이익에 미치는 영향은\n(단, 감가상각비의 계산이 필요한 경우 정액법을 적용하여 월할 계산하기로 한다)?","a":["당기순이익 90,000원 감소","당기순이익 75,000원 감소","당기순이익 75,000원 증가","당기순이익 90,000원 증가"],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (당기순이익 75,000원 증가). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_15","q":"다음 중 금융자산의 분류에 관한 설명으로 옳지 않은 것은?","a":["일반적으로 지분증권은 당기손익-공정가치 측정 금융자산으로 분류한다.","회계불일치를 제거하기 위한 목적으로 보유하는 지분상품은 최초 인식시 기타포괄손익-공정가치 측 정 금융자산으로 지정할 수 있다.","원리금 수취 목적으로 보유하는 채무상품은 일반적으로 상각후원가측정금융자산으로 분류한다.","단기매매목적으로 보유하는 지분상품은 기타포괄손익-공정가치 측정 금융자산으로 분류할 수 없다."],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '회계불일치를 제거하기 위한 목적으로 보유하는 지분상품은 최초 인식시 기타포괄손익-공정가치 측 정 금융자산으로'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_16","q":"다음 중 손상차손 인식 대상 금융자산에 해당하는 것은?","a":["당기손익–공정가치 측정 채무상품","당기손익–공정가치 측정 지분상품","기타포괄손익–공정가치 측정 채무상품","기타포괄손익–공정가치 측정 지분상품"],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '기타포괄손익–공정가치 측정 채무상품'이 올바른 설명입니다. 기타포괄손익은 후속적으로 당기손익으로 재분류되는 항목(해외사업환산손익 등)과 되지 않는 항목(재평가잉여금 등)으로 구분됩니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_재무_17","q":"다음 중 전환사채에 관한 설명으로 옳지 않은 것은?","a":["전환사채는 부채요소와 자본요소를 모두 가지고 있는 복합금융상품에 해당한다.","전환사채의 전환권조정은 사채할인발행차금과 유사하게 상환기간동안 유효이자율법을 적용하여 상각 하고 상각된 금액은 이자비용으로 인식한다.","신주인수권부사채는 유가증권의 소유자가 사전에 약정된 가격으로 보통주의 발행을 청구할 수 있는 권리가 부여된 사채를 의미한다.","상환할증금지급조건부 전환사채의 장부금액은 전환사채의 액면금액에서 전환권조정을 차감한 금액과 같다."],"c":3,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '상환할증금지급조건부 전환사채의 장부금액은 전환사채의 액면금액에서 전환권조정을 차감한 금액과 같다.'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_18","q":"다음 중 금융부채에 관한 설명으로 옳지 않은 것은?","a":["금융부채는 원칙적으로 최초 인식시 공정가치로 인식한다.","당기손익-공정가치 측정 금융부채와 관련되는 거래원가는 당기손익으로 처리한다.","사채의 상환손익이 발생하는 이유는 상환일의 시장이자율이 발행일의 액면이자율과 다르기 때문이 다.","연속상환사채의 발행금액은 원칙적으로 사채로부터 발생하는 미래현금흐름을 사채 발행시점의 시장 이자율로 할인한 현재가치가 된다."],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '사채의 상환손익이 발생하는 이유는 상환일의 시장이자율이 발행일의 액면이자율과 다르기 때문이 다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_19","q":"㈜삼일은 20X1년 1월 1일에 만기 3년, 액면금액 50,000,000원, 표시이자율 연 6 % 인 사채를 발행하\n였다. 이자는 매년 말에 지급되고 사채 발행시점의 유효이자율은 연 8 % 라고 할 때, 20X2년도에 감소\n되는 사채할인발행차금은 얼마인가(단, 단수차이가 발생하는 경우 가장 근사치를 답으로 선택한다)?\n8 % 1년 2년 3년 합계\n현가계수 0.92593 0.85734 0.79383 2.57710","a":["793,824원","857,330원","925,930원","1,651,170원"],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (857,330원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_20","q":"다음 중 충당부채 및 우발부채 등에 관한 설명으로 옳지 않은 것은?","a":["과거사건에 의하여 발생하였으나, 기업이 전적으로 통제할 수는 없는 하나 이상의 불확실한 미래사 건의 발생 여부에 의하여서만 그 존재가 확인되는 잠재적 의무는 충당부채에 해당하지 않는다.","과거사건에 의하여 발생한 현재의무로서 그 의무를 이행하기 위하여 경제적효익을 갖는 자원이 유출 될 가능성이 높은 경우에는 금액의 신뢰성 있는 추정가능 여부와 관계없이 충당부채를 인식하여야 한다.","우발부채는 부채로 인식하지 않고, 유형별로 그 성격을 주석에 설명하는 것이 원칙이지만, 당해 의 무를 이행하기 위하여 자원이 유출될 가능성이 희박한 경우에는 주석기재를 생략할 수 있다.","우발자산은 자산으로 인식하지 아니하고, 자원이 유입될 것이 확정된 경우에는 그러한 상황변화가 발생한 기간에 관련 자산과 이익을 인식한다."],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '과거사건에 의하여 발생한 현재의무로서 그 의무를 이행하기 위하여 경제적효익을 갖는 자원이 유출 될 가능성이 '는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_21","q":"다음 중 현금배당과 주식배당의 실시로 인한 영향을 설명한 것으로 옳지 않은 것은?","a":["현금배당을 실시하면 자본총계가 감소하지만, 주식배당의 경우에는 자본총계의 변동이 없다.","현금배당 및 주식배당 모두 미처분이익잉여금이 감소하게 된다.","현금배당을 실시하면 자본금에 변동이 없지만, 주식배당의 경우에는 자본금이 증가한다.","현금배당을 실시하면 부채비율이 증가하지만, 주식배당의 경우에는 부채비율이 감소한다."],"c":3,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '현금배당을 실시하면 부채비율이 증가하지만, 주식배당의 경우에는 부채비율이 감소한다.'는 잘못된 설명입니다. 실제로는 증가가 아니라 감소하는 관계입니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_22","q":"㈜삼일은 20X1년 10월 1일에 자기주식 150주(주당 액면 5,000원)를 주당 6,000원에 취득하고, 20X1\n년 11월 2일 50주를 주당 7,000원에, 50주는 20X1년 12월 5일 주당 5,500원에 매각하였다. 나머지\n50주는 20X1년 12월 31일 소각하였다. 다음 설명 중 옳은 것은(단, 20X1년 10월 이전에 자기주식 거\n래는 없었다)?","a":["20X1년 10월 1일 거래로 자본이 750,000원 증가한다.","20X1년 11월 2일 거래로 자본이 250,000원 증가한다.","20X1년 12월 5일 거래로 자본이 75,000원 감소한다.","20X1년 12월 31일 거래로 자본은 변동하지 않는다."],"c":3,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '20X1년 12월 31일 거래로 자본은 변동하지 않는다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_재무_23","q":"㈜삼일은 20X1년 초에 상품 A, B, C를 4,000,000원에 판매하기로 하는 계약을 고객과 체결하였으며,\n각 계약을 하나의 상업적 목적으로 일괄 협상하였다. 당기 중 A에 대한 공급이 완료되었고, B와 C에\n대한 공급은 차기 이후에 이루어질 예정이며, 해당 거래에 유의적인 금융요소는 없다고 가정한다. 각\n상품별 개별 판매가격 및 구매단가가 다음과 같을 때, ㈜삼일이 20X1년에 인식할 수익을 계산하면 얼마\n인가?\n구분 상품 A 상품 B 상품 C 합계\n개별판매가격 1,000,000원 2,500,000원 1,500,000원 5,000,000원\n구매원가 750,000원 1,700,000원 1,250,000원 3,700,000원","a":["750,000원","800,000원","1,000,000원","1,250,000원"],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (800,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_24","q":"다음 중 고객과의 계약에서 생기는 수익에 관한 설명으로 옳지 않은 것은?","a":["고객에게 이전할 재화나 용역에 대하여 받을 권리를 갖게 될 대가의 회수가능성이 높지 않더라도 계 약의 상업적 실질이 존재하고 이전할 재화나 용역의 지급조건을 식별할 수 있으면 고객과의 계약으 로 회계처리한다.","기업이 수행하여 만든 자산이 기업 자체에 대체적인 용도가 없고, 지금까지 수행을 완료한 부분에 대해 집행가능한 지급청구권이 기업에 있는 경우, 기업은 기간에 걸쳐 수익을 인식한다.","진행률은 보고기간 말 마다 다시 측정하되 회계추정의 변경으로 회계처리한다.","기간에 걸쳐 수익을 인식하는 경우 투입법 혹은 산출법에 따라 진행률을 측정하며, 비슷한 수행의무 에 대해서는 일관되게 적용한다."],"c":0,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '고객에게 이전할 재화나 용역에 대하여 받을 권리를 갖게 될 대가의 회수가능성이 높지 않더라도 계 약의 상업적'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_25","q":"㈜서울은 ㈜용산으로부터 건설공사를 수주하였다. ㈜용산과 체결한 건설공사가 총 건설계약기간에 대하\n여 손실이 발생할 것으로 예상되는 경우 ㈜서울이 수행할 회계처리로 옳은 것은?","a":["건설계약에서 예상되는 손실액은 진행률에 따라 비용으로 인식한다.","건설계약에서 예상되는 손실액은 공사완료시점에 비용으로 인식한다.","건설계약에서 예상되는 손실액은 당기에 즉시 비용으로 인식한다.","건설계약에서 예상되는 손실액은 전기에 인식했던 수익에서 직접 차감한다."],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '건설계약에서 예상되는 손실액은 당기에 즉시 비용으로 인식한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_재무_26","q":"㈜서울은 20X1년 1월 1일 ㈜용산에 상품을 할부로 판매하였다. 상품의 원가는 7,000,000원이며, 할부\n대금은 20X1년 1월 1일부터 매년 초에 3,000,000원씩 3년간 회수하기로 하였다. 또한 시장이자율은\n10 % , 연금현가계수(10 %, 2년)는 1.73554이고, 연금현가계수(10 %, 3년)는 2.48685이다. 동 할부매\n출과 관련하여 ㈜서울이 20X1년에 인식할 매출총이익과 이자수익은 각각 얼마인가(단, 소수점 이하는\n반올림한다)?\n매출총이익 이자수익","a":["460,550원 746,055원","746,055원 1,200,000원","1,206,620원 520,662원","2,000,000원 1,200,000원"],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (1,206,620원 520,662원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_27","q":"다음 중 단기종업원급여에 관한 설명으로 옳지 않은 것은?","a":["종업원이 관련 근무용역을 제공한 회계기간의 말부터 12개월 이내에 지급기일이 전부 도래하는 종 업원급여이다(해고급여 제외).","단기종업원급여는 근무용역을 제공한 회계기간에 인식한다.","누적유급휴가는 휴가가 실제로 사용되는 때에 재무제표에 인식한다.","단기종업원급여는 보험수리적 방법으로 측정하지 않는다."],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '누적유급휴가는 휴가가 실제로 사용되는 때에 재무제표에 인식한다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_28","q":"다음 중 현금결제형 주식기준보상거래에 관한 설명으로 옳지 않은 것은?","a":["제공받는 재화나 용역과 그 대가로 부담하는 부채를 부채의 공정가치로 측정한다.","기업이 재화나 용역을 제공받는 대가로 지분상품의 가치에 기초하여 현금 등을 지급해야 하는 거래 이다.","부채가 결제될 때까지 매 보고기간 말 부채의 공정가치를 재측정하지 않는다.","재화나 용역의 제공대가로 지분상품을 부여하는 주식결제형 주식기준보상거래와 구분된다."],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '부채가 결제될 때까지 매 보고기간 말 부채의 공정가치를 재측정하지 않는다.'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_29","q":"㈜삼일은 20X1년 중 설립된 회사로 20X1년 중 미래 과세소득을 감소시키는 차감할 일시적차이\n1,000,000원이 발생하였다. 해당 차감할 일시적차이가 소멸되는 회계기간 및 각 회계기간에 적용될\n법인세율은 다음과 같다. 자료를 토대로 ㈜삼일이 20X1년말 인식할 이연법인세자산(부채)는 얼마인가\n(단, 일시적차이가 사용될 수 있는 미래 과세소득의 발생 가능성은 높다고 가정한다)?\n20X2년 20X3년 20X4년\n차감할 일시적차이 200,000원 300,000원 500,000원\n적용될 법인세율 20 % 30 % 30 %","a":["이연법인세자산 200,000원","이연법인세자산 280,000원","이연법인세부채 200,000원","이연법인세부채 280,000원"],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (이연법인세자산 280,000원). 이연법인세자산/부채 = 일시적차이 × 세율. 차감할 일시적차이는 이연법인세자산, 가산할 일시적차이는 이연법인세부채를 인식합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_30","q":"다음 중 법인세 관련 자산, 부채, 비용(수익)의 재무제표 표시와 공시에 관한 설명으로 옳지 않은 것\n은?","a":["과거기간의 당기법인세에 대하여 당기에 인식한 조정사항은 공시하지 않는다.","당기법인세자산과 당기법인세부채는 일정 조건을 충족하는 경우에만 상계하여 표시한다.","이연법인세자산(부채)은 비유동으로 구분한다.","당기법인세자산(부채)은 유동으로 구분한다."],"c":0,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '과거기간의 당기법인세에 대하여 당기에 인식한 조정사항은 공시하지 않는다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_31","q":"㈜삼일은 20X1년 1월 1일에 취득한 기계장치 1,000,000원을 생산량비례법으로 상각하여 오던 중 20X3\n년 1월 1일에 정액법으로 감가상각방법을 변경하기로 하였다. 감가상각방법 변경 후 잔존내용연수가 4\n년이라고 한다면 ㈜삼일이 회계변경으로 인하여 20X3년 인식할 감가상각비는 얼마인가(잔존가치는 없다\n고 가정한다)?\n회계연도 20X1년 20X2년\n기계장치 감가상각비\n200,000원 160,000원\n(생산량비례법)","a":["80,000원","128,000원","160,000원","200,000원"],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (160,000원). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_32","q":"㈜삼일의 20X1년 당기순이익은 3,000,000원이다. ㈜삼일의 20X1년 1월 1일 유통주식수는 10,000주이\n고, 4월 1일 자기주식 1,000주를 취득하였으며, 10월 1일에는 유상증자(주식의 발행금액은 공정가치\n와 동일)를 통해 3,000주를 발행하였다. ㈜삼일의 20X1년 기본주당순이익이 260원인 경우, 20X1년 우\n선주 배당금은 얼마인가(단, 가중평균유통주식수는 월수로 계산한다)?","a":["400,000원","595,000원","600,000원","790,000원"],"c":0,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번 (400,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_33","q":"다음 중 지분법에 관한 설명으로 옳지 않은 것은?","a":["투자자가 직접 또는 간접으로 피투자자에 대한 의결권의 20 % 이상을 소유하고 있다면 명백한 반증 이 없는 한 유의적인 영향력이 있는 것으로 본다.","기업이 해당 피투자자에 대하여 유의적인 영향력이 있는지 여부를 평가할 때에는 다른 기업이 보유 한 잠재적 의결권도 고려한다.","투자자의 보고기간종료일과 관계기업의 보고기간종료일이 다른 경우, 관계기업은 투자자의 재무제표 와 동일한 보고기간종료일의 재무제표를 재작성한다.","지분법을 적용하는 경우, 관계기업으로부터 수취한 배당금은 배당금수익으로 인식한다."],"c":3,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '지분법을 적용하는 경우, 관계기업으로부터 수취한 배당금은 배당금수익으로 인식한다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_34","q":"㈜삼일은 20X1년 초에 ㈜용산의 주식 25 % 를 1,000,000원에 취득하면서 유의적인 영향력을 행사할 수\n있게 되었다. 취득일 현재 ㈜용산의 순자산 장부금액은 4,000,000원이며, 자산 및 부채의 장부금액은\n공정가치와 동일하다. ㈜용산은 20X1년에 당기순이익 800,000원과 총포괄이익 1,000,000원을 보고하였\n다. ㈜삼일이 20X1년 중에 ㈜용산으로부터 중간배당금 50,000원을 수취하였다면, ㈜삼일이 20X1년 당\n기손익으로 인식할 지분법이익을 계산하면 얼마인가?","a":["200,000원","212,500원","225,000원","250,000원"],"c":0,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번 (200,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_6_재무_35","q":"다음 중 외화자산 및 외화부채의 환산에 관한 설명으로 옳지 않은 것은?","a":["화폐성 외화자산·부채는 보고기간말 현재의 환율로 환산한다.","비화폐성 외화자산·부채 중 공정가치로 측정하는 항목은 당해 자산·부채의 최초 거래일의 환율로 환산한다.","화폐성 자산의 예로는 현금및현금성자산, 장·단기 매출채권 등이 있으며, 화폐성 부채의 예로는 매 입채무, 장·단기차입금, 사채 등이 있다.","비화폐성 외화자산·부채 중 역사적원가로 측정하는 항목은 당해 자산 또는 부채 거래일의 환율로 환산한다."],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '비화폐성 외화자산·부채 중 공정가치로 측정하는 항목은 당해 자산·부채의 최초 거래일의 환율로 환산한다.'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_36","q":"다음 중 파생상품의 회계처리에 관한 설명으로 옳지 않은 것은?","a":["파생상품은 해당 계약에 따라 발생된 권리와 의무를 자산, 부채로 인식하여 재무제표에 계상한다.","위험회피대상항목은 공정가치나 미래현금흐름의 변동위험에 노출되어 있고, 위험회피대상으로 지정 된 자산, 부채, 확정계약, 발생가능성이 매우 높은 예상거래 또는 해외사업장에 대한 순투자를 말한 다.","공정가치위험회피목적의 파생상품 평가손익은 기타포괄손익으로 인식한다.","위험회피수단으로 지정되지 않고 매매목적 등으로 보유하고 있는 파생상품의 평가손익은 당기손익으 로 인식한다."],"c":2,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '공정가치위험회피목적의 파생상품 평가손익은 기타포괄손익으로 인식한다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_37","q":"다음 중 리스에 관한 설명으로 옳지 않은 것은?","a":["내재이자율은 리스료의 현재가치 합계액을 기초자산의 공정가치와 리스제공자의 리스개설직접원가의 합계액과 동일하게 하는 할인율을 말한다.","리스개설직접원가란 리스를 체결하지 않았더라면 부담하지 않았을 리스체결의 증분원가를 말한다.","리스이용자는 리스개시일에 그날 현재 지급되지 않은 리스료의 현재가치로 리스부채를 측정한다.","리스이용자는 단기리스와 소액 기초자산 리스에 대해 사용권자산과 리스부채를 인식하지 않기로 선 택할 수 있다."],"c":0,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '내재이자율은 리스료의 현재가치 합계액을 기초자산의 공정가치와 리스제공자의 리스개설직접원가의 합계액과 동일하게'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_38","q":"다음은 특정 현금흐름을 영업활동, 투자활동 및 재무활동과 짝지은 것이다. 잘못 짝지어진 것은 어느\n것인가?","a":["리스부채의 상환 – 영업활동","비품의 취득 – 투자활동","원재료 구입 – 영업활동","단기차입금의 상환 – 재무활동"],"c":0,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '리스부채의 상환 – 영업활동'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_6_재무_39","q":"현금의 유입과 유출이 없는 중요한 거래는 현금흐름표에는 표시되지 않지만 재무제표를 이해하는데 목\n적적합한 정보인 경우 주석으로 표시한다. 다음 중 현금의 유입과 유출이 없는 거래로 옳지 않은 것은?","a":["현물출자로 인한 유형자산의 취득","사채의 발행","전환사채의 전환","무상증자"],"c":1,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '사채의 발행'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_재무_40","q":"다음은 ㈜삼일의 20X2년 말 비교재무상태표상에서 추출한 건물과 관련된 자료이다. 주어진 자료만을 이\n용하여 투자활동현금흐름을 계산하면 얼마인가?\n가. ㈜삼일의 20X2년 초 및 20X2년 말의 건물 장부금액은 각각 30,000원과 28,000원이다.\n나. ㈜삼일은 20X2년 중 보유중인 건물을 7,000원에 처분하면서, 유형자산처분이익 1,000원을 인식\n하였다.\n다. ㈜삼일이 20X2년 건물의 감가상각비로 인식한 금액은 5,000원이다.\n라. ㈜삼일의 20X2년 건물과 관련된 모든 거래는 현금으로 이루어졌다.","a":["1,000원 유입","1,000원 유출","2,000원 유입","2,000원 유출"],"c":3,"s":"재무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번 (2,000원 유출). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_1","q":"다음 중 조세의 분류에 관한 설명으로 옳지 않은 것은?","a":["조세는 과세권자에 따라 국세와 지방세로 분류한다.","교육세는 조세의 사용용도가 특정되지 아니한 보통세에 해당한다.","소득세는 납세자의 인적사항이 고려되는 인세(人稅)에 해당한다.","부가가치세는 입법상 조세부담의 전가를 예상한 간접세에 해당한다."],"c":1,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '교육세는 조세의 사용용도가 특정되지 아니한 보통세에 해당한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_2","q":"다음 중 기간과 기한에 관한 설명으로 옳지 않은 것은?","a":["기간을 일,주,월 또는 연으로 정한 때에는 초일은 기간 계산시 산입하지 않는 것을 원칙으로 한다.","기한이란 일정한 시점의 도래로 인하여 법률효과가 발생·소멸하거나 또는 일정한 시점까지 의무를 이행하여야 하는 경우에 그 시점을 말한다.","기간의 계산은 국세기본법 또는 그 세법에 특별한 규정이 있는 것을 제외하고는 민법을 따른다.","국세기본법에서 규정하는 서류의 제출에 관한 기한이 토요일 및 일요일, 공휴일 및 대체공휴일, 근 로자의 날인 경우에는 그 공휴일 등의 전 날을 기한으로 한다."],"c":3,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '국세기본법에서 규정하는 서류의 제출에 관한 기한이 토요일 및 일요일, 공휴일 및 대체공휴일, 근 로자의 날인'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_3","q":"다음 중 국세기본법상 국세부과의 원칙과 관련된 내용으로 옳지 않은 것은?","a":["정부는 국세를 감면한 경우에 그 감면의 취지를 성취하거나 국가정책을 수행하기 위하여 필요하다고 인정하면 세법에서 정하는 바에 따라 감면한 세액에 상당하는 자금 또는 자산의 운용 범위를 정할 수 있다.","국세를 조사ㆍ결정할 때 장부의 기록 내용이 사실과 다르거나, 장부의 기록에 누락된 것이 있을 때 에는 그 부분에 대해서만 정부가 조사한 사실에 따라 결정할 수 있다.","사실상 당해 사업자가 취득하여 사업에 공하였음이 확인되는 경우에도 공부상 등기ㆍ등록 등이 타인 의 명의로 되어 있는 경우에는 이를 그 사실상 사업자의 사업용자산으로 보지 아니한다.","정부는 장부의 기록 내용과 다른 사실 또는 장부 기록에 누락된 것을 조사하여 결정하였을 때에는 정부가 조사한 사실과 결정의 근거를 결정서에 적어야 한다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '사실상 당해 사업자가 취득하여 사업에 공하였음이 확인되는 경우에도 공부상 등기ㆍ등록 등이 타인 의 명의로 되'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_4","q":"다음 중 국세기본법상 수정신고와 경정청구에 관한 내용으로 옳지 않은 것은?","a":["과세표준신고서를 법정신고기한까지 제출한 자 및 기한후과세표준신고서를 제출한 자는 수정신고를 할 수 있다.","납세의무자가 당초신고시 과세표준과 세액을 과다신고하거나 결손금액 또는 환급세액을 과소신고한 경우 경정 등 청구를 할 수 있다.","과세표준신고서를 법정신고기한까지 제출한 자 또는 국세의 과세표준 및 세액의 결정을 받은 자는 후발적 사유가 발생하였을 때에는 그 사유가 발생한 것을 안 날부터 2개월 이내에 결정 또는 경정 을 청구할 수 있다.","과세표준신고서를 법정신고기한까지 제출한 자가 법정신고기한이 지난 후 2년 이내에 수정신고한 경우(과세표준과 세액을 경정할 것을 미리 알고 과세표준수정신고서를 제출한 경우는 제외한다)에는 과소신고·초과환급신고가산세의 법 소정 비율에 상당하는 금액을 감면한다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '과세표준신고서를 법정신고기한까지 제출한 자 또는 국세의 과세표준 및 세액의 결정을 받은 자는 후발적 사유가 '는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_5","q":"다음 중 법인세법상 사업연도와 납세지에 관한 설명으로 옳지 않은 것은?","a":["사업연도가 변경된 경우에는 종전의 사업연도 개시일부터 변경된 사업연도 개시일 전날까지의 기간 을 1사업연도로 하되, 그 기간이 1개월 미만인 경우에는 변경된 사업연도에 그 기간을 포함한다.","매년 1월 1일부터 12월 31일까지를 사업연도로 하는 법인이 2024년부터 변경된 사업연도를 적용 하려면 2024년 3월 31일까지 납세지 관할 세무서장에게 사업연도변경신고서를 제출해야 한다.","내국법인이 본점 등의 소재지가 자산 또는 사업장과 분리되어 있어 조세포탈의 우려가 있는 경우에 는 등기부상의 소재지 등에 불구하고 관할 지방국세청장(또는 국세청장)이 법인의 납세지를 지정할 수 있다.","내국법인이 본점의 이전 등으로 인하여 법인의 납세지가 변경된 경우에는 그 변경일로부터 15일 이 내에 변경 전의 납세지 관할 세무서장에게 납세지 변경신고를 하여야 한다."],"c":3,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '내국법인이 본점의 이전 등으로 인하여 법인의 납세지가 변경된 경우에는 그 변경일로부터 15일 이 내에 변경 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_6","q":"다음 중 세무조정시 기타사외유출로 처분하는 것은?","a":["기업업무추진비 한도초과액","감가상각비 한도초과액","임원퇴직급여 한도초과액","업무용승용차 관련비용 중 업무미사용금액"],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '기업업무추진비 한도초과액'. 세무조정은 기업회계 이익을 세법상 과세소득으로 전환하는 과정으로, 익금산입·손금불산입 등을 통해 조정합니다. ","src":"cbt"},{"id":"jg_6_세무_7","q":"㈜삼일은 제24기(2024년 1월 1일 ∼ 2024년 12월 31일) 사업연도 중에 보유하던 토지 A의 40 % 를\n시가에 양도하였다. 토지 A에 대한 자료가 다음과 같은 경우 토지의 양도와 관련하여 제24기 사업연도\n에 필요한 세무조정으로 옳은 것은(단, 전기 이전의 세무조정은 적정하며, 주어진 자료 이외에는 고려\n하지 않음)?\n(1) 제23기 사업연도의 자본금과 적립금조정명세서(을)\n(단위 : 원)\n당기중 증감\n과목 또는 사항 기초잔액 기말잔액\n감소 증가\n토지 A 10,000,000 - - 10,000,000\n(2) 제24기 토지 A 양도시 결산상 회계처리\n(차) 현 금 31,000,000 (대) 토 지 40,000,000*\n유형자산처분손실 9,000,000\n* 양도 당시 결산상 토지 A의 장부가액 100,000,000원에 양도비율 40 % 를 곱한 금액임","a":["익금산입 및 손금불산입 4,000,000원","손금산입 및 익금불산입 4,000,000원","익금산입 및 손금불산입 6,000,000원","손금산입 및 익금불산입 6,000,000원"],"c":1,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '손금산입 및 익금불산입 4,000,000원'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_세무_8","q":"㈜삼일이 제24기(2024년 1월 1일 ~ 2024년 12월 31일)에 다음 금액을 비용으로 회계처리한 경우 각\n사업연도 소득금액 계산시 손금불산입되는 금액은 얼마인가?\n1. 주식할인발행차금 1,000,000원\n2. 형법상 뇌물 5,000,000원\n3. 법인지방소득세 2,000,000원\n4. 폐수배출부담금 3,000,000원\n5. 직장어린이집운영비 4,000,000원","a":["6,500,000원","8,000,000원","11,000,000원","15,000,000원"],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (11,000,000원). 종합소득세 = 종합소득과세표준 × 세율 - 누진공제액. 소득공제를 차감한 후 세율을 적용합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_9","q":"㈜삼일은 제24기(2024년 1월 1일 ~ 2024년 12월 31일)초에 전무이사가 사용할 업무용 승용차를\n50,000,000원에 취득하고 업무전용자동차보험에 가입하였다. 해당 업무용 승용차에 관련된 다음 내역을\n바탕으로 세무조정을 수행하고 해당 세무조정의 결과 제24기 사업연도의 손금불산입금액을 계산하면\n얼마인가?\n(1) 손익계산서상 비용계상내역","a":["감가상각비 10,000,000원","차량유지비(유류비, 수선비 등) 5,000,000원 (2) 운행기록부상 업무사용비율은 100 % 이다. ① 0원 ② 2,000,000원","3,000,000원","7,600,000원"],"c":1,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (차량유지비(유류비, 수선비 등) 5,000,000원 (2) 운행기록부상 업무사용비율은 100 % 이다. ① 0원 ② 2,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_10","q":"다음 중 법인세법상 손익의 귀속시기에 관한 설명으로 옳지 않은 것은?","a":["익금과 손금은 권리·의무가 확정되는 사업연도에 인식하는 것을 원칙으로 한다.","내국법인이 익금과 손금의 귀속사업연도에 관하여 일반적으로 공정ㆍ타당하다고 인정되는 기업회계 기준을 적용하거나 관행을 계속 적용하여 온 경우에는 법인세법 및 조세특례제한법에서 달리 규정하 고 있는 경우를 제외하고는 그 기업회계기준 또는 관행에 따른다.","자산을 위탁매매한 경우에는 수탁자가 그 위탁자산을 매매한 날을 손익의 귀속시기로 한다.","부동산을 양도한 경우에는 대금청산일에 관계없이 등기이전일을 손익의 귀속시기로 한다."],"c":3,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '부동산을 양도한 경우에는 대금청산일에 관계없이 등기이전일을 손익의 귀속시기로 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_11","q":"다음 중 법인세법상 감가상각비에 관한 설명으로 옳지 않은 것은?","a":["시설의 개체 또는 기술의 낙후로 인하여 생산설비의 일부를 폐기한 경우 해당 자산의 장부가액에서 1천원을 공제한 금액을 폐기일이 속하는 사업연도의 손금에 산입할 수 있다.","사업연도 중에 취득하여 사업에 사용한 감가상각자산에 대한 상각범위액은 사업에 사용한 날부터 당 해 사업연도 종료일까지의 월수에 따라 계산한다.","건축물의 감가상각방법을 신고하지 아니한 경우에는 정률법을 적용한다.","상각범위액을 계산함에 있어서 감가상각자산의 잔존가액은 원칙적으로“0”으로 하고, 정률법에 의 하여 상각범위액을 계산하는 경우에만 취득가액의 5 % 에 상당하는 금액으로 하되, 그 금액은 당해 감가상각자산에 대한 미상각잔액이 최초로 취득가액의 5 % 이하가 되는 사업연도의 상각범위액에 가 산한다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '건축물의 감가상각방법을 신고하지 아니한 경우에는 정률법을 적용한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_12","q":"다음 자료에 의한 ㈜삼일의 제24기(2024년 1월 1일 ~ 2024년 12월 31일) 사업연도의 세무조정 사항\n이 각 사업연도 소득금액에 미치는 영향으로 옳은 것은?\n구분 건물 비품 차량운반구\n회사계상 상각비 5,000,000원 5,000,000원 1,000,000원\n세법상 상각범위액 6,000,000원 3,500,000원 1,400,000원\n내 용 연 수 40년 5년 5년\n전기이월상각 부인액 1,300,000원 600,000원 -","a":["영향 없음","500,000원 감소","500,000원 증가","1,000,000원 증가"],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '500,000원 증가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_세무_13","q":"용산역에 위치한 ㈜삼일은 투자 목적으로 회사 주변의 건물을 소유하고 있다. ㈜삼일의 김삼일 대표이\n사는 자신의 향우회로부터 6억원의 현금을 받는 조건으로 회사의 건물을 매각하라는 제안을 받았고, 동\n제안을 수락할 경우 어떤 효과가 있을지 고민하고 있다. 동 건물의 시가는 10억원이다. 건물을 위의 조\n건으로 매각할 경우 다음 중 옳은 세무조정은 어느 것인가(단, 대표이사 향우회는 ㈜삼일과 특수관계자\n가 아니다)?","a":["<손금불산입> 비지정기부금 1억원","<손금불산입> 일반기부금 2억원","<손금불산입> 일반기부금 3억원","<손금불산입> 비지정기부금 4억원"],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '<손금불산입> 비지정기부금 1억원'. 세무조정은 기업회계 이익을 세법상 과세소득으로 전환하는 과정으로, 익금산입·손금불산입 등을 통해 조정합니다. ","src":"cbt"},{"id":"jg_6_세무_14","q":"중소기업이며 제조업을 영위하는 ㈜삼일의 제24기 사업연도(2024년 1월 1일 ∼ 2024년 12월 31일)\n의 기업업무추진비와 관련된 자료가 다음과 같을 경우, 세무조정으로 인한 손금불산입액의 총합계는 얼\n마인가(문화관련업무추진비나 전통시장에서 지출한 업무추진비는 없다)?\nㄱ. 기업업무추진비지출액: 90,000,000원\n(기업업무추진비로 신용카드 등을 사용하지 않고 영수증을 받은 금액 2,000,000원(1건) 포함)\nㄴ. 손익계산서상 매출액: 190억원(매출액은 전액 제조업에서 발생한 금액으로서 특수관계인과 거\n래분은 없음)\nㄷ. 사업연도 중 중단된 사업부문(소매업)의 매출액 10억원(손익계산서상 매출액에는 포함되어 있\n지 않으며, 특수관계인 거래분 없음)\nㄹ. 기업업무추진비 손금한도액 계산시 수입금액기준한도액 계산에 필요한 적용률은 수입금액 100\n억원 이하분에 대하여는 0.3 %, 100억 초과 500억 이하 분에 대하여는 0.2 %이다.","a":["2,000,000원","4,000,000원","6,000,000원","8,000,000원"],"c":1,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (4,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_15","q":"다음은 지급이자손금불산입 항목을 나열한 것이다. 지급이자손금불산입을 적용하는 순서를 나타낸 것으\n로 옳은 것은?\nㄱ. 건설자금이자\nㄴ. 업무무관자산 등 관련 이자\nㄷ. 비실명 채권·증권의 이자상당액\nㄹ. 채권자불분명 사채이자","a":["ㄷ → ㄴ → ㄱ → ㄹ","ㄷ → ㄴ → ㄹ → ㄱ","ㄹ → ㄷ → ㄱ → ㄴ","ㄹ → ㄷ → ㄴ → ㄱ"],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. 'ㄹ → ㄷ → ㄱ → ㄴ'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_세무_16","q":"다음 중 법인세법상 대손충당금 설정대상 채권이 아닌 것은?","a":["특수관계인에 대한 업무무관가지급금","금전소비대차계약에 의하여 타인에게 대여한 금액","상품의 판매가액의 미수액","용역제공에 의한 영업수익 미수금"],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '특수관계인에 대한 업무무관가지급금'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_17","q":"다음 중 준비금에 관한 설명으로 옳지 않은 것은?","a":["보험사업을 하는 내국법인은 법인세법에 따라 고유목적사업준비금을 손금에 산입할 수 있다.","준비금은 법인세법과 조세특례제한법에 규정되어 있다.","보험사업을 하는 내국법인은 비상위험준비금을 손금에 산입할 수 있다.","손금에 산입한 책임준비금은 일정기간이 경과한 후에 다시 익금산입하여야 한다."],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '보험사업을 하는 내국법인은 법인세법에 따라 고유목적사업준비금을 손금에 산입할 수 있다.'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_18","q":"㈜삼일은 2024년 7월 1일 개인대주주에게 시가 3억원인 토지를 장부가액인 2억원에 매도하고 다음과\n같이 회계처리 하였다. 다음 중 해당 토지 처분과 관련하여 2024년에 필요한 세무조정으로 옳은 것은?\n(차) 현금 2억원 (대) 토지 2억원","a":["(익금산입) 저가양도 1억원 (배당)","(익금산입) 저가양도 1억원 (배당), (손금산입) 토지 1억원 (△유보)","(익금산입) 토 지 1억원 (유보)","(손금산입) 토 지 1억원 (△유보)"],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '(익금산입) 저가양도 1억원 (배당)'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_세무_19","q":"다음 중 법인세법상 과세표준의 계산에 관한 설명으로 옳지 않은 것은?","a":["자산수증이익이나 채무면제이익에 의해 충당된 이월결손금은 과세표준 계산시 공제할 수 없다.","과세표준은 각 사업연도 소득금액에서 이월결손금, 비과세소득, 소득공제를 순서대로 차감하여 계산 한다.","공제대상 이월결손금은 각 사업연도 소득금액의 60 %(중소기업과 회생계획 이행 중인 기업 등은 100 %)의 범위에서 공제한다.","각 사업연도 소득금액에서 이월결손금을 공제한 금액을 초과하는 비과세소득은 다음 사업연도로 이 월되지 않고 소멸한다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '공제대상 이월결손금은 각 사업연도 소득금액의 60 %(중소기업과 회생계획 이행 중인 기업 등은 100 %)의'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_20","q":"다음 중 법인세의 신고와 납부에 관한 설명으로 옳지 않은 것은?","a":["법인세 납세의무가 있는 내국법인은 각 사업연도 종료일이 속하는 달의 말일부터 3개월 이내에 법 인세 과세표준과 세액을 신고하는 것을 원칙으로 한다.","법인세 과세표준 신고시 필수적 첨부서류인 개별내국법인의 재무상태표, 포괄손익계산서, 이익잉여 금처분(결손금처리)계산서, 법인세 과세표준 및 세액조정계산서를 첨부하여야 한다.","내국법인으로서 각 사업연도 소득금액이 없거나 결손금이 있는 법인의 경우에는 법인세 과세표준 신 고의무가 없다.","각 사업연도의 기간이 6개월을 초과하는 법인은 사업연도 개시일부터 6개월간을 중간예납기간으로 하여 중간예납기간이 지난 날부터 2개월 이내에 그 기간에 대한 법인세를 납부해야 한다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '내국법인으로서 각 사업연도 소득금액이 없거나 결손금이 있는 법인의 경우에는 법인세 과세표준 신 고의무가 없다'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_21","q":"다음 중 소득세의 신고와 납부에 관한 설명으로 옳지 않은 것은?","a":["소득세법은 원칙적으로 열거주의에 의해 과세대상소득을 규정하고 있으며 예외적으로 이자 및 배당 소득에 한하여 유형별 포괄주의를 채택하고 있다.","퇴직소득과 양도소득은 다른 소득과 합산하지 않고 별도로 과세한다.","소득세법은 개인단위과세제도를 원칙으로 하되, 예외적으로 가족이 공동으로 사업을 경영하는 경우 에는 무조건 합산과세한다.","소득세법은 과세표준의 증가에 따라 세율이 증가하는 누진과세를 채택하고 있다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '소득세법은 개인단위과세제도를 원칙으로 하되, 예외적으로 가족이 공동으로 사업을 경영하는 경우 에는 무조건 합'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_22","q":"다음 자료에 의하여 거주자 김삼일씨의 2024년 소득 중 종합과세할 금융소득금액을 계산하면 얼마인가\n(제시된 배당은 모두 Gross-up 대상이며, 배당소득 가산율은 10 % 이다)?\nㄱ. 현금배당 : 10,000,000원\nㄴ. 주식배당 : 30,000,000원\nㄷ. 은행예금이자 : 10,000,000원\nㄹ. 직장공제회 초과반환금 : 20,000,000원","a":["53,000,000원","55,000,000원","73,000,000원","75,000,000원"],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번 (53,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_23","q":"다음 자료로 간편장부대상자인 개인사업자 김삼일씨의 2024년 사업소득금액을 계산하면 얼마인가?\nㄱ. 손익계산서상 당기순이익 100,000,000원\nㄴ. 손익계산서에는 다음과 같은 수익과 비용이 포함되어 있다.\n- 본인에 대한 급여 20,000,000원\n- 영업부장으로 근무하는 아들의 급여 10,000,000원\n- 정기예금이자 5,000,000원\n- 기계장치처분이익(사업용유형자산에 해당함) 1,000,000원\n- 사업용 건물에 대한 재산세 3,000,000원","a":["110,000,000원","114,000,000원","115,000,000원","118,000,000원"],"c":1,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (114,000,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_24","q":"다음은 ㈜삼일에 근무하는 김철수 대리의 2024년 급여지급 내역이다. 이와 관련한 설명으로 옳지 않은\n것은?\nㄱ. 월 급여 : 4,000,000원(상여, 자녀보육수당, 중식대 제외)\nㄴ. 상여 : 연간 12,000,000원\nㄷ. 6세 이하 자녀보육수당 : 월 200,000원\nㄹ. 중식대 : 월 200,000원(식사를 제공받지 않음)\nㅁ. 인정상여 : 3,000,000원","a":["총급여액 계산시 비과세소득은 근로소득에서 제외된다.","법인세법에 따라 상여로 처분된 금액은 근로소득에서 제외된다.","근로자가 식사를 제공받지 않은 경우 월 20만원 이내의 식사대는 비과세한다.","6세 이하의 자녀 보육과 관련하여 사용자로부터 받는 급여로서 월 20만원 이내의 금액은 비과세한 다."],"c":1,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '법인세법에 따라 상여로 처분된 금액은 근로소득에서 제외된다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_25","q":"다음 중 소득세법상 기타소득에 관한 설명으로 옳지 않은 것은?","a":["복권당첨소득은 기타소득으로 분류되며 무조건 분리과세되므로 종합과세되지 않는다.","법인세법에 따라 처분된 기타소득의 수입시기는 그 법인의 해당 사업연도의 결산확정일이다.","서화ㆍ골동품을 박물관 또는 미술관에 양도함으로써 발생하는 소득은 비과세 기타소득이다.","주택입주지체상금은 기타소득으로 분류되며 증빙이 없더라도 총수입금액의 60 % 를 필요경비 인정률 로 적용받을 수 있다."],"c":3,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '주택입주지체상금은 기타소득으로 분류되며 증빙이 없더라도 총수입금액의 60 % 를 필요경비 인정률 로 적용받을'는 잘못된 설명입니다. 실제로는 필요한 사항입니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_26","q":"다음 신용카드 등 사용금액 소득공제에 관한 설명으로 옳지 않은 것은?","a":["리스료(자동차대여사업의 자동차대여료를 포함함)는 신용카드 등 사용금액에 대한 소득공제대상이 아니다.","신용카드 사용액이 총급여의 25 % 를 초과하는 경우 소득공제액이 발생한다.","신용카드로 결제한 월세액은 세액공제를 적용받았는지 여부에 관계없이 신용카드 등 사용금액에 대 한 소득공제대상이 아니다.","해외에서 지출한 신용카드 사용액은 신용카드 등 사용금액에 대한 소득공제대상이 아니다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '신용카드로 결제한 월세액은 세액공제를 적용받았는지 여부에 관계없이 신용카드 등 사용금액에 대 한 소득공제대상'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_27","q":"다음 중 소득세법상 의료비세액공제에 관한 설명으로 옳지 않은 것은?","a":["근로소득이 있는 거주자가 기본공제대상자(나이 및 소득의 제한을 받지 아니한다)를 위하여 해당 과 세기간에 의료비를 지급한 경우 의료비세액공제를 적용한다.","공제대상 의료비에는 미용ㆍ성형수술을 위한 비용 및 건강증진을 위한 의약품 구입비용은 포함하지 않는다.","미숙아·선천성이상아 의료비에 대한 의료비세액공제는 세액공제대상 금액의 20 % 로 한다.","시력보정용 안경 또는 콘택트렌즈 구입을 위하여 지출한 비용으로서 기본공제대상자 1명당 70만원 이내의 금액은 공제대상 의료비에 해당한다."],"c":3,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '시력보정용 안경 또는 콘택트렌즈 구입을 위하여 지출한 비용으로서 기본공제대상자 1명당 70만원 이내의 금액은'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_28","q":"다음 중 소득세법상 원천징수에 관한 설명으로 옳지 않은 것은?","a":["분리과세대상소득은 원천징수로써 납세의무가 종결된다.","원천징수에 있어서 세금을 실제로 부담하는 납세의무자와 이를 실제 신고·납부하는 원천징수의무자 는 서로 다르다.","비영업대금의 이익의 경우 원천징수세율은 14 % 이다.","법인이 개인에게 소득을 지급하는 경우 소득세법에 따라 원천징수한다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '비영업대금의 이익의 경우 원천징수세율은 14 % 이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_29","q":"거주자 최순희씨는 2024년 5월 6일에 10년간 보유한 토지(등기된 사업용토지)를 양도하였다. 다음 자\n료에 의해 양도소득과세표준을 계산하면 얼마인가(단, 동 토지의 실지양도비용은 6,000,000원이다)?\n기준시가\n구분 실지거래가액\n(개별공시지가)\n양도가액 100,000,000원 80,000,000원\n취득가액 50,000,000원 30,000,000원\n단, 장기보유특별공제율은 20 % 를 적용한다.","a":["32,700,000원","35,200,000원","37,200,000원","39,500,000원"],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번 (32,700,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_30","q":"다음 중 반드시 종합소득과세표준 확정신고를 해야 하는 자는 누구인가(다만, 제시된 소득은 소득세법\n에 따라 원천징수되었다고 가정한다)?","a":["㈜삼일에 재직 중인 비상근 임원으로서 소장하던 서화를 5천만원에 양도한 유지태씨","㈜서울에 근무하다가 당기에 퇴직하여 퇴직금을 수령하였고 아직까지 취직을 하지 못하고 있는 한미 진씨","10억원의 정기예금에서 연 3,600만원의 이자를 수령하고 해당 이자소득 외에는 소득이 없는 한소희 씨","로또복권당첨금 50,000,000원 외에 다른 소득이 없는 신미나씨"],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '10억원의 정기예금에서 연 3,600만원의 이자를 수령하고 해당 이자소득 외에는 소득이 없는 한소희 씨'. 원천징수는 소득 지급 시 지급자가 세금을 미리 공제하고 납부하는 제도입니다. ","src":"cbt"},{"id":"jg_6_세무_31","q":"다음 중 부가가치세법에 관한 설명으로 옳은 것은?","a":["공장에서 제조하는 재화는 출고단계에서 한 번 과세하고, 유통단계에서는 추가로 과세하지 않는 단 단계거래세이다.","부가가치세는 면세로 열거되지 않은 모든 재화 또는 용역을 과세대상으로 하는 일반소비세이다.","매출액에서 매입액을 차감하여 부가가치를 계산한 후 부가가치에 세율을 곱하는 방식으로 세액을 계산하는 전단계거래액공제법을 채택하고 있다.","국제적 이중과세의 문제를 해결하기 위하여 수출품에 대하여 부가가치세를 과세하지 않는 면세제도 를 두고 있다."],"c":1,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '부가가치세는 면세로 열거되지 않은 모든 재화 또는 용역을 과세대상으로 하는 일반소비세이다.'이 올바른 설명입니다. 세법에서 정한 과세요건을 충족하는 경우에 해당합니다. 과세/비과세/면세 기준을 정확히 파악해야 합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_세무_32","q":"다음 중 부가가치세 납세의무자인 사업자에 관한 설명으로 옳지 않은 것은?","a":["면세사업자는 매출세액을 거래 징수할 필요는 없으나 매입세액 공제를 받을 수 있다.","면세사업자는 부가가치세법에 따른 사업자등록 의무는 없다.","과세사업자는 일반과세자와 간이과세자로 구분할 수 있다.","비영리사업자도 부가가치세법상 납세의무자가 될 수 있다."],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '면세사업자는 매출세액을 거래 징수할 필요는 없으나 매입세액 공제를 받을 수 있다.'는 잘못된 설명입니다. 실제로는 필요한 사항입니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_33","q":"다음 중 부가가치세 과세기간에 관한 설명으로 옳지 않은 것은?","a":["사업개시일 이전에 사업자등록을 신청한 경우의 과세기간은 그 신청한 날부터 그 신청일이 속하는 과세기간의 종료일까지로 한다.","간이과세자의 과세기간은 1년을 2개의 과세기간으로 나누어 6개월마다 신고ㆍ납부하도록 하고 있 다.","간이과세자가 간이과세를 포기한 경우 신고일이 속하는 과세기간 개시일부터 그 신고일이 속하는 달 의 말일까지의 기간을 간이과세자의 과세기간으로 한다.","신규사업자의 최초과세기간은 사업개시일부터 그 날이 속하는 과세기간의 종료일까지로 하는 것이 원칙이다."],"c":1,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '간이과세자의 과세기간은 1년을 2개의 과세기간으로 나누어 6개월마다 신고ㆍ납부하도록 하고 있 다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_34","q":"다음 중 부가가치세법상 사업장에 관한 설명으로 옳지 않은 것은?","a":["건설업을 영위하는 법인의 경우 법인의 등기부상 소재지(등기부상의 지점 소재지를 포함함)를 사업 장으로 본다.","제조업의 경우 최종 제품을 완성하는 장소를 사업장으로 본다.","부동산임대업의 경우 사업에 관한 업무를 총괄하는 장소를 사업장으로 본다.","사업장을 설치하지 않은 경우 해당 사업자의 주소 또는 거소를 사업장으로 본다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '부동산임대업의 경우 사업에 관한 업무를 총괄하는 장소를 사업장으로 본다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_35","q":"다음 중 부가가치세법상 재화의 공급에 관한 설명으로 옳지 않은 것은?","a":["사업자가 주요자재의 전부 또는 일부를 부담하고 해당 재화에 공작을 가해 새로운 재화를 만드는 가 공계약은 재화의 공급에 해당된다.","사업자가 다른 재화를 인도받거나 용역을 제공받는 교환계약에 의해 재화를 인도하는 교환계약은 재 화의 공급에 해당된다.","사용인에게 경조사와 관련된 재화(매입세액공제를 받음)를 제공하는 경우 사용인 1명당 연간 20만원 을 한도로 하며, 20만원을 초과하는 경우 해당 초과액에 대해서는 재화의 공급으로 본다.","사업자가 사업을 폐업할 때 취득한 재화(매입세액을 공제받음) 중 남아있는 재화는 재화의 공급으로 본다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '사용인에게 경조사와 관련된 재화(매입세액공제를 받음)를 제공하는 경우 사용인 1명당 연간 20만원 을 한도로'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_36","q":"다음 중 부가가치세법상 공급시기에 관한 설명으로 옳지 않은 것은?","a":["장기할부판매의 경우에는 대가의 각 부분을 받기로 한 때를 공급시기로 한다.","전력이나 그 밖에 공급단위를 구획할 수 없는 재화를 계속적으로 공급하는 경우에는 대가의 각 부분 을 받기로 한 때를 재화의 공급시기로 본다.","내국신용장에 의하여 공급하는 재화의 공급시기는 수출재화의 선(기)적일로 한다.","무인판매기를 이용하여 재화를 공급하는 경우에는 무인판매기에서 현금을 꺼내는 때를 공급시기로 한다."],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '내국신용장에 의하여 공급하는 재화의 공급시기는 수출재화의 선(기)적일로 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_세무_37","q":"다음은 겸용주택의 임대와 관련된 사항이다. 면세되는 건물과 토지의 면적은 얼마인가(단, 해당 겸용주\n택은 단층주택으로 도시계획구역 내에 소재함)?\nŸ 주택 40㎡이고 점포 50㎡ / 부수토지 450㎡\n면세건물 면세토지","a":["40㎡ 150㎡","40㎡ 200㎡","90㎡ 400㎡","90㎡ 450㎡"],"c":1,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (40㎡ 200㎡). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_38","q":"과세사업과 면세사업을 겸영하고 있는 ㈜삼일은 두 사업에서 공통으로 사용하고 있던 재화를 매각하였\n다. 다음 자료를 보고 ㈜삼일의 2024년 제2기 확정신고시 공통사용재화와 관련된 매출세액을 계산하면\n얼마인가?\n·공통사용재화 취득일: 2024년 1월 2일\n·공통사용재화 공급일: 2024년 11월 25일\n·공통사용재화 공급가액: 30,000,000원(부가가치세 불포함)\n·과세사업과 면세사업의 공급가액\n구분 2024년 1기 2024년 2기\n과세 1억원 2억원\n면세 3억원 3억원\n계 4억원 5억원","a":["750,000원","900,000원","1,500,000원","3,000,000원"],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번 (750,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_39","q":"다음은 부가가치세 과세사업을 영위하는 ㈜삼일의 2024년 제1기 예정신고기간의 매입내역이다. 2024\n년 제1기 예정신고시 공제받을 수 있는 매입세액은 얼마인가(단, 별도의 언급이 없는 항목은 정당하게\n세금계산서를 수령하였다고 가정한다)?\n매 입 내 역 매입세액\nㄱ. 기계장치 구입 10,000,000원\nㄴ. 업무무관비용 지출 7,000,000원\nㄷ. 원재료 구입 6,000,000원\nㄹ. 부재료 구입(세금계산서의 필요적 기재사항의 일부가 9,000,000원\n누락되었고, 그 세금계산서에 적힌 나머지 필요적 기\n재사항 또는 임의적 기재사항으로 보아 거래사실을 확\n인할 수 없음)\nㅁ. 기업업무추진비 4,000,000원","a":["16,000,000원","20,000,000원","24,000,000원","33,000,000원"],"c":0,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번 (16,000,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_6_세무_40","q":"다음 중 부가가치세법상 가산세가 부과되는 경우로 옳지 않은 것은?","a":["사업자등록을 하지 않은 경우","재화를 공급받고 타인 명의로 세금계산서를 발급받은 경우","예정신고시 매입처별 세금계산서 합계표를 제출하지 않고 확정신고시 제출한 경우","세금계산서의 발급시기가 지난 후 해당 재화 또는 용역의 공급시기가 속하는 과세기간에 대한 확정 신고 기한까지 세금계산서를 발급하는 경우"],"c":2,"s":"세무회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '예정신고시 매입처별 세금계산서 합계표를 제출하지 않고 확정신고시 제출한 경우'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_원가_1","q":"다음 중 재무회계와 관리회계에 관한 설명으로 옳은 것은?","a":["관리회계는 과거지향적이고 객관성을 강조하나, 재무회계는 미래지향적이며, 목적적합성을 강조한 다.","관리회계의 보고수단은 일반목적을 위한 재무제표이나, 재무회계의 보고수단은 특수목적의 재무제표 와 기타보고서이다.","관리회계는 기업회계기준 등 일정한 준거기준이 있으나, 재무회계는 일정한 기준이 없다.","관리회계는 주로 내부경영자의 경제적 의사결정에 유용한 정보를 제공하기 위한 내부보고 목적으로 이용되나, 재무회계는 주로 외부보고 목적으로 이용된다."],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '관리회계는 주로 내부경영자의 경제적 의사결정에 유용한 정보를 제공하기 위한 내부보고 목적으로 이용되나, 재무'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_원가_2","q":"다음 자료를 이용하여 당기제품제조원가를 구하면 얼마인가?\nㄱ. 기초재공품 15,000원\nㄴ. 직접재료원가 40,000원\nㄷ. 기말재공품 10,000원\nㄹ. 직접노무원가 30,000원\nㅁ. 제조간접원가 배부액은 직접노무원가 발생액의 70 % 이다.","a":["75,000원","93,000원","96,000원","99,000원"],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (96,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_3","q":"다음 중 보조부문의 원가배분에 관한 설명으로 옳은 것은?","a":["보조부문원가는 제조부문에 배부하지 않고 기간원가로 처리해야 한다.","직접배분법은 보조부문 상호간의 용역수수관계를 고려하는 원가배분방법이다.","보조부문의 원가를 배부할 때에는 항상 수혜기준을 우선적으로 고려해야 한다.","단계배분법은 보조부문 간의 용역수수관계를 일부 인식하기는 하지만 배분순서가 적절하지 않은 경 우 원가배분결과가 왜곡될 수 있다."],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. 단계배분법은 보조부문 원가를 배분순서를 정해 순차적으로 배분하는 방법입니다. 한번 배분된 부문에는 다시 배분하지 않습니다. 직접배분법(상호용역 무시), 상호배분법(완전 반영)과 구별됩니다.","src":"cbt"},{"id":"jg_6_원가_4","q":"㈜삼일은 단계배분법을 이용하여 보조부문원가를 배분하고 있다. 다음의 자료를 이용하여 물음에 답하\n시오(단, 보조부문A의 원가부터 배분한다).\n사용부문 보조부문 제조부문\n합계\n제공부문 A B 갑 을\n부문원가 6,000원 7,000원 12,000원 15,000원 40,000원\nA － 30 % 30 % 40 % 100 %\nB 25 % － 33 % 42 % 100 %\n위의 자료에서 보조부문 B가 제조부문 갑에 배분해야 하는 금액을 계산하면 얼마인가?","a":["3,276원","3,872원","4,928원","7,328원"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (3,872원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_5","q":"다음 중 개별원가계산의 장점에 관한 설명으로 옳지 않은 것은?","a":["종합원가계산에 비하여 제조간접원가의 배부문제가 없고 기장절차가 간단하므로 시간과 비용이 절약 된다.","종합원가계산에 비해 상대적으로 보다 정확한 원가계산이 가능하다.","작업원가표에 의해 개별 제품별로 효율성을 통제할 수 있고 개별 작업에 집계되는 실제원가를 예산 액과 비교하여 미래예측에 이용할 수 있다.","제품별 손익분석 및 계산이 비교적 용이하다."],"c":0,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '종합원가계산에 비하여 제조간접원가의 배부문제가 없고 기장절차가 간단하므로 시간과 비용이 절약 된다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_원가_6","q":"㈜삼일은 개별원가계산제도를 채택하고 있으며, 직접노무원가를 기준으로 제조간접원가를 배분한다.\n20X1년의 제조간접원가 배부율은 A부문에 대해서는 300 %, B부문에 대해서는 50 % 이다. 제조지시서\n#04는 20X1년 중에 시작되어 완성되었으며, 원가 발생액은 다음과 같다. 제조지시서 #04와 관련된 총\n제조원가를 계산하면 얼마인가?\n제조지시서 #04 A부문 B부문\n직접재료원가 50,000원 10,000원\n직접노무원가 ? 60,000원\n제조간접원가 90,000원 ?","a":["210,000원","250,000원","270,000원","300,000원"],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (270,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_7","q":"㈜삼일은 개별원가계산제도를 채택하고 있으며, 제품 A의 작업원가표가 아래와 같을 때 제품 A의 제조\n원가는 얼마인가?\nㄱ. 직접재료 투입액 135,000원\nㄴ. 직접노동시간 200시간\nㄷ. 직접노무원가 임률 500원/시간\nㄹ. 제조간접원가 배부율(직접노동시간당) 750원/시간","a":["350,000원","385,000원","412,500원","435,000원"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (385,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_8","q":"다음 중 종합원가계산에 관한 설명으로 옳은 것은?","a":["각 제품의 원가요소별 단위당 원가를 완성품환산량에 기초하여 계산한다.","조선업, 기계제작업 등과 같이 수요자의 주문에 기초하여 제품을 생산하는 업종에서 주로 사용한다.","여러 종류의 제품을 주문에 의해 생산하거나 또는 동종의 제품을 일정 간격을 두고 비반복적으로 생 산하는 업종에 적합한 원가계산제도이다.","제조과정에서 발생한 원가는 개별제품별로 작성된 작업원가표에 집계되므로 재공품원가를 집계하는 것이 용이하다."],"c":0,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '각 제품의 원가요소별 단위당 원가를 완성품환산량에 기초하여 계산한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_원가_9","q":"㈜삼일은 선입선출법에 따라 종합원가계산을 하고 있다. 당월 완성품환산량 단위당 원가는 재료원가 10\n원, 가공원가 15원이며, 당월 중 생산과 관련된 자료는 다음과 같다.\n기초재공품 600단위 (완성도 40 %)\n기말재공품 700단위 (완성도 60 %)\n당기완성품 4,300단위\n재료는 공정초기에 전량 투입된다고 할 때 이 회사의 당월에 실제 발생한 재료원가는 얼마인가?","a":["43,600원","44,000원","47,200원","50,000원"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (44,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_10","q":"㈜삼일은 종합원가계산제도를 채택하고 있다. 원재료는 공정초기에 전량 투입되며, 가공원가는 공정 전\n반에 걸쳐 균등하게 발생한다. 평균법과 선입선출법에 의한 직접재료원가의 완성품환산량은 각각\n85,000단위와 73,000단위이다. 기초재공품의 완성도는 30 % 이고, 기말재공품의 완성도는 40 % 라면,\n기초재공품 수량은 몇 개인가?","a":["12,000개","25,500개","36,000개","40,000개"],"c":0,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번 (12,000개). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_11","q":"㈜삼일의 제조간접원가와 직접노무시간에 대한 자료이다. ㈜삼일은 예상제조간접원가를 예상직접노무시\n간으로 나눈 제조간접원가 배부율로 원가배분한다. 정상원가계산에 따른 제조간접원가 배부차이가\n300,000원 (과소배부) 발생했다면 실제 직접노무시간으로 옳은 것은?\n제조간접원가 직접노무시간(시간)\n예상 1,000,000원 1,000시간\n실제 800,000원 ?","a":["300시간","500시간","800시간","1,000시간"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (500시간). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_12","q":"다음 중 표준원가계산의 원가차이 처리방법으로서 매출원가조정법에 관한 설명으로 옳지 않은 것은?","a":["유리한 원가차이는 매출원가에서 차감하며 불리한 원가차이는 매출원가에 가산한다.","원가차이가 중요하지 않은 경우 매출원가조정법을 적용할 수 있다.","매출원가조정법을 사용하면 비례배분법을 사용하는 경우보다 당기순이익이 항상 크게 나타난다.","매출원가조정법이란 모든 제조간접원가 배부차이를 매출원가에 가감하는 방법이다."],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '매출원가조정법을 사용하면 비례배분법을 사용하는 경우보다 당기순이익이 항상 크게 나타난다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_원가_13","q":"㈜삼일의 직접재료원가에 대한 자료는 다음과 같다. ㈜삼일의 직접재료원가 능률차이는 얼마인가?\n직접재료 표준사용량 10,000 kg\n직접재료 실제사용량 8,000 kg\n직접재료원가 kg당 표준가격 300원\n직접재료원가 kg당 실제가격 400원","a":["600,000원(불리)","600,000원(유리)","800,000원(불리)","800,000원(유리)"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (600,000원(유리)). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_14","q":"다음 중 직접노무비 총차이에서 불리한 차이가 발생하고 직접노무비 능률차이에서는 유리한 차이가 발\n생한 경우로 옳은 것은?","a":["실제노무시간이 실제생산량에 허용된 표준노무시간보다 짧지만 실제임률은 표준임률보다 높다.","실제노무시간이 실제생산량에 허용된 표준노무시간보다 길지만 실제임률은 표준임률보다 낮다.","실제노무시간이 실제생산량에 허용된 표준노무시간보다 짧고 실제임률도 표준임률보다 낮다.","실제노무시간이 실제생산량에 허용된 표준노무시간보다 길고 실제임률도 표준임률보다 높다."],"c":0,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '실제노무시간이 실제생산량에 허용된 표준노무시간보다 짧지만 실제임률은 표준임률보다 높다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_원가_15","q":"㈜삼일의 표준원가계산제도는 제조간접원가의 배부에 있어서 직접작업시간을 배부기준으로 사용한다.\n다음은 이 회사의 원가차이분석에 필요한 자료이다. 자료를 바탕으로 변동제조간접원가 소비차이를 계\n산하면 얼마인가?\n총제조간접비 실제발생액 15,000원\n고정제조간접비 실제발생액 6,500원\n실제작업시간 3,200시간\n표준작업시간 3,500시간\n변동제조간접비 표준배부율 작업시간당 2.5원","a":["300원 유리","300원 불리","500원 유리","500원 불리"],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번 (500원 불리). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_16","q":"다음 중 변동원가계산과 전부원가계산에 관한 설명으로 옳은 것은?","a":["기초재고자산이 없고 당기 생산량과 판매량이 동일하다면 변동원가계산 순이익이 전부원가계산보다 크다.","변동원가계산은 의사결정에 유용하므로 전부원가계산에 비하여 외부보고용으로 적절한 원가계산방법 이다.","변동원가계산은 변동판매비와관리비를 제품원가로 인식하고, 전부원가계산은 고정제조간접원가를 제 품원가로 인식한다.","변동원가계산을 표준원가 및 변동예산과 같이 사용하면 원가통제와 성과평가에 유용하게 활용할 수 있다."],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '변동원가계산을 표준원가 및 변동예산과 같이 사용하면 원가통제와 성과평가에 유용하게 활용할 수 있다.'이 올바른 설명입니다. 원가행태에 따라 변동원가(조업도에 비례)와 고정원가(조업도와 무관)로 분류합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_원가_17","q":"20X1년에 영업을 시작한 ㈜삼일은 당기에 1,000단위의 제품을 생산하여 900단위의 제품을 판매하였다.\n당기의 판매가격 및 원가자료가 다음과 같을 때, 전부원가계산의 영업이익은 얼마인가?\n판매가격 100원\n제품단위당 직접재료원가 25원\n제품단위당 직접노무원가 20원\n제품단위당 변동제조간접원가 6원\n제품단위당 변동판매비와관리비 5원\n고정제조간접원가 30,000원","a":["9,000원","12,600원","14,000원","17,100원"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (12,600원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_18","q":"㈜삼일은 20X1년에 사업을 개시하였다. 20X1년 변동원가계산에 의한 순이익이 200,000원일 때, 제조간\n접비 배부액이 다음과 같을 경우 전부원가계산에 의한 순이익을 계산하면 얼마인가?\n변동제조간접원가 고정제조간접원가\n재 공 품 45,000원 30,000원\n제 품 30,000원 25,000원\n매출원가 230,000원 120,000원","a":["145,000원","180,000원","220,000원","255,000원"],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번 (255,000원). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_19","q":"㈜삼일의 20X1년 2월의 제품 생산 및 판매와 관련된 자료는 다음과 같다. 초변동원가계산을 이용한 ㈜\n삼일의 20X1년 2월 재료처리량 공헌이익을 계산하면 얼마인가?\n생산량 5,000개\n판매량 4,700개\n제품단위당 판매가격 370원\n제품단위당 직접재료원가 130원\n제품단위당 직접노무원가 60원\n제품단위당 변동제조간접원가 30원\n고정제조간접원가 80,000원\n단, 기초 제품재고는 없다.","a":["705,000원","846,000원","1,128,000원","1,200,000원"],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (1,128,000원). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_20","q":"㈜삼일은 12월 중 아래 영업자료를 참고하여 전부원가계산과 변동원가계산에 의한 순이익을 비교하고\n있다. 전부원가계산의 영업이익이 변동원가계산에 비해 80,000원 만큼 크다면 판매량은 몇 개인가?\n생산량 2,000개 판매량 ?\n고정제조원가 400,000원 고정판매관리비 80,000원\n(단, 월초재고는 없음)","a":["1,500개","1,600개","1,800개","2,000개"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (1,600개). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_21","q":"다음 중 활동기준원가계산(ABC)에 관한 설명으로 옳지 않은 것은?","a":["활동기준원가계산을 통해 산출된 정보는 원가계산뿐만 아니라 관리회계의 의사결정과 성과평가에도 활용할 수 있다.","활동분석과 원가동인의 파악에 소요되는 비용과 시간이 크다는 단점이 존재한다.","각 활동별로 적절한 배부기준을 사용하여 원가를 배부하기 때문에 종전에는 제품별로 추적 불가능 하던 제조간접원가도 개별제품에 추적가능한 직접원가로 인식되어 원가계산이 보다 정확해진다.","제품원가를 계산하기 위한 활동은 분석이 가능하나 고객이나 서비스 등의 원가대상에 대해서는 활 동분석이 불가능하여 활동기준원가계산을 적용할 수 없다."],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '제품원가를 계산하기 위한 활동은 분석이 가능하나 고객이나 서비스 등의 원가대상에 대해서는 활 동분석이 불가능'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_원가_22","q":"㈜삼일의 과거 원가자료를 바탕으로 총제조간접원가를 추정한 원가함수는 다음과 같다. 이에 관한 설\n명으로 옳지 않은 것은(단, 조업도는 기계시간이다.)?\ny = 100,000 + 40x","a":["100,000은 총고정원가 추정치를 의미한다.","x는 기계시간을 의미한다.","40은 기계시간당 고정제조간접원가를 의미한다.","조업도가 1,000기계시간일 경우 총제조간접비는 140,000 원으로 추정된다."],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '40은 기계시간당 고정제조간접원가를 의미한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_원가_23","q":"다음 중 CVP분석에 관한 설명으로 옳은 것은?","a":["공헌이익률은 원가구조와 밀접한 관련이 있으며 변동원가 비중이 높으면 공헌이익률이 높게 나타난 다.","영업레버리지도가 3이라는 의미는 매출액이 1 % 변화할 때 당기순이익이 3 % 변화한다는 의미이 다.","법인세를 고려하더라도 손익분기점 분석결과는 변하지 않는다.","복수제품인 경우 매출배합은 변동한다고 가정한다."],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '법인세를 고려하더라도 손익분기점 분석결과는 변하지 않는다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_원가_24","q":"㈜삼일은 단일제품을 생산판〮매하고 있으며, 당해 공헌이익 손익계산서는 다음과 같다.\n매출액(800개×1,000원) 800,000원\n(-) 변동비 640,000원\n공헌이익 160,000원\n(-) 고정비 120,000원\n(=) 영업이익 40,000원\n내년에도 당해년도의 단위당 판매가격과 원가구조가 동일하게 유지되나 판매수량 감소가 예상된다.\n내년도에 영업손실이 발생되지 않으려면 판매수량이 최대 몇 개까지 감소하여도 되는가?","a":["150개","180개","200개","250개"],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (200개). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_25","q":"㈜삼일은 제품 10,000개를 판매하여 2,000,000원의 세전영업이익을 달성하는 것을 목표로 하고 있다.\n이에 대한 고정원가는 4,000,000원이고 공헌이익률은 40 % 이다. ㈜삼일의 제품 단위당 판매가격과 제\n품 단위당 변동원가는 각각 얼마인가(단, 회사는 단일제품을 생산, 판매하며 판매가격은 연중 일정하\n다고 가정한다)?\n단위당 판매가격 단위당 변동원가","a":["1,500원 600원","1,500원 900원","1,000원 900원","1,000원 600원"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번 (1,500원 900원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_26","q":"다음 중 변동예산을 사용하는 목적에 관한 설명으로 옳은 것은?","a":["실제 조업도 수준에서 예산원가와 실제원가를 비교 평가하기 위하여","기준 조업도 수준에서 예산원가와 실제원가를 비교 평가하기 위하여","예산설정에 소요되는 총시간을 감소시키기 위하여","하부 경영자들에게 권한을 위양하기 위하여"],"c":0,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '실제 조업도 수준에서 예산원가와 실제원가를 비교 평가하기 위하여'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_원가_27","q":"다음 중 책임회계제도에 관한 설명으로 옳지 않은 것은?","a":["원가중심점은 특정 원가의 발생에만 통제책임을 지는 책임중심점으로 판매부서 및 영업소 등이 원 가중심점의 예가 될 수 있다.","수익중심점은 매출액에 대해서만 통제책임을 지는 책임중심점으로 기업의 최종산출물인 제품 또는 서비스의 판매수익을 창출하는데 일차적인 책임을 진다.","책임중심점은 책임의 성격 및 책임범위에 따라 원가중심점, 수익중심점, 이익중심점 및 투자중심점 으로 분류할 수 있다.","책임중심점이란 경영관리자가 특정활동에 대해 통제할 책임을 지는 조직의 부문을 말한다."],"c":0,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 1번. '원가중심점은 특정 원가의 발생에만 통제책임을 지는 책임중심점으로 판매부서 및 영업소 등이 원 가중심점의 예가'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_원가_28","q":"아래에 주어진 재무자료를 이용하여 경제적부가가치(EVA)를 산출하면 얼마인가(단, 법인세효과는 무시\n한다)?\n매출액 100억원\n매출원가 60억원\n판매비와관리비 30억원\n투하자본 50억원\n(타인자본 25억원, 자기자본 25억원)\n타인자본비용 10 %\n자기자본비용 12 %","a":["3.5억원","4억원","4.5억원","5억원"],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (4.5억원). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_29","q":"다음 중 경제적부가가치(EVA)에 관한 설명으로 옳지 않은 것은?","a":["EVA는 고유의 영업활동에서 창출된 순가치의 증가분을 의미한다.","EVA는 자기자본에 대한 자본비용을 고려하지 않고 성과평가를 한다.","EVA는 투자중심점이 고유의 영업활동에서 세금, 타인자본과 자기자본에 대한 자본비용을 초과하여 벌어들인 이익을 의미한다.","EVA는 발생주의 회계수치를 성과측정목적에 맞게 수정하여 계산한다."],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. 'EVA는 자기자본에 대한 자본비용을 고려하지 않고 성과평가를 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_원가_30","q":"㈜삼일은 복사기를 판매한다. ㈜삼일은 20X1년 복사기 시장규모가 80,000대일 것으로 예측했으나, 실\n제 시장규모는 70,000대로 집계되었다. 20X1년 예산판매량은 8,000대이고 단위당 예산공헌이익은 50\n원이었으나 20X1년 실제판매량은 5,600대이고 단위당 실제공헌이익은 40원이었다. 20X1년 ㈜삼일의\n시장점유율 차이를 구하면 얼마인가?","a":["70,000원 유리","80,000원 유리","70,000원 불리","80,000원 불리"],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번 (70,000원 불리). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_6_원가_31","q":"㈜삼일은 전자제품을 생산하여 판매하는 회사로서 각 사업부의 영업자산, 영업이익 및 매출액에 관한\n정보는 다음과 같다. 다음 중 투자수익률이 높은 사업부의 순서로 옳은 것은?\n구 분 휴대폰사업부 청소기사업부 냉장고사업부\n평균영업자산 1,000,000원 500,000원 2,000,000원\n영업이익 50,000원 30,000원 160,000원\n매출액 4,000,000원 3,000,000원 1,000,000원","a":["휴대폰 > 청소기 > 냉장고","청소기 > 휴대폰 > 냉장고","냉장고 > 청소기 > 휴대폰","청소기 > 냉장고 > 휴대폰"],"c":2,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 3번. '냉장고 > 청소기 > 휴대폰'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_6_원가_32","q":"다음 중 의사결정시에 필요한 원가용어와 그에 대한 정의를 연결한 것으로 옳지 않은 것은?","a":["매몰원가는 과거에 발생한 역사적 원가로서 현재 또는 미래에 회수할 수 없는 원가이다.","기회원가는 자원을 현재 용도 이외의 다른 용도에 사용할 경우 얻을 수 있는 최대금액이다.","지출원가는 미래에 현금 등의 지출을 수반하는 원가이다.","관련원가는 과거원가이거나 대안 간에 차이가 나지 않는 미래원가이다."],"c":3,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 4번. '관련원가는 과거원가이거나 대안 간에 차이가 나지 않는 미래원가이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_6_원가_33","q":"다음 제시된 원가 중 의사결정을 위한 관련원가에 해당되는 원가의 합으로 옳은 것은?\n기회원가 5,000원 매몰원가 20,000원\n회피가능원가 16,000원 회피불능원가 14,000원","a":["16,000원","21,000원","30,000원","36,000원"],"c":1,"s":"원가관리회계","y":"2024년 6월","exam":"jaegyeong","exp":"정답 2번. '21,000원'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id"
