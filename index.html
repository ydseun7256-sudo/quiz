단체 중 수익을 구성원에게 분배하지 아니하는 단체가 단체명을 표시하 여 금융거래를 함으로써 금융기관으로부터 받는 이자소득 및 배당소득"],"c":0,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '출자공동사업자의 배당소득'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_23","q":"다음 자료로 개인사업자 김삼일씨(복식부기의무자 아님)의 2024년 사업소득금액을 계산하면 얼마인가?\nㄱ. 손익계산서상 당기순이익 200,000,000원\nㄴ. 손익계산서에는 다음과 같은 수익과 비용이 포함되어 있다.\n(아래 기술한 내용 이외에는 모두 세법상 적정하게 계상되어 있음)\n- 본인에 대한 급여 50,000,000원\n- 배당금수익 2,000,000원\n- 유형자산처분이익 10,000,000원\n- 세금과공과 중 벌금 5,000,000원","a":["195,000,000원","205,000,000원","232,000,000원","243,000,000원"],"c":3,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번 (243,000,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_24","q":"다음 자료에 의하여 거주자 김삼일씨의 2024년 근로소득금액을 계산하면 얼마인가?\nㄱ. 급여：월 3,000,000원\nㄴ. 상여：연 8,000,000원\nㄷ. 실비변상적 성격의 자가운전보조금：월 200,000원\nㄹ. 중식대：월 200,000원(식사를 제공받지 않음)\nㅁ. 연간 연월차수당 총합계：1,000,000원\n* 김삼일씨는 당해 1년 동안 계속 근무하였다.\n연간급여액 근로소득공제액\n1,500만원 초과 4,500만원 이하 750만원 ＋ 1,500만원 초과액×15 %\n4,500만원 초과 1억원 이하 1,200만원 ＋ 4,500만원 초과액×5 %","a":["33,000,000원","35,280,000원","36,420,000원","38,760,000원"],"c":0,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (33,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_25","q":"다음은 거주자 김삼일 씨의 2024년 기타소득에 관한 자료이다. 김삼일 씨의 종합과세 할 기타소득금액\n은 얼마인가(단, 기타소득의 실제 필요경비는 확인되지 아니한다)?\nㆍ 통신판매중개를 하는 자를 통하여 장소를 대여하고 받은 대여료 5,000,000원\nㆍ 주택입주지체상금 6,000,000원\nㆍ 복권당첨소득 3,000,000원","a":["3,200,000원","4,200,000원","5,600,000원","8,600,000원"],"c":0,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (3,200,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_26","q":"근로소득이 있는 거주자 김지나 씨(여성)의 다음 자료를 바탕으로 2024년 종합소득공제 중 인적공제액\n을 계산한 것으로 옳은 것은?\n(1) 본인 및 부양가족 현황\n관 계 연 령 소 득 비 고\n본 인 42세 근로소득금액 40,000,000원\n부 친 75세 없 음 2024년 1월 10일 사망\n모 친 72세 사업소득금액 6,000,000원\n남 편 43세 총급여액 5,000,000원\n아 들 7세 없 음\n동 생 39세 없 음 장애인\n(2) 본인과 부양가족은 주민등록표의 동거가족으로서 해당 과세기간 동안 동일한\n주소에서 생계를 같이하고 있다.\n(3) 조세부담 최소화를 가정한다.","a":["9,500,000원","10,000,000원","10,500,000원","11,000,000원"],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (10,500,000원). 종합소득세 = 종합소득과세표준 × 세율 - 누진공제액. 소득공제를 차감한 후 세율을 적용합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_27","q":"다음 중 소득세법상 세액공제에 관한 설명으로 옳지 않은 것은?","a":["거주자의 종합소득금액에 Gross-up된 배당소득금액이 합산된 경우에는 당해 배당소득에 가산된 금 액을 산출세액에서 공제한다.","복식부기의무자는 복식부기로 기장한 경우에도 기장세액공제를 적용받을 수 없다.","간편장부대상자가 간편장부로 기장하고 종합소득과세표준 확정신고시 간편장부 소득금액계산서를 제 출하는 경우 기장세액공제가 적용된다.","거주자의 종합소득에 국외원천소득이 포함되어 있는 경우 국외에서 납부한 세액이 있는 때에는 외국 납부세액공제를 적용할 수 있다."],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '간편장부대상자가 간편장부로 기장하고 종합소득과세표준 확정신고시 간편장부 소득금액계산서를 제 출하는 경우 기장'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_28","q":"다음 중 소득세법상 퇴직소득에 관한 설명으로 옳지 않은 것은?","a":["종업원이 임원이 된 경우에 퇴직급여를 실제로 지급받지 않은 경우에는 퇴직으로 보지 않을 수 있 다.","사용자 부담금을 기초로 하여 현실적인 퇴직을 원인으로 지급받는 소득은 퇴직소득에 해당한다.","퇴직일 현재 연금계좌에 있거나 퇴직소득을 연금계좌로 지급하는 경우 퇴직일에 해당 퇴직소득에 대 한 소득세를 원천징수하여야 한다.","「건설근로자의 고용개선 등에 관한 법률」에 따라 지급받는 퇴직공제금은 퇴직소득으로 본다."],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '퇴직일 현재 연금계좌에 있거나 퇴직소득을 연금계좌로 지급하는 경우 퇴직일에 해당 퇴직소득에 대 한 소득세를 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_29","q":"다음 중 소득세법상 양도소득에 관한 설명으로 옳지 않은 것은?","a":["비상장주식의 양도소득은 원칙적으로 양도소득세 과세대상이다.","대주주의 상장법인 주식의 양도소득은 양도소득세 과세대상이다.","1세대 1주택은 고가주택 해당 여부에 관계없이 과세하지 않는다.","건물을 무상이전하는 경우에는 양도소득세를 과세하지 아니한다."],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '1세대 1주택은 고가주택 해당 여부에 관계없이 과세하지 않는다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_30","q":"다음 중 소득세법상 신고납부와 관련된 설명으로 옳지 않은 것은?","a":["성실신고확인대상사업자가 성실신고확인서를 제출하는 경우에는 종합소득과세표준 확정신고를 그 과 세기간의 다음 연도 5월 1일부터 6월 30일까지 하여야 한다.","중간예납세액이 50만원 미만일 경우 중간예납세액을 징수하지 아니한다.","모든 거주자는 소득의 종류와 관계없이 6개월간의 소득세를 미리 납부하는 중간예납제도 적용대상 이다.","근로소득만이 있는 자는 연말정산으로 모든 납세절차가 종결되기 때문에 확정신고는 원칙적으로 하 지 않아도 된다."],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '모든 거주자는 소득의 종류와 관계없이 6개월간의 소득세를 미리 납부하는 중간예납제도 적용대상 이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_31","q":"다음 중 부가가치세법에 관한 설명으로 옳은 것은?","a":["부가가치세는 특정한 재화 또는 용역만 과세하는 개별소비세에 해당한다.","국제적 이중과세의 문제를 해결하기 위하여 원산지국 과세원칙을 채택하고 있다.","매출액에서 매입액을 차감하여 부가가치를 계산한 후 부가가치에 세율을 곱하는 방식으로 세액을 계 산하는 전단계거래액공제법을 채택하고 있다.","모든 거래단계에서 창출된 부가가치에 대하여 각 단계별로 과세하는 다단계과세방법을 채택하고 있 다."],"c":3,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '모든 거래단계에서 창출된 부가가치에 대하여 각 단계별로 과세하는 다단계과세방법을 채택하고 있 다.'이 올바른 설명입니다. 세법에서 정한 과세요건을 충족하는 경우에 해당합니다. 과세/비과세/면세 기준을 정확히 파악해야 합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_세무_32","q":"다음 부가가치세와 관련된 재경담당자들의 대화 내용 중 옳은 설명을 하고 있는 사람은 누구인가?\n김부장 : 부가가치세 납세의무자인 개인사업자는 1년에 네 번 부가가치세를 신고하는 것이\n원칙이다.\n박과장 : 면세사업자의 경우 부가가치세법상 납세의무는 없으며, 법정증빙을 구비한 매입에\n대하여는 매입세액을 공제 받을 수 있다.\n이차장 : 주된 사업장에서 총괄납부하더라도 세금계산서는 각 사업장에서 발급하여야 하며,\n신고도 각 사업장별로 이행하여야 한다.\n최사원 : 사업자란 사업목적이 영리로서 사업상 독립적으로 재화 또는 용역을 공급하는 자를\n말한다.","a":["김부장","박과장","이차장","최사원"],"c":2,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '이차장'. 세금계산서는 부가가치세 매입세액공제의 핵심 증빙서류입니다. 필요적 기재사항 누락 시 불이익이 있습니다. ","src":"cbt"},{"id":"jg_12_세무_33","q":"다음 중 부가가치세 과세기간에 관한 설명으로 옳지 않은 것은?","a":["사업개시일 이전에 사업자등록을 신청한 경우의 과세기간은 그 신청한 날부터 그 신청일이 속하는 과세기간의 종료일까지로 한다.","간이과세자가 간이과세를 포기한 경우 신고일이 속하는 과세기간 개시일부터 그 신고일이 속하는 달 의 다음달 말일까지의 기간을 간이과세자의 과세기간으로 한다.","간이과세자의 과세기간은 1월 1일부터 12월 31일까지이다.","신규사업자의 최초과세기간은 사업개시일부터 그 날이 속하는 과세기간의 종료일까지로 하는 것이 원칙이다."],"c":1,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '간이과세자가 간이과세를 포기한 경우 신고일이 속하는 과세기간 개시일부터 그 신고일이 속하는 달 의 다음달 말'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_34","q":"다음 중 부가가치세법상 사업장에 관한 설명으로 옳지 않은 것은?","a":["건설업을 영위하는 법인의 경우 법인의 등기부상 소재지(등기부상의 지점 소재지를 포함하지 않음) 를 사업장으로 본다.","제조업의 경우 최종 제품을 완성하는 장소를 사업장으로 본다.","부동산임대업은 부동산의 등기부상 소재지를 사업장으로 한다.","사업장을 설치하지 않은 경우 해당 사업자의 주소 또는 거소를 사업장으로 본다."],"c":0,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '건설업을 영위하는 법인의 경우 법인의 등기부상 소재지(등기부상의 지점 소재지를 포함하지 않음) 를 사업장으로'는 잘못된 설명입니다. 실제로는 포함되는 항목입니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_35","q":"다음 중 부가가치세 과세대상에 관한 설명으로 옳지 않은 것은?","a":["재화의 수입에 대해서는 수입자가 사업자는 물론 비사업자인 경우에도 부가가치세가 과세된다.","재화란 재산적 가치가 있는 유체물과 무체물이므로 상품권은 물론 주식도 과세대상에 해당된다.","건설업의 경우 건설업자가 건설자재의 전부 또는 일부를 부담하는 경우에는 용역의 공급으로 본다.","과학상의 지식, 경험 또는 숙련에 관한 정보를 제공하는 것은 용역의 공급으로 본다."],"c":1,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '재화란 재산적 가치가 있는 유체물과 무체물이므로 상품권은 물론 주식도 과세대상에 해당된다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_세무_36","q":"㈜삼일은 2024년 10월 15일 상품을 할부판매하고 판매대금 3,000,000원은 아래와 같이 회수하기로 약\n정하였다. 할부대금의 실제 회수액이 다음과 같을 때 2024년 제2기 확정신고기간에 동 할부판매와 관\n련하여 신고할 과세표준은 얼마인가(단, 회수약정액과 회수액은 부가가치세를 포함하지 않은 금액임)?\nŸ 2024년 10월 15일 : 회수약정액 1,000,000원 / 실제회수액 0원\nŸ 2024년 12월 15일 : 회수약정액 1,000,000원 / 실제회수액 1,000,000원\nŸ 2025년 2월 15일 : 회수약정액 1,000,000원 / 실제회수액 1,800,000원","a":["1,000,000원","1,800,000원","2,000,000원","3,000,000원"],"c":3,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번 (3,000,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_37","q":"다음은 김삼일씨의 2024년 1월 가계부 지출내역이다. 지출금액에 포함된 부가가치세 합계를 계산하면\n얼마인가(단, 공급자는 부가가치세법에 따라 적법하게 부가가치세를 거래징수 하였다고 가정한다)?\n일 자 적 요 지 출 금 액\n1월 14일 바나나 구입 11,000원\n1월 21일 생수 구입 22,000원\n1월 27일 도서(책) 구입 44,000원\n1월 30일 프로축구 입장권 구입 55,000원","a":["3,000원","7,000원","8,000원","10,000원"],"c":1,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (7,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_38","q":"부가가치세 과세사업을 영위하던 일반과세자 김삼일씨는 2024년 11월 10일 당해 사업을 폐지하였다.\n다음 폐업시 잔존재화 자료를 보고 부가가치세 과세표준을 계산하면 얼마인가?\n자산의 종류 취득일 취득원가 시가\n상 품 2024년 9월 15일 20,000,000원* 28,000,000원\n토 지 2021년 7월 16일 100,000,000원 200,000,000원\n건 물 2023년 10월 15일 80,000,000원* 120,000,000원\n* 매입세액공제액를 적용받은 취득가액","a":["100,000,000원","120,000,000원","125,000,000원","325,000,000원"],"c":0,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (100,000,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_39","q":"일반과세자인 ㈜일품(음식점업)의 2024년 제2기 예정신고기간(7월 1일 ~ 9월 30일)의 세금계산서 수\n취분 매입세액은 다음과 같다. 이 자료를 이용하여 2024년 제2기 예정신고기간의 매입세액 공제액을\n계산하면 얼마인가?\n일자 내 용 매입세액\n7월 9일 가스렌지 구입비 6,000,000원\n8월 5일 개별소비세 과세대상 자동차(5인승, 배기량 2,000cc) 유류비 300,000원\n9월 20일 거래처접대(기업업무추진비) 100,000원\n9월 30일 조미료, 설탕 구입비 200,000원","a":["6,200,000원","6,700,000원","6,800,000원","7,700,000원"],"c":0,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (6,200,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_세무_40","q":"다음 중 부가가치세법상 일반과세자와 간이과세자를 비교한 내용으로 옳지 않은 것은?\n일반과세자 간이과세자\n간이과세자를 포기하고 일반과세자가","a":["포기제도 포기제도 없음 될 수 있음","의제매입세액공제 적용 없음","대손세액공제 규정있음 규정없음","세금계산서 발급 세금계산서 발급 원칙 세금계산서 발급 불가"],"c":3,"s":"세무회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '세금계산서 발급 세금계산서 발급 원칙 세금계산서 발급 불가'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_1","q":"다음 중 원가의 일반적인 특성에 관한 설명으로 옳지 않은 것은?","a":["기업의 수익획득 활동에 필요한 물품은 아직 소비하지 않았더라도 구입하는 시점에서 원가가 된다.","제조원가는 정상적인 경제활동 과정에서 소비된 가치만을 포함하고, 비정상적인 상황에서 발생한 가 치의 감소분은 포함되지 않는다.","경제적 가치를 가지고 있는 요소만 원가가 될 수 있다.","발생한 제조원가 중 기업의 수익획득에 아직 사용되지 않은 부분은 자산으로, 수익획득에 사용된 부 분은 비용으로 재무제표에 계상된다."],"c":0,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '기업의 수익획득 활동에 필요한 물품은 아직 소비하지 않았더라도 구입하는 시점에서 원가가 된다.'는 잘못된 설명입니다. 실제로는 필요한 사항입니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_2","q":"㈜삼일의 20X1년 12월 매출원가는 1,000,000원이다. 제조간접원가는 직접노무원가의 25 % 였으며, 기\n타관련 자료는 다음과 같을 때 20X1년 12월의 기초원가는 얼마인가?\n20X1년 12월 1일 20X1년 12월 31일\n재공품 50,000원 20,000원\n제품 100,000원 70,000원\n20X1년 12월 중 직접재료비 : 240,000원","a":["600,000원","730,000원","800,000원","1,000,000원"],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (800,000원). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_3","q":"다음 중 원가배분에 관한 설명으로 옳은 것을 모두 고르면?\nㄱ. 원가배분은 공통원가를 일정한 기준에 따라 원가대상에 합리적으로 대응시키는 과정을 말한다\nㄴ. 원가배분은 재고자산 및 매출원가의 금액을 산출하는 목적과는 무관하다.\nㄷ. 원가대상의 부담능력에 따라 원가를 배분하는 것은 사용할 수 없는 원가배분기준이다.\nㄹ. 원가집합(cost pool)이란 원가대상에 직접적으로 추적할 수 없는 원가를 모아둔 것을 의미한다.","a":["ㄱ, ㄴ","ㄴ, ㄷ","ㄷ, ㄹ","ㄱ, ㄹ"],"c":3,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. 'ㄱ, ㄹ'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_원가_4","q":"㈜삼일은 단계배분법을 이용하여 보조부문원가를 배분하고 있다. 다음의 자료를 이용하여 물음에 답하\n시오(단, 보조부문 A의 원가부터 배분한다).\n사용부문 보조부문 제조부문\n합계\n제공부문 A B 갑 을\n부문원가 60,000원 70,000원 240,000원 350,000원 720,000원\nA － 30 % 30 % 40 % 100 %\nB 20 % － 35 % 45 % 100 %\n위의 자료에서 보조부문 B가 제조부문 을에 배분해야 하는 금액을 계산하면 얼마인가?","a":["32,500원","38,000원","49,500원","73,000원"],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (49,500원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_5","q":"㈜삼일의 박원가 회계팀장은 회사의 업무흐름을 더욱 투명하게 관리하고자 영업활동 Flowchart를 작성\n하고 있다. ㈜삼일이 개별원가계산을 채택하고 있을 때 ( ㄱ )과 ( ㄴ )에 각각 들어갈 내용으로 옳은\n것은?\n직접재료의 원가흐름\n생 재료출고요청 원재료계정\n산\n부\n회\n서 ( ㄱ ) 계정처리\n계\n부\n서\n창 재료출고 ( ㄴ )\n고\n부\n서\n청구서확인 송부 기장(입력)\nㄱ ㄴ ㄱ ㄴ","a":["재료원가표 작업시간표","작업시간표 재료원가표","재료출고청구서 재료원가표","재료출고청구서 작업시간표"],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '재료출고청구서 재료원가표'. 개별원가계산은 주문생산 방식에 적용하며, 작업별로 원가를 집계합니다. ","src":"cbt"},{"id":"jg_12_원가_6","q":"다음은 ㈜삼일의 20X1년 12월 원가자료이다. 회사는 직접노무비를 기준으로 하여 제조간접원가를 예정\n배부하고 있다. 다음 자료에 따라 12월에 완성된 제품 #101의 제조원가를 계산하면 얼마인가(단, 기초\n재고자산은 존재하지 않는 것으로 가정한다)?\nㄱ. 당월 제조간접비 발생총액 500,000원\nㄴ. 당월 노무비 발생총액 700,000원\nㄷ. 제조간접비 예정배부율 직접노무비 1원당 \\ 0.5\nㄹ. 제품 #101의 직접원가 직접재료비 64,000원\n직접노무비 40,000원","a":["124,000원","153,000원","272,000원","353,000원"],"c":0,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (124,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_7","q":"다음은 ㈜삼일의 제조부문과 관련하여 당기 발생한 원가에 대한 자료들이다. 회사가 부문별 제조간접원\n가 배부율을 사용할 경우 #1B의 가공원가는 얼마인가?\nㄱ. ㈜삼일은 두 개의 제조부문(A, B)이 있다. 다음은 당기의 자료이다.\nA부문 B부문 합 계\n제조간접원가 4,000,000원 8,000,000원 12,000,000원\n직접기계시간 2,000시간 8,000시간 10,000시간\nㄴ. 당기 중 착수하여 완성된 #1B 작업의 원가자료는 다음과 같다.\nA부문 B부문 합 계\n직접재료원가 500,000원 200,000원 700,000원\n직접노무원가 200,000원 100,000원 300,000원\n직접기계시간 120시간 240시간 360시간\nㄷ. 회사는 직접기계시간을 기준으로 제조간접원가를 배부하고 있다.","a":["475,000원","780,000원","1,080,000원","1,347,000원"],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (780,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_8","q":"다음 중 종합원가계산에 관한 설명으로 옳지 않은 것은?","a":["원가통제 및 성과평가는 개별 작업이 아닌 공정이나 부문별로 수행되는 것이 일반적이다.","원가의 집계는 개별작업별로 작업지시서를 통해 이루어진다.","모든 생산공정이 원가계산기간 말에 종료되는 것은 아니므로, 기말 시점에는 공정에 따라 가공이 완 료되지 않은 재공품이 존재할 수 있다.","특정기간 동안 특정공정에서 가공된 제품은 원가측면에서 서로가 동일하다고 가정한다."],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '원가의 집계는 개별작업별로 작업지시서를 통해 이루어진다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_9","q":"다음 중 종합원가계산제도의 선입선출법과 평균법에 관한 설명으로 옳지 않은 것은?","a":["평균법 적용하의 완성품환산량은 선입선출법 적용하의 완성품환산량보다 크거나 같다.","평균법에서는 당기 이전의 기초재공품 작업분도 당기에 작업이 이루어진 것으로 간주한다.","선입선출법에서는 완성품환산량 산출시 당기 이전의 기초재공품 작업분과 당기 작업분을 별도로 구 분한다.","원재료 단가 산정시 선입선출법을 사용하는 기업이라면 종합원가계산제도 적용시 평균법을 사용할 수 없다."],"c":3,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '원재료 단가 산정시 선입선출법을 사용하는 기업이라면 종합원가계산제도 적용시 평균법을 사용할 수 없다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_10","q":"다음은 ㈜삼일의 원가자료이다. 재료는 공정 초기에 전량 투입되며, 가공원가는 공정전반에 걸쳐 균등\n하게 발생한다. ㈜삼일이 선입선출법을 사용할 경우 기말재공품의 완성도(%)는 얼마인가(단, 가공원가\n의 당기 완성품환산량은 2,070개라고 가정한다)?\n< 수량 >\n기초재공품수량 100개(80 %) 완성수량 2,000개\n착수수량 2,200개 기말재공품수량 300개(? %)","a":["50 %","60 %","70 %","80 %"],"c":0,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (50 %). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_11","q":"㈜삼일은 정상원가계산을 적용하고 있으며, 제조간접원가를 기계작업시간 기준으로 예정배부하고 있다.\n20X1년 실제 기계작업시간은 몇 시간인가?\n제조간접원가(예산) 816,000원\n제조간접원가(실제) 801,600원\n제조간접원가 배부액 785,400원\n기계작업시간(예산) 4,000시간","a":["3,640시간","3,730시간","3,850시간","4,015시간"],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (3,850시간). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_12","q":"다음 중 표준원가계산제도에 관한 설명으로 옳은 것을 모두 고르면?\nㄱ. 변동원가계산제도에서는 적용할 수 없다.\nㄴ. 직접재료원가 가격차이를 원재료 구입시점에서 분리하든 사용시점에서 분리하든 직접재료원가\n능률차이에는 영향을 주지 않는다.\nㄷ. 원가통제를 포함한 표준원가시스템을 잘 활용하여도 원가절감을 유도할 수는 없다.\nㄹ. 기말에 원가차이를 매출원가에서 조정할 경우 불리한 차이는 매출원가에 가산하고 유리한 차\n이는 매출원가에서 차감한다.","a":["ㄱ, ㄷ","ㄴ, ㄷ","ㄴ, ㄹ","ㄷ, ㄹ"],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. 'ㄴ, ㄹ'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_원가_13","q":"다음 중 표준원가 차이분석에 관한 설명으로 옳은 것은?","a":["원재료의 효율적 이용으로 투입량이 절감된 경우 직접재료원가에 있어 불리한 능률차이가 발생할 것 이다.","공장노무자의 비능률적 업무수행으로 인해 직접노무원가에 있어 불리한 능률차이가 발생할 수 있다.","품질이 떨어지는 원재료를 매우 저렴한 가격으로 구매한 경우 직접재료원가에 있어 불리한 가격차이 가 발생할 것이나, 이로 인하여 유리한 능률차이가 발생할 수 있다.","직접노동시간을 조업도로 사용하여 변동제조간접원가를 배부할 경우, 노동의 능률적 혹은 비능률적 사용은 변동제조간접원가 능률차이에 전혀 영향을 미치지 않는다."],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '공장노무자의 비능률적 업무수행으로 인해 직접노무원가에 있어 불리한 능률차이가 발생할 수 있다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_원가_14","q":"㈜삼일의 20X1년 4월 직접노무원가 관련 자료는 다음과 같다. 직접노무원가 가격차이를 계산하면 얼마\n인가?\n직접노무원가 능률차이 20,000원(유리) 실제발생액 150,000원\n실제직접노동시간 50,000시간 표준직접노동시간 55,000시간","a":["20,000원 불리","20,000원 유리","50,000원 불리","50,000원 유리"],"c":3,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번 (50,000원 유리). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_15","q":"㈜삼일은 직접노동시간을 조업도로 사용하고 있다. 변동제조간접원가와 관련한 자료가 다음과 같을 때\n실제생산량에 허용된 표준변동제조간접원가는 얼마인가?\n실제작업시간기준 표준변동제조간접원가 1,200,000원\n변동제조간접원가 소비차이 300,000원(불리)\n변동제조간접원가 능률차이 400,000원(유리)","a":["1,300,000원","1,600,000원","1,700,000원","1,900,000원"],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (1,600,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_16","q":"다음 중 변동원가계산과 전부원가계산의 차이에 관한 설명으로 옳은 것은?","a":["기초재고자산이 없고 당기 생산량과 판매량이 동일하다면 변동원가계산과 전부원가계산의 순이익은 같게 된다.","고정판매비와관리비는 변동원가계산과 전부원가계산간의 처리방법이 상이하다.","변동원가계산은 외부보고 목적으로 적합하며, 전부원가계산은 내부계획과 통제 목적에 적합하다.","변동원가계산은 원가부착개념에 근거를 두고 있고, 전부원가계산은 원가회피개념에 근거를 두고 있 다."],"c":0,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. 전부원가계산은 고정제조간접원가를 제품원가에 포함합니다. 변동원가계산은 변동제조원가만 제품원가로, 고정제조간접원가는 기간비용으로 처리합니다. 재고 증가 시 전부원가이익 > 변동원가이익.","src":"cbt"},{"id":"jg_12_원가_17","q":"다음 중 변동원가계산에서 재고자산가액에 포함되는 원가항목을 옳게 나열한 것은?","a":["직접재료원가, 직접노무원가, 변동판매비와관리비","직접재료원가, 직접노무원가, 변동제조간접원가","직접재료원가, 직접노무원가, 고정제조간접원가","직접재료원가, 변동판매비와관리비, 고정제조간접원가"],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '직접재료원가, 직접노무원가, 변동제조간접원가'. 재고자산은 판매목적으로 보유하는 자산으로, 취득원가와 순실현가능가치 중 낮은 금액으로 평가합니다(저가법). ","src":"cbt"},{"id":"jg_12_원가_18","q":"변동원가계산에 의한 공헌이익 손익계산서 작성을 위한 자료가 아래와 같을 경우 변동원가계산에 의한\n영업이익은 얼마인가?\n판매수량 4,000개\n단위당 판매가격 3,000원/개\n단위당 변동제조원가 2,000원/개\n단위당 변동판매비와관리비 500원/개\n고정제조간접원가 1,000,000원\n고정판매비와관리비 500,000원","a":["200,000원","500,000원","1,500,000원","2,500,000원"],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번 (500,000원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_19","q":"㈜삼일은 20X1년에 사업을 개시하였다. 20X1년 변동원가에 의한 순이익이 700,000원일 때, 제조간접비\n배부액이 다음과 같을 경우 전부원가계산에 의한 순이익은 얼마인가?\n변동제조간접원가 고정제조간접원가\n재 공 품 15,000원 20,000원\n제 품 30,000원 15,000원\n매출원가 630,000원 510,000원","a":["625,000원","700,000원","735,000원","1,240,000원"],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (735,000원). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_20","q":"㈜삼일의 20X1년 2월의 제품 생산 및 판매와 관련된 자료는 다음과 같다. 초변동원가계산을 이용한\n㈜삼일의 20X1년 2월 재료처리량 공헌이익을 계산하면 얼마인가?\n생산량 4,500개\n판매량 4,300개\n제품단위당 판매가격 630원\n제품단위당 직접재료원가 320원\n제품단위당 직접노무원가 80원\n제품단위당 변동제조간접원가 90원\n고정제조간접원가 275,000원\n(단, 기초 제품재고는 없다)","a":["989,000원","1,035,000원","1,333,000원","1,395,000원"],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (1,333,000원). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_21","q":"㈜삼일은 세 종류의 책상을 생산하여 판매하고 있으며, 활동기준원가계산을 적용하고 있다. 당월에 원\n가계산을 통해 B제품에 제조간접원가를 136,500원 배부하였다면, B제품의 당월 생산량은 몇 개인가?\n제품별 활동 수\n활동 구분 제조간접원가 원가동인\nA제품 B제품 C제품\n재단 142,500원 재단횟수 250회 300회 400회\n연마 100,000원 직접노무시간 30시간 40시간 30시간\n코팅 75,000원 기계작업시간 15시간 5시간 10시간\n조립 102,000원 생산량 100개 ? 110개","a":["100개","110개","120개","130개"],"c":3,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번 (130개). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_22","q":"㈜삼일의 과거 원가자료를 바탕으로 총제조간접원가를 추정한 원가함수는 다음과 같다. 이에 관한 설\n명으로 옳지 않은 것은(단, 조업도는 기계시간이다)?\n = 150,000 + 45","a":["150,000은 총고정제조간접원가 추정치를 의미한다.","는 기계시간을 의미한다.","45는 기계시간당 고정제조간접원가를 의미한다.","조업도가 1,000기계시간일 경우 총제조간접비는 195,000 원으로 추정된다."],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '45는 기계시간당 고정제조간접원가를 의미한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_23","q":"다음 중 단위당 판매가격과 단위당 변동원가가 불변이고 총고정원가가 감소할 경우에 관한 설명으로\n옳은 것은?","a":["손익분기점 판매량이 증가한다.","손익분기점 매출액이 감소한다.","공헌이익이 감소한다.","공헌이익률이 증가한다."],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '손익분기점 매출액이 감소한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_원가_24","q":"다음은 매출액과 영업이익이 동일한 ㈜삼일과 ㈜용산의 영업활동에 관한 자료이다.\n㈜삼일 ㈜용산\n매 출 액 1,000,000원 1,000,000원\n변동원가 600,000원 300,000원\n공헌이익 400,000원 700,000원\n고정원가 200,000원 500,000원\n영업이익 200,000원 200,000원\n다음 중 ㈜삼일과 ㈜용산의 영업레버리지에 관한 설명으로 옳지 않은 것은?","a":["영업레버리지도는 손익분기점에 접근할수록 점점 1의 값에 가까워진다.","㈜삼일의 경우 영업레버리지도는 2이다.","㈜삼일의 경우 매출액이 1,000,000원 증가하면 영업이익은 600,000원으로 산출된다.","경기침체로 인해 매출액이 감소할 때 ㈜용산의 영업이익 감소율이 ㈜삼일의 영업이익 감소율보다 크다."],"c":0,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '영업레버리지도는 손익분기점에 접근할수록 점점 1의 값에 가까워진다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_25","q":"㈜삼일은 세가지 제품 A, B, C를 2:2:1의 비중으로 생산하여 판매하고 있으며, 이 비중은 변동되지\n않고 있다. ㈜삼일의 재무팀이 실시한 CVP분석에 따르면, 제품 A의 판매량이 9,000단위일 때 회사는\n손익분기점을 달성하게 된다. 제품 B의 판매가격은 얼마인가?\n구분 제품 A 제품 B 제품 C\n단위당 판매가격 2,500원 ? 2,900원\n단위당 변동원가 1,500원 1,600원 1,300원\n고정제조간접원가 11,000,000원\n고정판매비와관리비 11,500,000원","a":["2,300원","2,450원","2,600원","2,750원"],"c":0,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번 (2,300원). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_26","q":"다음 중 고정예산과 변동예산의 차이에 관한 설명으로 옳은 것은?","a":["고정예산의 범위는 특정부서로 한정되는 반면, 변동예산은 회사전체를 범위로 한다.","고정예산은 고정원가만을 고려하고, 변동예산은 변동원가만을 고려한다.","고정예산은 조업도의 변동을 고려하지 않고 특정조업도를 기준으로 작성되는 예산이고, 변동예산은 조업도의 변동에 따라 조정되어 작성되는 예산이다.","고정예산에서는 권한이 하부 경영자들에게 위양되나, 변동예산에서는 그렇지 않다."],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '고정예산은 조업도의 변동을 고려하지 않고 특정조업도를 기준으로 작성되는 예산이고, 변동예산은 조업도의 변동에'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_원가_27","q":"다음 중 사업부별 성과평가시 사업부경영자의 성과를 평가할 때 포함하여야 하는 원가는 무엇인가?","a":["공통 고정원가","추적불가능하고 통제불가능한 고정원가","추적불가능하고 통제가능한 고정원가","추적가능하고 통제가능한 고정원가"],"c":3,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '추적가능하고 통제가능한 고정원가'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_12_원가_28","q":"분권화란 의사결정권한이 조직 전반에 걸쳐서 위양되어 있는 상태를 의미한다. 다음 중 분권화에 관한\n설명으로 옳지 않은 것은?","a":["각 사업부에서 동일한 활동이 개별적으로 중복되어 수행될 가능성이 있다.","하위경영자들이 고객 등의 요구에 신속한 대응을 하기 어렵다.","분권화될 경우 각 사업부의 이익만 고려하는 준최적화 현상이 발생할 수 있다.","하위 경영자들에게 보다 큰 재량권이 주어지므로 보다 많은 동기 부여가 된다."],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '하위경영자들이 고객 등의 요구에 신속한 대응을 하기 어렵다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_29","q":"다음은 ㈜삼일의 12월 예산 및 실제 성과와 관련한 자료이다. 자료를 바탕으로 매출조업도차이를 계산\n하면 얼마인가?\n실 제 예 산\n단위당 판매가격 100원 105원\n단위당 변동원가 54원 58원\n고정제조간접원가 755,000원 748,000원\n고정판매관리비 670,000원 650,000원\n판매량 47,000단위 50,000단위","a":["126,000원 불리","126,000원 유리","141,000원 불리","141,000원 유리"],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번 (141,000원 불리). 예산차이 = 실제원가 - 예산원가. 조업도차이와 능률차이로 세분화할 수 있습니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_30","q":"㈜삼일의 분권화된 사업부 A의 당기 영업이익은 1,800,000원이며, 평균 영업자산은 5,000,000원, 평\n균 이자부부채는 1,500,000원이다. 다음 중 사업부 A의 투자수익률(ROI)로 옳은 것은?","a":["18 %","36 %","43 %","51 %"],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '36 %'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_원가_31","q":"다음 중 경제적부가가치(EVA)와 관련된 설명으로 옳지 않은 것은?","a":["고유의 영업활동에서 창출된 순가치의 증가분을 의미한다.","가중평균자본비용의 측정에 있어 이자비용의 법인세 절감효과는 별도로 고려하지 않는다.","세후순영업이익이 증가하면, 경제적 부가가치는 증가한다.","투하자본의 회전율을 높이면 매출액이익률이 동일하더라도 경제적부가가치는 높아진다."],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '가중평균자본비용의 측정에 있어 이자비용의 법인세 절감효과는 별도로 고려하지 않는다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_32","q":"다음 중 의사결정시에 필요한 원가용어와 그에 대한 정의를 연결한 것으로 옳지 않은 것은?","a":["회피가능원가는 특정대안을 선택하는 것과 관계없이 계속해서 동일하게 발생하는 원가이다.","기회원가는 자원을 현재 용도 이외의 다른 용도에 사용할 경우 얻을 수 있는 최대금액이다.","지출원가는 미래에 현금 등의 지출을 수반하는 원가이다.","매몰원가는 과거에 발생한 역사적 원가로서 현재 또는 미래에 회수할 수 없는 원가이다."],"c":0,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '회피가능원가는 특정대안을 선택하는 것과 관계없이 계속해서 동일하게 발생하는 원가이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_33","q":"㈜삼일은 진부화된 컴퓨터 50대를 보유하고 있다. 이 제품에 대한 총제조원가는 35,000,000원이었으\n나 현재로는 컴퓨터 1대당 250,000원에 처분하거나, 11,000,000원을 투입하여 개조한 후 컴퓨터 1대\n당 500,000원에 판매할 수 있는 상황이다. 다음 설명 중 옳은 것은?","a":["그대로 컴퓨터 1대당 250,000원에 처분하면 27,500,000원의 손실이 발생하므로 처분해서는 안된 다.","제품에 대한 총제조원가 35,000,000원은 의사결정에 고려하여야 하는 관련원가이다.","11,000,000원의 추가비용을 지출하지 않고 컴퓨터 1대당 250,000원에 판매하는 것이 유리하다.","개조하여 판매하는 것이 그대로 처분하는 것보다 1,500,000원 만큼 유리하다."],"c":3,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '개조하여 판매하는 것이 그대로 처분하는 것보다 1,500,000원 만큼 유리하다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_원가_34","q":"㈜삼일은 부품 A를 자가제조하고 있으며, 이와 관련된 연간 생산 및 원가자료는 다음과 같다. 최근 외\n부업체로부터 부품 A 100단위를 단위당 1,000원에 공급하겠다는 제안을 받았다. 외부업체의 제안을\n수락할 경우 자가제조보다 연간 얼마나 유리(또는 불리)한가(단, 고정제조간접원가는 전액 회피 가능\n하다)?\n직접재료원가 86,000원\n변동직접노무원가 34,000원\n변동제조간접원가 26,000원\n고정제조간접원가 60,000원\n생산량 100단위","a":["46,000원 불리","46,000원 유리","106,000원 불리","106,000원 유리"],"c":3,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번 (106,000원 유리). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_12_원가_35","q":"㈜삼일은 특별추가생산 요청을 받았다. 현재 여유생산시설이 충분한 상황이라면 이 회사의 경영자가\n특별추가생산 의사결정에서 고려하지 않아도 되는 원가로 옳은 것은?","a":["직접재료원가","직접노무원가","변동제조간접원가","고정제조간접원가"],"c":3,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 4번. '고정제조간접원가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_원가_36","q":"다음 중 자본예산모형에 관한 설명으로 옳은 것은?","a":["자본예산모형은 장기 투자에 대한 타당성을 평가하기 위한 것이므로 모든 모형에서 화폐의 시간가 치가 필수적으로 고려된다.","둘 이상의 상호 독립적인 투자안의 우선순위를 결정함에 있어 순현재가치법과 내부수익률법이 서로 다른 결과를 도출할 수 있다.","회수기간법은 계산이 간단하며, 투자기간 전체의 현금흐름을 고려한다는 특징을 가지고 있다.","내부수익률법을 적용할 때에는 산출된 내부수익률이 양수이면 투자안을 채택한다."],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '둘 이상의 상호 독립적인 투자안의 우선순위를 결정함에 있어 순현재가치법과 내부수익률법이 서로 다른 결과를 도'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_12_원가_37","q":"㈜삼일은 당기 말 순장부가액이 600,000원인 기존의 기계장치를 800,000원에 처분하고, 새로운 기계\n장치를 1,000,000원에 매입하였다. 법인세율이 20 % 라고 가정하면, 위 거래로 인한 순현금흐름은 얼\n마인가(단, 감가상각비는 고려하지 않는다)?","a":["240,000원 유출","800,000원 유출","200,000원 유입","680,000원 유입"],"c":0,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 1번. '240,000원 유출'. 유형자산은 취득원가로 인식 후 감가상각을 통해 내용연수에 걸쳐 비용화합니다. ","src":"cbt"},{"id":"jg_12_원가_38","q":"㈜삼일의 경영진은 새로운 투자안을 검토 중이며, 경영진이 분석한 이 투자안의 NPV는 0보다 큰 값이\n산출되었다. 그러나 재무담당자인 갑의 분석에 의하면 이 투자안은 경제성이 없는 것으로 판단된다.\n갑의 분석이 옳다고 했을 때, 이 기업의 경영진은 경제성분석 과정에서 어떤 오류를 범하였겠는가?","a":["투자종료시점의 투자안의 처분가치를 너무 낮게 추정하였다.","현금 영업수익을 너무 낮게 추정하였다.","현금영업비용을 너무 낮게 추정하였다.","자본비용을 너무 높게 추정하였다."],"c":2,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 3번. '현금영업비용을 너무 낮게 추정하였다.'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_12_원가_39","q":"제품의 판매가격 결정은 기업 전체에 영향을 미치므로 경영진의 중요한 의사결정 사항 중 하나로 여겨\n지고 있다. 다음 중 가격 결정에 영향을 미치는 요소들에 관한 설명으로 옳지 않은 것은?","a":["제품의 가격을 인하하면 수요가 증가하는 것이 일반적이지만, 수요의 변동이 없을 수도 있다.","제품에 대해 장기적인 정상가격을 결정할 때에는 고정원가를 포함한 모든 제조원가가 고려되어야 하나, 판매비와관리비는 고려되지 아니한다.","경쟁기업의 원가정보는 경쟁력 있는 가격을 설정하는데 가치있는 정보가 될 것이다.","경제학에서는 한계수익과 한계비용이 일치하는 점에서 제품의 최적판매가격이 결정된다."],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '제품에 대해 장기적인 정상가격을 결정할 때에는 고정원가를 포함한 모든 제조원가가 고려되어야 하나, 판매비와관'는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_12_원가_40","q":"다음 중 균형성과표의 관점과 그에 대한 적절한 성과평가지표를 연결한 것으로 옳은 것은?","a":["재무적 관점 – 총자산수익률, 배송시간","고객 관점 – 고객만족도, 고객유지율","내부프로세스 관점 – 종업원 직무만족도, 이직률","학습과 성장 관점 – 서비스 대응시간, 주문 - 배달기간"],"c":1,"s":"원가관리회계","y":"2024년 12월","exam":"jaegyeong","exp":"정답 2번. '고객 관점 – 고객만족도, 고객유지율'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"}];

const SM2={
  init:()=>({interval:1,ease:2.5,rep:0,next:Date.now()}),
  update(card,q){let{interval,ease,rep}=card;if(q<3){rep=0;interval=1;}else{ease+=(0.1-(5-q)*(0.08+(5-q)*0.02));if(ease<1.3)ease=1.3;rep++;interval=rep===1?1:rep===2?6:Math.round(interval*ease);}return{interval,ease,rep,next:Date.now()+interval*86400000};}
};

function save(){LS.set("questions",S.questions);LS.set("stats",S.stats);LS.set("wrongs",S.wrongs);LS.set("reviews",S.reviews);LS.set("exams",S.exams);LS.set("apiKey",S.apiKey);LS.set("aiProvider",S.aiProvider);LS.set("firstLaunch",S.firstLaunch);LS.set("fontScale",S.fontScale);LS.set("activeExam",S.activeExam);}

function getPool(){return S.questions.filter(q=>q.exam===S.activeExam);}

function pickQ(){
  const pool=getPool();if(!pool.length)return;
  const now=Date.now();const due=pool.filter(q=>{const r=S.reviews[q.id];return r&&r.next<=now;});
  const p=due.length>0?due[Math.floor(Math.random()*due.length)]:pool[Math.floor(Math.random()*pool.length)];
  const c=p.a[p.c];const sh=[...p.a].sort(()=>Math.random()-.5);
  S.curQ=p;S.shuf=sh;S.cIdx=sh.indexOf(c);S.sel=null;S.ok=null;
}

function answer(idx){
  if(S.sel!==null)return;S.sel=idx;const ok=idx===S.cIdx;S.ok=ok;
  const st=S.stats,sub=S.curQ.s,exam=S.curQ.exam;
  st.total++;
  if(!st.bySub)st.bySub={};if(!st.bySub[sub])st.bySub[sub]={t:0,c:0};st.bySub[sub].t++;
  if(!st.byExam)st.byExam={};if(!st.byExam[exam])st.byExam[exam]={t:0,c:0};st.byExam[exam].t++;
  if(ok){st.correct++;st.streak++;st.maxStreak=Math.max(st.maxStreak,st.streak);st.bySub[sub].c++;st.byExam[exam].c++;}
  else{st.streak=0;S.wrongs.push({q:S.curQ,ts:Date.now()});if(S.wrongs.length>300)S.wrongs.shift();}
  const qid=S.curQ.id;if(!S.reviews[qid])S.reviews[qid]=SM2.init();S.reviews[qid]=SM2.update(S.reviews[qid],ok?4:1);
  if(!st.qDiff)st.qDiff={};const qk=qid;if(!st.qDiff[qk])st.qDiff[qk]={a:0,c:0};st.qDiff[qk].a++;if(ok)st.qDiff[qk].c++;
  const today=new Date().toDateString();if(!st.history)st.history=[];
  const last=st.history.length?st.history[st.history.length-1]:null;
  if(last&&last.d===today){last.t++;if(ok)last.c++;}else st.history.push({d:today,t:1,c:ok?1:0});
  if(st.history.length>30)st.history.shift();
  save();render();
}

// AI helper
async function aiCall(prompt,maxTk){
  if(!S.apiKey)throw new Error("API 키를 설정해주세요");
  if(S.aiProvider==="gemini"){
    let model="gemini-2.5-flash";
    let r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+S.apiKey,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    let d=await r.json();
    // 모델 실패 시 다른 모델 시도
    if(d.error){
      model="gemini-2.0-flash";
      r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+S.apiKey,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      d=await r.json();
    }
    if(d.error)throw new Error("Gemini 오류: "+(d.error.message||JSON.stringify(d.error)));
    return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
  }else{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTk||2000,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();return d.content?d.content.map(c=>c.text||"").join(""):"";
  }
}

// ═══ TTS Engine (Android Native) ═══
const TTS={
  speaking:false,
  rate:0.9,
  _onEnd:null,
  _checkTimer:null,
  
  speak(text,onEnd){
    this.stop();
    this._onEnd=onEnd;
    this.speaking=true;
    
    if(window.AppBridge){
      // Android 네이티브 TTS
      try{AppBridge.speak(text,this.rate);}catch(e){this.speaking=false;if(onEnd)onEnd();return;}
      // 완료 체크 (500ms 간격)
      this._checkTimer=setInterval(()=>{
        try{
          if(!AppBridge.isSpeaking()){
            clearInterval(this._checkTimer);
            this.speaking=false;
            if(this._onEnd)this._onEnd();
          }
        }catch(e){clearInterval(this._checkTimer);this.speaking=false;}
      },500);
    } else if(window.speechSynthesis){
      // 브라우저 폴백
      const u=new SpeechSynthesisUtterance(text);
      u.lang="ko-KR";u.rate=this.rate;
      u.onend=()=>{this.speaking=false;if(onEnd)onEnd();};
      u.onerror=()=>{this.speaking=false;if(onEnd)onEnd();};
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    } else {
      this.speaking=false;
      alert("TTS를 사용할 수 없습니다");
      if(onEnd)onEnd();
    }
  },
  
  stop(){
    if(this._checkTimer)clearInterval(this._checkTimer);
    this.speaking=false;
    try{if(window.AppBridge)AppBridge.stopSpeak();}catch(e){}
    try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
  },
  
  readQuestion(q,includeAnswer,onDone){
    let text="문제. "+q.q+". ";
    q.a.forEach((a,i)=>{text+=(i+1)+"번. "+a+". ";});
    if(includeAnswer){text+="정답은 "+(q.c+1)+"번, "+q.a[q.c]+"입니다. ";if(q.exp)text+="해설: "+q.exp;}
    this.speak(text,onDone);
  }
};

// Listen mode state
let listenState={playing:false,idx:0,auto:true,showAnswer:false,speed:1,answerOnly:false};

function listenAutoPlay(){
  if(!listenState.playing)return;
  var p=getPool();
  if(!p.length||listenState.idx>=p.length){listenState.playing=false;render();return;}
  var q=p[listenState.idx];
  
  function goNext(){
    if(!listenState.playing)return;
    if(listenState.auto&&listenState.idx<p.length-1){
      setTimeout(function(){
        if(!listenState.playing)return;
        listenState.idx++;listenState.showAnswer=false;render();
        setTimeout(function(){listenAutoPlay();},300);
      },1000);
    }else{listenState.playing=false;render();}
  }
  
  if(listenState.answerOnly){
    // 정답만 모드: 문제 읽고 → 정답만 (보기 4개 스킵)
    TTS.speak("문제. "+q.q,function(){
      if(!listenState.playing)return;
      listenState.showAnswer=true;render();
      setTimeout(function(){
        TTS.speak("정답. "+(q.c+1)+"번. "+q.a[q.c],function(){goNext();});
      },300);
    });
  }else{
    // 전체 모드: 문제 → 보기 → 정답
    TTS.readQuestion(q,false,function(){
      if(!listenState.playing)return;
      listenState.showAnswer=true;render();
      setTimeout(function(){
        if(!listenState.playing)return;
        TTS.speak("정답. "+(q.c+1)+"번. "+q.a[q.c],function(){goNext();});
      },500);
    });
  }
}
