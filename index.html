보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_35","q":"다음 중 기능통화에 의한 외화거래의 보고에 관한 설명으로 옳지 않은 것은?","a":["외화거래를 최초로 인식하는 경우 거래일의 환율을 외화금액에 적용하여 기능통화로 기록한다.","화폐성항목의 결제시점에 생기는 외환차이는 그 외환차이가 생기는 회계기간의 기타포괄손익으로 인 식한다.","역사적원가로 측정하는 비화폐성 외화항목은 보고기간 말에 거래일의 환율로 환산한다.","공정가치로 측정하는 비화폐성항목에서 생긴 공정가치 평가손익을 기타포괄손익으로 인식하는 경우 에는 그 손익에 포함된 환율변동효과를 기타포괄손익으로 인식한다."],"c":1,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '화폐성항목의 결제시점에 생기는 외환차이는 그 외환차이가 생기는 회계기간의 기타포괄손익으로 인 식한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_재무_36","q":"㈜삼일은 6개월 후에 $2,000의 재고자산을 구입할 예정이며 현재 환율은 1,000원/$ 이다. 그러나 6개\n월 후에 환율이 1,100원/$ 으로 상승한다면 재고자산의 매입으로 인한 현금 유출액은 당초 계획보다 증\n가하게 될 것이다. ㈜삼일은 이를 회피하기 위하여 6개월 후에 $2,000를 $1당 1,050원에 매입하는 통\n화선도계약을 체결하였다. 해당 거래의 위험회피유형으로 옳은 것은?","a":["매매목적위험회피","공정가치위험회피","현금흐름위험회피","해외사업장순투자위험회피"],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '현금흐름위험회피'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_재무_37","q":"㈜삼일은 20X1년 1월 1일에 사무실 임차계약을 체결하였다. ㈜삼일이 리스부채에 대해 20X1년에 인식\n할 이자비용은 얼마인가(단, 계산금액은 소수점 첫째자리에서 반올림함을 원칙으로 하고, 가장 근사치\n를 답으로 선택한다)?\nㄱ. 임차기간은 20X1년 1월 1일부터 20X3년 12월 31일까지 이며, 매년 12월 31일에 고정리스\n료 100,000원을 지급한다.\nㄴ. ㈜삼일의 20X1년 1월 1일 증분차입이자율은 연 10 % 이다.\nㄷ. 3년 10 % 정상연금 현가계수는 2.48685이며, 현가계수는 0.75131이다.","a":["17,355원","21,711원","24,869원","28,526원"],"c":2,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (24,869원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_38","q":"다음 중 리스이용자의 리스부채 측정치에 반영되지 않는 것은?","a":["리스이용자가 매수선택권을 행사할 것이 상당히 확실한 경우에 그 매수선택권의 행사가격","무보증 잔존가치","지수나 요율(이율)에 따라 달라지는 변동리스료","고정리스료"],"c":1,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '무보증 잔존가치'. K-IFRS 제1116호에 따라 리스이용자는 사용권자산과 리스부채를 인식합니다(단기/소액리스 제외). ","src":"cbt"},{"id":"jg_9_재무_39","q":"㈜삼일은 기중에 다음과 같은 자금의사결정을 하였다. 아래의 의사결정으로 인한 현금흐름 중 재무활동\n관련 순현금흐름은 얼마인가(단, ㈜삼일은 배당금의 수취 및 지급을 영업활동 현금흐름으로 선택하였\n다)?\n매출채권의 회수 950,000원\n차입금의 상환 1,000,000원\n유형자산의 처분 500,000원\n기타포괄손익-공정가치 측정 금융자산의 취득 1,000,000원\n유상증자 2,000,000원\n급여의 지급 500,000원\n배당금의 지급 800,000원","a":["200,000원 현금유출","500,000원 현금유출","200,000원 현금유입","1,000,000원 현금유입"],"c":3,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번 (1,000,000원 현금유입). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_9_재무_40","q":"㈜삼일의 20X1년 재무제표 관련 자료를 이용하여 현금흐름표에 보고될 간접법에 의한 영업활동현금흐름\n을 계산하면 얼마인가?\n당기순이익 20,000원 감가상각비 4,600원\n매출채권의 증가 15,000원 재고자산의 감소 2,500원\n매입채무의 증가 10,400원 유형자산처분손실 2,400원","a":["20,100원","21,000원","22,500원","24,900원"],"c":3,"s":"재무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번 (24,900원). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_9_세무_1","q":"다음 중 조세의 분류기준에 따른 구분과 세목을 연결한 것으로 옳지 않은 것은?\n분류기준 구분 조세항목\n국세 법인세, 소득세, 부가가치세","a":["과세권자 지방세 취득세, 등록면허세, 주민세 사용용도의 보통세 법인세, 소득세, 부가가치세","특정여부 목적세 교육세 조세부담의 직접세 법인세, 소득세","전가여부 간접세 개별소비세 납세의무자의 인세 재산세, 부가가치세","인적사항 고려여부 물세 소득세"],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '인적사항 고려여부 물세 소득세'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_2","q":"다음 중 국세기본법상 특수관계인에 관한 설명으로 옳지 않은 것은?","a":["친생자로서 다른 사람에게 친양자 입양된 자는 특수관계인에 해당한다.","특수관계자인 배우자는 사실혼 관계에 있는 자를 제외한다.","법인과 경제적 연관관계가 있는 임원은 특수관계인에 해당한다.","개인이 직접 또는 그와 친족관계에 있는 자를 통하여 법인의 경영에 대하여 지배적인 영향력을 행사 하는 경우 그 법인은 특수관계인에 해당한다."],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '특수관계자인 배우자는 사실혼 관계에 있는 자를 제외한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_3","q":"다음 중 소급과세의 금지 원칙에 관한 설명으로 옳지 않은 것은?","a":["국세를 납부할 의무가 성립한 소득에 대하여 그 성립 후의 새로운 법에 따라 소급하여 과세할 수 없 다.","국세청의 해석이 일반적으로 납세자에게 받아들여진 후에는 새로운 해석에 의하여 소급하여 과세할 수 없다.","조세법률관계에 있어 법적안정성 및 예측가능성을 보장하기 위한 국세부과의 원칙 중 하나이다.","과세기간 중에 법률의 개정이 있는 경우 사업연도 개시일부터 적용하는 것은 허용된다."],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '조세법률관계에 있어 법적안정성 및 예측가능성을 보장하기 위한 국세부과의 원칙 중 하나이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_4","q":"다음 중 수정신고와 경정청구에 관한 설명으로 옳은 것은?","a":["수정신고는 관할세무서장이 당해 국세에 대한 과세표준과 세액의 결정 또는 경정 통지하기 전으로서 국세부과 제척기간이 끝나기 전까지 할 수 있다.","수정신고는 과세표준과 세액을 법정신고기한까지 신고하지 못한 경우 법정신고기한이 지난 후 신고 하는 것을 말한다.","납세의무자가 당초 신고 시 과세표준 및 세액을 과다하게 신고하였다면 수정신고를 할 수 있다.","후발적사유와 같은 특별한 사유가 없다면 법정신고기한(신고기한이 연장된 경우에는 그 연장된 기 한)이 지난 후 3년 이내에 경정청구를 하여야 한다."],"c":0,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '수정신고는 관할세무서장이 당해 국세에 대한 과세표준과 세액의 결정 또는 경정 통지하기 전으로서 국세부과 제척'이 올바른 설명입니다. 세법에서 정한 과세요건을 충족하는 경우에 해당합니다. 과세/비과세/면세 기준을 정확히 파악해야 합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_세무_5","q":"다음 중 법인세법상 사업연도에 관한 설명으로 옳지 않은 것은?","a":["법인의 사업연도는 법령 또는 정관상에서 정하고 있는 회계기간을 우선적으로 적용하며 원칙적으로 1년을 초과할 수 없다.","사업연도를 변경하려는 법인은 직전 사업연도 종료일 이전 3개월 이내에 사업연도 변경신고서를 제 출해야 한다.","신설법인의 최초 사업연도 개시일은 설립등기일이다.","법령 또는 정관상에 사업연도가 규정되어 있지 않은 경우에는 법인이 관할세무서장에게 신고한 사업 연도를 적용하며, 신고하지 않은 경우에는 1월 1일에서 12월 31일까지를 사업연도로 한다."],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '사업연도를 변경하려는 법인은 직전 사업연도 종료일 이전 3개월 이내에 사업연도 변경신고서를 제 출해야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_6","q":"다음 중 소득처분에 관한 설명으로 옳지 않은 것은?","a":["손금불산입사항으로 사외유출된 것이 분명하나, 귀속자가 불분명한 경우에는 대표자에 대한 상여로 처분한다.","기타사외유출의 경우 법인세를 과세하는 것 이외의 추가적 과세가 없다.","소득의 귀속자가 출자자인 법인의 경우 배당으로 처분한다.","소득처분 중 기타는 사후관리가 불필요하다."],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '소득의 귀속자가 출자자인 법인의 경우 배당으로 처분한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_7","q":"다음 자료를 바탕으로 ㈜삼일이 제24기에 수행하여야 하는 세무조정으로 옳은 것은?\n(1) ㈜삼일은 제23기에 업무용 건물의 재산세 300 만원을 현금으로 납부하였고 다음과 같이 회계처\n리하였다.\n(차) 세금과공과(재산세) 3,000,000원 (대) 현금 3,000,000원\n(2) 제24기에 재산세 과오납 사유가 발생하여 150 만원의 재산세 환급금과 20 만원의 과오납급의 환\n급가산금을 지급받았고 다음과 같이 회계처리하였다.\n(차) 현금 1,700,000원 (대) 잡이익 1,700,000원","a":["(익금산입) 200,000원","(익금산입) 1,700,000원","(익금불산입) 200,000원","(익금불산입) 1,700,000원"],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '(익금불산입) 200,000원'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_세무_8","q":"다음 자료에 의할 경우 ㈜삼일의 제24기(2024년 1월 1일 ~ 2024년 12월 31일) 김삼일 이사(주주에\n해당함)의 인건비 중 손금불산입되는 금액은 얼마인가?\nㄱ. 김삼일 이사는 ㈜삼일에 3년 9개월간 근무하다가 2024년 12월 31일에 퇴직하였다.\nㄴ. ㈜삼일은 김삼일 이사에게 퇴직급여 16,000,000원을 지급하였다. ㈜삼일은 퇴직급여충당금을\n설정하지 않으며, 임원퇴직급여 규정도 두고 있지 않다.\nㄷ. 퇴직 직전 1년간 김삼일 이사에게 지급한 급여액은 24,000,000원이며 상여금은 10,000,000\n원(정관규정의 지급한도를 초과한 2,000,000원 포함)이다.\nㄹ. 급여액 등 인건비는 모두 손익계산서상 비용으로 회계처리되었다.","a":["2,000,000원","4,000,000원","5,000,000원","6,000,000원"],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번 (6,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_9_세무_9","q":"다음 중 법인세법상 손금으로 인정되는 금액은 얼마인가(단, 손금인정을 위한 기타 요건은 갖추었다고\n가정한다)?\nㆍ 업무와 관련하여 발생한 교통사고 벌과금 5,000,000원\nㆍ 세금과공과(가산세 500,000 포함) 3,000,000원\nㆍ ⌜국민건강보험법 에 따라\n⌟\n사용자로서 부담하는 국민건강보험료 1,500,000원\nㆍ 직장체육비 3,200,000원","a":["1,500,000원","4,500,000원","7,200,000원","12,200,000원"],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (7,200,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_세무_10","q":"㈜삼일은 제24기(2024년 1월 1일 ~ 2024년 12월 31일)에 회사가 제조한 기계를 할부판매하고 인도\n한 후 다음과 같이 회계처리 하였다. 제24기 회사에 필요한 세무조정으로 옳은 것은(단, ㈜삼일은 중\n소기업이 아니며 매출원가나 현재가치는 고려하지 않는다)?\nㄱ. 계약일 : 2024년 2월 25일\nㄴ. 판매금액 : 50,000,000원\nㄷ. 대금결제조건 : 2024년 2월 25일 계약금 5,000,000원, 6개월이 경과할 때마다 5,000,000원씩\n9회에 분할하여 결제함\nㄹ. 회사의 회계처리 : 회사는 당기에 50,000,000원을 매출로 인식함","a":["세무조정 없음","(익금불산입) 할부매출액 35,000,000원(△유보)","(익금불산입) 할부매출액 40,000,000원(△유보)","(익금불산입) 할부매출액 45,000,000원(△유보)"],"c":0,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '세무조정 없음'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_세무_11","q":"도매업을 영위하는 ㈜삼일은 전기까지 매장을 임차하여 사용하다가 당기(2024년 1월 1일 ~ 2024년 12\n월 31일) 중 건물을 최초로 취득하고 세무상 감가상각 내용연수를 신고하려고 한다. 건물의 취득일자가\n2024년 3월 14일인 경우 세무상 감가상각 내용연수 신고는 언제까지 해야 하는가?","a":["2024년 6월 30일","2024년 9월 30일","2025년 1월 31일","2025년 3월 31일"],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '2025년 3월 31일'. 유형자산은 취득원가로 인식 후 감가상각을 통해 내용연수에 걸쳐 비용화합니다. ","src":"cbt"},{"id":"jg_9_세무_12","q":"다음 자료에 의한 ㈜삼일의 제24기(2024년 1월 1일 ~ 2024년 12월 31일) 사업연도의 세무조정 사항\n이 각 사업연도 소득금액에 미치는 영향으로 옳은 것은?\n구분 건물 기계 영업권\n회사계상 상각비 7,000,000원 3,000,000원 1,000,000원\n세법상 상각범위액 6,000,000원 4,000,000원 1,200,000원\n내용연수 40년 5년 5년\n전기이월상각 부인액 2,000,000원 - -","a":["영향 없음","500,000원 감소","1,000,000원 증가","2,000,000원 감소"],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '1,000,000원 증가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_세무_13","q":"다음 중 법인세법상 기부금에 관한 설명으로 옳지 않은 것은?","a":["기부금은 사업과 직접 관련없이 무상으로 지출하는 재산적 증여가액을 말한다.","천재·지변으로 인한 이재민의 구호금품 가액과 사회복지법인에 고유목적사업비로 지출하는 기부금 은 특례기부금에 해당한다.","비지정기부금에 해당하면 한도계산없이 전액 손금불산입된다.","기부금은 현금주의에 의하여 손금에 계상되므로 법인이 실제로 지급하지 아니한 기부금을 미지급으 로 하여 손비로 계상한 경우 동 기부금은 손금불산입된다."],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '천재·지변으로 인한 이재민의 구호금품 가액과 사회복지법인에 고유목적사업비로 지출하는 기부금 은 특례기부금에 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_14","q":"중소기업이며 제조업을 영위하는 ㈜삼일의 제24기 사업연도(2024년 1월 1일 ∼ 2024년 12월 31일)\n의 기업업무추진비와 관련된 자료가 다음과 같을 경우, 기업업무추진비한도초과로 인한 손금불산입액은\n얼마인가(단, 제시된자료 외에는 고려하지 않는다)?\nㄱ. 기업업무추진비지출액: 42,000,000원\n[기업업무추진비로 신용카드 등을 사용하지 않고 영수증을 받은 금액 2,000,000원(1건) 포함]\nㄴ. 매출액: 450,000,000원(매출액은 전액 제조업에서 발생한 금액으로서 특수관계인과 거래분은\n없다)\nㄷ. 기업업무추진비 손금한도액 계산시 수입금액기준한도액 계산에 필요한 적용률은 수입금액\n100억 원 이하분에 대하여 0.3 % 이다.","a":["2,000,000원","2,650,000원","4,000,000원","4,650,000원"],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (2,650,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_세무_15","q":"다음 중 법인세법상 지급이자 손금불산입에 관한 설명으로 옳지 않은 것은?","a":["지급이자를 손금불산입하는 순서를 규정하고 있다.","비상각자산에 대한 건설자금이자 손금불산입 금액은 처분시 손금으로 추인한다.","재고자산에 대한 건설자금이자는 손금불산입 하지 않는다.","채권자가 불분명한 사채의 이자에 대한 원천징수세액상당액은 손금불산입 하지 않는다."],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '채권자가 불분명한 사채의 이자에 대한 원천징수세액상당액은 손금불산입 하지 않는다.'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_16","q":"다음은 제조업을 영위하는 ㈜삼일의 제 24기(2024년 1월 1일 ~ 2024년 12월 31일) 대손충당금과 관\n련된 자료이다. 이 자료를 이용하여 대손충당금에 대한 세무조정 결과를 ‘자본금과 적립금조정명세서\n(을)’에 기입하고자 할 때, 빈칸에 들어갈 금액으로 가장 올바르게 짝지어진 것은?\n<자료1> 대손충당금 관련 자료\nㄱ. 결산서상 대손충당금 내역\n기초 대손충당금 잔액 20,000,000원\n당기 대손 처리액 6,000,000원(소멸시효 완성 채권)\n당기 추가 설정액 8,000,000원\nㄴ. 전기 대손충당금 부인액 4,000,000원\nㄷ. 당기 말 세법상 대손충당금 설정대상 채권금액 400,000,000원\nㄹ. 당기 대손실적률은 3 % 임\n<자료2> 자본금과 적립금조정명세서(을)\n당기중증감\n과목 또는 사항 기초잔액 기말잔액\n감소 증가\n대손충당금한도초과액 4,000,000 (ㄱ) xxx (ㄴ)\n(ㄱ) (ㄴ)","a":["0 22,000,000","4,000,000 22,000,000","0 10,000,000","4,000,000 10,000,000"],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '4,000,000 10,000,000'. 세무조정은 기업회계 이익을 세법상 과세소득으로 전환하는 과정으로, 익금산입·손금불산입 등을 통해 조정합니다. ","src":"cbt"},{"id":"jg_9_세무_17","q":"다음 법인세법상 대손금 중 결산조정사항이 아닌 것은?","a":["민사집행법의 규정에 의하여 채무자의 재산에 대한 경매가 취소된 압류채권","채무자의 파산으로 인하여 회수할 수 없는 채권","부도 발생일로부터 6개월 이상 지난 수표 또는 어음상의 채권 및 중소기업의 외상매출금(부도발생 일 이전의 것)","특수관계인이 아닌자와의 거래로 인하여 발생한 중소기업 외상매출금으로서 회수기일로부터 2년 이 상 지난 외상매출금"],"c":0,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '민사집행법의 규정에 의하여 채무자의 재산에 대한 경매가 취소된 압류채권'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_18","q":"㈜삼일은 대표이사인 홍길동씨에게 업무와 관련 없이 자금을 대여하고 있으며, 동 대여금의 2024년 적\n수는 1,000,000,000원이다. 2024년 중 대표이사로부터 50,000원의 이자를 수령하였으며 ㈜삼일의 가중\n평균차입이자율이 7 % 인 경우 필요한 세무조정으로 옳은 것은(단, 인정이자 계산시 가중평균차입이자\n율 적용, 소수점 첫째 자리에서 반올림한다)?","a":["(익금불산입) 가지급금 인정이자 141,257원(상여)","(익금산입) 가지급금 인정이자 141,257원(상여)","(익금불산입) 가지급금 인정이자 191,257원(상여)","(익금산입) 가지급금 인정이자 191,257원(상여)"],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 ((익금산입) 가지급금 인정이자 141,257원(상여)). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_세무_19","q":"다음 중 법인세법상 이월결손금에 관한 설명으로 옳지 않은 것은?","a":["자산수증이익 및 채무면제이익으로 충당된 이월결손금은 익금불산입되므로 소멸된다.","법원결정에 의한 회생계획을 이행중인 기업은 당해연도 소득의 80 % 를 이월결손금 연간 공제 한도 로 한다.","과세표준계산시 공제받을 수 있는 이월결손금은 15년(2020. 1. 1 이전 발생분은 10년) 이내에 개시 한 사업연도에서 발생한 결손금이다.","중소기업의 경우 당해연도 소득의 100 % 를 이월결손금 연간 공제 한도로 한다."],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '법원결정에 의한 회생계획을 이행중인 기업은 당해연도 소득의 80 % 를 이월결손금 연간 공제 한도 로 한다.'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_20","q":"다음 중 법인세 신고와 납부에 관한 설명으로 옳지 않은 것은?","a":["기납부세액은 중간예납세액, 원천징수 된 세액 및 수시부과세액을 의미하며, 이는 사업연도 중에 납 부한 세액이므로 회사가 총부담할 세액에서 이를 차감하여 납부세액을 구한다.","원천징수한 세액은 징수일이 속하는 달의 다음달 10일까지 납세지 관할세무서장에게 납부하여야 한 다.","사업연도의 기간이 6개월을 초과하는 법인은 해당 사업연도 개시일부터 6개월간을 중간예납기간으 로 하여 중간예납기간이 지난 날부터 3개월 이내에 그 기간에 대한 법인세를 신고·납부해야 한다.","법인세 납세의무가 있는 내국법인은 각 사업연도 소득금액이 없거나 결손금이 있는 경우에도 과세표 준과 세액을 신고해야 한다."],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '사업연도의 기간이 6개월을 초과하는 법인은 해당 사업연도 개시일부터 6개월간을 중간예납기간으 로 하여 중간예'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_21","q":"다음 중 소득세법상 소득의 구분 및 과세에 관한 설명으로 옳지 않은 것은?","a":["비거주자에 대하여 과세하는 소득세는 해당 국내원천소득을 종합하여 과세하는 경우와 분류하여 과 세하는 경우 및 그 국내원천소득을 분리하여 과세하는 경우로 구분하여 계산한다.","일용근로자에 대한 근로소득은 종합소득대상이 아니다.","국내사업장이 없는 비거주자에 대하여는 국내원천소득(퇴직소득·양도소득을 포함)을 소득별로 분리 하여 과세한다.","분리과세대상소득은 소득을 지급하는 자가 소득을 지급할 때 원천징수함으로써 납세의무가 종결된 다."],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '국내사업장이 없는 비거주자에 대하여는 국내원천소득(퇴직소득·양도소득을 포함)을 소득별로 분리 하여 과세한다.'는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_22","q":"다음 중 금융소득의 과세방법에 관한 설명으로 옳지 않은 것은?","a":["이자, 배당소득 중 원천징수되지 않은 금융소득은 분리과세 대상이 아니다,","비실명금융소득의 경우 종합소득에 합산하지 아니하고 원천징수로써 납세의무가 종결된다.","종합과세대상 금융소득이 2,000만원 이하인 경우에는 누진세율이 적용되지 않는다.","종합과세 되는 배당소득의 경우 원천징수세율의 적용여부와 관계없이 Gross-up이 적용된다."],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '종합과세 되는 배당소득의 경우 원천징수세율의 적용여부와 관계없이 Gross-up이 적용된다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_23","q":"다음 자료를 보고 개인사업자 김삼일씨(복식부기의무자 아님)의 2024년의 사업소득금액을 계산하면 얼\n마인가?\nㄱ. 손익계산서상 당기순이익 300,000,000원\nㄴ. 손익계산서에는 다음과 같은 수익과 비용이 포함되어 있다.\n(아래 기술한 내용 이외에는 모두 세법상 적정하게 계상되어 있음)\n- 본인에 대한 급여 60,000,000원\n- 배당금수익 2,000,000원\n- 유형자산처분이익 10,000,000원\n- 세금과공과 중 벌금 5,000,000원\nㄷ. 이월결손금 70,000,000원(2020년 사업소득에서 발생함)","a":["295,000,000원","292,000,000원","290,000,000원","283,000,000원"],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번 (283,000,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_9_세무_24","q":"다음 중 소득세가 과세되는 근로소득 항목을 모두 고르면?\nㄱ. 법인세법에 의해 상여로 처분된 금액\nㄴ. 6세 이하 자녀에 대하여 월 20만 원을 초과하여 지급하는 보육비\nㄷ. 사내 급식으로 제공받는 식사\nㄹ. 퇴직급여로 지급되기 위하여 적립되는 급여\nㅁ. 종업원(임원아님)이 사택을 제공받음으로써 얻는 이익","a":["ㄱ, ㄴ","ㄱ, ㄹ","ㄴ, ㄹ","ㄷ, ㅁ"],"c":0,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. 'ㄱ, ㄴ'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_9_세무_25","q":"다음 중 소득세법상 기타소득에 관한 설명으로 옳지 않은 것은?","a":["국내에서 거주자 또는 비거주자에게 기타소득을 지급하는 자는 기타소득금액의 22 % 에 해당하는 세 액을 원천징수하여 그 징수일이 속하는 달의 다음달 10일까지 납부하여야한다.","기타소득은 종합과세하는 것이 원칙이나 소득세법이 정하는 일부 기타소득은 분리과세한다,","기타소득금액이 연 300만원 이하인 경우 선택적 분리과세가 가능하다.","법인세법에 따라 처분된 기타소득의 수입시기는 해당법인의 해당 사업연도 결산 확정일이다."],"c":0,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '국내에서 거주자 또는 비거주자에게 기타소득을 지급하는 자는 기타소득금액의 22 % 에 해당하는 세 액을 원천'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_26","q":"다음은 거주자 김삼일씨의 2024년 부양가족 현황이다. 김삼일씨가 소득공제로 적용받을 수 있는 인적공\n제(기본공제와 추가공제)의 합계를 계산하면 얼마인가(단, 제시된 자료 외 다른 사항은 고려하지 않는\n다)?\n가족구성원 연령 소득종류 및 금액\n김삼일(남성) 42세 종합소득금액 5,000만원\n배우자(장애인) 40세 총급여 500만원\n부친 72세 소득 없음\n모친(장애인) 69세 사업소득금액 120만원\n딸 10세 소득 없음\n아들 8세 소득 없음","a":["900만원","950만원","1,050만원","1,150만원"],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '1,050만원'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_9_세무_27","q":"다음 중 소득세법상 세액공제·감면에 관한 설명으로 옳은 것은?","a":["만 7세 이상의 기본공제대상자에 해당하는 자녀(입양자 및 위탁아동 포함) 1명당 15만원을 세액공 제 받을 수 있다.","해당 과세기간에 출생한 자녀가 셋째인 경우 70만원을 세액공제 받을 수 있다.","장애인전용 보장성보험료는 200만원까지 보험료 세액공제 대상이 된다.","총급여액의 5 % 를 초과하는 의료비에 대해서 의료비 세액공제를 받을 수 있다."],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '해당 과세기간에 출생한 자녀가 셋째인 경우 70만원을 세액공제 받을 수 있다.'이 올바른 설명입니다. 세법에서 정한 과세요건을 충족하는 경우에 해당합니다. 과세/비과세/면세 기준을 정확히 파악해야 합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_세무_28","q":"다음 중 원천징수에 관한 설명으로 옳지 않은 것은?","a":["비영업대금의 이익의 경우 원천징수세율은 25 % 이다.","법인이 개인에게 소득을 지급하는 경우 법인세법에 따라 원천징수한다.","원천징수에 의해서 정부는 조세수입을 조기에 확보할 수 있으며, 탈세를 방지할 수 있는 장점이 있다.","완납적 원천징수의 경우에는 별도의 소득세 확정신고 절차가 불필요하다."],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '법인이 개인에게 소득을 지급하는 경우 법인세법에 따라 원천징수한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_29","q":"다음 중 양도소득에 관한 설명으로 옳지 않은 것은?","a":["상장주식을 양도한 경우에는 원칙적으로 양도소득세 대상이 아니나, 대주주 거래분과 장외거래분에 한해서 양도소득세를 과세한다.","1세대 1주택(고가주택 제외)과 그 부수토지의 양도로 인한 소득에 대해서는 비과세를 적용한다.","토지를 법인에게 현물출자한 경우에는 양도가 아니므로 양도소득세 대상이 아니다.","거주자가 토지 및 건물을 양도한 경우 양도한 날이 속하는 달의 말일부터 2개월 이내에 양도소득세 를 신고 및 납부하여야 한다."],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '토지를 법인에게 현물출자한 경우에는 양도가 아니므로 양도소득세 대상이 아니다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_30","q":"다음 중 소득세법상 신고·납부기한에 관한 설명으로 옳지 않은 것은?","a":["사업소득이 있는 거주자는 11월 30일까지 중간예납세액을 납부하여야 한다.","3월에 비상장주식을 양도한 거주자는 8월 말까지 양도차익에 대한 예정신고를 하고 세액을 납부해 야 한다.","근로소득만 있는자가 연말정산을 한 경우에는 소득세 확정신고를 하지 않을 수 있다.","부가가치세 면세사업을 영위하는 면세사업자는 해당 과세기간의 다음연도 2월 말까지 사업장 현황 신고를 해야한다."],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '부가가치세 면세사업을 영위하는 면세사업자는 해당 과세기간의 다음연도 2월 말까지 사업장 현황 신고를 해야한다'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_31","q":"다음 중 우리나라 부가가치세에 관한 설명으로 옳지 않은 것은?","a":["전단계세액공제법을 적용하여 납부할 세액을 계산하고 있다.","재화를 수입하는 자는 사업자인지 여부에 관계없이 모두 납세의무가 있다.","부가가치세법상 사업자의 요건을 충족하기 위해서는 영리를 목적으로 거래하여야 한다.","주된 재화의 공급에 부수되어 공급되는 재화의 과세대상여부는 주된재화의 과세여부에 의해서 결정 된다."],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '부가가치세법상 사업자의 요건을 충족하기 위해서는 영리를 목적으로 거래하여야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_32","q":"다음 중 우리나라 부가가치세법상 납세의무자에 관한 설명으로 옳지 않은 것은?","a":["부가가치세의 납세의무자는 재화 또는 용역을 공급받는 사업자이다.","과세사업과 면세사업을 겸영하는 겸영사업자는 과세사업자로 분류된다.","신규로 사업을 개시하는 자는 원칙적으로 사업장마다 사업자등록을 하여야 한다.","과세사업자라 하더라도 면세대상 재화 또는 용역을 공급하는 경우 부가가치세가 면제되는 경우가 있 다."],"c":0,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '부가가치세의 납세의무자는 재화 또는 용역을 공급받는 사업자이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_33","q":"다음 중 부가가치세법상 과세기간에 관한 설명으로 옳지 않은 것은?","a":["공급대가의 변동으로 간이과세자가 일반과세자로 변경되는 경우 그 변경 이전 1월 1일부터 6월 30 일까지는 간이과세규정이 적용된다.","간이과세자는 1월 1일부터 12월 31일까지를 과세기간으로 한다.","신규사업자가 사업개시일 이전에 사업자등록을 신청한 경우에도 사업개시일부터 개시일이 속하는 과 세기간의 종료일까지를 최초 과세기간으로 한다.","폐업자의 경우 폐업일이 속하는 과세기간 개시일부터 폐업일까지를 최종 과세기간으로 한다."],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '신규사업자가 사업개시일 이전에 사업자등록을 신청한 경우에도 사업개시일부터 개시일이 속하는 과 세기간의 종료일'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_34","q":"다음 중 부가가치세법상 사업장에 관한 설명으로 옳지 않은 것은?","a":["건설업의 경우 법인은 그 법인의 등기부상 소재지, 개인은 업무총괄장소를 사업장으로 한다.","사업장을 설치하지 않은 경우 그 사업에 관한 업무총괄장소를 사업장으로 한다.","부동산임대업의 경우 그 부동산의 등기부상의 소재지를 사업장으로 본다.","재화를 보관하고 관리할 수 있는 시설만 갖춘 장소로서 하치장으로 신고된 장소는 사업장으로 보지 않는다."],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '사업장을 설치하지 않은 경우 그 사업에 관한 업무총괄장소를 사업장으로 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_35","q":"다음 중 부가가치세 과세대상에 관한 설명으로 옳지 않은 것은?","a":["재화란 재산적 가치가 있는 유체물과 무체물이므로 주식은 물론 특허권도 과세대상에 해당된다.","재화의 수입에 대해서는 수입자가 사업자는 물론 비사업자인 경우에도 부가가치세가 과세된다.","과학상의 지식, 경험 또는 숙련에 관한 정보를 제공하는 것은 용역의 공급으로 본다.","건설업의 경우 건설업자가 건설자재의 전부 또는 일부를 부담하는 경우에는 용역의 공급으로 본다."],"c":0,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '재화란 재산적 가치가 있는 유체물과 무체물이므로 주식은 물론 특허권도 과세대상에 해당된다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_36","q":"다음 중 부가가치세법상 재화의 공급시기에 관한 설명으로 옳지 않은 것은?","a":["재화의 이동이 필요한 경우에는 재화가 인도되는 때를 원칙적인 공급시기로 한다.","조건부 판매는 조건이 성취되거나 기한이 지나 판매가 확정되는 때를 공급시기로 한다.","재화의 이동이 필요하지 아니한 경우에는 재화가 이용가능하게 되는 때를 원칙적인 공급시기로 한 다.","폐업일 이전에 공급한 재화의 공급시기가 폐업일 이후에 도래하는 경우 공급한 때를 공급시기로 한 다."],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '폐업일 이전에 공급한 재화의 공급시기가 폐업일 이후에 도래하는 경우 공급한 때를 공급시기로 한 다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_37","q":"다음 자료를 바탕으로 회사 입장에서 영세율 제도와 면세 제도에 따라 부가가치세 납부 또는 환급세액\n을 계산할 경우 어떤 제도가 얼마나 유리한지 알맞게 짝지어진 것을 고르시오.\n구 분 영세율 면세\n매출액 30,000,000원(수출) 30,000,000원(면세 - 국내 매출)\n매입액 20,000,000원(과세) 20,000,000원(과세)\n부가가치(매출액 - 매입액) 10,000,000원 10,000,000원","a":["영세율 제도가 1,000,000원 유리함","영세율 제도가 2,000,000원 유리함","면세 제도가 1,000,000원 유리함","면세 제도가 2,000,000원 유리함"],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (영세율 제도가 2,000,000원 유리함). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_세무_38","q":"다음은 과세사업을 영위하는 ㈜삼일의 2024년 제1기 예정신고기간에 발생한 거래이다. 2024년 제1기\n예정신고기간의 과세표준은 얼마인가(단, 모든 금액에는 부가가치세가 포함되지 아니하였다)?\n(1) 특수관계인에게 제품을 5,000,000 원(시가 7,000,000 원)에 판매하였다.\n(2) 제3자에게 제품을 장기할부조건으로 판매하였으며, 총 판매대금은 36,000,000 원이다.\n이 중 2024년 제1기 예정신고기간동안 회수하기로 약정된 금액은 6,000,000 원이나 실\n제로 회수된 금액은 4,000,000 원이다.\n(3) 제 3자에게 10,000,000 원 상당의 제품을 판매하고 이 중 3,000,000 원은 ㈜삼일이 적\n립한 마일리지로 결제하였으며, 나머지는 현금으로 결제하였다.\n(4) 거래처에 판매장려 목적으로 현금 4,000,000 원과 당사의 제품(원가 : 3,000,000 원, 시\n가 5,000,000 원)을 제공하였다.","a":["21,000,000원","23,000,000원","25,000,000원","27,000,000원"],"c":2,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (25,000,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_세무_39","q":"다음 중 부가가치세법상 매입세액공제에 관한 설명으로 옳지 않은 것은?","a":["사업자가 법 소정 사업자로부터 재화를 공급받고 세금계산서 대신 부가가치세액이 별도로 구분 가능 한 신용카드 매출전표 등을 발급 받은 경우 일정한 요건을 구비하면 매입세액 공제를 받을 수 있다.","의제매입세액은 해당 면세 농산물 등의 사용시점에 공제된다.","기업업무추진비 및 이와 유사한 비용의 지출에 관련된 매입세액은 매출세액에서 공제되지 않는다.","재화를 공급받은 자가 발행한 매입자발행세금계산서는 원칙적으로 매입세액을 공제 받을 수 있는 세 금계산서에 해당한다."],"c":1,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '의제매입세액은 해당 면세 농산물 등의 사용시점에 공제된다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_세무_40","q":"부가가치세법상 일반과세자인 김삼일씨는 2024년 8월 20일에 사업을 개시하였으나 2024년 11월 1일\n에 사업자등록을 신청하였다. 2024년의 공급가액이 다음과 같을 때 2024년 제 2기 확정신고시 김삼일\n씨가 납부하여야 할 미등록가산세는 얼마인가?\n8월 20일 - 8월 31일: 5,000,000원\n9월 1일 - 9월 30일: 8,000,000원\n10월 1일 - 10월 31일: 10,000,000원\n11월 1일 - 11월 30일: 20,000,000원\n12월 1일 - 12월 31일: 30,000,000원","a":["50,000원","130,000원","180,000원","230,000원"],"c":3,"s":"세무회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번 (230,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_1","q":"다음은 원가의 분류에 관한 설명이다. 괄호 안에 들어갈 용어로 옳은 것은?\n원가란 특정목적을 달성하기 위해 소멸된 경제적 자원의 희생을 화폐가치로 측정한 것으로, 발생한\n원가 중 기업의 수익획득에 아직 사용되지 않은 부분은 ( a )(으)로, 수익획득에 사용된 부분은\n( b )(으)로 재무제표에 계상되며 수익획득에 기여하지 못하고 소멸된 부분은 ( c )(으)로\n계상된다.","a":["(a) 손실, (b) 비용, (c) 자산","(a) 비용, (b) 자산, (c) 손실","(a) 자산, (b) 손실, (c) 비용","(a) 자산, (b) 비용, (c) 손실"],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '(a) 자산, (b) 비용, (c) 손실'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_원가_2","q":"다음은 ㈜삼일의 제조원가명세서(약식)와 관련된 자료이다. 아래 자료를 이용하여 ㈜삼일의 당기 기초\n원가와 가공원가를 계산하면 얼마인가?\n제조원가명세서\n(20X1.1.1. ~ 20X1.3.31.)\nㄱ. 직접재료원가\n- 기초재료재고액 30,000원\n- 당기재료매입액 300,000원\n- 기말재료재고액 20,000원\nㄴ. 직접노무원가 90,000원\nㄷ. 제조간접원가 350,000원\nㄹ. 기초재공품원가 100,000원\nㅁ. 기말재공품원가 50,000원\n기초원가 가공원가 기초원가 가공원가","a":["400,000원 350,000원","410,000원 440,000원","400,000원 440,000원","410,000원 650,000원"],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (400,000원 440,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_3","q":"다음 중 보조부문의 원가배분 방법에 관한 설명으로 옳지 않은 것은?","a":["직접배분법이란 보조부문 상호간에 행해지는 용역의 수수를 완전히 무시하고 보조부문의 원가를 배 분하는 방법이다.","상호배분법에서 특정보조부문의 배분할 총원가는 [자기부문의 발생원가 + 다른 부문으로부터 배분된 원가] 이다.","단계배분법이란 보조부문원가의 배분순서를 정하여 그 순서에 따라 단계적으로 보조부문 원가를 다 른 보조부문과 제조부문에 배분하는 방법이다.","단계배분법의 경우 보조부문간의 용역수수관계가 완전히 인식되나, 보조부문간의 배분순위 결정이 부적절한 경우 원가배분 결과가 왜곡될 수 있다."],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. 단계배분법은 보조부문 원가를 배분순서를 정해 순차적으로 배분하는 방법입니다. 한번 배분된 부문에는 다시 배분하지 않습니다. 직접배분법(상호용역 무시), 상호배분법(완전 반영)과 구별됩니다.","src":"cbt"},{"id":"jg_9_원가_4","q":"원목가구 제조회사인 ㈜삼일은 두 개의 제조부문(조각부와 도료부)과 두 개의 보조부문(창고부와 전력\n부)으로 구성되어 있다. 각 부문에서 발생한 원가 및 부문간의 용역관계는 다음과 같다.\n용역사용부문 제조부문 보조부문\n합계\n용역제공부문\n조각부 도료부 창고부 전력부\n창고부 40 % 50 % 10 % 100 %\n전력부 30 % 50 % 20 % 100 %\n발생원가 800,000원 400,000원 200,000원 600,000원 2,000,000원\n위 자료에 따라 보조부문 상호간의 용역수수에 의한 배분방법 중 단계배분법을 사용하여 보조부문 원가\n를 각 제조부문에 배분하기 위한 계산과정에서 괄호 안에 들어갈 금액에 대한 설명으로 옳지 않은 것은\n(단, 창고부문원가부터 먼저 배분한다)?\n용역사용부문 제조부문 보조부문\n용역제공부문\n조각부 도료부 창고부 전력부\n각 부문의 발생원가 800,000원 400,000원 200,000원 600,000원\n보조부문의 원가배부\n창고부 괄호1( ) 괄호2( )\n전력부 괄호3( ) 괄호4( )","a":["“괄호2”는 100,000원이다.","“괄호3”은 232,500원이다.","“괄호4”는 262,500원이다.","직접배분법을 사용할 경우“괄호4”는 375,000원이다."],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (“괄호4”는 262,500원이다.). 전력 P = V × I (전압 × 전류)로 계산합니다. 3상의 경우 P = √3 × V × I × cosθ 입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_5","q":"다음 중 개별원가계산제도에 관한 설명으로 옳지 않은 것은?","a":["개별원가계산은 원가계산제도 중 기업의 생산형태에 따른 분류방법 중 하나이다.","소수의 제품을 대량생산하는 회사에서 적합한 원가계산방법이다.","개별원가계산은 직접원가와 간접원가의 분류가 중요하다.","제품별 손익분석이 용이한 계산방법이다."],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '소수의 제품을 대량생산하는 회사에서 적합한 원가계산방법이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_원가_6","q":"㈜삼일은 개별원가계산제도를 채택하고 있으며, 직접노무원가를 기준으로 제조간접원가를 배부한다.\n20X1년의 제조간접원가배부율은 X부문에 대해서는 50 % , Y부문에 대해서는 20 % 이다. 제조지시서\n#105와 관련된 기초재공품은 300,000원이며, 당기 중 판매가 완료되었다. 원가 발생액과 관련된 자료\n가 다음과 같은 경우 제조지시서 #105와 관련하여 당기 손익계산서에 반영될 매출원가는 얼마인가?\n< #105 >\n구 분 X부문 Y부문 합 계\n직접재료원가 700,000원 500,000원\n직접노무원가 1,000,000원\n제조간접원가 200,000원\n합 계","a":["2,900,000원","3,000,000원","3,900,000원","4,200,000원"],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번 (4,200,000원). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_7","q":"㈜삼일은 직접노동시간을 기준으로 제조간접원가를 예정배부하고 있으며 연간 제조간접원가 2,000,000\n원으로, 연간 직접노동시간은 5,000시간으로 각각 예상하고 있으나 실제로는 연간 직접노동시간이\n4,000시간 발생하였다. 실제 제조간접원가가 1,800,000원이 발생한 경우 #B의 예정배부와 실제배부의\n제조간접원가 차이는 얼마인가?\n#A #B 계\n예상직접노동시간 3,000시간 2,000시간 5,000시간\n실제직접노동시간 1,500시간 2,500시간 4,000시간","a":["100,000원","125,000원","150,000원","225,000원"],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (125,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_8","q":"다음 종합원가계산의 특징 및 장단점에 대한 설명 중 옳은 것은 모두 몇 개인가?\nㄱ. 특정기간 동안 특정 공정에서 생산된 제품은 원가측면에서 서로가 동일하다고 가정한다.\n즉 제품원가를 평균개념에 의해서 산출한다.\nㄴ. 원가의 집계가 공정별로 이루어지는 것이 아니기 때문에 개별작업별로 작업지시서를 작성\n해야 한다.\nㄷ. 동일제품을 연속적으로 대량생산하지만 일반적으로 어떤 공정에 있어서든지 기말시점에서\n는 부분적으로 가공이 완료되지 않은 재공품이 존재하게 된다.\nㄹ. 원가통제와 성과평가가 공정별로 이루어지는 것이 아니라 개별작업별로 이루어진다.\nㅁ. 기장절차가 상대적으로 간단한 편이므로 시간과 비용이 절약된다는 장점이 있다.","a":["2개","3개","4개","5개"],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '3개'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_원가_9","q":"다음은 ㈜삼일의 원가자료이다. ㈜삼일은 평균법을 이용하여 종합원가계산을 하며, 원재료는 공정시작\n시점에서 전량 투입되고 가공원가는 공정 전반에 걸쳐 균등하게 투입된다.\n< 수량 >\n기초재공품수량 0개 완성수량 1,200개\n착수수량 2,000개 기말재공품수량 800개(50%)\n< 원가 >\n재료원가 가공원가\n당기발생원가 1,000,000원 800,000원\n㈜삼일의 (ㄱ) 재료원가와 (ㄴ) 가공원가의 완성품환산량 단위당 원가는 각각 얼마인가?\nㄱ ㄴ ㄱ ㄴ","a":["500원 500원","500원 400원","625원 500원","625원 400원"],"c":0,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (500원 500원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_10","q":"㈜삼일은 선입선출법을 이용한 종합원가계산을 한다. 원재료는 공정시작 시점에서 전량 투입되며, 가공\n원가는 공정 전반에 걸쳐 균등하게 발생한다. 만약 기말재공품의 완성도가 70 % 임에도 90 % 로 잘못\n파악하여 종합원가계산을 수행한다면 어떤 결과가 발생하는가?","a":["기말재공품의 원가가 과대계상된다.","당기완성품의 완성품환산량이 과대계상된다.","완성품환산량 단위당 원가가 과대계상된다.","기말재공품의 완성품환산량이 과소계상된다."],"c":0,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (기말재공품의 원가가 과대계상된다.). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_11","q":"다음 중 표준원가계산의 목적에 관한 설명으로 옳지 않은 것은?","a":["원가관리와 통제","회계업무의 간소화","적시성 있는 원가정보 제공","제품별 발생원가의 정확한 계산"],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '제품별 발생원가의 정확한 계산'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_원가_12","q":"다음 중 제조간접원가 차이를 3분법으로 분석할 경우에 나타나지 않는 항목은 무엇인가?","a":["소비차이","조업도차이","예산차이","능률차이"],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '예산차이'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_9_원가_13","q":"다음은 표준원가계산제도를 채택하고 있는 ㈜삼일의 재료비 표준원가와 실제원가의 차이에 관한 자료이\n다. ㈜삼일의 제품 1단위당 직접재료 표준투입량을 계산하면 얼마인가?\n[실제원가] 직접재료원가 실제사용량 3,200 kg, 11원/kg\n실제완성품 생산수량 2,000단위\n[재료비 원가차이] 직접재료비 능률차이 2,800원 (불리한 차이)\n직접재료비 가격차이 9,600원 (유리한 차이)","a":["1.3 kg","1.5 kg","1.8 kg","2.0 kg"],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (1.5 kg). 원가차이 = (실제-표준) × 수량 또는 가격. 유리한 차이(F)와 불리한 차이(U)를 구분합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_14","q":"다음 중 직접노무원가 능률차이의 계산식을 올바르게 나타낸 것은?","a":["표준임률 × (실제작업시간 - 표준작업시간)","실제임률 × (실제작업시간 - 표준작업시간)","(실제임률 - 표준임률) × 실제작업시간","(실제임률 - 표준임률) × 표준작업시간"],"c":0,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '표준임률 × (실제작업시간 - 표준작업시간)'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_9_원가_15","q":"㈜삼일은 직접노동시간을 기준으로 고정제조간접원가를 배부하고 있다. 당기 고정제조간접원가 예산과\n실제자료는 다음과 같다.\n예 산 실 제\n직접노동시간 8,000시간 9,000시간\n고정제조간접원가 4,000원 5,000원\n제품 단위당 표준직접노동시간은 4시간이고, 당기 실제생산량은 2,500개이다. 또한 회사는 기준조업\n도로 예산조업도를 사용한다. 이 경우 당기 고정제조간접원가 조업도차이를 계산하면 얼마인가?","a":["500원 유리","500원 불리","1,000원 유리","1,000원 불리"],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (1,000원 유리). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_16","q":"다음 중 변동원가계산에 의한 손익계산서에 관한 내용으로 옳은 것을 모두 나열한 것은?\nㄱ. 변동제조간접원가를 기간비용으로 처리한다.\nㄴ. 고정제조간접원가는 공헌이익 산출에 포함되지 않는다.\nㄷ. 제품생산량이 영업이익에 영향을 미친다.\nㄹ. 판매비와관리비를 변동비와 고정비로 분리하여 보고한다.","a":["ㄱ, ㄴ","ㄴ, ㄷ","ㄴ, ㄹ","ㄷ, ㄹ"],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. 'ㄴ, ㄹ'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_원가_17","q":"직접재료원가와 직접노무원가는 실제원가로, 제조간접원가는 사전에 전해놓은 예정배부율로 측정하는\n원가계산방법은 무엇인가?","a":["전부원가계산","종합원가계산","표준원가계산","정상원가계산"],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '정상원가계산'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_9_원가_18","q":"20X1년 1월1일에 영업을 개시한 ㈜삼일은 단일제품을 생산, 판매하며 20X1년 한 해 동안 총 2,000단\n위를 생산하여 1,500단위(단위당 판매가격 1,800원)를 판매하였다. 20X1년에 발생한 추가정보가 다음\n과 같을 경우 변동원가계산에 의한 ㈜삼일의 영업이익은 얼마인가?\n고 정 원 가 단위당 변동원가\n직접재료원가 - 300원\n직접노무원가 - 250원\n제조간접원가 300,000원 150원\n판매비와관리비 200,000원 200 원","a":["825,000원","850,000원","900,000원","925,000원"],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (850,000원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_19","q":"20X1년 초에 영업을 시작한 ㈜삼일은 선입선출법에 의한 실제원가계산제도를 채택하고 있으며, 20X1년\n1월의 생산과 판매에 관한 자료는 다음과 같다.\n1월\n생 산 량 10,000단위\n판 매 량 7,000단위\n20X1년 1월 중 전부원가계산에 의한 영업이익이 변동원가계산에 의한 영업이익보다 300,000원이 크다고\n할 때, 1월 고정제조간접원가는 얼마인가?","a":["700,000원","1,000,000원","1,300,000원","2,000,000원"],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (1,000,000원). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_20","q":"다음 중 초변동원가계산에 관한 설명으로 옳지 않은 것은?","a":["초변동원가계산에 의한 영업이익은 단위당 현금창출공헌이익에 판매수량을 곱하고 운영비용을 차감 하여 계산한다.","제조간접원가에 포함되는 혼합원가를 임의로 고정원가와 변동원가로 구분해야 하므로 혼합원가의 주관적 구분이 필요하다.","생산량이 증가할수록 영업이익이 감소되므로 재고자산 보유를 최소화하도록 유인을 제공한다.","변동원가계산제도와 마찬가지로 원가회피개념에 근거를 두고 있다."],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번. '제조간접원가에 포함되는 혼합원가를 임의로 고정원가와 변동원가로 구분해야 하므로 혼합원가의 주관적 구분이 필요'는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_원가_21","q":"㈜삼일은 활동기준 원가계산을 사용하고 있으며, 당기의 관련 원가자료는 다음과 같다.\n활동구분 가공원가 총액 원가동인 원가동인 수\n세척 800,000원 재료의 부피 100,000리터\n조립 2,500,000원 부품의 수량 500,000단위\n검사 620,000원 완성품 수량 15,500단위\n제품 A 한 단위당 투입되는 재료의 원가는 200원, 부피는 12리터이고, 25단위의 부품이 소요된다고\n할 때, 당기에 생산된 제품 A 50단위의 총 제조원가는 얼마인가?","a":["13,050원","18,250원","21,050원","23,050원"],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번 (23,050원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_22","q":"다음 중 원가추정에 관한 설명으로 옳지 않은 것은?","a":["관련 범위 내에서 총 원가가 일정함을 가정한다.","조업도와 원가 사이의 관계를 규명하여 원가함수를 추정하는 것이다.","원가추정시 원가에 영향을 미치는 요인은 조업도 뿐이라고 가정한다.","원가추정의 목적은 계획과 통제 및 의사결정에 유용한 미래원가를 추정하기 위함이다."],"c":0,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '관련 범위 내에서 총 원가가 일정함을 가정한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_원가_23","q":"다음 중 원가-조업도-이익 도표에 관한 설명으로 옳지 않은 것은?\n수익\n원\nc\n비용\nd\na\nb 조업도","a":["a는 총고정원가를 의미한다.","b는 손익분기점 생산량을 의미한다.","c는 공헌이익을 의미한다.","d는 총변동비를 의미한다."],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. 'c는 공헌이익을 의미한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_원가_24","q":"20X1년도에 ㈜삼일의 변동원가는 매출액의 60 % 였다. 20X2년도에 경영자가 단위당 판매가격을 10 %\n인상하였을 경우, 20X1년 대비 20X2년도의 공헌이익증가율은 (단, 판매량과 단위당 변동원가 및 고정\n원가는 동일하다고 가정한다)?","a":["10 %","15 %","20 %","25 %"],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '25 %'. 전부원가계산은 고정제조간접원가를 제품원가에 포함하고, 변동원가계산은 기간비용으로 처리합니다. ","src":"cbt"},{"id":"jg_9_원가_25","q":"㈜삼일은 회계프로그램을 판매하는 회사로 단위당 판매가격은 50원이며, 단위당 변동원가는 30원이\n다. 연간 고정원가는 30,000원이며 당기에 10,000원의 이익을 목표로 하고 있다. 다음 설명 중 옳지\n않은 것은(단, 법인세는 고려하지 않는다)?","a":["공헌이익률은 40 % 이다.","단위당 공헌이익은 20원이다.","목표이익을 달성하려면 66,667원의 매출을 하여야 한다.","손익분기점을 달성하기 위한 매출수량은 1,500단위이다."],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '목표이익을 달성하려면 66,667원의 매출을 하여야 한다.'. 전부원가계산은 고정제조간접원가를 제품원가에 포함하고, 변동원가계산은 기간비용으로 처리합니다. ","src":"cbt"},{"id":"jg_9_원가_26","q":"다음은 ㈜삼일의 예산자료이다. 안전한계율은 얼마인가?\n매출액 5,000,000원\n변동원가 3,000,000원\n공헌이익 2,000,000원\n고정원가 1,800,000원\n영업이익 200,000원","a":["10 %","20 %","30 %","40 %"],"c":0,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (10 %). 영업이익 = 매출액 - 매출원가 - 판매비와관리비. 영업외수익/비용은 제외합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_27","q":"㈜삼일에 새로 부임한 박상무는 올해 철저한 성과평가제도의 도입을 검토하고 있다. 성과평가제도의\n도입과 관련하여 옳지 않은 주장을 펼치고 있는 실무담당자는 누구인가?\n유팀장 : 효율적인 성과평가제도는 기업 구성원들의 성과극대화 노력이 기업전체 목표의 극대화로\n연결될 수 있도록 설계되어야 합니다.\n장과장 : 각 책임중심점의 성과평가를 수행하는 과정에서 성과측정의 오류가 발생하는 것이 일반적\n인데, 효율적인 성과평가제도는 성과평가치의 성과측정오류가 최소화되도록 설계되어야\n합니다.\n김대리 : 많은 시간과 비용을 투입할수록 더욱 정확하고 공정한 성과평가가 가능하므로 성과평가제\n도의 운영을 적시성 및 경제성의 잣대로 바라보지 않도록 주의해야 합니다.\n최사원 : 성과평가를 한다는 사실 자체가 피평가자의 행위에 영향을 미치는 현상도 고려하여 이를\n적절히 반영해야 합니다.","a":["유팀장","장과장","김대리","최사원"],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '김대리'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_원가_28","q":"다음은 ㈜삼일의 20X1년 이익중심점의 통제책임이 있는 A사업부의 공헌이익 손익계산서이다. A사업부\n의 성과평가목적에 가장 적합한 이익은 얼마인가?\n매 출 액 5,000,000 원\n변 동 원 가 2,000,000 원\n공 헌 이 익 3,000,000 원\n추적가능·통제가능고정원가 500,000 원\n사업부경영자공헌이익 2,500,000 원\n추적가능·통제불능고정원가 500,000 원\n사업부공헌이익 2,000,000 원\n공통고정원가배분액 400,000 원\n법인세비용차감전순이익 1,600,000 원\n법인세비용 600,000 원\n순 이 익 1,000,000 원","a":["1,000,000원","2,000,000원","2,500,000원","3,000,000원"],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (2,000,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_29","q":"㈜삼일은 A, B의 두 가지 제품을 생산하여 판매한다. 20X1 년 예산과 실제자료는 다음과 같다.\n<20X1 년 예산>\n판매수량 및 비율\n단위당 단위당\n제품종류\n판매가격 변동원가\n수량 비율\nA 800 원 500 원 4,000 개 40 %\nB 600 원 400 원 6,000 개 60 %\n합계 10,000 개 100 %\n<20X1 년 실제 결과>\n판매수량 및 비율\n단위당 단위당\n제품종류\n판매가격 변동원가\n수량 비율\nA 780 원 510 원 4,950 개 45 %\nB 560 원 390 원 6,050 개 55 %\n합계 11,000 개 100 %\n20X1 년 매출배합차이와 매출수량차이는 얼마인가?\n매출배합차이 매출수량차이","a":["55,000 원 유리 240,000 원 유리","55,000 원 불리 240,000 원 불리","60,000 원 유리 235,000 원 유리","60,000 원 불리 235,000 원 불리"],"c":0,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (55,000 원 유리 240,000 원 유리). 예산차이 = 실제원가 - 예산원가. 조업도차이와 능률차이로 세분화할 수 있습니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_30","q":"다음 중 투자중심점의 성과지표로 투자수익률(ROI : return on investment)을 사용할 때의 특징으로\n옳은 것은?","a":["준최적화 현상이 발생하지 않는다.","현금의 흐름을 기준으로 성과를 평가하므로 적용되는 회계기준과 무관한 결과를 도출한다.","투자규모가 다른 투자중심점의 상호 비교가 어렵다는 단점이 있다.","자본예산기법에 의한 성과평가에 비하여 단기적인 성과를 강조한다."],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '자본예산기법에 의한 성과평가에 비하여 단기적인 성과를 강조한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_원가_31","q":"다음 재무자료를 이용하여 계산한 경제적부가가치(EVA)가 14억원인 경우, 자기자본비용을 계산하면 얼\n마인가(단, 아래의 자료에서 법인세효과는 무시한다)?\n매출액 120억원\n매출원가 75억원\n판매비와관리비 15억원\n투하자본(타인자본 120억원, 자기자본 80억원) 200억원\n타인자본비용 6 %","a":["10 %","11 %","12 %","13 %"],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (11 %). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_32","q":"다음은 로스쿨과 관련한 신문기사 내용이다. 의사결정과 관련하여 괄호 안에 들어갈 용어로 옳은 것\n은?\n로스쿨은 도전할 만한 가치가 있는 것일까?\n로스쿨의 연간 등록금은 최소 8백만원에서 최대 2천만원이 넘는 곳까지 천차만별이다. 책값과\n생활비 등을 감안하면 사립대의 경우 로스쿨에 다니는 동안 9천만원 ~ 1억원 정도는 투자해야\n할 각오를 해야 한다.\n하지만 등록금보다 더 큰 부담은 ( )로 볼 수 있다. 직장에서 휴직을 허용하고, 로스쿨 진\n학 비용을 대주지 않는 한 직장인이 로스쿨에 다니려면 사표를 내야 한다. 연봉 3천만원인 직장\n인이 로스쿨을 다니기 위해 사표를 낸다면 3년 동안 ( )가 1억원에 이른다. 사립대 로스쿨\n에 들어간다면 ( )와 등록금까지 감안하여 2억원에 이르는 돈을 투자하는 것이다.","a":["추적불능원가","회피불능원가","기회원가","매몰원가"],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '기회원가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_9_원가_33","q":"㈜삼일의 손익계산서는 다음과 같다.\n제품단위당 판매가격 1,200원\n매출액 7,200,000원\n매출원가 3,200,000원\n매출총이익 4,000,000원\n판매비와관리비 2,700,000원\n영업이익 1,300,000원\n매출원가 중 1/4 과 판매비와관리비 중 2/3 가 고정비이다. 유휴생산능력이 있다고 할 경우, 제품단위\n당 500원에 700단위의 제품에 대한 추가주문을 받아들인다면 회사의 영업이익에 미치는 영향은 얼마인\n가(단, 추가주문 수락이 기존주문에 미치는 영향은 없는 것으로 가정한다)?","a":["35,000원 증가","35,000원 감소","75,000원 증가","75,000원 감소"],"c":1,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 2번 (35,000원 감소). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_34","q":"다음 중 의사결정에 관한 설명으로 옳지 않은 것은?","a":["현재 시설능력을 100 % 활용하고 있는 기업은 특별주문의 수락 여부를 고려할 때 동 주문생산에 따 른 추가 시설 임차료를 고려하여야 한다.","고정원가가 당해 의사결정과 관계없이 계속 발생한다면 해당 고정원가는 비관련원가이다.","제품라인 폐지 의사결정 시 유휴생산시설을 이용하여 발생시키는 수익을 고려하여야 한다.","부품의 자가제조 또는 외부구입 의사결정시 회피가능원가가 외부구입원가보다 작은 경우에는 외부 구입하는 것이 바람직하다."],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '부품의 자가제조 또는 외부구입 의사결정시 회피가능원가가 외부구입원가보다 작은 경우에는 외부 구입하는 것이 바'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_원가_35","q":"다음은 ㈜삼일의 제품별 예산자료이다.\n제품A 제품B\n단위당 공헌이익 300원 450원\n단위당 기계시간 3 h 5 h\n연간 최대 수요량 100단위 80단위\n㈜삼일의 연간 사용가능 기계시간이 400시간일 때, 이익을 극대화하기 위해서는 두 제품을 각각 몇 단\n위씩 생산하여야 하는가?\n제품A 제품B","a":["100단위 20단위","75단위 35단위","50단위 50단위","0단위 80단위"],"c":0,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '100단위 20단위'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_9_원가_36","q":"다음은 ㈜삼일의 신규투자담당 팀장과의 인터뷰 내용이다. 괄호 안에 들어갈 말로 옳지 않은 것은?\n기자: 신규 투자 기획팀에서 15년 동안 팀장을 맡고 계신데 신규 투자에 대한 타당성 검토에는 어떠\n한 모형들이 사용됩니까?\n팀장: 여러 모형이 있지만 우리 회사에서는 회수기간법, 순현재가치법, 내부수익률법, 수익성지수법을\n이용하여 타당성 검토를 합니다.\n기자: 그렇다면, 그 중에서 가장 중요시 하는 모형이 있습니까?\n팀장: 물론입니다. 투자안마다 약간 다르긴 하지만 우리 회사는 회수기간법을 가장 중요시 합니다.\n왜냐하면 ( )","a":["회수기간 이후의 현금흐름을 포함한 수익성을 고려하는 투자안이기 때문입니다.","투자자금을 빨리 회수하는 투자안을 선택하여 기업의 유동성확보에 도움을 줄 수 있기 때문입니다.","현금흐름의 할인을 고려하지 않고 계산할 수도 있는 장점이 있기 때문입니다.","회수기간이 짧을수록 안전한 투자안이라는 위험지표로서의 정보를 제공하기 때문입니다."],"c":0,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번. '회수기간 이후의 현금흐름을 포함한 수익성을 고려하는 투자안이기 때문입니다.'는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_9_원가_37","q":"㈜삼일은 당기 초 새로운 투자안에 950,000원을 투자하였다. 회사는 이 투자안으로부터 앞으로 5년\n동안 매년 말 280,000원의 세후 현금유입을 예측하고 있다. 회사의 최저필수수익률이 연 10 % 일 경우\n이 투자안의 순현재가치(NPV)는 얼마인가?\n연 10 %\n5년 현가계수 0.62\n5년 연금현가계수 3.79","a":["111,200원","120,000원","187,000원","279,000원"],"c":0,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 1번 (111,200원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_38","q":"다음은 투자안 타당성 평가와 관련한 담당이사들의 대화내용이다. 각 담당이사별로 선호하는 자본예산\n모형을 가장 올바르게 짝지은 것은?\n최이사 : 저는 투자안 분석의 기초자료가 재무제표이기 때문에 자료확보가 용이한 (a)모형을 가\n장 선호합니다.\n박이사 : (a)모형의 경우 현금흐름이 아닌 회계이익에 기초하고 있다는 단점이 있습니다. 그래\n서 저는 현금흐름을 기초로 화폐의 시간가치를 고려하는 (b)모형을 가장 선호합니다.\n이 모형은 투자기간 동안 자본비용으로 재투자된다고 보기 때문에 가장 현실적인 가정\n을 하고 있습니다.","a":["(a) 회계적이익률법 (b) 내부수익률법","(a) 내부수익률법 (b) 순현재가치법","(a) 회계적이익률법 (b) 순현재가치법","(a) 회수기간법 (b) 내부수익률법"],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번. '(a) 회계적이익률법 (b) 순현재가치법'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_9_원가_39","q":"㈜삼일은 A, B 두 개의 사업부를 가지고 있다. A사업부는 부품 갑을 생산하여 외부에 판매하거나 B사\n업부에 내부대체할 수 있다. A사업부의 연간 생산 및 판매자료는 다음과 같다.\n최대생산능력 20,000개\n외부수요량 18,000개\n단위당 판매가격 500원\n단위당 변동원가 250원\nB사업부는 부품 갑을 필요한 수량만큼 외부시장에서 370원에 구입할 수 있다. 만약 A사업부가 2,000개\n의 부품을 B사업부에 내부대체한다면 대체수량 1개당 회사전체이익이 얼마만큼 증가 또는 감소하겠는가\n(단, B사업부의 단위당 내부대체량의 순실현가치는 외부구입가격보다 크다)?","a":["20원 증가","20원 감소","120원 증가","120원 감소"],"c":2,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 3번 (120원 증가). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_9_원가_40","q":"다음 품질원가 도표에 대한 설명으로 옳지 않은 것은?\n< 도표A > < 도표B >\n원가\n원가 총품질원가\n총품질원가\nb\nb\na\na\n0 불량률\n0 불량률","a":["a는 통제원가를, b는 실패원가를 의미한다.","도표A는 허용가능품질관점(acceptable quality view)을 나타낸다.","전사적 품질관리시스템(TQC system)은 도표B의 관점을 반영한다.","무결함관점(zero-defects view)에서는 통제원가와 실패원가 사이에 항상 상반관계가 존재한다."],"c":3,"s":"원가관리회계","y":"2024년 9월","exam":"jaegyeong","exp":"정답 4번. '무결함관점(zero-defects view)에서는 통제원가와 실패원가 사이에 항상 상반관계가 존재한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_1","q":"다음 중 일반목적재무보고에 관한 설명으로 옳지 않은 것은?","a":["일반목적재무보고의 목적은 기업에 자원을 제공하는 것에 대한 의사결정을 할 때 유용한 보고기업의 재무정보를 제공하는 것이다.","현대 회계에서는 계량화하기 어려운 비재무적 정보를 제외하는 재무보고의 개념을 사용하고 있다.","감독당국 및 일반 대중도 일반목적재무보고를 유용하게 활용할 수 있다.","현재 및 잠재적인 투자자, 대여자와 그 밖의 채권자가 일반목적재무보고의 주요 이용자에 해당한다."],"c":1,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '현대 회계에서는 계량화하기 어려운 비재무적 정보를 제외하는 재무보고의 개념을 사용하고 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_2","q":"다음 중‘재무보고를 위한 개념체계’의 목적과 위상에 관한 설명으로 옳지 않은 것은?","a":["특정거래나 다른사건에 적용할 회계기준이 없거나 회계기준에서 회계정책 선택이 허용되는 경우에 재 무제표 작성자가 일관된 회계정책을 개발하는데 도움을 준다.","모든 이해관계자가 회계기준을 이해하고 해석하는데 도움을 준다.","재무보고를 위한 개념체계는 한국채택국제회계기준의 일부이므로 다른 기준서들과 동등한 지위를 가 진다.","한국회계기준위원회가 일관된 개념에 기반하여 한국채택국제회계기준을 제·개정하는 데 도움을 준 다."],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '재무보고를 위한 개념체계는 한국채택국제회계기준의 일부이므로 다른 기준서들과 동등한 지위를 가 진다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_3","q":"다음 중 목적적합성과 표현충실성에 관한 설명으로 옳지 않은 것은?","a":["재무정보가 유용하기 위해서는 목적적합하고 나타내고자 하는 바를 충실하게 표현해야 한다.","재무정보가 목적적합성을 가지기 위해서는 서술이 완전하고, 중립적이며, 오류가 없어야 할 것이다.","목적적합한 재무정보는 정보이용자의 의사결정에 차이가 나도록 할 수 있다.","재무정보에 예측가치와 확인가치 또는 이 둘 모두가 있다면 의사결정에 차이가 나도록 할 수 있다."],"c":1,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '재무정보가 목적적합성을 가지기 위해서는 서술이 완전하고, 중립적이며, 오류가 없어야 할 것이다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_4","q":"다음 중 포괄손익계산서의 구성요소 중 기타포괄손익으로 분류될 항목으로 적절하지 않은 것은?","a":["유형자산의 재평가잉여금 변동","확정급여제도의 재측정요소","기타포괄손익-공정가치 측정 금융자산의 평가손실","투자부동산의 평가손익"],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '투자부동산의 평가손익'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_5","q":"다음 중 보고기간후사건에 관한 설명으로 옳지 않은 것은?","a":["수정을 요하는 보고기간후사건의 예로 보고기간 말과 재무제표 발행 승인일 사이에 발견한 보고기간 말 재무제표가 부정확하다는 것을 보여주는 오류를 들 수 있다.","수정을 요하지 않는 보고기간후사건으로서 중요한 것은 그 범주별로 사건의 성격이나 사건의 재무적 영향에 대한 추정치 등을 공시하여야 한다.","수정을 요하지 않는 보고기간후사건의 예로 보고기간 말 이전에 구입한 자산의 취득원가나 매각한 자 산의 대가를 보고기간 후에 결정하는 경우 등을 들 수 있다.","수정을 요하는 보고기간후사건이란 보고기간 말에 존재하였던 상황에 대해 증거를 제공하는 사건을 말한 다."],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '수정을 요하지 않는 보고기간후사건의 예로 보고기간 말 이전에 구입한 자산의 취득원가나 매각한 자 산의 대가를'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_6","q":"다음 중 재고자산에 관한 설명으로 옳지 않은 것은?","a":["특정한 고객을 위한 비제조 간접원가 또는 제품 디자인원가는 재고자산의 원가에 포함할 수 없다.","후속 생산단계에 투입하기 전에 필수적으로 발생하는 보관원가는 재고자산의 취득원가에 포함한다.","판매원가는 재고자산의 취득원가에 포함하지 않는다.","재고자산을 현재의 장소에 현재의 상태로 이르게 하는데 기여하지 않은 관리간접원가는 재고자산의 취득원가에 포함하지 않는다."],"c":0,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '특정한 고객을 위한 비제조 간접원가 또는 제품 디자인원가는 재고자산의 원가에 포함할 수 없다.'는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_7","q":"다음 중 재고자산의 원가흐름에 대한 가정에 관한 설명으로 옳지 않은 것은?","a":["한국채택국제회계기준은 재고자산의 단위원가 결정방법으로 개별법, 선입선출법, 가중평균법의 적용 을 허용하고 있다.","성격과 용도가 유사하더라도 재고자산의 지역별 위치나 과세방식이 다른 경우에는 재고자산의 단위원 가 결정방법을 서로 다르게 적용할 수 있다.","회계기간 중에 재고자산의 취득단가가 계속 상승하는 상황에서 기말재고수량이 기초재고수량보다 같 거나 많은 경우 선입선출법 하의 기말재고자산은 가중평균법 하의 기말재고자산보다 더 크게 계상된 다.","회계기간 중에 재고자산의 취득단가가 계속 상승하는 상황에서 기말재고수량이 기초재고수량보다 같 거나 많은 경우 선입선출법 하의 당기순이익은 가중평균법 하의 당기순이익보다 더 크게 계상된다."],"c":1,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '성격과 용도가 유사하더라도 재고자산의 지역별 위치나 과세방식이 다른 경우에는 재고자산의 단위원 가 결정방법을'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_8","q":"다음은 여성의류를 수입하여 판매하는 ㈜삼일의 상품재고 현황이다. ㈜삼일은 섬유신소재의 개발로 인하\n여 상품재고를 다음연도로 이월하며, 이를 정상가격으로 판매하기가 곤란하다고 판단하였다. ㈜삼일의\n기말 재고자산평가충당금 잔액은 얼마인가?\n단위당 단위당\n장부수량 실사수량\n장부금액 순실현가능가치\n의류 1,200개 4,000원 1,000개 3,200원","a":["0원","800,000원","1,000,000원","1,800,000원"],"c":1,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (800,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_9","q":"다음 중 유형자산의 취득원가에 포함되는 요소만 바르게 짝지은 것은?\nㄱ. 설치장소 준비를 위한 지출 ㄴ. 최초의 운송 및 취급관련 원가\nㄷ. 보유중인 건물에 대하여 부과되는 재산세 ㄹ. 새로운 시설을 개설하는데 소요되는 원가","a":["ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"c":0,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. 'ㄱ, ㄴ'. 유형자산은 취득원가로 인식 후 감가상각을 통해 내용연수에 걸쳐 비용화합니다. ","src":"cbt"},{"id":"jg_11_재무_10","q":"다음 중 유형자산에 관한 설명으로 옳지 않은 것은?","a":["유형자산은 기업이 재화나 용역의 생산 등에 사용할 목적으로 보유하는 자산이다.","유형자산은 통상적으로 한 회계기간을 초과하여 사용될 것이 예상된다.","예비부품이나 대기성 장비는 유형자산의 정의를 충족하더라도 재고자산으로 분류하여야 한다.","모든 유형자산에 대하여 감가상각이 필요한 것은 아니다."],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '예비부품이나 대기성 장비는 유형자산의 정의를 충족하더라도 재고자산으로 분류하여야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_11","q":"㈜삼일은 20X1 년 1 월 1 일 임직원 연수동의 건설에 착공하였다. 회사가 20X1 년 중 동 연수동 신축과\n관련하여 지출한 금액과 회사의 차입금 현황은 다음과 같다. 완공까지 약 3년이 소요될 예정일 경우,\n㈜삼일이 20X1 년에 자본화 할 차입원가는 얼마인가?\n지 출 일 지 출 액 비 고\n20X1. 01. 01 10,000,000 원 공사착공\n20X1. 07. 01 12,000,000 원\n20X1. 09. 01 9,000,000 원\n차 입 처 차 입 일 차 입 금 연 이 자 율 용 도\nK 은행 20X1. 01. 01 8,000,000 10 % 특정목적차입금\nS 은행 20X1. 04. 01 20,000,000 8 % 일반목적차입금","a":["800,000 원","1,600,000 원","1,680,000 원","2,000,000 원"],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (1,680,000 원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_12","q":"제약회사인 ㈜삼일은 20X1년 초에 설립되었으며, 암 치료용 신약 연구·개발 프로젝트를 진행 중에 있\n다. 다음은 20X1년 동안 암 치료용 신약 연구·개발 프로젝트A에 소요된 지출들이다.\n단계 지출시점 지출액\n연구단계 20X1년 1월 1일 100,000원\n20X1년 5월 1일 150,000원\n개발단계\n20X1년 9월 1일 200,000원\n20X1년 말에 종료되는 회계연도에 개발비(무형자산)로 인식할 금액과 당기비용으로 인식할 금액은 얼\n마인가(단, 프로젝트A의 개발단계 지출액은 모두 무형자산인식요건을 충족하였으며, 개발비는 20X2년\n부터 사용가능 하다고 가정한다)?\n개발비(무형자산) 당기비용","a":["200,000원 0원","200,000원 100,000원","350,000원 100,000원","350,000원 200,000원"],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '350,000원 100,000원'. 무형자산은 물리적 실체가 없는 식별가능한 비화폐성자산으로, 상각/비상각 자산으로 구분됩니다. ","src":"cbt"},{"id":"jg_11_재무_13","q":"다음 중 무형자산의 회계처리에 관한 설명으로 옳지 않은 것은?","a":["내용연수가 유한한 무형자산은 매 보고기간 말에 손상검사를 수행하여야 한다.","내용연수가 유한한 무형자산은 자산을 사용할 수 있는 날부터 상각한다.","내용연수가 유한한 무형자산의 경제적 효익이 소비되는 형태를 신뢰성있게 결정할 수 없는 경우에는 정액법을 적용하여 상각한다.","내용연수가 유한한 무형자산의 상각기간은 적어도 매 회계연도 말에 검토한다."],"c":0,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '내용연수가 유한한 무형자산은 매 보고기간 말에 손상검사를 수행하여야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_14","q":"다음 중 투자부동산의 계정대체에 관한 설명으로 옳지 않은 것은?","a":["원가모형 적용 임대수익 목적의 건물을 자가사용으로 전환하면 투자부동산을 유형자산으로 대체한 다.","자가사용건물을 제3자에게 운용리스로 제공하는 경우에는 투자부동산으로 분류한다.","공정가치모형 적용 임대수익 목적의 건물을 자가사용으로 전환하면 유형자산으로 분류하고 대체시점 에서 발생한 재평가차액을 기타포괄손익으로 인식한다.","유형자산을 공정가치로 평가하는 투자부동산으로 대체하는 경우 용도 변경시점의 장부금액과 공정가 치의 차액을 유형자산 재평가와 동일하게 회계처리한다."],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '공정가치모형 적용 임대수익 목적의 건물을 자가사용으로 전환하면 유형자산으로 분류하고 대체시점 에서 발생한 재'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_15","q":"다음 중 금융상품에 관한 설명으로 옳지 않은 것은?","a":["금융자산은 현금 뿐만 아니라 다른 기업의 지분상품, 거래상대방에게서 현금 등 금융자산을 수취할 계약상의 권리 등을 포함하는 포괄적인 개념이다.","한국채택국제회계기준은 보유자에게 금융자산을 발생시키고 동시에 상대방에게 금융부채나 지분상품 을 발생시키는 모든 계약을 금융상품으로 정의하였다.","매입채무와 미지급금은 금융부채에 해당한다.","확정수량의 자기지분상품을 인도할 계약상의 의무는 금융부채에 해당한다."],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '확정수량의 자기지분상품을 인도할 계약상의 의무는 금융부채에 해당한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_16","q":"㈜삼일은 ㈜용산의 주식을 취득하고, 이를 기타포괄손익-공정가치 측정 금융자산으로 분류하였다. ㈜용\n산의 주식과 관련된 자료가 아래와 같고, 다른 거래가 없다고 가정할 경우, 다음 설명 중 옳은 것은\n(단，㈜용산 주식의 취득과 처분은 공정가치로 한다)?\n구 분 20X1년 기중 20X1년 기말 20X2년 기말 20X3년 기중\n회계처리 취득 후속평가 후속평가 처분\n공정가치 100,000원 110,000원 90,000원 120,000원\n거래원가 1,000원 - - -","a":["20X1년 기타포괄손익-공정가치 측정 금융자산의 취득원가는 100,000원 이다.","기타포괄손익-공정가치 측정 금융자산에 대한 회계처리가 20X1년 당기순이익에 미치는 영향은 10,000원 증가이다.","기타포괄손익-공정가치 측정 금융자산에 대한 회계처리가 20X2년 기타포괄이익에 미치는 영향은 20,000원 감소이다.","기타포괄손익-공정가치 측정 금융자산에 대한 회계처리가 20X3년 당기순이익에 미치는 영향은 30,000원 증가이다."],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '기타포괄손익-공정가치 측정 금융자산에 대한 회계처리가 20X2년 기타포괄이익에 미치는 영향은 20,000원 '이 올바른 설명입니다. 기타포괄손익은 후속적으로 당기손익으로 재분류되는 항목(해외사업환산손익 등)과 되지 않는 항목(재평가잉여금 등)으로 구분됩니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_재무_17","q":"다음과 같은 조건의 사채를 발행하여 상각후원가로 측정할 경우 동 사채로 인하여 20X2년에 인식해야\n하는 이자비용은 얼마인가(단, 단수차이가 있는 경우 가장 근사치를 선택한다)?\nㄱ. 액면금액 : 10,000,000원\nㄴ. 발행일 : 20X1년 1월 1일\nㄷ. 만기일 : 20X3년12 월 31일\nㄹ. 액면이자율 및 이자지급조건 : 연 5 %, 매년 말 지급\nㅁ. 발행일의 시장이자율 : 연 6 %\nㅂ. 이자율 6 %, 3년 연금현재가치계수 : 2.6730\n이자율 6 %, 3년 현재가치계수 : 0.8396","a":["583,950원","588,987원","594,326원","600,000원"],"c":1,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (588,987원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_18","q":"㈜삼일은 20X1년 1월 1일에 만기 3년, 표시이자율 연 7 %, 이자는 매년 말에 지급하는 액면금액\n3,000,000원의 전환사채를 상환할증조건부로 액면발행하였다. ㈜삼일은 전환사채의 만기일에 액면금액\n의 115 % 로 상환한다. 일반사채의 시장이자율이 연 12 % 라고 할 때 발행시점에 계상할 전환권대가와\n전환권조정은 각각 얼마인가(전환권대가는 자본으로 분류되며, 12 %, 3 년의 현재가치계수는 0.7118 이\n고, 12 %, 3 년의 연금현재가치계수는 2.4018 이다)?\n전환권대가 전환권조정","a":["39,912원 39,912원","39,912원 450,000원","39,912원 489,912원","450,000원 489,912원"],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (39,912원 489,912원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_19","q":"다음 중 금융부채 등의 회계처리에 관한 설명으로 옳지 않은 것은?","a":["사채의 발행회사가 자기가 발행한 사채(자기사채)를 재취득한 경우에는 사채의 조기상환으로 보아 재취득금액과 사채 장부금액의 차액을 사채상환손익으로 회계처리한다.","상환우선주의 보유자가 상환을 청구할 수 있는 권리를 보유하는 경우, 해당 상환우선주의 발행자는 동 상환우선주를 지분상품으로 분류한다.","금융부채는 계약상 의무가 이행, 취소 또는 만료되어 소멸한 경우 재무상태표에서 제거한다.","기존 채무자와 채권자가 실질적으로 다른 조건으로 채무상품을 교환하여 금융부채의 조건이 실질적 으로 변경된 경우에는 금융부채를 제거하고 새로운 금융부채를 발행한 것으로 본다."],"c":1,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '상환우선주의 보유자가 상환을 청구할 수 있는 권리를 보유하는 경우, 해당 상환우선주의 발행자는 동 상환우선주'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_20","q":"㈜삼일은 제조상의 결함이나 하자에 대하여 1년간 제품보증을 시행하고 있다. 20X1년 7월 1일에 판매\n된 5,000,000원의 제품에서 중요하지 않은 결함이 발견된다면 70,000원의 수리비용이 발생하고, 치명\n적인 결함이 발생하면 140,000원의 수리비용이 발생할 것으로 예상한다. 20X1년 7월 1일의 매출액\n5,000,000원에 대하여 판매된 제품의 80 % 에는 하자가 없을 것으로 예상하고, 제품의 15 % 는 중요하\n지 않은 결함이 발견될 것으로 예상하고, 5 % 는 치명적인 결함이 있을 것으로 예상하였다. ㈜삼일이\n20X1년 말에 인식할 제품보증충당부채의 금액은 얼마인가(단, 20X1년에는 결함이나 하자가 발생하지\n않았다)?","a":["7,500원","10,000원","17,500원","20,500원"],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (17,500원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_21","q":"다음은 ㈜삼일의 자본변동표이다. 다음 중 자본변동표 표시방법으로 옳지 않은 것은?\n자본변동표\n㈜삼일 제12기 20X1년1월1일부터 20X1년 12월 31일까지 (단위 : 백만원)\n이익\n구분 자본금 자본잉여금 자본조정 합계\n잉여금\n기초 XXX XXX XXX XXX XXX","a":["유상증자 100 - - - 100","자기주식취득 30 - - 30","당기순이익 - - - 10 10","현금배당금 지급 - - - (20) (20) 기말 XXX XXX XXX XXX XXX"],"c":1,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '자기주식취득 30 - - 30'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_22","q":"㈜삼일은 20X1년 초 설립된 회사로 설립시에 보통주와 우선주를 모두 발행하였다. 설립일 이후 자본금\n의 변동은 없었으며, 20X2년 12월 31일 현재 보통주자본금과 우선주자본금은 다음과 같다. ㈜삼일은\n설립된 이후 어떠한 배당도 하지 않았으나 20X2년 12월 31일로 종료되는 회계연도의 정기주주총회에서\n배당금 총액을 190,000원으로 선언할 예정일 경우, 우선주 주주에게 배분될 배당금을 계산하면 얼마인\n가?\n구분 주당액면금액 발행주식수 자본금\n보통주 1,000원 1,000주 1,000,000원\n우선주(*) 1,000원 500주 500,000원\n* 누적적·완전 참가적 우선주, 배당률 5 %","a":["25,000원","50,000원","75,000원","80,000원"],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (80,000원). 자본변동 = 당기순이익 + 기타포괄손익 - 배당금 ± 자본거래. 회계등식(자산=부채+자본)을 기반으로 분석합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_23","q":"기업은 고객에게 약속한 재화나 용역을 이전하여 수행의무를 이행할 때 수익을 인식하여야 하는데, 만\n약 수행의무가 한 시점에 이행되는 경우라면 고객이 약속된 자산을 통제하고 기업이 의무를 이행하는\n시점에서 수익을 인식한다. 여기서 고객이 자산을 통제하는 시점의 예로 옳지 않은 것은?","a":["판매기업에게 자산에 대해 현재 지급청구권이 있다.","판매기업이 자산의 물리적 점유를 이전하였다.","고객이 자산을 인수하였다.","자산의 소유에 따른 유의적인 위험과 보상이 판매기업에게 있다."],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '자산의 소유에 따른 유의적인 위험과 보상이 판매기업에게 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_24","q":"다음 중 거래유형별 수익인식에 관한 설명으로 옳지 않은 것은?","a":["배당금수익은 배당금을 받을 권리와 금액이 확정되는 시점에 인식한다.","위탁판매는 수탁자가 고객에게 판매한 시점에 수익을 인식한다.","장기할부판매로 수취할 대가의 총액은 재화가 인도되는 시점에 일괄하여 수익으로 인식한다.","시용판매의 경우 고객이 매입의사를 표시한 시점에 수익을 인식한다."],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '장기할부판매로 수취할 대가의 총액은 재화가 인도되는 시점에 일괄하여 수익으로 인식한다.'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_25","q":"㈜삼일은 고객의 구매액 2원당 1포인트의 고객충성포인트를 고객에게 부여하는 고객충성제도를 운영하\n고 있다. 각 포인트는 고객이 미래에 기업의 제품을 구매할 때 1원을 할인받을 수 있다. ㈜삼일은\n20X1년에 제품을 400,000원에 판매하고, 200,000포인트를 고객에게 부여하였다. 제품의 개별 판매가격\n은 400,000원이다. ㈜삼일은 부여한 포인트 중 50 % 가 교환될 것으로 예상하였고, 부여한 200,000포\n인트의 개별판매가격을 100,000원으로 추정하였다. 이러한 예상은 20X1년 말까지 변함이 없다고 가정\n한다. 20X1년에 실제 교환된 포인트가 30,000포인트일 때, 20X1년 말 재무상태표에 표시될 계약부채는\n얼마인가?","a":["32,000원","56,000원","64,000원","80,000원"],"c":1,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (56,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_26","q":"㈜서울은 20X1년 2월 5일에 ㈜부산과 공장건설계약을 맺었다. 총공사계약액은 130,000,000원이며 ㈜\n서울은 누적발생계약원가에 기초하여 진행률을 산정하여 진행기준에 따라 수익을 인식한다. ㈜서울의\n건설계약과 관련한 20X1년 자료는 다음과 같다. ㈜서울의 20X1년 말 재무상태표상 계약부채(초과청구\n공사) 또는 계약자산(미청구공사) 금액은 얼마인가?\n누적발생원가 추정총계약원가 공사대금청구액\n12,000,000원 100,000,000원 18,000,000원","a":["계약부채(초과청구공사) 2,400,000원","계약부채(초과청구공사) 6,000,000원","계약자산(미청구공사) 2,400,000원","계약자산(미청구공사) 6,000,000원"],"c":0,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번 (계약부채(초과청구공사) 2,400,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_27","q":"확정급여제도를 시행하고 있는 ㈜삼일의 20X1년 퇴직급여와 관련된 정보는 다음과 같다. 20X1년에 확\n정급여채무와 관련하여 발생한 재측정요소는 얼마인가?\n· 20X1년 초 확정급여채무의 현재가치 60,000원\n· 당기근무원가 39,000원\n· 이자원가 6,000원\n· 퇴직급여지급액 7,000원\n· 20X1년 말 보험수리적 가정의 변동을 반영한 확정급여채무의 현재가치 110,000원","a":["2,000원","8,000원","10,000원","12,000원"],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (12,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_28","q":"㈜삼일은 20X1년 1월 1일 임원 10명에게 3년의 용역제공조건(20X1년 1월 1일부터 20X3년 12월 31\n일)으로 1인당 주식결제형 주식선택권 100개를 부여하였다. 부여일 현재 주식선택권의 단위당 공정가\n치는 100원으로 추정되었다. 20X1년말과 20X2년말 추정권리상실률은 10 % 로 예상되었으며, 20X3년\n말 실제권리상실률은 15 % 이다. ㈜삼일이 20X3년 중 인식할 주식보상비용은 얼마인가(단, 제시된 권리\n상실률은 가득기간 전체의 권리상실률이다)?","a":["20,000원","22,500원","25,000원","27,500원"],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (25,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_29","q":"㈜삼일은 20X1년에 영업을 개시하였다. ㈜삼일의 과세소득과 관련된 자료는 다음과 같다. 20X1년 말\n재무상태표에 계상될 이연법인세자산(부채)(A)과 포괄손익계산서에 계상될 법인세비용(B)은 각각 얼마\n인가?\n법인세비용차감전순이익 3,000,000원\n가산(차감)조정\n일시적차이가 아닌 차이 600,000원\n일시적차이 (800,000원)\n과세표준 2,800,000원(세율 20 %)\n< 추가자료 >\nㄱ. 일시적차이가 사용될 수 있는 미래과세소득의 발생가능성은 높다고 가정한다.\nㄴ. 일시적차이는 20X2년, 20X3년에 걸쳐 400,000원씩 소멸하며, 미래에도 세율의 변동은 없는\n것으로 가정한다.\n(A) (B)","a":["이연법인세부채 120,000원 560,000원","이연법인세자산 120,000원 560,000원","이연법인세자산 160,000원 480,000원","이연법인세부채 160,000원 720,000원"],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (이연법인세부채 160,000원 720,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_30","q":"다음 중 법인세회계에 관한 설명으로 옳지 않은 것은(단, 미래에 충분한 과세소득이 발생한다고 가정한\n다)?","a":["가산할 일시적차이는 이연법인세부채를 발생시킬 수 있다.","차감할 일시적차이는 이연법인세자산을 발생시킬 수 있다.","이연법인세자산과 부채는 현재가치로 평가하지 않으며, 유동자산(부채)으로 분류한다.","미사용 세무상결손금과 세액공제는 이연법인세자산을 발생시킬 수 있다."],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '이연법인세자산과 부채는 현재가치로 평가하지 않으며, 유동자산(부채)으로 분류한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_31","q":"㈜삼일은 20X1년 7월 1일 500,000원 (내용연수 5년, 잔존가치 50,000원)에 건물을 취득하고, 20X1\n년 말 정액법으로 감가상각 하였다. 그런데 ㈜삼일은 건물에 내재된 미래경제적효익의 예상되는 소비형\n태의 유의적인 변동을 반영하기 위하여, 20X2년 초부터 감가상각방법을 연수합계법으로 변경하고 잔존\n내용연수는 3 년, 잔존가치는 없는 것으로 재추정하였다. 20X2년 말 건물의 장부금액을 계산하면 얼마\n인가(감가상각은 월할 상각하며, 건물에 대한 손상차손누계액은 없다)?","a":["210,000원","225,000원","227,500원","230,000원"],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (227,500원). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_32","q":"다음 중 기본주당이익의 계산에 관한 설명으로 옳지 않은 것은?","a":["당해 회계기간과 관련한 누적적 우선주에 대한 세후배당금은 배당결의 여부에 관계없이 당기순이익 에서 차감한다.","기본주당이익은 보통주에 귀속되는 특정 회계기간의 당기순손익을 그 기간의 유통된 보통주식수를 가중평균한 주식수로 나누어 계산한다.","자기주식은 취득시점 이후부터 매각시점까지의 기간동안 유통보통주식수에 포함하지 아니한다.","기중에 유상증자 등으로 발행된 신주에 무상증자가 실시된 경우에는 기초에 실시된 것으로 간주하여 가중평균유통보통주식수를 조정한다."],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '기중에 유상증자 등으로 발행된 신주에 무상증자가 실시된 경우에는 기초에 실시된 것으로 간주하여 가중평균유통보'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_33","q":"다음 중 관계기업에 대한 지분법 회계처리에 관한 설명으로 옳지 않은 것은?","a":["투자자가 피투자자에 대해 유의적인 영향력을 행사할 수 있는 경우에 적용한다.","투자자는 지분법을 적용할 때 가장 최근의 이용가능한 관계기업의 재무제표를 사용한다.","피투자자로부터 배당금수취시 투자주식 원본의 회수로 보아 관계기업투자주식의 장부금액을 감소시 킨다.","관계기업투자주식을 최초 인식할 때 발생하는 영업권은 투자자산의 장부금액에 포함하지 않고, 별도 로 인식한다."],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '관계기업투자주식을 최초 인식할 때 발생하는 영업권은 투자자산의 장부금액에 포함하지 않고, 별도 로 인식한다.'는 잘못된 설명입니다. 실제로는 포함되는 항목입니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_34","q":"20X1년 초 ㈜삼일은 ㈜한양의 보통주 40 % 를 900,000원에 취득하여 유의적인 영향력을 행사하게 되었\n다. 주식취득일 현재 ㈜한양의 순자산장부금액은 2,000,000원으로 공정가치와 동일하였다. ㈜한양의\n20X1년 당기순이익이 300,000원이고, 총포괄이익이 500,000원이라고 할 때 이를 반영하는 회계처리가\n㈜삼일의 20X1년도 기타포괄이익에 미치는 영향은 얼마인가?","a":["40,000원 증가","40,000원 감소","80,000원 증가","80,000원 감소"],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (80,000원 증가). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_35","q":"다음 중 환율변동효과에 관한 설명으로 옳지 않은 것은?","a":["재무제표를 표시할 때 사용되는 통화를 표시통화라고 한다.","기능통화와 표시통화가 서로 다른 경우 기능통화로 표시된 재무제표를 표시통화로 환산하여야 한다.","표시통화는 영업활동이 이루어지는 주된 경제환경의 통화로서, 기업과 관련된 실제 거래, 사건과 상 황을 반영하여 결정되어야 하다.","기능통화가 변경되는 경우에는 새로운 기능통화에 의한 환산절차를 변경한 날부터 전진적용한다."],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '표시통화는 영업활동이 이루어지는 주된 경제환경의 통화로서, 기업과 관련된 실제 거래, 사건과 상 황을 반영하'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_36","q":"다음 중 파생상품 및 위험회피회계에 관한 설명으로 옳지 않은 것은?","a":["위험회피수단으로 지정되지 않고 매매목적으로 보유하고 있는 파생상품의 평가손익은 당기손익으로 인식한다.","위험회피대상항목이 미래에 예상되는 거래로서 당해 거래에 따른 미래현금흐름변동을 상쇄하기 위하 여 현금흐름위험회피회계를 적용할 수 있다.","인식된 자산, 부채, 확정계약은 공정가치위험회피회계의 위험회피대상항목이 될 수 있다.","위험회피대상이 기타포괄손익-공정가치 측정 금융자산인 지분상품일 경우 위험회피수단인 파생상품 의 평가손익은 당기손익으로 인식한다."],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '위험회피대상이 기타포괄손익-공정가치 측정 금융자산인 지분상품일 경우 위험회피수단인 파생상품 의 평가손익은 당'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_37","q":"㈜삼일은 20X1년 1월 1일 ㈜용산과 기계장치에 대한 리스계약을 다음과 같이 체결하였다. 20X2년 말\n㈜용산이 인식해야 할 리스부채를 계산하면 얼마인가(단, 단수차이가 발생하는 경우 가장 근사치를 선\n택한다)?\nㄱ. 리스료 : 매년 말 200,000원씩 지급\nㄴ. 20X1년 1월 1일 현재 리스부채의 현가 : 758,158원\nㄷ. 리스부채 측정시 사용한 내재이자율 : 연 10 %\nㄹ. 리스기간 : 5년","a":["497,371원","576,583원","633,974원","698,476원"],"c":0,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번 (497,371원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_38","q":"다음은 ㈜삼일의 20X1년 영업활동에 관련된 자료이다. 20X1년 12월 31일로 종료되는 회계연도에 ㈜삼\n일의 현금흐름표에 보고되어야 할 영업활동 현금흐름은 얼마인가(단, 상기 자료 이외에 간접법으로 현\n금흐름표 작성 시 고려할 사항은 없다고 가정한다)?\n·당기순이익 15,000,000원\n·매출채권의 증가 3,000,000원\n·매입채무의 감소 2,500,000원\n·감가상각비 1,000,000원\n·유형자산처분이익 500,000원","a":["8,500,000원","9,000,000원","10,000,000원","10,500,000원"],"c":2,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (10,000,000원). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_재무_39","q":"현금흐름표의 작성방법에는 직접법과 간접법이 있다. 다음 중 현금흐름표의 작성방법에 관한 설명으로\n옳지 않은 것은?","a":["직접법은 현금흐름을 개별항목별로 파악할 수 있기 때문에 거래유형별 현금흐름의 내용을 쉽게 파악 할 수 있다.","간접법은 당기순이익과 영업활동으로 인한 현금흐름과의 차이를 명확하게 보여준다.","간접법으로 영업활동현금흐름을 작성하더라도 이자 및 배당금수취, 이자 및 배당금지급, 법인세 납 부는 직접법을 적용한 것처럼 별도로 표시해야 한다.","직접법과 간접법은 영업활동뿐만 아니라 투자활동 및 재무활동도 현금흐름표상의 표시방법이 다르 다."],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '직접법과 간접법은 영업활동뿐만 아니라 투자활동 및 재무활동도 현금흐름표상의 표시방법이 다르 다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_재무_40","q":"다음 중 현금흐름표 작성시 현금흐름의 유형구분에 관한 설명으로 옳지 않은 것은?","a":["종업원과 관련하여 직·간접적으로 발생하는 현금유출은 영업활동 현금흐름으로 분류한다.","법인세의 납부 또는 환급과 관련된 현금흐름은 재무와 투자활동에 명백히 관련되어 있지 않는 한 영 업활동 현금흐름으로 분류한다.","다른 기업의 지분상품 취득에 따른 현금유출은 투자활동으로 분류하는 것이 원칙이지만, 단기매매목 적으로 보유하는 상품의 취득에 따른 현금유출은 영업활동 현금흐름으로 분류한다.","리스이용자의 리스부채 상환에 따른 현금흐름은 영업활동 현금흐름으로 분류한다."],"c":3,"s":"재무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '리스이용자의 리스부채 상환에 따른 현금흐름은 영업활동 현금흐름으로 분류한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_1","q":"다음 중 조세의 분류에 관한 설명으로 옳지 않은 것은?","a":["조세는 과세권자에 따라 국세와 지방세로 분류한다.","농어촌특별세는 조세의 사용용도를 특정하여 징수하는 목적세에 해당한다.","소득세는 납세자의 인적사항이 고려되는 인세(人稅)에 해당한다.","개별소비세는 입법상 조세부담의 전가를 예상하지 아니한 조세이므로 직접세에 해당한다."],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '개별소비세는 입법상 조세부담의 전가를 예상하지 아니한 조세이므로 직접세에 해당한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_2","q":"다음 중 국세기본법상 특수관계인에 관한 설명으로 옳지 않은 것은?","a":["본인이 법인인 경우 해당 법인의 임원은 특수관계인에 해당한다.","본인이 개인인 경우 해당 개인의 배우자(사실상의 혼인관계에 있는 자를 제외한다)는 특수관계인에 해당한다.","본인이 개인인 경우 해당 개인의 4촌 이내의 혈족은 특수관계인에 해당한다.","본인이 개인인 경우 3촌 이내의 인척은 특수관계인에 해당한다."],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '본인이 개인인 경우 해당 개인의 배우자(사실상의 혼인관계에 있는 자를 제외한다)는 특수관계인에 해당한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_3","q":"다음 중 국세기본법상 국세부과의 원칙 및 세법적용의 원칙에 관한 설명으로 옳지 않은 것은?","a":["실질과세의 원칙은 조세평등주의를 구체화한 국세부과의 원칙이다.","소급과세금지의 원칙이란 세법의 해석이나 국세행정의 관행이 일반적으로 납세자에게 받아들여진 후 에는 그 해석이나 관행에 의한 행위 또는 계산은 정당한 것으로 보며, 새로운 해석이나 관행에 의하 여 소급하여 과세하지 아니하는 것을 말한다.","납세자가 그 의무를 이행할 때 신의에 따라 성실하게 할 것을 요구하는 신의성실의 원칙은 세무공무 원이 직무를 수행할 때에는 적용되지 아니한다.","근거과세의 원칙에 의해 국세를 조사ㆍ결정할 때, 장부의 기록내용이 사실과 다르거나 장부의 기록 에 누락된 것이 있을 때에는 그 부분에 대해서만 과세관청이 조사한 사실에 따라 결정할 수 있다."],"c":2,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '납세자가 그 의무를 이행할 때 신의에 따라 성실하게 할 것을 요구하는 신의성실의 원칙은 세무공무 원이 직무를'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_4","q":"다음 중 국세기본법상 가산세에 관한 설명으로 옳지 않은 것은?","a":["가산세는 해당 의무가 규정된 세법의 해당 국세의 세목으로 하나, 해당 국세를 감면하는 경우에도 가산세는 그 감면대상에 포함시키지 아니하는 것으로 한다.","법정신고기한이 지난 후 2년 이내에 수정신고한 경우에도 과세표준과 세액을 경정할 것을 미리 알 고 과세표준수정신고서를 제출한 경우는 과소신고·초과환급신고가산세를 감면하지 아니한다.","부가가치세법에 따른 사업자가 영세율과세표준을 과소신고한 경우 과소신고한 영세율과세표준의 1% 를 과소신고·초과환급신고가산세에 더한다.","법정신고기한이 지난 후 1개월 이내에 기한 후 신고를 한 경우 무신고가산세의 50%에 상당하는 금 액을 감면한다."],"c":2,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '부가가치세법에 따른 사업자가 영세율과세표준을 과소신고한 경우 과소신고한 영세율과세표준의 1% 를 과소신고·초'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_5","q":"다음 중 법인세법상 사업연도에 관한 설명으로 옳지 않은 것은?","a":["사업연도는 법령이나 법인의 정관(定款) 등에서 정하는 1회계기간으로 하되, 그 기간은 1년을 초과 하지 못한다.","내국법인의 최초사업연도 개시일은 사업자등록을 한 날로 한다.","사업연도를 변경하려는 법인은 그 법인의 직전 사업연도 종료일부터 3개월 이내에 납세지 관할 세 무서장에게 이를 신고하여야 한다.","최초사업연도의 개시일전에 생긴 손익을 사실상 그 법인에 귀속시킨 것이 있는 경우 조세포탈의 우 려가 없을 때에는 최초 사업연도의 기간이 1년을 초과하지 아니하는 범위내에서 이를 당해 법인의 최초사업연도의 손익에 산입할 수 있다."],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '내국법인의 최초사업연도 개시일은 사업자등록을 한 날로 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_6","q":"다음 항목에 대한 세무조정의 결과 공통적으로 발생하는 법인세법상 소득처분으로 옳은 것은?\nㄱ. 기업업무추진비 한도초과액\nㄴ. 채권자불분명사채이자에 대한 원천징수세액\nㄷ. 일반기부금 한도초과액","a":["배당","유보","상여","기타사외유출"],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '기타사외유출'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_세무_7","q":"다음은 ㈜삼일의 제24기(2024년 1월 1일 ~ 2024년 12월 31일) 손익계산서에 수익으로 계상되어 있\n는 항목이다. 자료에 의하여 익금불산입으로 세무조정을 하여야 하는 금액을 계산하면 얼마인가(단, ㈜\n삼일의 이월결손금은 없다)?\n가. 자산수증이익 1,000,000원\n나. 지방세 과오납금의 환급금 이자 2,000,000원\n다. 손금불산입된 금액의 환입액 3,000,000원\n라. 자산의 임대료 4,000,000원","a":["3,000,000원","4,000,000원","5,000,000원","6.000,000원"],"c":2,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (5,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_8","q":"다음은 ㈜삼일이 임원 또는 직원을 위하여 지출한 복리후생비 보조원장의 일부이다. 이 중 법인세법상\n손금으로 인정받지 못하는 금액을 계산하면 얼마인가?\n복 리 후 생 비\n2024년 1월 1일 ~ 2024년 12월 31일\n㈜삼일 (단위 : 원)\n월/일 적 요 금 액\n01/23 직장문화비 3,000,000\n01/25 사용자 부담 노인장기요양보험료 1,000,000\n02/03 우리사주조합 운영비 4,000,000\n06/27 직장어린이집 운영비 5,000,000\n12/23 직장회식비 2,000,000","a":["0원","4,000,000원","6,000,000원","8,000,000원"],"c":0,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '0원'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_11_세무_9","q":"㈜삼일이 제24기(2024년 1월 1일 ~ 2024년 12월 31일) 손익계산서에 비용으로 회계처리한 금액의\n내역은 다음과 같다. ㈜삼일의 제24기 세무조정시 손금불산입으로 세무조정해야 할 금액의 합계액은\n얼마인가?\nㄱ. 관세법 위반으로 인한 벌금 1,000,000원\nㄴ. 사계약상 납품지연 지체상금 2,000,000원\nㄷ. 원천징수 등 납부지연가산세 3,000,000원\nㄹ. 업무용 건물에 대한 재산세 4,000,000원\nㅁ. 법인세 6,000,000원","a":["6,000,000원","8,000,000원","9,000,000원","10,000,000원"],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (10,000,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_10","q":"㈜삼일은 제24기(2024 년 1 월 1 일 ~ 2024 년 12 월 31 일)에 제품을 장기할부조건으로 판매하고 다\n음과 같이 회계처리 하였다. 제24기 세부담을 최소화하려는 경우 필요한 세무조정으로 옳은 것은(단,\n㈜삼일은 중소기업이며 매출원가는 고려하지 않는다)?\nㄱ. 인도일 : 2024년 2월 25일\nㄴ. 판매금액 : 40,000,000원\nㄷ. 대금결제조건 :\n일자 2024년 2월 25일 2024년 8월 25일 2025년 2월 25일 2025년 8월 25일\n할부금 10,000,000원 10,000,000원 10,000,000원 10,000,000원\nㄹ. 회사의 회계처리 : 회사는 당기에 40,000,000원을 매출로 인식함","a":["세무조정 없음","(익금불산입) 할부매출액 10,000,000원(△유보)","(익금불산입) 할부매출액 20,000,000원(△유보)","(익금불산입) 할부매출액 40,000,000원(△유보)"],"c":2,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '(익금불산입) 할부매출액 20,000,000원(△유보)'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_세무_11","q":"다음 중 법인세법상 수익적 지출에 해당하는 것은?","a":["건물 또는 벽의 도장을 위한 지출","엘리베이터의 설치를 위한 지출","빌딩의 피난시설 설치를 위한 지출","재해로 멸실되어 본래의 용도에 이용할 가치가 없는 건축물의 복구를 위한 지출"],"c":0,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '건물 또는 벽의 도장을 위한 지출'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_세무_12","q":"㈜삼일(사업연도 : 1월 1일 ~ 12월 31일)은 2023년 7월 1일에 기계장치를 100,000,000원에 취득하\n였다. 회사는 세법상 기계장치에 대한 감가상각방법을 정액법으로, 내용연수는 10년으로 신고하였으며\n잔존가치는 없다. 회사가 2024년 감가상각비로 8,000,000원을 계상한 경우, 다음 각 상황에 따른 세무\n조정으로 옳은 것은?\n상황1. 전기 상각부인액이 4,000,000원이 있는 경우\n상황2. 전기 시인부족액이 4,000,000원이 있는 경우\n상황1 상황2","a":["손금불산입 2,000,000원 손금산입 2,000,000원","손금불산입 3,000,000원 세무조정 없음","손금산입 3,000,000원 손금산입 2,000,000원","손금산입 2,000,000원 세무조정 없음"],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '손금산입 2,000,000원 세무조정 없음'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_세무_13","q":"다음 중 법인세법상 기부금에 관한 설명으로 옳지 않은 것은?","a":["일반기부금한도초과액은 해당 사업연도의 다음 사업연도 개시일부터 5년 이내에 끝나는 각 사업연 도로 이월하여 그 이월된 사업연도의 소득금액을 계산할 때 손금산입한도액의 범위에서 손금에 산입 한다.","법인이 특수관계인에게 현물로 기부한 일반기부금은 기부했을 때의 장부가액과 시가 중 큰 금액으로 해당 자산가액을 산정한다.","특수관계인 외의 자에게 정당한 사유 없이 자산을 정상가액보다 낮은 가액으로 양도함으로써 실질적 으로 증여한 것으로 인정되는 금액은 기부금으로 본다.","내국법인이 각 사업연도에 지출하는 기부금을 이연계상한 경우에는 이를 그 지출한 사업연도의 기부 금으로 하고, 그 후의 사업연도에 있어서는 이를 기부금으로 보지 아니한다."],"c":0,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. '일반기부금한도초과액은 해당 사업연도의 다음 사업연도 개시일부터 5년 이내에 끝나는 각 사업연 도로 이월하여 '는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_14","q":"제조업을 영위하는 ㈜삼일(중소기업 아님)의 제24기(2024년 1월 1일 ~ 2024년 12월 31일) 기업업무\n추진비 세무조정을 위한 자료이다. 손금불산입 세무조정 금액으로 옳은 것은?\nㄱ. 포괄손익계산서상 매출액은 15,000,000,000원이고, 이 금액에는 매출할인 3,000,000,000원이 차감\n되어 있다.\nㄴ. 포괄손익계산서상 기업업무추진비로 비용처리한 금액은 74,000,000원(문화기업업무추진비와 전통\n시장에서 사용한 기업업무추진비는 없음)이다. 기업업무추진비에는 영수증 수취분 500,000원\n(1건)이 포함되어 있다.\nㄷ. 수입금액에 관한 적용률\n100억원 이하 0.3 %\n100억원 초과 500억원 이하 3천만원＋(수입금액－100억원)×0.2 %\n500억원 초과 1억1천만원+(수입금액－500억원)×0.03 %","a":["500,000원","21,500,000원","22,000,000원","22,500,000원"],"c":2,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번 (22,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_15","q":"다음은 지급이자 손금불산입 항목을 나열한 것이다. 지급이자 손금불산입을 적용하는 순서를 나타낸 것\n으로 옳은 것은?\nㄱ. 채권자불분명 사채이자\nㄴ. 비실명 채권·증권의 이자상당액\nㄷ. 업무무관자산 등 관련 이자\nㄹ. 건설자금이자","a":["ㄱ → ㄴ → ㄹ → ㄷ","ㄱ → ㄴ → ㄷ → ㄹ","ㄴ → ㄱ → ㄹ → ㄷ","ㄴ → ㄱ → ㄷ → ㄹ"],"c":0,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번. 'ㄱ → ㄴ → ㄹ → ㄷ'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_세무_16","q":"다음은 제조업을 영위하는 ㈜삼일의 당기 사업연도(2024 년 1 월 1 일 ~ 2024 년 12 월 31 일)의 대손\n충당금 관련 내역이다. 당기의 대손처리내역은 없으며 전기 대손충당금 부인액이 3,000,000원이라고 가\n정할 때 당기의 대손충당금 한도초과액은 얼마인가?\n(1) 결산서상 대손충당금 내역\n대손충당금\n기말잔액 30,000,000원 기초잔액 10,000,000원\n당기설정액 20,000,000원\n합계 30,000,000원 합계 30,000,000원\n(2) 당기 말 대손충당금 설정대상 채권가액 : 2,500,000,000원","a":["0원","5,000,000원","6,000,000원","8,000,000원"],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (5,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_17","q":"다음 중 법인세법상 손금으로 인정되는 준비금으로 옳지 않은 것은?","a":["책임준비금","연구인력개발준비금","해약환급금준비금","고유목적사업준비금"],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '연구인력개발준비금'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_18","q":"㈜삼일은 대표이사에게 보유 중이던 비상장법인인 ㈜용산의 주식을 양도하였다. 다음 자료를 이용하여\n㈜삼일에 대하여 부당행위계산의 부인을 적용할 경우 세무조정으로 옳은 것은?\nㄱ. 양도주식수는 10,000주이며, 양도가액은 주당 8,000원(장부가액은 주당 6,000원)이다.\nㄴ. 감정평가법인인 한국감정원에서 양도일부터 3개월 전에 ㈜용산의 주식을 감정평가하였는데,\n1주당 평가액은 10,000원이었다.\nㄷ. 양도 당시 장외시장에서 거래되는 ㈜용산의 주식의 1주당 거래가격은 9,000원이며,\n이 금액은 법인세법상 시가로 인정되는 금액이다.","a":["세무조정없음","익금산입 10,000,000원","익금산입 20,000,000원","익금산입 30,000,000원"],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (익금산입 10,000,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_19","q":"다음 중 법인세법상 이월결손금에 관한 설명으로 옳지 않은 것은?","a":["각 사업연도 소득에서 세법상 공제가능한 이월결손금을 공제한 금액을 초과하는 비과세소득은 다음 사업연도로 이월되지 않고 소멸한다.","각 사업연도의 익금총액보다 손금총액이 큰 경우 동 차액을 결손금이라 하며, 동 결손금이 다음 사 업연도로 이월되는 경우 이를 법인세법상 이월결손금이라 한다.","세무상 결손금은 과세표준 계산상 공제되거나 자산수증이익이나 채무면제이익에 의해 보전되면 소멸 된다.","중소기업인 경우 이월결손금에 대한 공제는 각 사업연도 소득의 100분의 90을 한도로 한다."],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '중소기업인 경우 이월결손금에 대한 공제는 각 사업연도 소득의 100분의 90을 한도로 한다.'는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_20","q":"다음 중 법인세 신고·납부에 관한 설명으로 옳지 않은 것은?","a":["성실신고확인대상인 내국법인은 사업연도 종료일이 속하는 달의 말일부터 4개월 이내에 법인세 과 세표준과 세액을 신고하여야 한다.","중소기업의 납부할 법인세액이 1,400만원인 경우 400만원을 납부기한이 지난 날부터 2개월 이내에 분납할 수 있다.","법인세의 과세표준과 세액을 신고할 때 기업회계기준을 준용하여 작성한 개별 내국법인의 재무상태 표·포괄손익계산서·이익잉여금처분계산서(또는 결손금처리계산서) 및 법인세 과세표준 및 세액조 정계산서를 신고서에 첨부하지 아니하면 신고로 보지 아니한다.","중간예납의무자는 중간예납기간이 지난 날부터 3개월 이내에 중간예납세액을 납부하여야 한다."],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '중간예납의무자는 중간예납기간이 지난 날부터 3개월 이내에 중간예납세액을 납부하여야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_21","q":"다음 중 소득세법에 관한 설명으로 옳은 것은?","a":["소득세법상 과세기간은 1월 1일부터 12월 31일까지 1년간이나 사업자가 폐업한 경우에는 1월 1 일부터 폐업일까지를 과세기간으로 한다.","일용근로자의 근로소득은 원천징수로 납세의무를 종결하는 분리과세 대상 소득이다.","비거주자는 국내외원천소득에 대하여 소득세를 납부하여야 한다.","개인단위로 과세하는 것이 원칙이나 부부인 경우에는 금융소득을 합산하여 과세한다."],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '일용근로자의 근로소득은 원천징수로 납세의무를 종결하는 분리과세 대상 소득이다.'이 올바른 설명입니다. 세법에서 정한 과세요건을 충족하는 경우에 해당합니다. 과세/비과세/면세 기준을 정확히 파악해야 합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_11_세무_22","q":"다음 중 소득세법상 무조건 분리과세대상 금융소득인 것은?","a":["국내금융소득 중 원천징수하지 않은 금융소득","비실명금융소득","출자공동사업자의 배당소득","국외에서 받은 배당소득(국내 대리인이 원천징수한 것은 제외)"],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번. '비실명금융소득'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_11_세무_23","q":"다음 자료를 이용하여 개인사업자 김삼일씨(복식부기의무자임)의 2024년도 사업소득금액을 계산하면 얼\n마인가?\nㄱ. 손익계산서상 당기순이익 100,000,000원\nㄴ. 손익계산서에는 다음과 같은 수익과 비용이 포함되어 있다.\n- 본인에 대한 급여 3,000,000원\n- 사업자금의 예치로 인한 정기예금이자 5,000,000원\n- 기계장치(유형자산)의 처분이익 4,000,000원\n- 토지의 처분이익 2,000,000원","a":["96,000,000원","98,000,000원","101,000,000원","103,000,000원"],"c":0,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번 (96,000,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_24","q":"거주자 김철수 씨는 ㈜경기(중소기업)에서 영업부 부장으로 재직하던 중 2024년 6월 30일에 퇴직하였\n다. 다음 자료는 김철수 씨가 2024년 1월 1일부터 2024년 6월 30일까지 ㈜경기로부터 지급받은 금액\n또는 이익이다. 김철수 씨의 2024년 근로소득 총급여액을 계산하면 얼마인가?\n구 분 금액(이익) 비 고\n(1) 급여 60,000,000원 월 10,000,000원\n(2) 식사 3,000,000원 월 50만원 상당의 식사를 제공받음\n(3) 식사대 1,200,000원 월 200,000원\n소유차량을 이용하여 업무를 수행하였으며, 실제 여비를\n(4) 차량유지비 1,800,000원\n받는 대신에 ㈜경기의 사규에 따라 월 30만원씩 지급받음\n(5) 건강보험료 1,500,000원 국민건강보험법에 의한 사용자부담 국민건강보험료\n(6) 단체순수보장성보험\n300,000원 ㈜경기가 부담한 단체순수보장성보험의 보험료\n의 보험료","a":["61,800,000원","62,100,000원","63,000,000원","64,500,000원"],"c":0,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번 (61,800,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_25","q":"다음 중 기타소득에 해당하지 않는 것은?","a":["주택입주 지체상금","일시적인 문예창작소득","근무 중에 주식매수선택권을 행사하여 얻은 이익","공익사업과 관련하여 지상권의 설정 또는 대여로 인한 소득"],"c":2,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '근무 중에 주식매수선택권을 행사하여 얻은 이익'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_26","q":"거주자 김삼일씨의 부양가족 현황이 다음과 같은 경우 김삼일씨(남성, 49 세)의 2024년 종합소득 과세\n표준 계산시 공제되는 인적공제액을 계산하면 얼마인가?\n구 분 나 이 비 고\n배우자 48 세 소득 없음\n부 친 75 세 2024년 4월 15일 사망함, 소득없음\n모 친 69 세 소득 없음\n장 모 68 세 주거형편상 별거하고 있으며, 소득 없음\n장 남 23 세 장애인이며, 사업소득금액 4,000,000원 있음\n장 녀 18 세 소득 없음","a":["9,000,000 원","10,000,000 원","11,000,000 원","13,000,000 원"],"c":1,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 2번 (10,000,000 원). 종합소득세 = 종합소득과세표준 × 세율 - 누진공제액. 소득공제를 차감한 후 세율을 적용합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_27","q":"다음 중 소득세법상 의료비세액공제에 관한 설명으로 옳지 않은 것은?","a":["미용을 위한 성형수술비는 의료비세액공제대상이 아니다.","건강증진을 위한 의약품 구입비용은 공제대상 의료비에 해당하지 않는다.","의료비지출액에 대하여 보험회사등으로부터 실손의료보험금을 받은 경우에도 의료비지출액은 의료비 세액공제 대상이 된다.","시력보정용 안경 또는 콘택트렌즈 구입을 위하여 지출한 비용으로서 기본공제대상자(나이 및 소득제 한 없음) 1명당 50만원 이내의 금액은 공제대상 의료비에 해당한다."],"c":2,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 3번. '의료비지출액에 대하여 보험회사등으로부터 실손의료보험금을 받은 경우에도 의료비지출액은 의료비 세액공제 대상이 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_28","q":"다음 중 퇴직소득에 해당하지 않는 것은?","a":["공적연금 관련법에 따라 받는 일시금","사용자 부담금을 기초로 하여 현실적인 퇴직을 원인으로 지급받는 소득","「건설근로자의 고용개선 등에 관한 법률」 에 따라 지급받는 퇴직공제금","임원 퇴직소득 한도초과액"],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '임원 퇴직소득 한도초과액'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_11_세무_29","q":"거주자 최순희씨는 2024년 5월 6일에 15년간 보유한 토지(등기된 사업용토지)를 양도하였다. 다음 자\n료에 의해 양도소득과세표준을 계산하면 얼마인가(단, 동 토지의 실지양도비용은 6,000,000원이다)?\n기준시가\n구분 실지거래가액\n(개별공시지가)\n양도가액 90,000,000원 80,000,000원\n취득가액 40,000,000원 30,000,000원\n단, 장기보유특별공제율은 30 % 를 적용한다.","a":["28,300,000원","30,800,000원","32,500,000원","35,000,000원"],"c":0,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 1번 (28,300,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_30","q":"다음 중 반드시 종합소득세 확정신고를 해야 하는 자는 누구인가(단, 원천징수 대상소득에 대하여는 소\n득세법에 따라 적법하게 원천징수 하였다)?","a":["삼일전자에 근무하고 있고 연간 총급여액 5,000만원의 근로소득 외에 다른 소득이 없는 김철수씨","용산상사에 근무하다가 당기에 퇴직하여 3억원 퇴직금을 수령하였고 다른 소득은 없는 김영희씨","3억원의 정기예금에서 연간 1,500만원씩 이자를 수령하고, 수령한 이자소득만으로 생활을 하고 계 신 이철수 할아버지","상가를 임대하여 연간 4,000만원의 임대료를 받고 있는 성부자 할머니"],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번. '상가를 임대하여 연간 4,000만원의 임대료를 받고 있는 성부자 할머니'. 원천징수는 소득 지급 시 지급자가 세금을 미리 공제하고 납부하는 제도입니다. ","src":"cbt"},{"id":"jg_11_세무_31","q":"㈜서울은 원재료를 매입하지 않고 공기와 햇빛으로 생산한 제품을 도매업자인 ㈜용산에 500,000원에,\n㈜용산은 소매업자인 ㈜한강에 800,000원에 판매하고, ㈜한강은 최종소비자에게 1,000,000원에 판매하\n였다. 각 사업자가 창출한 부가가치의 합계는 얼마인가?","a":["500,000원","800,000원","900,000원","1,000,000원"],"c":3,"s":"세무회계","y":"2024년 11월","exam":"jaegyeong","exp":"정답 4번 (1,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_11_세무_32","q":"다음 중 부가가치세 납세의무자인 사업자에 관한 설명으로 옳지 않은 것은?","a":["영세율을 적용받는 사업자는 부가가치세법상의 사업자 등록의무가 있다.","사업상 독립적으로 재화 또는 용역을 공급하는 경
