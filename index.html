0 원 증가이다.","당기손익-공정가치 측정 금융자산에 대한 회계처리가 20×2년 기타포괄이익에 미치는 영향은 20,000원 감소이다.","당기손익-공정가치 측정 금융자산에 대한 회계처리가 20×3년 당기순이익에 미치는 영향은 30,000 원 증가이다."],"c":3,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '당기손익-공정가치 측정 금융자산에 대한 회계처리가 20×3년 당기순이익에 미치는 영향은 30,000 원 증가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_재무_16","q":"다음 중 금융자산의 분류에 관한 설명으로 옳지 않은 것은?","a":["계약상 현금흐름이 원리금으로 구성되어 있고, 사업모형이 계약상 현금흐름의 수취와 금융자산 매도 의 목적을 모두 가지고 있는 경우 기타포괄손익-공정가치 측정 금융자산으로 분류한다.","원리금 수취만의 목적으로 보유하는 채무상품에 대해 회계불일치를 제거하기 위해 최초 인식 시점에 당기손익-공정가치 측정 금융자산으로 지정할 수 있다.","계약상 현금흐름이 원리금으로 구성되어 있지 않다면 일반적으로 금융자산을 기타포괄손익-공정가치 측정 금융자산으로 분류한다.","단기매매 목적 외의 지분상품에 대한 공정가치 변동을 기타포괄손익으로 인식하기로 최초 인식시점 에 선택한 경우 기타포괄손익-공정가치 측정 금융자산으로 분류한다."],"c":2,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '계약상 현금흐름이 원리금으로 구성되어 있지 않다면 일반적으로 금융자산을 기타포괄손익-공정가치 측정 금융자산으'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_17","q":"다음 중 금융부채와 지분상품의 구분에 관한 설명으로 옳지 않은 것은?","a":["자기지분상품으로 결제되거나 결제될 수 있는 계약으로서 변동가능한 수량의 자기지분상품을 인도할 계약상 의무가 없는 비파생상품은 지분상품으로 구분한다.","거래상대방에게 현금 등 금융자산을 인도하기로 하는 계약상 의무는 금융부채로 구분한다.","상환우선주 발행자가 보유자에게 미래의 시점에 확정되었거나 결정 가능한 금액을 의무적으로 상환 해야 하는 경우에는 금융부채로 구분한다.","상환우선주의 보유자가 발행자에게 특정일이나 그 이후에 확정되었거나 결정 가능한 금액의 상환을 청구할 수 있는 권리를 보유하고 있는 경우에는 지분상품으로 구분한다."],"c":3,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '상환우선주의 보유자가 발행자에게 특정일이나 그 이후에 확정되었거나 결정 가능한 금액의 상환을 청구할 수 있는'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_18","q":"㈜삼일은 다음과 같은 조건으로 사채를 발행하였으며, 상각후원가 측정 금융부채로 분류하였다. 20X2년\n말 재무상태표에 표시된 사채의 장부금액은 얼마인가(단, 계산금액은 소수점 첫째자리에서 반올림하고,\n가장 근사치를 답으로 선택한다)?\nㄱ. 액면금액 : 1,000,000원\nㄴ. 발행일 : 20X1년 1월 1일\nㄷ. 만기일 : 20X3년 12 월 31일\nㄹ. 액면이자율 및 이자지급조건 : 연10 %, 매년 말 지급\nㅁ. 발행일의 시장이자율 : 연 12 %\nㅂ. 이자율 12 %, 3년 정상연금현가계수 : 2.40183\n이자율 12 %, 3년 현가계수 : 0.71178","a":["963,245원","971,365원","982,143원","991,133원"],"c":2,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (982,143원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_재무_19","q":"다음 중 전환사채에 관한 설명으로 옳지 않은 것은?","a":["전환사채의 발행금액에는 전환권대가가 포함되어 있다.","전환권대가에 해당하는 부분은 무조건 부채로 계상한다.","상환할증금 지급조건의 경우 보장수익률이 액면이자율보다 높다.","전환사채는 부채요소와 자본요소를 모두 가지고 있는 복합금융상품이다."],"c":1,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '전환권대가에 해당하는 부분은 무조건 부채로 계상한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_20","q":"다음 중 충당부채에 관한 설명으로 옳지 않은 것은?","a":["미래의 예상 영업손실은 부채의 정의에 부합하지 못할 뿐 아니라 충당부채의 인식기준도 충족하지 못하기 때문에 충당부채로 인식하지 않는다.","계약상의 의무에 따라 발생하는 회피 불가능한 원가가 당해 계약 때문에 받을 것으로 기대되는 경제 적 효익을 초과하는 계약을 체결한 경우에는 관련된 현재의무를 충당부채로 인식한다.","입법 예고된 법률의 세부 사항이 아직 확정되지 않은 경우에는 해당 법안대로 제정될 것이 거의 확 실한 경우에도 충당부채를 인식할 수 없다.","충당부채의 화폐의 시간가치 영향이 중요한 경우에는 의무를 이행하기 위하여 예상되는 지출액의 현 재가치로 평가한다."],"c":2,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '입법 예고된 법률의 세부 사항이 아직 확정되지 않은 경우에는 해당 법안대로 제정될 것이 거의 확 실한 경우에'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_21","q":"다음 중 자본거래가 자본의 각 항목에 미치는 영향으로 옳은 것은?\n자본금 이익잉여금 총자본","a":["주식배당 증가 감소 불변","주식의 할인발행 증가 불변 감소","자기주식 취득 감소 불변 감소","현금배당 불변 불변 감소"],"c":0,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '주식배당 증가 감소 불변'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_재무_22","q":"㈜삼일의 제12기 자본항목과 관련된 주요사항이 다음과 같을 때 20X2년 말 결산 시 ㈜삼일의 자본에\n대한 보고금액으로 올바르게 짝지어진 것은 어느 것인가(단, 아래 자료 이외에 자본에 영향을 미치는\n사건의 발생은 없다고 가정한다)?\nㄱ. 20X2년 11월 11일 이사회 결의를 통하여 ㈜삼일의 자기주식 10,000주를 한 주당\n5,000원에 취득하였다.\nㄴ. ㈜삼일은 20X1년 초에 토지를 1,000백만원에 취득하였다. 이 토지는 20X1년 말에\n1,020백만원으로 재평가되었고 20X2년 말에는 1,100백만원으로 재평가되었다.\n자본변동표\n제12기 20X2년 1월 1일부터 20X2년 12월 31일까지\n㈜삼일 (단위: 백만원)\n주식발행 재평가 이익\n구 분 자본금 자기주식 총 계\n초과금 잉여금 잉여금\n20X1년 말 500 800 (100) 20 XXX XXX\n자본의 변동 XXX XXX XXX XXX XXX XXX\n20X2년 말 500 (ㄱ) (ㄴ) (ㄷ) XXX XXX\n(ㄱ) (ㄴ) (ㄷ)","a":["750 (150) 20","800 (150) 100","750 (200) 20","800 (200) 100"],"c":1,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '800 (150) 100'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_3_재무_23","q":"다음 중 고객과의 계약에서 생기는 수익에 관한 설명으로 옳지 않은 것은?","a":["기업이 수행하여 만든 자산이 기업 자체에는 대체 용도가 없고, 지금까지 수행을 완료한 부분에 대 해 집행가능한 지급청구권이 기업에 있다면 한 시점에 이행하는 수행의무로 보아 한 시점에 수익을 인식한다.","고객에게 약속한 재화나 용역을 이전하여 수행의무를 이행할 때, 즉 고객이 자산을 통제할 때 수익 을 인식한다.","거래가격이란 고객에게 약속한 재화나 용역을 이전하고 그 대가로 기업이 받을 권리를 갖게 될 것으 로 예상하는 금액이며, 부가가치세처럼 제3자를 대신해 회수한 금액은 제외한다.","재화나 용역을 이전하는 시점과 고객이 대가를 지급하는 시점이 1년 이내로 예상되는 경우 금융요 소가 유의적이지 않다고 보아 계약에 있는 금융요소를 조정하지 않을 수 있다."],"c":0,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '기업이 수행하여 만든 자산이 기업 자체에는 대체 용도가 없고, 지금까지 수행을 완료한 부분에 대 해 집행가능'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_24","q":"㈜삼일은 20X1년 12월 31일 ㈜반품에 60,000,000원(원가 30,000,000원)의 제품을 판매하고 1년 이내\n반품할 수 있는 권리를 부여하였다. 인도일 현재 매출액 기준 10,000,000원이 반품될 것으로 예상된다\n면 ㈜삼일이 20X1년 말 재무상태표에 환불부채로 인식할 금액은 얼마인가?","a":["0원","5,000,000원","10,000,000원","15,000,000원"],"c":2,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (10,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_재무_25","q":"㈜삼일은 20X1년에 계약금액 400억원의 사무실용 빌딩 건설공사를 수주하였다. 공사 관련 정보가 다음\n과 같을 경우, 20X2년 계약이익은 얼마인가(단, 진행률은 누적발생원가에 기초하여 산정한다)?\n20X1년 20X2년 20X3년\n추정총계약원가 250억원 300억원 300억원\n당기발생계약원가 100억원 110억원 90억원","a":["10억원 이익","20억원 이익","30억원 이익","40억원 이익"],"c":0,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번 (10억원 이익). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_3_재무_26","q":"㈜삼일은 20X1년 1월 1일 ㈜용산에 원가 70,000,000원의 상품을 할부로 판매하였다. 할부대금은 매년\n말 30,000,000원씩 3년간 회수하기로 하였다. 상품판매시의 유효이자율이 연 5 % 인 경우 ㈜삼일이 동\n거래와 관련하여 20X1년에 인식할 매출총이익은 얼마인가(단, 3년, 5 % 연금현가계수는 2.7232이다)?","a":["9,982,000원","11,696,000원","12,897,800원","13,524,000원"],"c":1,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번 (11,696,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_3_재무_27","q":"확정급여제도를 시행하고 있는 ㈜삼일의 20X1년 퇴직급여와 관련된 정보는 다음과 같다. 20X1년에 확\n정급여채무와 관련하여 발생한 재측정요소는 얼마인가?\n· 20X1년 초 확정급여채무의 현재가치 60,000원\n· 당기근무원가 39,000원\n· 이자원가 6,000원\n· 퇴직급여지급액 7,000원\n· 20X1년 말 보험수리적 가정의 변동을 반영한 확정급여채무의 현재가치 125,000원","a":["25,000원","26,000원","27,000원","28,000원"],"c":2,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (27,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_재무_28","q":"다음 중 주식기준보상 회계처리에 관한 설명으로 옳지 않은 것은?","a":["주식선택권 행사로 신주가 발행되는 경우 행사가격이 액면금액을 초과하는 부분은 주식발행초과금으 로 처리한다.","가득기간 중 각 회계기간에 인식할 주식보상비용은 당기말 인식할 누적보상원가에서 전기말까지 인 식한 누적보상원가를 차감하여 계산한다.","종업원에게 제공받은 용역 보상원가는 부여일 이후 지분상품의 공정가치 변동을 반영하여 수정한다.","주식선택권의 권리를 행사하지 않아 소멸되는 경우에는 과거에 인식한 보상원가를 환입하지 않는다."],"c":2,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '종업원에게 제공받은 용역 보상원가는 부여일 이후 지분상품의 공정가치 변동을 반영하여 수정한다.'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_29","q":"다음 중 법인세회계에 관한 설명으로 옳은 것은?","a":["일시적차이가 발생한 연도의 평균세율을 적용하여 이연법인세자산·부채를 측정한다.","이연법인세자산 ․ 부채는 일시적 차이의 소멸시기에 따라 유동 및 비유동항목으로 구분하여 표시한 다.","차감할 일시적차이가 사용될 수 있는 미래과세소득의 발생 가능성이 높은 경우에 이연법인세자산을 인식한다.","화폐의 시간가치가 중요한 경우 이연법인세자산 ․ 부채는 현재가치로 평가한다."],"c":2,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '차감할 일시적차이가 사용될 수 있는 미래과세소득의 발생 가능성이 높은 경우에 이연법인세자산을 인식한다.'이 올바른 설명입니다. 세법에서 정한 과세요건을 충족하는 경우에 해당합니다. 과세/비과세/면세 기준을 정확히 파악해야 합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_재무_30","q":"다음은 ㈜삼일의 20X1년 법인세비용 관련 자료이다. 20X1년 포괄손익계산서에 계상할 법인세비용은 얼\n마인가(단, 제시된 자료 이외에 기타 세무조정 사항은 없으며, 기초시점에 일시적차이는 없다)?\n법인세비용차감전순이익 4,000,000원\n가산(차감)조정\n접대비한도초과액 600,000원\n감가상각비한도초과액 900,000원\n과세표준 5,500,000원\n세율 25 %\n< 추가자료 >\nㄱ. 차감할 일시적차이가 사용될 수 있는 미래과세소득의 발생가능성은 높다고 가정한다.\nㄴ. 감가상각비한도초과액에 대한 일시적차이는 20X2년, 20X3년, 20X4년에 걸쳐 300,000원씩\n소멸하며, 일시적차이가 소멸될 것으로 예상되는 기간의 과세소득에 적용될 것으로 기대되\n는 평균세율은 다음과 같다.\n연도 20X2년 20X3년 20X4년\n세율 25 % 30 % 30 %","a":["970,000원","1,030,000원","1,120,000원","1,210,000원"],"c":2,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (1,120,000원). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_재무_31","q":"다음 중 회계변경과 오류수정의 회계에 관한 설명으로 옳지 않은 것은?","a":["회계정책의 변경을 반영한 재무제표가 거래, 기타 사건 또는 상황이 재무상태, 재무성과 또는 현금 흐름에 미치는 영향에 대하여 신뢰성 있고 더 목적적합한 정보를 제공하는 경우에는 회계정책을 변 경할 수 있다.","측정기준의 변경은 회계정책의 변경이 아니라 회계추정치 변경에 해당한다.","회계정책의 변경과 회계추정치 변경을 구분하는 것이 어려운 경우에는 회계추정치 변경으로 본다.","회계정책의 변경으로 인한 누적효과를 합리적으로 결정하기 어려운 경우에 실무적으로 소급적용이 가능한 가장 이른 회계기간에 반영한다."],"c":1,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '측정기준의 변경은 회계정책의 변경이 아니라 회계추정치 변경에 해당한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_32","q":"㈜삼일의 20X1년 당기순이익은 12,000,000원이며, 우선주배당금은 3,000,000원이다. ㈜삼일의 20X1년\n1월 1일 유통보통주식수는 18,000주이며, 5월 1일에는 자기주식 3,000주를 취득하였다. ㈜삼일의\n20X1년 기본주당순이익은 얼마인가(단, 가중평균 유통보통주식수는 월할로 계산한다)?","a":["498.5원","562.5원","613.5원","789.5원"],"c":1,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번 (562.5원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_3_재무_33","q":"20X1년 초 ㈜삼일은 ㈜한양의 보통주 40 % 를 800,000원에 취득하여 유의적인 영향력을 행사하게 되었\n다. 주식취득일 현재 ㈜한양의 순자산장부금액은 2,000,000원으로 공정가치와 동일하였다. ㈜한양의\n20X1년 당기순이익이 300,000원이며, 기타포괄이익이 100,000원이라 할 때 20X1년 말 ㈜삼일의 재무\n상태표에 기록될 관계기업투자주식(지분법적용투자주식)의 장부금액은 얼마인가?","a":["860,000원","880,000원","920,000원","960,000원"],"c":3,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번 (960,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_3_재무_34","q":"다음 중 지분법 회계처리에 관한 설명으로 옳지 않은 것은?","a":["투자회사가 수취하는 배당금 금액은 관계기업투자주식의 장부금액을 감소시킨다.","관계기업투자주식의 장부금액이 ‘영(0)’ 이하가 될 경우 지분변동액에 대한 인식을 중지한다.","영업권은 상각하지 않는다.","염가매수차익이 발생하는 경우 취득한 기간의 기타포괄손익에 포함한다."],"c":3,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '염가매수차익이 발생하는 경우 취득한 기간의 기타포괄손익에 포함한다.'는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_35","q":"다음 중 기능통화와 표시통화에 관한 설명으로 옳지 않은 것은?","a":["표시통화와 기능통화는 반드시 동일한 화폐로 사용하여야 한다.","표시통화란 재무제표를 표시할 때 사용하는 통화이다.","기능통화로 외화거래를 최초로 인식하는 경우에 거래일의 외화와 기능통화 사이의 현물환율을 외화 금액에 적용하여 기록한다.","기능통화란 영업활동이 이루어지는 주된 경제 환경의 통화이다."],"c":0,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '표시통화와 기능통화는 반드시 동일한 화폐로 사용하여야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_36","q":"다음 중 파생상품회계의 일반원칙에 관한 설명으로 옳은 것은?","a":["현금흐름 위험회피회계에서 위험회피수단의 손익 중 위험회피에 효과적인 부분은 당해 회계연도의 기타포괄손익으로 인식한다.","현금흐름 위험회피회계에서 위험회피수단의 손익 중 위험회피에 효과적이지 않은 부분은 당해 회계 연도의 기타포괄손익으로 인식한다.","위험회피수단으로 지정되지 않고 매매목적으로 보유하고 있는 파생상품의 평가손익은 기타포괄손익 으로 처리한다.","공정가치 위험회피회계에서 위험회피대상이 채무상품인 경우 위험회피수단에 대한 손익은 당해 회계 연도의 기타포괄손익으로 인식한다."],"c":0,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '현금흐름 위험회피회계에서 위험회피수단의 손익 중 위험회피에 효과적인 부분은 당해 회계연도의 기타포괄손익으로 '이 올바른 설명입니다. 기타포괄손익은 후속적으로 당기손익으로 재분류되는 항목(해외사업환산손익 등)과 되지 않는 항목(재평가잉여금 등)으로 구분됩니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_재무_37","q":"다음 중 리스가 일반적으로 금융리스로 분류될 수 있는 상황의 예로 옳지 않은 것은?","a":["리스기간 종료시점 이전에 기초자산의 소유권이 리스이용자에게 이전되는 경우","리스이용자가 선택권을 행사할 수 있는 날의 공정가치보다 충분히 낮을 것으로 예상되는 가격으로 기초자산을 매수할 수 있는 선택권을 가지고 있지만, 그 선택권을 행사하지 않을 것이 리스약정일 현재 상당히 확실한 경우","기초자산의 소유권이 이전되지는 않더라도 리스기간이 기초자산의 경제적 내용연수의 상당 부분을 차지하는 경우","리스약정일 현재 리스료의 현재가치가 적어도 기초자산 공정가치의 대부분에 해당하는 경우"],"c":1,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '리스이용자가 선택권을 행사할 수 있는 날의 공정가치보다 충분히 낮을 것으로 예상되는 가격으로 기초자산을 매수'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_38","q":"다음 중 현금흐름표상 투자활동 현금흐름으로 구분할 수 있는 항목으로 옳지 않은 것은?","a":["지분상품의 취득으로 인한 현금흐름","배당금 수입으로 인한 현금흐름","배당금의 지급으로 인한 현금흐름","이자수입으로 인한 현금흐름"],"c":2,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '배당금의 지급으로 인한 현금흐름'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_재무_39","q":"다음은 ㈜삼일의 영업활동으로 인한 현금흐름을 계산하기 위한 자료이다. ㈜삼일의 당기순이익이\n5,000,000원이라고 할 때 영업활동으로 인한 현금흐름을 계산하면 얼마인가?\n유형자산처분이익 200,000원 매출채권의 증가 900,000원\n감가상각비 300,000원 재고자산의 감소 1,000,000원\n매입채무의 감소 500,000원","a":["4,700,000원","4,900,000원","5,100,000원","5,300,000원"],"c":0,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번 (4,700,000원). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_3_재무_40","q":"㈜삼일의 20X1년도 포괄손익계산서상 이자비용은 300,000원이다. 다음 자료를 이용하여 ㈜삼일이 20X1\n년도에 현금으로 지급한 이자금액을 계산하면 얼마인가?\n구 분 20X0년 12월 31일 20X1년 12월 31일\n미지급이자 100,000원 250,000원","a":["90,000원","110,000원","130,000원","150,000원"],"c":3,"s":"재무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번 (150,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_1","q":"다음 중 조세의 분류기준과 구분 및 조세항목을 연결한 것으로 옳지 않은 것은?\n분류기준 구분 조세항목\n국세 법인세, 재산세","a":["과세권자 지방세 취득세, 주민세 독립된 독립세 법인세, 부가가치세","세원 부가세 교육세 과세물건의 종가세 부가가치세","측정단위 종량세 주정에 대한 주세 조세부담의 직접세 법인세, 소득세","전가여부 간접세 부가가치세, 개별소비세"],"c":0,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '과세권자 지방세 취득세, 주민세 독립된 독립세 법인세, 부가가치세'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_2","q":"다음 중 국세기본법상 특수관계인에 관한 설명으로 옳지 않은 것은?","a":["본인을 기준으로 특수관계에 해당하는 경우 본인도 그 특수관계인의 특수관계인으로 본다.","배우자에는 사실상의 혼인 관계에 있는 자를 포함한다.","친생자로서 다른 사람에게 친양자 입양된 자 및 그 배우자 ․ 직계비속은 특수관계인에 해당한다.","법인과 그 법인의 임원은 특수관계인에 해당하나 그 밖의 사용인은 그 법인과 특수관계에 해당하지 아니한다."],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '법인과 그 법인의 임원은 특수관계인에 해당하나 그 밖의 사용인은 그 법인과 특수관계에 해당하지 아니한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_3","q":"다음 중 국세부과의 원칙에 관한 설명으로 옳지 않은 것은?","a":["신의성실의 원칙이란 납세자가 그 의무를 이행할 때 또는 세무공무원이 직무를 수행할 때 신의에 따 라 성실하게 하여야 한다는 원칙이다.","근거과세의 원칙이란 장부 등 직접적인 자료에 입각하여 납세의무를 확정해야 한다는 원칙이다.","조세감면 사후관리란 세법이 정하는 바에 따라 감면한 세액에 상당하는 자금 또는 자산의 운용범위 를 정할 수 있는 원칙이다.","실질과세의 원칙은 조세법률주의를 구체화한 국세부과의 원칙이다."],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '실질과세의 원칙은 조세법률주의를 구체화한 국세부과의 원칙이다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_4","q":"다음 중 국세기본법상 이의신청, 심사청구 및 심판청구에 관한 설명으로 옳은 것은?","a":["국세기본법에 따른 동일한 처분에 대하여 심사청구와 심판청구를 중복하여 제기할 수 있다.","이의신청을 하려면 처분이 있음을 안 날로부터 60일 이내에 신청하여야 한다.","이의신청은 임의적 절차이므로 이의신청을 거치지 않고 심사청구 또는 심판청구를 할 수 있다.","납세자는 행정소송을 제기하고자 하는 경우에는 결정통지서를 받은 날(결정통지 전이라도 그 결정기 간이 지난 날)로부터 60일 이내에 서류를 제출해야 한다."],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '이의신청은 임의적 절차이므로 이의신청을 거치지 않고 심사청구 또는 심판청구를 할 수 있다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_세무_5","q":"다음 중 법인세법상 미환류소득 법인세에 관한 설명으로 옳지 않은 것은?","a":["미환류소득에 대한 법인세 납부의무가 있는 법인은 각사업연도의 소득에 대한 법인세액에 추가하여 미환류소득에 대한 법인세를 납부해야 한다.","상호출자제한기업집단에 속하는 법인이 적용대상 법인이다.","미환류소득에서 차기환류적립금, 이월된 초과환류액을 차감한 금액의 10 % 를 미환류소득 법인세로 납부한다.","초과환류액 발생시 그 다음 2개 사업연도 동안 미환류소득에서 공제할 수 있다."],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '미환류소득에서 차기환류적립금, 이월된 초과환류액을 차감한 금액의 10 % 를 미환류소득 법인세로 납부한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_6","q":"다음 세무조정사항 중 소득처분의 귀속자에게 추가적인 과세가 필요한 경우에 해당되는 것은?","a":["업무용승용차 관련 비용 중 업무미사용금액","특례기부금 한도초과액","대손충당금 한도초과액","업무무관자산 등 관련 차입금이자"],"c":0,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '업무용승용차 관련 비용 중 업무미사용금액'. 세무조정은 기업회계 이익을 세법상 과세소득으로 전환하는 과정으로, 익금산입·손금불산입 등을 통해 조정합니다. ","src":"cbt"},{"id":"jg_3_세무_7","q":"다음은 ㈜삼일의 제24기 손익계산서에 수익으로 계상되어 있는 항목이다. 자료에 의하여 익금불산입\n세무조정을 하여야 하는 금액을 계산하면 얼마인가(단, 과세표준 계산시 공제가능한 이월결손금은 없\n다)?\n가. 채무면제이익 1,000,000원\n나. 국세 과오납금의 환급금 이자 2,000,000원\n다. 손금산입된 금액의 환입액 3,000,000원\n라. 자산의 임대료 4,000,000원","a":["2,000,000원","3,000,000원","4,000,000원","6,000,000원"],"c":0,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번 (2,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_8","q":"다음 중 손금불산입항목에 해당하지 않는 것은?","a":["잉여금처분에 의한 배당","국세의 강제징수로 인한 강제징수비","임원상여금 한도초과액","본사 건물 재산세"],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '본사 건물 재산세'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_9","q":"㈜삼일은 제24기(2024년 1월 1일 ~ 2024년 12월 31일)초에 대표이사 업무용 승용차를 50,000,000원\n에 취득하고 업무전용자동차보험에 가입하였다. 해당 업무용 승용차에 관련된 다음 내역을 바탕으로 세\n무조정을 수행하고 해당 세무조정의 결과 제24기 사업연도의 손금불산입금액을 계산하면 얼마인가?\n(1) 손익계산서 상 비용계상내역","a":["감가상각비 10,000,000원","차량유지비(유류비, 수선비 등) 5,000,000원 (2) 운행기록부는 작성하지 않았다. ① 0원 ② 2,000,000원","3,000,000원","7,600,000원"],"c":1,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번 (차량유지비(유류비, 수선비 등) 5,000,000원 (2) 운행기록부는 작성하지 않았다. ① 0원 ② 2,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_10","q":"다음은 ㈜삼일건설의 제24기(2024년 1월 1일 ~ 2024년 12월 31일)의 공사내역이다. 제시된 공사에\n대하여 회사가 완성기준으로 회계처리한 경우 올바른 세무조정은?\n구 분 공사기간 도급금액 2024년 공사비 총공사예정비\nA 공사 2024. 9. 1. - 2026. 1. 10. 150억원 40억원 100억원","a":["(익금산입) 공사수익 60 억원 (유보) (손금산입) 공사원가 40 억원 (△유보)","(익금산입) 공사수익 40 억원 (유보) (손금산입) 공사원가 60 억원 (△유보)","(익금불산입) 공사수익 60 억원 (△유보) (손금불산입) 공사원가 40 억원 (유보)","세무조정 사항 없음"],"c":0,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '(익금산입) 공사수익 60 억원 (유보) (손금산입) 공사원가 40 억원 (△유보)'. 세무조정은 기업회계 이익을 세법상 과세소득으로 전환하는 과정으로, 익금산입·손금불산입 등을 통해 조정합니다. ","src":"cbt"},{"id":"jg_3_세무_11","q":"다음 중 법인세법상 감가상각비에 관한 설명으로 옳지 않은 것은?","a":["전화기(휴대용 전화기 포함) 및 개인용 컴퓨터(그 주변기기 포함)는 그 사업에 사용한 날이 속하는 사업연도에 손비로 계상하면 이를 손금에 산입한다.","유형자산의 잔존가액은 0으로 하되, 정률법 계산시 상각률 산정에는 잔존가액을 5 %으로 하여 상각 률을 산정한다.","자산 취득가액이 거래단위별로 100만원 이하인 경우로서 그 사업의 개시를 위하여 취득하는 자산은 시부인계산 과정을 거치지 않고 전액 손금으로 인정한다.","광업권에 대하여 감가상각방법을 신고하지 않은 경우 생산량비례법을 적용한다."],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '자산 취득가액이 거래단위별로 100만원 이하인 경우로서 그 사업의 개시를 위하여 취득하는 자산은 시부인계산 '는 잘못된 설명입니다. 법인세법상 손금/익금 산입·불산입 항목을 정확히 구분해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_12","q":"㈜삼일(법인세를 감면․면제받는 법인이 아니며, 한국채택국제회계기준을 적용하지 않음)의 감가상각비\n관련 자료이다. 감가상각비에 대하여 세무조정을 할 경우 세무조정으로 인하여 소득금액이 얼마나 변동\n되는가(단, 주어진 자료 이외에는 고려하지 않으며, △는 시인부족액임)?\n(단위：원)\n구 분 건 물 트 럭 비 품\n전 기 상 각 시 부 인 액 1,000,000 △1,000,000 △2,000,000\n당기감가상각비계상액 1,200,000 1,600,000 3,000,000\n당 기 상 각 범 위 액 2,000,000 3,000,000 2,000,000","a":["200,000원 증가","200,000원 감소","1,200,000원 증가","1,200,000원 감소"],"c":0,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '200,000원 증가'. 유형자산은 취득원가로 인식 후 감가상각을 통해 내용연수에 걸쳐 비용화합니다. ","src":"cbt"},{"id":"jg_3_세무_13","q":"㈜삼일은 국가에 정당한 사유없이 시가 10억원 건물을 5억원에 양도하였다. 이 거래와 관련하여 ㈜삼\n일이 기부금으로 의제할 금액은 얼마인가?","a":["2억원","3억원","4억원","5억원"],"c":0,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번 (2억원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_14","q":"다음 중 법인세법상 접대비(2024년부터는 기업업무추진비로 명칭이 변경됨)에 관한 설명으로 옳지 않은\n것은?","a":["골프장을 경영하는 법인이 그 고객이 조직한 임의단체(골프클럽)에 지급하는 금품은 접대비로 본다.","접대비 관련 부가가치세 매입세액 불공제액은 접대비에 포함된다.","법인의 생산품 등으로 접대한 경우 접대비를 시가와 장부가액 중 큰 금액으로 평가한다.","광고∙선전목적으로 달력 등을 불특정다수인에게 기증한 것은 접대비로 본다."],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '광고∙선전목적으로 달력 등을 불특정다수인에게 기증한 것은 접대비로 본다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_15","q":"다음 중 손금불산입 대상인 지급이자와 이에 대한 소득처분을 연결한 것으로 옳은 것은(단, 지급이자에\n대한 원천징수는 고려하지 않는다)?\n구 분 소득처분","a":["비실명채권·증권의 이자상당액 기타사외유출","건설자금이자 배당","업무무관자산 등 관련이자 대표자 상여","채권자불분명 사채이자 대표자 상여"],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '채권자불분명 사채이자 대표자 상여'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_세무_16","q":"다음은 제조업을 영위하는 ㈜삼일의 당기 사업연도(2024년 1월 1일 ~ 2024년 12월 31일)의 대손충당\n금 관련 내역이다. 당기의 대손처리내역은 없으며 전기 대손충당금 부인액이 4,000,000원이라고 가정할\n때 당기의 대손충당금 한도초과액은 얼마인가?\n(1) 결산서상 대손충당금 내역\n대손충당금\n대손처리액 - 기초잔액 20,000,000원\n기말잔액 30,000,000원 당기설정액 10,000,000원\n합계 30,000,000원 합계 30,000,000원\n(2) 당기 말 대손충당금 설정대상 채권가액 : 2,000,000,000원","a":["5,000,000원","6,000,000원","8,000,000원","10,000,000원"],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번 (10,000,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_17","q":"다음 중 준비금 및 충당금에 관한 설명으로 옳은 것은?","a":["해약환급금 준비금은 증권회사가 설정대상이다.","비영리내국법인의 고유목적사업준비금은 조세특례제한법에 근거하고 있다.","준비금은 손금에 산입한 후 환입하거나 비용과 상계하기 때문에 손금에 산입하는 사업연도에는 조세 부담을 경감시키고 환입하거나 상계하는 연도에 조세부담을 증가시키게 된다.","복구충당금은 법인세법에 손금으로 인정되는 충당금으로 열거되어 있다."],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '준비금은 손금에 산입한 후 환입하거나 비용과 상계하기 때문에 손금에 산입하는 사업연도에는 조세 부담을 경감시'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_세무_18","q":"다음 ㈜삼일의 거래 중 법인세법상 부당행위계산부인 규정의 적용대상인 것은?","a":["직원인 김삼일씨에게 사택을 무상으로 제공하였다(단, 김삼일씨는 지배주주의 특수관계인이 아니 다).","임원 김용산씨에게 시가 8억원의 기계장치를 9억원에 양도하였다.","대표이사 김서울씨에게 업무와 관련 없이 1억원을 무이자 조건으로 대여하였다.","대주주인 김마포씨로부터 토지를 1년간 무상으로 임차하였다."],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '대표이사 김서울씨에게 업무와 관련 없이 1억원을 무이자 조건으로 대여하였다.'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_3_세무_19","q":"다음 중 법인세 과세표준 및 세액의 계산과 관련하여 옳은 주장을 하고 있는 사람은 누구인가?\n김부장: 내국법인의 2024년에 발생한 결손금은 향후 10년간 이월하여 공제받을 수 있습니다.\n이과장: 연구 및 인력개발비 세액공제는 최저한세 적용대상이며, 최저한세 적용으로 공제받지 못한\n세액공제는 향후 5년간 이월공제가 가능합니다.\n박차장: 내국법인이 사업연도 중 천재지변이나 그 밖의 재해로 법 소정 자산총액의 20 % 이상 상실\n하여 납세가 곤란하다고 인정되는 경우 재해손실 세액공제를 받을 수 있습니다.\n최사원: 내국법인이 재화를 3만원(부가가치세 포함)에 공급받고 신용카드 매출전표 등 법정지출증\n명서류를 수취하지 아니한 경우에는 가산세를 납부하여야 합니다.","a":["김부장","이과장","박차장","최사원"],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (박차장). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_20","q":"다음 중 법인세법의 신고와 납부에 관한 설명으로 옳은 것은?","a":["법인세 납세의무가 있는 내국법인은 각 사업연도 종료일이 속하는 달의 말일로부터 3개월(내국법인 이 성실신고확인서를 제출하는 경우에는 5개월)이내에 법인세 과세표준과 세액을 신고하여야 한다.","각 사업연도의 기간이 6개월을 초과하는 법인은 사업연도 개시일부터 6개월을 중간예납기간으로 하 여 중간예납기간이 경과한 날로부터 3개월 이내에 그 기간에 대한 법인세를 신고 납부하여야 한다.","납부할 세액이 1천만 원을 초과하는 경우 납부기한이 경과한 날로부터 2개월(중소기업은 3개월)내 에 분납할 수 있다.","납세의무가 있는 내국법인은 각사업연도소득금액이 없거나 결손금이 있는 경우에도 법인세 신고를 하여야 한다."],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '납세의무가 있는 내국법인은 각사업연도소득금액이 없거나 결손금이 있는 경우에도 법인세 신고를 하여야 한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_세무_21","q":"다음 중 소득세와 관련된 설명으로 옳지 않은 것은?","a":["비거주자인 경우 국내원천소득에 대해서만 소득세를 과세한다.","일용근로자의 근로소득은 원천징수로 납세의무를 종결한다.","사업자가 해당 과세기간 중에 폐업한 경우 1월 1일부터 폐업일까지를 과세기간으로 한다.","소득세는 신고납세제도를 채택하고 있으므로 납세의무자의 확정신고로 과세표준과 세액이 확정된다."],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '사업자가 해당 과세기간 중에 폐업한 경우 1월 1일부터 폐업일까지를 과세기간으로 한다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_22","q":"다음 중 소득세법상 무조건 분리과세대상 금융소득인 것은?","a":["국외에서 받은 배당소득(국내 대리인이 원천징수한 것은 제외)","비실명금융소득","국내금융소득 중 원천징수하지 않은 금융소득","출자공동사업자의 배당소득"],"c":1,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '비실명금융소득'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_3_세무_23","q":"다음 자료로 복식부기의무자인 개인사업자 김삼일씨의 2024년 사업소득금액을 계산하면 얼마인가?\nㄱ. 손익계산서상 당기순이익 300,000,000원\nㄴ. 손익계산서에는 다음과 같은 수익과 비용이 포함되어 있다.\n- 본인에 대한 급여 40,000,000원\n- 영업부장으로 근무하는 아들의 급여 30,000,000원\n- 정기예금이자 10,000,000원\n- 기계장치처분이익(사업용유형자산에 해당함) 5,000,000원\n- 세금과공과 중 과태료 3,000,000원","a":["320,000,000원","323,000,000원","330,000,000원","333,000,000원"],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번 (333,000,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_24","q":"정일품씨의 2024년 급여내역이 다음과 같을 때 총급여액을 계산하면 얼마인가(근무기간 : 2024. 1. 1 ~\n2024. 12. 31)?\n- 월급여액: 4,000,000원\n- 상여 : 월급여액의 400 %\n- 연월차수당: 3,000,000원\n- 식사대: 2,400,000원(월 200,000원. 단, 식사 또는 기타 음식물을 제공받지 않음)\n- 자가운전보조금: 3,000,000원(월 250,000원)(본인 소유 차량을 직접 운전하여 회사의\n업무 수행에 이용하고 실제 여비를 받는 대신 회사의 규정에 따라 받은\n금액임)","a":["67,000,000원","67,600,000원","69,200,000원","70,000,000원"],"c":1,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번 (67,600,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_25","q":"다음은 근로자 황정남씨의 2024년 기타소득에 대한 자료이다. 황정남씨의 종합과세 될 기타소득금액을\n계산하면 얼마인가(단, 실제필요경비는 확인되지 아니한다.)?\nㆍ 슬롯머신 당첨금품 5,000,000원\nㆍ 일시적인 강연료(필요경비 차감 전) 10,000,000원\nㆍ 법인세법에 따라 처분된 기타소득 3,000,000원","a":["5,000,000원","7,000,000원","10,000,000원","14,000,000원"],"c":1,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번 (7,000,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_26","q":"거주자 갑의 2024년 종합소득공제 관련 자료이다. 갑의 2024년 종합소득공제 중 인적공제액으로 옳은\n것은?\n<본인 및 부양가족 현황>\n구 분 나 이 소 득\n본 인(남성) 43세 총급여액 50,000,000원\n부 친 73세 총급여액 4,000,000원\n모 친* 72세 소득 없음\n아 들 10세 소득 없음\n* 모친은 항시 치료를 요하는 중증환자인 장애인이다.","a":["8,500,000원","9,500,000원","10,000,000원","11,000,000원"],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '11,000,000원'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_3_세무_27","q":"다음 중 소득세법상 세액공제에 관한 설명으로 옳지 않은 것은?","a":["거주자의 종합소득금액에 Gross-up된 배당소득금액이 합산된 경우에는 당해 배당소득에 가산된 금 액을 산출세액에서 공제한다.","복식부기의무자는 장부를 기장해도 기장세액공제를 적용받을 수 없다.","거주자의 종합소득에 국외원천소득이 포함되어 있는 경우 국외에서 납부한 세액이 있는 때에는 외국 납부세액공제를 적용할 수 있다.","간편장부대상자가 간편장부로 기장하고 종합소득과세표준 확정신고시 간편장부 소득금액계산서를 제 출하는 경우 기장세액공제가 적용된다."],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '간편장부대상자가 간편장부로 기장하고 종합소득과세표준 확정신고시 간편장부 소득금액계산서를 제 출하는 경우 기장'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_28","q":"다음 중 연말정산 공제항목에 관한 설명으로 옳은 것은?","a":["유럽여행 중 현지에 있는 병원에서 치료를 받고 지급한 의료비는 의료비세액공제를 받을 수 있다.","본인을 위해 자동차종합보험에 가입하고 납부한 보험료는 보험료세액공제 대상에 해당하지 아니한 다.","자동차리스료를 직불카드로 지급한 경우에도 신용카드 등 사용금액에 대한 소득공제를 적용 받을 수 있다.","중학생 자녀의 학교 수업료 뿐만 아니라 급식비나 교과서 구입비도 교육비세액공제대상에 해당한다."],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '중학생 자녀의 학교 수업료 뿐만 아니라 급식비나 교과서 구입비도 교육비세액공제대상에 해당한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_세무_29","q":"다음 중 양도소득세 과세대상자산으로 옳지 않은 것은?","a":["골프회원권","과점주주가 보유하는 부동산과다보유법인 주식","전환사채","토지ㆍ건물과 함께 양도하는 영업권"],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '전환사채'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_30","q":"다음 중 소득세법상 신고ㆍ납부에 관한 설명으로 옳은 것은?","a":["소득세 중간예납 적용대상은 원칙적으로 종합소득이 있는 거주자 중 사업소득 또는 기타소득이 있는 자로 한다.","부가가치세법에 따른 사업자가 예정신고 또는 확정신고를 한 경우에도 사업장 현황신고를 하여야 한 다.","근로소득과 퇴직소득이 있는 거주자는 적법하게 원천징수된 경우 소득세 확정신고 의무가 없다.","소득세 과세표준과 세액의 결정 및 경정방법은 추계조사를 원칙으로 한다."],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '근로소득과 퇴직소득이 있는 거주자는 적법하게 원천징수된 경우 소득세 확정신고 의무가 없다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_세무_31","q":"다음 중 부가가치세법에 관한 설명으로 옳은 것은?","a":["부가가치세는 특정한 재화 또는 용역만 과세하는 개별소비세에 해당한다.","모든 거래단계에서 창출된 부가가치에 대하여 각 단계별로 과세하는 다단계과세방법이다.","매출액에서 매입액을 차감하여 부가가치를 계산한 후 부가가치에 세율을 곱하는 방식으로 세액을 계 산하는 전단계거래액공제법을 채택하고 있다.","국제적 이중과세의 문제를 해결하기 위하여 수출품에 대하여 부가가치세를 과세하지 않는 면세제도 를 두고 있다."],"c":1,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '모든 거래단계에서 창출된 부가가치에 대하여 각 단계별로 과세하는 다단계과세방법이다.'이 올바른 설명입니다. 세법에서 정한 과세요건을 충족하는 경우에 해당합니다. 과세/비과세/면세 기준을 정확히 파악해야 합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_세무_32","q":"다음 부가가치세와 관련된 재경담당자들의 대화 내용 중 옳은 설명을 하고 있는 사람은 누구인가?\n김부장 : 부가가치세 납세의무자인 개인사업자는 1년에 네 번 부가가치세를 신고하는 것이\n원칙입니다.\n이차장 : 주된 사업장에서 총괄납부하더라도 세금계산서는 각 사업장에서 발급하여야 하며,\n신고도 각 사업장별로 이행하여야 합니다.\n박과장 : 면세사업자의 경우 부가가치세법상 납세의무는 없으며, 법정증빙을 구비한 매입에\n대하여는 매입세액을 받을 수 있습니다.\n최사원 : 사업자란 사업목적이 영리로서 사업상 독립적으로 재화 또는 용역을 공급하는 자를\n말합니다.","a":["김부장","이차장","박과장","최사원"],"c":1,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '이차장'. 세금계산서는 부가가치세 매입세액공제의 핵심 증빙서류입니다. 필요적 기재사항 누락 시 불이익이 있습니다. ","src":"cbt"},{"id":"jg_3_세무_33","q":"다음 중 부가가치세 과세기간에 관한 설명으로 옳지 않은 것은?","a":["사업개시일 이전에 사업자등록을 신청한 경우의 과세기간은 그 신청한 날부터 그 신청일이 속하는 과세기간의 종료일까지로 한다.","폐업자의 최종과세기간은 폐업일이 속하는 과세기간의 개시일부터 폐업일까지로 한다.","간이과세자가 간이과세를 포기한 경우 신고일이 속하는 과세기간 개시일부터 그 신고일이 속하는 달 의 다음달 말일까지의 기간을 간이과세자의 과세기간으로 한다.","신규사업자의 최초과세기간은 사업개시일부터 그 날이 속하는 과세기간의 종료일까지로 하는 것이 원칙이다."],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '간이과세자가 간이과세를 포기한 경우 신고일이 속하는 과세기간 개시일부터 그 신고일이 속하는 달 의 다음달 말'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_34","q":"다음 중 부가가치세법상 사업장에 관한 설명으로 옳지 않은 것은?","a":["부동산임대업은 그 부동산의 등기부상 소재지를 사업장으로 한다.","제조업은 최종 제품을 완성하는 장소를 사업장으로 하며, 따로 제품의 포장만을 하거나 용기에 충전 만을 하는 장소도 사업장으로 본다.","무인자동판매기를 통하여 재화 ․ 용역을 공급하는 사업은 그 사업에 관한 업무총괄장소를 사업장으 로 한다.","재화의 보관 ․ 관리 시설만을 갖춘 장소로서 사업자가 관할세무서장에게 그 설치신고를 한 하치장은 별개의 사업장으로 보지 아니한다."],"c":1,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '제조업은 최종 제품을 완성하는 장소를 사업장으로 하며, 따로 제품의 포장만을 하거나 용기에 충전 만을 하는 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_35","q":"다음 중 부가가치세법상 재화의 공급에 해당하지 않는 것은?","a":["사용인에게 경조사와 관련하여 연간 10만원 이하의 재화를 제공한 경우","대물변제계약에 따라 채무를 변제하기 위하여 재화의 소유권을 이전하는 경우","교환계약에 의하여 재화를 인도한 경우","구입시 매입세액공제를 받지 못한 재화를 외상 판매한 경우"],"c":0,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '사용인에게 경조사와 관련하여 연간 10만원 이하의 재화를 제공한 경우'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_36","q":"다음 중 부가가치세법상 공급시기에 관한 설명으로 옳지 않은 것은?","a":["장기할부판매의 경우에는 대가의 각 부분을 받기로 한 때를 공급시기로 한다.","둘 이상의 과세기간에 걸쳐 부동산임대용역을 제공하고 그 대가를 선불 또는 후불로 받는 경우 대통 령령에 따라 계산한 금액은 예정신고기간 또는 과세기간의 종료일을 공급시기로 한다.","내국신용장에 의하여 공급하는 재화의 공급시기는 수출재화의 선(기)적일로 한다.","무인판매기를 이용하여 재화를 공급하는 경우에는 무인판매기에서 현금을 꺼내는 때를 공급시기로 한다."],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '내국신용장에 의하여 공급하는 재화의 공급시기는 수출재화의 선(기)적일로 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_37","q":"다음 중 부가가치세법상 영세율 적용대상이 아닌 것은?","a":["중개무역방식에 의한 수출","국외에서의 용역공급","선박에 의한 외국항행용역","국내에서 비거주자에게 직접 인도한 재화"],"c":3,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '국내에서 비거주자에게 직접 인도한 재화'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_세무_38","q":"다음 자료에 의하여 일반과세자인 ㈜삼일의 2024년 제1기 확정신고시의 과세표준을 계산하면 얼마인가\n(단, 모두 국내거래이고, 금액에는 부가가치세가 포함되지 않았으며, 아래의 자료를 제외한 세무상 처\n리는 모두 적정하다고 가정함)?\n거래일자 거 래 내 용 금 액\n4.11. 제품을 거래처에 외상으로 판매함(대금을 3개월 후 수령 예정) 8,000,000원\n시가 200,000원\n5.20. 거래처에 운송하는 중에 교통사고로 파손된 제품(매입세액공제분)\n원가 100,000원\n거래관계 개선목적으로 대리점에 제품(매입세액공제분)을 무상 제 시가 400,000원\n6.17.\n공함 원가 200,000원\n제품을 공급하기로 계약을 체결하였으나 계약자가 일방적으로 계\n6.27. 500,000원\n약을 해제함에 따라 위약금으로 받은 금액","a":["8,000,000원","8,200,000원","8,400,000원","8,900,000원"],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (8,400,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_39","q":"일반과세자인 ㈜용산의 2024년 제1기 예정신고기간의 매입거래이다. ㈜용산의 2024년 제1기 예정신\n고기간의 매입세액공제액으로 옳은 것은?\n⑴ 법인으로부터 원재료를 9,000,000원(부가가치세 900,000원 별도)에 구입하고 공급시기에 세\n금계산서를 수취하였다.\n⑵ 비영업용소형승용차(개별소비세 과세대상임)의 수선비를 지급하고 공급가액 2,000,000원(부\n가가치세 200,000원 별도)의 세금계산서를 수령하였다.\n⑶ 영업부 직원 회식비로 1,320,000원(부가가치세 120,000원 포함)을 지급하고 일반과세자로부\n터 공급대가 1,320,000원의 신용카드매출전표(부가가치세가 별도로 구분됨)를 수령하였다.\n⑷ 광고선전비에 대하여 공급가액 4,000,000원(부가가치세 400,000원 별도)의 세금계산서를 수\n령하였다.","a":["900,000원","1,100,000원","1,420,000원","1,620,000원"],"c":2,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (1,420,000원). 납부세액 = 매출세액(매출액×10%) - 매입세액(매입액×10%). 영세율/면세 항목은 별도 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_세무_40","q":"다음 중 부가가치세법상 가산세와 관련된 설명으로 옳지 않은 것은?","a":["세금계산서의 발급기한이 지난 후 해당 재화 또는 용역의 공급시기가 속하는 과세기간에 대한 확정 신고기한까지 세금계산서를 발급한 경우 공급가액의 1 %를 가산세로 한다.","예정신고기간에 발급받은 세금계산서에 대한 합계표를 예정신고시 제출하지 아니하고 확정신고시 제 출하여 매입세액을 공제받는 경우 가산세가 부과된다.","전자세금계산서 발급의무자가 발급기간 내에 종이세금계산서를 발급하면 가산세가 부과된다.","사업개시일부터 20일 이내에 사업자등록을 신청하지 아니한 경우에는 미등록가산세가 부과된다."],"c":1,"s":"세무회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '예정신고기간에 발급받은 세금계산서에 대한 합계표를 예정신고시 제출하지 아니하고 확정신고시 제 출하여 매입세액'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_1","q":"다음 중 원가의 일반적인 특성에 관한 설명으로 옳은 것은?","a":["기업의 수익획득 활동에 필요한 물품을 아직 소비하지 않았더라도 구입하는 시점에서 원가가 된다.","원가는 정상적인 경제활동 과정에서 소비된 가치와 비정상적인 상황에서 발생한 가치의 감소분을 모 두 포함한다.","경제적 가치를 가지고 있지 않더라도 원가가 될 수 있다.","발생한 제조원가 중 기업의 수익획득에 아직 사용되지 않은 부분은 자산으로, 수익획득에 사용된 부 분은 비용으로 재무제표에 계상된다."],"c":3,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '발생한 제조원가 중 기업의 수익획득에 아직 사용되지 않은 부분은 자산으로, 수익획득에 사용된 부 분은 비용으'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_원가_2","q":"다음은 ㈜삼일의 20X1년 한 해 동안의 제조원가 자료이다. ㈜삼일의 20X1년 제조원가명세서상의 당기\n제품제조원가를 계산하면 얼마인가?\n기 초 기 말\n직접재료 5,000원 7,000원\n재공품 10,000원 14,000원\n제 품 15,000원 10,000원\n직접재료 매입액 25,000원\n기초원가 60,000원\n가공원가 45,000원","a":["60,000원","64,000원","68,000원","70,000원"],"c":1,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번 (64,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_3","q":"다음 중 보조부문원가 배분방법인 이중배분율법에 관한 설명으로 옳은 것은?","a":["보조부문의 원가를 원가행태에 따라 고정원가와 변동원가로 분류하여 다른 배분기준을 적용하는 방 법이다.","변동원가는 제조부문에서 사용할 수 있는 최대사용가능량을 기준으로 배분한다.","고정원가는 실제 용역사용량을 기준으로 배분한다.","단일배분율법에 비해 사용하기가 간편하지만 부문의 최적의사결정이 조직전체의 차원에서는 최적의 사결정이 되지 않을 수 있다는 문제점이 있다."],"c":0,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '보조부문의 원가를 원가행태에 따라 고정원가와 변동원가로 분류하여 다른 배분기준을 적용하는 방 법이다.'이 올바른 설명입니다. 원가행태에 따라 변동원가(조업도에 비례)와 고정원가(조업도와 무관)로 분류합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_원가_4","q":"두 개의 제조부문과 두 개의 보조부문으로 이루어진 ㈜삼일의 부문간 용역수수에 관련된 자료는 다음과\n같다.\n보조부문 제조부문\nA B C D\nA부문 용역제공 - 40 % 20 % 40 %\nB부문 용역제공 20 % - 50 % 30 %\n발생원가 200,000원 300,000원 450,000원 600,000원\n단계배분법을 사용할 경우 제조부문 D에 배분되는 보조부문의 원가는 얼마인가(단, 보조부문원가는\nA부문의 원가를 우선 배분한다)?","a":["182,500원","222,500원","230,000원","277,500원"],"c":1,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번 (222,500원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_5","q":"다음 중 개별원가계산에 관한 설명으로 옳지 않은 것은?","a":["수요자의 요구에 따라 개별적으로 제품을 생산하는 업종에서 주로 사용한다.","간접원가의 배부 절차가 불필요하다.","개별작업에 집계되는 실제원가를 예산액과 비교하여 미래예측에 이용할 수 있다.","상대적으로 원가계산 자료가 상세하고 복잡하여 오류 발생 가능성이 높다."],"c":1,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '간접원가의 배부 절차가 불필요하다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_6","q":"㈜삼일은 개별원가계산제도를 채택하고 있으며, 직접노무원가를 기준으로 제조간접원가를 배부한다.\n20X1년의 제조간접원가배부율은 X부문에 대해서는 20 %, Y부문에 대해서는 50 % 이다. 제조지시서\n#105와 관련된 기초재공품은 300,000원이며, 당기 중 완성되어 판매가 완료되었다. 원가 발생액과 관\n련된 자료가 다음과 같은 경우 제조지시서 #105와 관련하여 당기 손익계산서에 반영될 매출원가는 얼마\n인가(단, 기초제품은 존재하지 않는다)?\n< 제조지시서 #105 >\n구 분 X부문 Y부문 합 계\n직접재료원가 700,000원 500,000원\n직접노무원가 1,000,000원\n제조간접원가 200,000원\n합 계","a":["2,800,000원","3,000,000원","3,300,000원","3,800,000원"],"c":2,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (3,300,000원). 매출원가 = 기초재고액 + 당기매입액 - 기말재고액. 재고자산평가손실과 정상감모손실은 매출원가에 포함하고, 비정상감모손실은 기타비용으로 처리합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_7","q":"㈜삼일은 기계가동시간을 기준으로 제조간접원가를 예정배부하고 있으며 연간 제조간접원가는\n5,000,000원으로, 연간 기계가동시간은 5,000시간으로 예상하고 있으나 실제로는 4,000시간이 발생\n하였다. 실제 제조간접원가가 5,000,000원이 발생한 경우 #A의 예정배부와 실제배부의 제조간접원가\n차이는 얼마인가?\n#A #B 계\n예상기계가동시간 3,000시간 2,000시간 5,000시간\n실제기계가동시간 2,000시간 2,000시간 4,000시간","a":["200,000원","300,000원","400,000원","500,000원"],"c":3,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번 (500,000원). 제조간접원가 배부율 = 제조간접원가 예정액 ÷ 배부기준 예정량. 실제 조업도를 곱해 배부액을 산정합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_8","q":"다음 중 아래 그림과 가장 관련 있는 원가회계 개념은 무엇인가?\n←1개를 100 % 완성\n∥\n← 2개를 50 % 완성\n∥\n← 4개를 25 % 완성","a":["개별원가계산의 간접원가배부율 계산","보조부문원가계산의 단계배분법","종합원가계산의 완성품환산량","표준원가계산의 차이분석"],"c":2,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '종합원가계산의 완성품환산량'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_3_원가_9","q":"㈜삼일은 종합원가계산제도를 채택하고 있으며, 원재료는 공정의 초기에 전량 투입되고, 가공원가는 공\n정 전반에 걸쳐서 진척도에 따라 균등하게 발생한다. 재료원가의 경우 평균법에 의한 완성품환산량은\n22,000단위이고, 선입선출법에 의한 완성품환산량은 20,000단위이다. 또한 가공원가의 경우 평균법에\n의한 완성품환산량은 21,000단위이고, 선입선출법에 의한 완성품환산량은 20,400단위이다. 기말재공품\n이 2,000단위인 경우 기초재공품의 진척도는 몇 % 인가?","a":["10 %","30 %","50 %","70 %"],"c":1,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '30 %'. 종합원가계산은 대량생산 공정에 적용하며, 완성품환산량을 기준으로 원가를 배분합니다. ","src":"cbt"},{"id":"jg_3_원가_10","q":"㈜삼일은 평균법을 이용한 종합원가계산제도를 채택하고 있다. 원재료는 공정초기에 전량 투입되며, 가\n공원가는 공정전반에 걸쳐 발생한다. 당기 완성품원가와 기말재공품원가를 계산하면 얼마인가?\n<수량>\n기초재공품 80개(완성도 40 %) 당기완성품 400개\n당기투입량 420개 기말재공품 100개(완성도 40 %)\n<원가> 재료원가 가공원가\n기초재공품원가 8,000,000원 5,720,000원\n당기발생원가 32,260,000원 28,556,000원\n당기완성품원가 기말재공품원가","a":["63,368,000원 11,168,000원","63,368,000원 15,842,000원","67,760,000원 12,266,000원","67,760,000원 16,940,000원"],"c":0,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번 (63,368,000원 11,168,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_11","q":"다음 중 정상원가계산에 관한 설명으로 옳지 않은 것은?","a":["직접재료원가와 직접노무원가는 실제원가로 측정하지만 제조간접원가는 사전에 정해 놓은 예정배부 율에 의해 배부된 원가로 측정한다.","제조간접원가 예정배부율에 의한 배부를 함으로써 특정 작업이 종료됨과 동시에 제품원가를 계산할 수 있도록 하고 매월 제품원가가 변동하지 않도록 하는 원가계산제도이다.","제조간접원가의 배부가 기말까지 지연되어 제품원가계산이 지연되는 표준원가계산의 문제점을 보완 하기 위한 원가계산제도이다.","제품원가를 정상원가로 측정하는 원가계산제도로서 평준화원가계산이라고도 한다."],"c":2,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '제조간접원가의 배부가 기말까지 지연되어 제품원가계산이 지연되는 표준원가계산의 문제점을 보완 하기 위한 원가계'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_12","q":"다음 중 표준원가계산에 관한 설명으로 옳지 않은 것은?","a":["표준원가계산제도를 채택할 경우 비계량적인 정보를 무시할 가능성이 있다.","원가요소의 표준은 수량과 가격에 대하여 각각 설정한다.","표준원가는 회사의 제반사정을 고려하여 현실적으로 달성 가능하도록 설정한다.","원가계산을 위해서는 원가흐름의 가정이 필요하다."],"c":3,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '원가계산을 위해서는 원가흐름의 가정이 필요하다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_13","q":"다음 중 차이분석에 관한 설명으로 올바른 것은 모두 몇 개인가?\n가. 직접재료원가 차이분석시 표준투입량은 사전에 미리 설정해 놓은 최대 조업도에 대한 표준투\n입량이다.\n나. 차이분석이란 표준원가와 실제원가를 비교하여 그 차이를 분석하는 것으로서, 일종의 투입-\n산출 분석이다.\n다. 능률차이는 실제원가와 실제투입량에 대한 표준원가와의 차이이다.\n라. 가격차이는 실제투입량에 대한 표준원가와 표준투입량에 대한 표준원가와의 차이이다.","a":["1개","2개","3개","4개"],"c":0,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '1개'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_원가_14","q":"㈜삼일의 변동제조간접원가와 관련한 자료가 다음과 같을 때 실제생산량에 허용된 변동제조간접원가 예\n산은 얼마인가?\n실제작업시간기준 변동제조간접원가 예산 2,400,000원\n변동제조간접원가 소비차이 200,000원(불리)\n변동제조간접원가 능률차이 200,000원(유리)","a":["2,000,000원","2,200,000원","2,400,000원","2,600,000원"],"c":3,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번 (2,600,000원). 예산차이 = 실제원가 - 예산원가. 조업도차이와 능률차이로 세분화할 수 있습니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_15","q":"다음은 표준원가계산제도를 채택하고 있는 ㈜삼일의 12월 중 생산활동과 관련한 직접노무원가에 대한\n자료이다. 직접노무원가 가격차이는 얼마인가?\n직접노무원가 표준임률 9,000원/시간\n직접노무원가 실제임률 10,000원/시간\n허용표준 직접노동시간 10,000시간\n직접노무원가 유리한 능률차이 4,500,000원","a":["9,000,000원 (유리)","9,000,000원 (불리)","9,500,000원 (유리)","9,500,000원 (불리)"],"c":3,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번 (9,500,000원 (불리)). 원가차이 = (실제-표준) × 수량 또는 가격. 유리한 차이(F)와 불리한 차이(U)를 구분합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_16","q":"다음 중 전부원가계산에서 재고자산가액에 포함되는 원가항목을 모두 나열한 것으로 옳은 것은?","a":["직접재료원가","직접재료원가, 직접노무원가, 변동제조간접원가","직접재료원가, 직접노무원가, 변동제조간접원가, 변동판매비와관리비","직접재료원가, 직접노무원가, 변동제조간접원가, 고정제조간접원가"],"c":3,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '직접재료원가, 직접노무원가, 변동제조간접원가, 고정제조간접원가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_원가_17","q":"다음 중 초변동원가계산에 관한 설명으로 옳은 것은?","a":["초변동원가계산에 의한 영업이익은 단위당 공헌이익에 판매수량을 곱한 금액에서 운영비용을 차감하 여 계산한다.","생산량이 증가할수록 영업이익이 감소되므로 재고자산 보유를 최소화하도록 유인을 제공한다.","기간비용으로 처리하는 제조간접원가에 포함되는 혼합원가를 변동원가와 고정원가로 구분하는 것이 필요하다.","변동원가계산제도와 마찬가지로 원가부착개념에 근거를 두고 있다."],"c":1,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '생산량이 증가할수록 영업이익이 감소되므로 재고자산 보유를 최소화하도록 유인을 제공한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_원가_18","q":"㈜삼일은 당기 초에 영업활동을 시작하여 당기에 제품 1,000단위를 생산하였으며, 당기의 원가자료는\n다음과 같다(단, 기말 재공품은 없다.)\n단위당 직접재료원가 420원\n단위당 직접노무원가 300원\n단위당 변동제조간접원가 120원\n단위당 변동판매비와관리비 150원\n고정제조간접원가 200,000원\n고정판매비와관리비 250,000원\n당기 판매량이 600단위였다면, 전부원가계산에 의한 기말제품재고액과 변동원가계산에 의한 기말제품재\n고액의 차이는 얼마인가?","a":["40,000원","60,000원","80,000원","100,000원"],"c":2,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (80,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_19","q":"㈜삼일의 20X1년 손익에 대한 자료가 다음과 같을 경우 (a) 변동원가계산에 따른 공헌이익과 (b) 초변\n동원가계산에 따른 재료처리량공헌이익의 차이는 얼마인가?\n단위당 판매가격 500원 고정제조간접원가 200,000원\n단위당 직접재료원가 150원 고정판매비와관리비 70,000원\n단위당 직접노무원가 120원 기초제품 없음\n단위당 변동제조간접원가 50원 생산량 20,000개\n단위당 변동판매비와관리비 30원 판매량 10,000개","a":["1,070,000원","1,900,000원","2,000,000원","2,170,000원"],"c":2,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번 (2,000,000원). 손익분기점 매출액 = 고정원가 ÷ 공헌이익률. 공헌이익률 = (매출액-변동원가) ÷ 매출액. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_20","q":"㈜삼일은 당기에 영업을 개시하여10,000단위의 제품을 생산하고 이 중에서 9,500단위의 제품을 단위당\n2,000원에 판매하였다. 회사의 경영자는 외부보고 목적으로는 전부원가계산제도를 사용하고 있으나, 관\n리목적으로는 변동원가계산제도를 사용하고 있다. 다음 설명 중 옳은 것은?\n제품단위당 직접재료원가 1,000원\n제품단위당 직접노무원가 400원\n제품단위당 변동제조간접원가 200원\n제품단위당 변동판매비와관리비 100원\n고정제조간접원가 1,200,000원\n고정판매비와관리비 400,000원","a":["전부원가계산에 의한 영업이익이 변동원가계산에 의한 영업이익보다 크다.","전부원가계산에 의할 경우 제품단위당 제조원가는 1,820원이다.","변동원가계산에 의할 경우 제품단위당 제조원가는 1,700원이다.","전부원가계산에 의할 경우 기말제품재고액은 910,000원이다."],"c":0,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. 전부원가계산은 고정제조간접원가를 제품원가에 포함합니다. 변동원가계산은 변동제조원가만 제품원가로, 고정제조간접원가는 기간비용으로 처리합니다. 재고 증가 시 전부원가이익 > 변동원가이익.","src":"cbt"},{"id":"jg_3_원가_21","q":"다음 중 활동기준원가계산(ABC)에 관한 설명으로 옳지 않은 것은?","a":["개별원가 기간비용으로 처리합니다. ","src":"cbt"},{"id":"jg_3_원가_26","q":"다음 중 영업레버리지도(Degree of Operating Leverage)에 관한 설명으로 옳지 않은 것은(단, 모든 경\n우에 영업이익은 0 보다 크다고 가정한다)?","a":["영업레버리지란 고정원가로 인하여 매출액의 변화율보다 영업이익의 변화율이 확대되는 효과이다.","고정원가가 감소하면 영업레버리지도는 낮아진다.","영업레비리지도가 높다는 것은 대체로 영업이익 규모가 양호함을 의미한다.","영업레버리지도는 손익분기점 부근에서 가장 크다."],"c":2,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '영업레비리지도가 높다는 것은 대체로 영업이익 규모가 양호함을 의미한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_27","q":"다음 중 예산에 관한 설명으로 옳지 않은 것은?","a":["기업의 공식적인 경영계획을 화폐단위로 표시한 것이다.","예산편성 성격에 따라 운영예산과 재무예산으로 구분된다.","예산편성 대상에 따라 종합예산과 부문예산으로 구분된다.","예산편성 방법에 따라 예산을 분류함에 있어, 조업도의 변동을 고려하지 않고 작성되는 예산을 영 업예산이라고 한다."],"c":3,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '예산편성 방법에 따라 예산을 분류함에 있어, 조업도의 변동을 고려하지 않고 작성되는 예산을 영 업예산이라고 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_28","q":"다음 중 책임회계제도에 관한 설명으로 옳지 않은 것은?","a":["책임회계제도가 그 기능을 효율적으로 발휘하기 위해서는 각 책임중심점의 경영자가 권한을 위임받 은 원가항목들에 대해 통제권을 행사할 수 없어야 한다.","책임회계제도는 실제 성과와 예산과의 차이를 쉽게 파악할 수 있게 해줌으로써 예외에 의한 관리가 가능하게 해준다.","책임중심점은 책임의 성격 및 책임범위에 따라 원가중심점, 수익중심점, 이익중심점 및 투자중심점 으로 분류할 수 있다.","책임중심점이 조직의 한 부분, 즉 판매부서, 점포단위 등으로 설정되는 경우 보통 이익중심점을 뜻 하는 것이 일반적이다."],"c":0,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '책임회계제도가 그 기능을 효율적으로 발휘하기 위해서는 각 책임중심점의 경영자가 권한을 위임받 은 원가항목들에'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_29","q":"다음 중 경제적부가가치(EVA)를 증대시키기 위한 방안에 관한 설명으로 옳지 않은 것은(단, 다른 조건\n은 일정하다고 가정한다)?","a":["판매비와관리비를 줄여야 한다.","비영업자산을 늘려야 한다.","매출액을 늘려야 한다.","자본비용을 줄여야 한다."],"c":1,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. '비영업자산을 늘려야 한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_30","q":"㈜삼일의 제품 생산과 관련된 아래 자료와 관련하여 직접재료원가의 능률차이와 수율차이를 계산하면\n얼마인가?\nㄱ. 제품단위당 표준원가\n- 직접재료(A) 152개 (@30원)\n- 직접재료(B) 38개 (@50원)\nㄴ. 생산량 : 5,000단위\nㄷ. 실제투입량\n- 직접재료(A) 600,000개\n- 직접재료(B) 300,000개\n능률차이 수율차이","a":["2,400,000 불리 1,700,000 불리","2,400,000 불리 1,700,000 유리","700,000 불리 1,700,000 불리","700,000 불리 1,700,000 유리"],"c":3,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번 (700,000 불리 1,700,000 유리). 원가차이 = (실제-표준) × 수량 또는 가격. 유리한 차이(F)와 불리한 차이(U)를 구분합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_3_원가_31","q":"㈜삼일은 분권화된 세 개의 제품별 사업부를 운영하고 있다. 이들은 모두 투자중심점으로 설계되어 있\n으며, 회사의 최저필수수익률은 12 % 이다. 각 사업부의 영업자산, 영업이익 및 매출액에 관한 정보는\n다음과 같다. 각 사업부를 잔여이익법으로 평가했을 경우 잔여이익이 높은 사업부의 순서로 옳은 것\n은?\n구분 A사업부 B사업부 C사업부\n평균영업자산 700,000원 1,000,000원 2,000,000원\n영업이익 120,000원 170,000원 230,000원\n매출액 1,500,000원 2,000,000원 3,000,000원","a":["A > B > C","B > A > C","C > B > A","B > C > A"],"c":1,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 2번. 'B > A > C'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_원가_32","q":"㈜삼일은 제조에 필요한 부품을 자가제조할 것인지 아니면 외부구입할 것인지의 여부에 대한 의사결정\n을 하려고 한다. 이에 관한 설명 중 옳지 않은 것은?","a":["회피가능 고정원가는 의사결정을 하는데 있어 고려대상이 아니다.","매몰원가는 비관련원가로 의사결정을 하는데 영향을 미치지 않는다.","외부구입원가가 회피가능원가보다 큰 경우에는 자가제조하는 것이 바람직하다.","기존설비를 다른 용도로 사용함에 따라 발생할 수 있는 기회비용도 함께 고려해야 한다."],"c":0,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '회피가능 고정원가는 의사결정을 하는데 있어 고려대상이 아니다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_33","q":"다음은 로스쿨과 관련한 신문기사 내용이다. 의사결정과 관련하여 괄호 안에 들어갈 용어로 옳은 것\n은?\n로스쿨은 도전할 만한 가치가 있는 것일까?\n로스쿨의 연간 등록금은 최소 8백만원에서 최대 2천만원이 넘는 곳까지 천차만별이다. 책값과\n생활비 등을 감안하면 사립대의 경우 로스쿨에 다니는 동안 9천만원 ~ 1억원 정도는 투자해야\n할 각오를 해야 한다.\n하지만 등록금보다 더 큰 부담은 ( )로 볼 수 있다. 직장에서 휴직을 허용하고, 로스쿨 진\n학 비용을 대주지 않는 한 직장인이 로스쿨에 다니려면 사표를 내야 한다. 연봉 3천만원인 직장\n인이 로스쿨을 다니기 위해 사표를 낸다면 3년 동안 ( )가 1억원에 이른다. 사립대 로스쿨\n에 들어간다면 ( )와 등록금까지 감안하여 2억원에 이르는 돈을 투자하는 것이다.","a":["기회원가","매몰원가","추적불능원가","추적가능원가"],"c":0,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '기회원가'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_원가_34","q":"㈜삼일은 최근에 ㈜우주로부터 제품을 단위당 4,000원에 1,000단위를 구입하겠다는 제안을 받았다.\n제품과 관련된 단위당 원가자료는 다음과 같으며 위 주문을 수락하더라도 고정원가에는 아무런 영향을\n초래하지 않으며, 별도의 판매비와 관리비는 발생하지 않는다. 다음 중 ㈜우주의 제안과 관련하여 올\n바른 의사결정안과 관련 손익을 가장 올바르게 짝지은 것은(단, 직접노무원가는 변동원가로 분류한\n다)?\n금액\n직접재료원가 1,000원\n직접노무원가 1,000원\n변동제조간접원가 800원\n고정제조간접원가 500원\n변동판매비와관리비 200원\n고정판매비와관리비 1,000원","a":["거절, 300,000원의 손실","거절, 500,000원의 손실","수락, 1,000,000원의 이익","수락, 1,200,000원의 이익"],"c":3,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 4번. '수락, 1,200,000원의 이익'. 전부원가계산은 고정제조간접원가를 제품원가에 포함하고, 변동원가계산은 기간비용으로 처리합니다. ","src":"cbt"},{"id":"jg_3_원가_35","q":"지난해 ㈜삼일의 사업부 X의 공헌이익은 85,000 원이고, 사업부 X에 대한 공통원가 배분액은 80,000\n원이었다. 공통원가 배분액 중 35,000 원은 사업부 X를 폐지하더라도 계속하여 발생하는 것이다. 만\n약 회사가 사업부 X를 폐지한다면 회사의 순이익은 어떻게 변화하는가?","a":["40,000 원 감소","40,000 원 증가","50,000 원 감소","50,000 원 증가"],"c":0,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '40,000 원 감소'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_3_원가_36","q":"다음 중 장기의사결정을 위한 자본예산 과정의 현금흐름 추정원칙으로 옳지 않은 것은?","a":["증분현금흐름을 측정할 때 과거의 투자결정에 의한 매몰원가는 제외한다.","법인세가 고려되어야 한다.","감가상각비는 현금흐름에 직·간접적으로 어떠한 영향도 미치지 않는다.","현금흐름계산에서 이자비용은 할인율에 반영하여 계산한다."],"c":2,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 3번. '감가상각비는 현금흐름에 직·간접적으로 어떠한 영향도 미치지 않는다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_3_원가_37","q":"다음 자료에 의하여 회수기간법에 따른 의사결정을 할 경우 옳은 것은?\n㈜삼일은 190,000 원에 기계를 구입하고자 하며, 조건은 다음과 같다.\n• 5년 이내에 회수가 되어야 한다.\n• 연중 현금흐름은 일정하게 발생한다고 가정한다.\n연도 기계A 연간 원가절감액 기계B 연간 원가절감액\n1 100,000원 50,000원\n2 50,000원 50,000원\n3 30,000원 50,000원\n4 20,000원 50,000원\n5 20,000원 50,000원","a":["기계 A를 구입한다.","기계 B를 구입한다.","둘 중 어떤 것을 구입해도 관계없다.","기계 A, B 모두 구입하지 않는다."],"c":0,"s":"원가관리회계","y":"2024년 3월","exam":"jaegyeong","exp":"정답 1번. '기계 A를 구입한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_3_원가_38","q":"다음 중 기말 연금 액보다 낮게 추정된다면 예외없이 재고자산평가손실이 발생한다.","재고자산의 판매가 계약에 의해 확정되어 있는 경우 순실현가능가치는 그 계약가격에 기초한다."],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '원재료의 현행대체원가가 장부금액보다 낮게 추정된다면 예외없이 재고자산평가손실이 발생한다.'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_7","q":"다음 중 재고자산의 원가흐름에 대한 가정에 관한 설명으로 옳지 않은 것은?","a":["한국채택국제회계기준은 재고자산의 단위원가 결정방법으로 개별법, 선입선출법, 가중평균법 및 후입 선출법의 적용을 허용하고 있다.","재고자산에 대한 단위원가 결정방법은 동일한 용도나 성격을 지닌 재고자산에 대해서 동일하게 적용 한다.","회계기간 중에 재고자산의 취득단가가 계속 상승하는 상황에서 기말재고수량이 기초재고수량보다 같 거나 많은 경우 선입선출법 하의 기말재고자산은 가중평균법 하의 기말재고자산보다 더 크게 계상된 다.","회계기간 중에 재고자산의 취득단가가 계속 상승하는 상황에서 기말재고수량이 기초재고수량보다 같 거나 많은 경우 선입선출법 하의 당기순이익은 가중평균법 하의 당기순이익보다 더 크게 계상된다."],"c":0,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '한국채택국제회계기준은 재고자산의 단위원가 결정방법으로 개별법, 선입선출법, 가중평균법 및 후입 선출법의 적용'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_8","q":"다음은 ㈜삼일의 재고자산과 관련된 자료이다. 이동평균법으로 평가할 경우 3월의 매출총이익은 얼마인\n가(단, 재고자산과 관련된 감모손실이나 평가손실 등 다른 원가는 없다)?\n일자 구분 수량 매입 단가 판매 단가\n3월 1일 기초재고 20개 100원\n3월 8일 매입 30개 110원\n3월 15일 매출 25개 130원\n3월 30일 매입 15개 120원","a":["600원","700원","800원","900원"],"c":0,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번 (600원). 매출총이익률법: 매출원가 = 매출액 × (1-매출총이익률). 재고손실 = 장부상재고 - 실사재고. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_9","q":"다음 중 유형자산의 후속측정으로 원가모형을 적용하는 기업의 회계처리에 관한 설명으로 옳은 것은?","a":["토지와 건물을 일괄하여 취득하였다면 단일 자산으로 회계처리 하여야 한다.","보유하고 있는 건물이 위치한 토지의 시장가치 증가는 건물의 감가상각대상금액에 영향을 미친다.","감가상각의 목적은 특정자산의 감가상각대상금액을 자산의 이용에 따라 효익이 발생하는 기간에 체계 적이고 합리적인 방법으로 배분하는 것이다.","기업은 해당 자산에 내재되어 있는 미래경제적효익의 예상소비형태를 가장 잘 반영할 수 있는 상각방 법을 선택하여 일관성 있게 적용하여야 하며 후속기간에 이를 변경할 수 없다."],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '감가상각의 목적은 특정자산의 감가상각대상금액을 자산의 이용에 따라 효익이 발생하는 기간에 체계 적이고 합리적'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_재무_10","q":"㈜삼일은 20X1년 초에 토지를 10,000원에 구입하였으며, 이 토지에 대해 재평가모형을 적용하여 매년\n말에 재평가하였다. 토지는 20X1년 말에 9,000원, 20X2년 말에 12,000원으로 각각 재평가되었다.\n20X2년 말에 시행한 토지의 재평가가 ㈜삼일의 20X2년 당기순이익에 미치는 영향은 얼마인가?","a":["영향 없음","1,000 원 증가","2,000 원 증가","3,000 원 증가"],"c":1,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (1,000 원 증가). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_11","q":"㈜삼일은 20X1년 1월 1일 임직원 연수동의 건설에 착공하였다. 회사가 20X1 년 중 동 연수동 신축과\n관련하여 지출한 금액과 차입금 현황은 다음과 같으며 완공까지는 약 3년이 소요될 예정이다. ㈜삼일이\n20X1 년에 자본화 할 차입원가는 얼마인가(단, 평균지출액과 이자는 월할계산한다)?\n지 출 일 지 출 액 비 고\n20X1년 1월 1일 10,000,000 원 공사착공\n20X1년 7월 1일 8,000,000 원\n20X1년 9월 1일 9,000,000 원\n차 입 처 차 입 일 차 입 금 연 이 자 율 용 도\nK 은행 20X1. 01. 01 8,000,000원 6 % 특정목적차입금\nS 은행 20X1. 09. 01 20,000,000원 9 % 일반목적차입금","a":["1,080,000원","1,290,000원","1,600,000원","2,080,000원"],"c":0,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번 (1,080,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_12","q":"다음 중 무형자산의 상각에 관한 설명으로 옳지 않은 것은?","a":["내용연수가 유한한 무형자산은 내용연수동안 상각하지만 내용연수가 비한정인 무형자산은 상각하지 않는다.","무형자산의 잔존가치는 처분으로 회수가능한 금액을 근거로 하여 추정하며, 적어도 매 회계기간말에 검토한다.","무형자산의 상각을 회계처리하는 방법은 직접법과 간접법이 있으며, 상각방법을 변경하는 경우에는 회계추정의 변경으로 본다.","내용연수가 비한정인 무형자산이란 내용연수가 무한하여 미래 경제적 효익이 무한할 것으로 기대되 는 무형자산을 의미한다."],"c":3,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '내용연수가 비한정인 무형자산이란 내용연수가 무한하여 미래 경제적 효익이 무한할 것으로 기대되 는 무형자산을 '는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_13","q":"㈜삼일이 20X1년 초에 취득한 특허권 관련 자료는 다음과 같다. 특허권은 잔존가치 없이 정액법으로 상\n각한다. 20X2년 말 ㈜삼일의 특허권 장부금액과 관련 손상차손 금액을 계산하면 얼마인가?\n20X2년 말\n취득원가 내용연수\n순공정가치 사용가치\n500,000원 5년 260,000원 280,000원\n장부금액 손상차손","a":["300,000원 20,000원","300,000원 0원","280,000원 20,000원","280,000원 0원"],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (280,000원 20,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_14","q":"㈜서울과 ㈜부산은 20X1년 초에 임대수익 및 시세차익 등을 목적으로 각각 건물 1동씩을 40억원에 매\n입하였다. 두 건물의 취득 당시 내용연수는 20년, 잔존가치는 없으며 20X1년 말 건물의 공정가치는 36\n억원으로 동일하다. ㈜서울과 ㈜부산의 유형자산 및 투자부동산의 평가방법은 다음과 같다.\n구 분 ㈜서울 ㈜부산\n유형자산 평가방법 원가모형 원가모형\n투자부동산 평가방법 원가모형 공정가치모형\n감가상각방법 정액법 정액법\n다음 중 상기 건물의 취득과 보유가 20X1 년 ㈜서울과 ㈜부산의 법인세비용차감전순이익에 미치는 영향\n에 관한 설명으로 옳은 것은(단, 손상사유는 발생하지 않은 것으로 가정한다)?","a":["㈜서울이 ㈜부산보다 법인세비용차감전순이익이 2억원 더 많이 계상된다.","㈜서울이 ㈜부산보다 법인세비용차감전순이익이 2억원 더 적게 계상된다.","㈜서울이 ㈜부산보다 법인세비용차감전순이익이 4억원 더 많이 계상된다.","㈜서울과 ㈜부산의 법인세비용차감전순이익에 미치는 영향은 동일하다."],"c":0,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '㈜서울이 ㈜부산보다 법인세비용차감전순이익이 2억원 더 많이 계상된다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_재무_15","q":"다음 중 상각후원가측정금융자산에 관한 설명으로 옳지 않은 것은?","a":["원칙적으로 지분상품은 상각후원가측정금융자산으로 분류될 수 없다.","상각후원가측정금융자산은 유효이자율법을 적용하여 상각후원가로 평가한다.","원칙적으로 모든 채무상품은 상각후원가측정금융자산으로 분류한다.","상각후원가측정금융자산 취득시 지출된 거래원가는 취득원가에 우선 가산한 후 유효이자율법에 의해 이자수익에 가감된다."],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '원칙적으로 모든 채무상품은 상각후원가측정금융자산으로 분류한다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_16","q":"㈜서울은 20X1년 초에 ㈜용산의 주식 1,000주를 기타포괄손익-공정가치 측정 금융자산으로 분류하고\n있다. ㈜서울이 20X1년과 20X2년 말의 재무상태표에 기타포괄손익누계액으로 계상할 평가손익은 각각\n얼마인가(단, 법인세 효과는 고려하지 않는다)?\n일 자 구 분 주 당 금 액\n20X1년 1월 3일 취득원가 5,000원\n20X1년 12월 31일 공정가치 6,500원\n20X2년 12월 31일 공정가치 4,900원\n20X1년 말 20X2년 말","a":["0원 0원","이익 1,500,000원 손실 100,000원","이익 1,500,000원 이익 100,000원","이익 1,500,000원 손실 1,600,000원"],"c":1,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (이익 1,500,000원 손실 100,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_17","q":"다음 중 금융부채에 해당하는 것으로 옳은 것은?","a":["재고자산을 외상으로 판매하면서 발생한 채권","보유하고 있는 다른 기업의 지분상품","100억원의 가치에 해당하는 자기지분상품을 인도할 계약","법인세와 관련된 부채"],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '100억원의 가치에 해당하는 자기지분상품을 인도할 계약'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_재무_18","q":"㈜삼일은 20X1년 1월 1일에 다음과 같은 조건의 사채를 발행하였다. 20X2년 12월 31일 현재 사채할\n인발행차금 잔액은 얼마인가(단, 단수차이가 발생하는 경우 가장 근사치를 정답으로 선택한다)?\nㄱ. 액면금액 : 20,000,000원\nㄴ. 만기일 : 20X3년 12월 31일(3년)\nㄷ. 액면이자율 : 4 %(매년 말 이자지급조건)\nㄹ. 발행일의 시장이자율 : 6 %\nㅁ. 이자율 6 %, 3년 연금현가계수 : 2.6730\n이자율 6 %, 3년 현가계수 : 0.8396","a":["377,803원","513,223원","620,408원","733,776원"],"c":0,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번 (377,803원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 1번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_19","q":"㈜삼일은 20X1년 1월 1일에 만기 3년, 표시이자율 7 %, 이자는 매년 말에 지급하는 액면금액\n3,000,000원의 전환사채를 액면발행하였다. ㈜삼일은 전환사채의 만기일에 액면금액의 10 % 를 할증금\n으로 지급하기로 하였다. 일반사채의 시장이자율이 12 % 라고 할 때 발행시점에 계상할 전환권대가와\n전환권조정은 각각 얼마인가(전환권대가는 자본으로 분류되며, 12 %, 3 년의 현재가치계수는 0.7118\n이고, 12 %, 3 년의 연금현재가치계수는 2.4018 이다)?\n전환권대가 전환권조정","a":["146,682원 146,682원","146,682원 446,682원","360,222원 360,222원","360,222원 660,222원"],"c":1,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (146,682원 446,682원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_20","q":"㈜삼일은 제조상의 결함이나 하자에 대하여 1년간 제품보증을 시행하고 있다. 20X1년 7월 1일에 판매\n된 5,000,000원의 제품에서 중요하지 않은 결함이 발견된다면 70,000원의 수리비용이 발생하고, 치명\n적인 결함이 발생하면 200,000원의 수리비용이 발생할 것으로 예상한다. 20X1년 7월 1일의 매출액\n5,000,000원에 대하여 판매된 제품의 80 % 에는 하자가 없을 것으로 예상하고, 제품의 15 % 는 중요하\n지 않은 결함이 발견될 것으로 예상하며, 5 % 는 치명적인 결함이 있을 것으로 예상하였다. ㈜삼일이\n20X1년 말에 인식할 충당부채의 금액은 얼마인가(단, 20X1년에는 결함이나 하자가 발생하지 않았다)?","a":["10,000원","10,500원","13,500원","20,500원"],"c":3,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번 (20,500원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_21","q":"㈜삼일의 20X1년 포괄손익계산서상 당기순이익과 총포괄이익은 1,300,000원과 1,100,000원이며, 20X1\n년 1월 1일 ㈜삼일의 자산과 부채 총계는 각각 38,500,000원과 13,500,000원 이다. ㈜삼일의 20X1년\n중 발생한 모든 자본거래가 다음과 같을 때, ㈜삼일이 20X1년 말 현재 재무상태표상 자본의 총계로 보\n고할 금액은 얼마인가(법인세 효과는 고려하지 않는다)?\n일자 내 용\n5월 18일 20X0년도 정기주주총회(2월 28일 개최)에서 결의한 주식배당으로 보통주 100주\n(주당 액면금액 5,000원, 주당 공정가치 6,000원)를 발행하였다.\n8월 14일 보통주 200주(주당 액면금액 5,000원)를 주당 6,500원에 발행하였다.\n10월13일 20X0년에 취득한 자기주식(취득원가 700,000원)을 800,000원에 재발행하였다.","a":["26,800,000원","27,000,000원","27,600,000원","28,200,000원"],"c":3,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번 (28,200,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_22","q":"다음은 ㈜삼일의 재무상태표이며, ㈜삼일의 경영자는 누적된 결손금을 해소하고자 무상감자를 고려하고\n있다. 다음 중 회사가 감자를 실시하는 경우에 관한 설명으로 옳은 것은?\n재무상태표\n㈜삼일 20X1년 12월 31일 (단위 : 원)\n현금 10,000,000 부채 60,000,000\n매출채권 20,000,000 자본금 40,000,000\n재고자산 30,000,000 주식발행초과금 10,000,000\n유형자산 30,000,000 결손금 (20,000,000)\n자산총계 90,000,000 부채와자본총계 90,000,000","a":["무상감자를 하면 부채비율(부채/자본)이 높아진다.","무상감자와 유상감자 모두 순자산에 미치는 영향은 동일하다.","무상감자 후 자본금은 감소한다.","무상감자 후의 자본총계는 50,000,000원이다."],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '무상감자 후 자본금은 감소한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_재무_23","q":"㈜삼일은 20X1년 1월 초 ㈜부산에 상품을 할부판매하고 할부금을 매년 말에 2,000,000원씩 3년간 회\n수하기로 하였다. ㈜삼일이 작성한 현재가치할인차금 상각표가 다음과 같을 때, 매년 값이 감소하는 항\n목으로 옳은 것은?\n매출채권 매출채권\n일자 할부금회수액 이자수익\n원금회수액 장부금액\n20X1년 1월 1일 4,803,660원\n20X1년 12월 31일 2,000,000원 576,439원 1,423,561원 XXX\n20X2년 12월 31일\n20X3년 12월 31일","a":["할부금 회수액, 이자수익","이자수익, 매출채권 원금회수액","이자수익, 매출채권 장부금액","매출채권 원금회수액, 매출채권 장부금액"],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '이자수익, 매출채권 장부금액'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_재무_24","q":"다음 중 유형별 수익인식방법에 관한 설명으로 옳지 않은 것은?","a":["시용판매에서는 고객의 매입의사표시가 제품 등에 대한 통제의 이전으로 보아 고객이 매입의사를 표 시한 시점에 수익을 인식한다.","기업이 고객에게 라이선스를 제공하는 경우에 있어서 해당 라이선스 계약이 접근권에 해당한다면 일 정기간 동안 권리를 부여하는 수행의무가 부여된 것이므로 그 기간에 걸쳐 수익을 인식한다.","기업이 고객에게 재화가 이전되기 전에 해당 재화에 대한 통제권을 가지지 않는 경우에 대리인으로 서 판매가액 총액을 수익으로 계상할 수 없으며, 받을 권리를 가지는 판매수수료만을 수익으로 인식 해야 한다.","구매자에게 재화를 판매하면서 설치하는 용역을 제공하는 경우에는 설치용역의 제공과 재화의 판매 를 하나의 수행의무로 보아 재화의 통제가 이전되는 시점에 수익을 인식한다."],"c":3,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '구매자에게 재화를 판매하면서 설치하는 용역을 제공하는 경우에는 설치용역의 제공과 재화의 판매 를 하나의 수행'는 잘못된 설명입니다. 수익/비용 인식 기준에 따라 올바른 인식 시점과 방법을 적용해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_25","q":"수익인식 5단계 중 한 시점에 이행하는 수행의무는 고객이 약속된 자산을 통제하고 기업이 의무를 이행\n하는 시점에 수익을 인식한다. 고객이 자산을 통제하는 시점으로 옳지 않은 것은?","a":["판매기업이 자산에 대해 현재 지급청구권이 있다.","자산소유에 따른 유의적인 위험과 보상이 고객에게 있다.","기업에게 자산의 법적소유권이 있다.","판매기업이 자산의 물리적 점유를 이전하였다."],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. K-IFRS 1115호 수익인식 5단계: ①계약식별 ②수행의무식별 ③거래가격산정 ④거래가격배분 ⑤수행의무이행시 수익인식. 이 단계에 따라 올바른 수익인식 시기와 금액을 결정합니다.","src":"cbt"},{"id":"jg_5_재무_26","q":"㈜삼일건설은 20X1년 1월 1일에 대전시로부터 교량건설을 총공사계약액 50,000,000원에 수주하였다.\n공사기간은 20X1년 1월 1일부터 20X3년 12월 31일까지이다. 추정총계약원가는 40,000,000원으로 공\n사기간 동안 변동이 없으며, 회사는 누적발생계약원가에 기초하여 공사진행률을 측정하고 있다. 20X1년\n과 20X2년 계약수익이 다음과 같을 때 20X2년 말 누적공사진행률을 계산한 것으로 옳은 것은?\nㄱ. 20X1년 계약수익: 15,000,000원\nㄴ. 20X2년 계약수익: 10,000,000원","a":["30 %","50 %","70 %","80 %"],"c":1,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (50 %). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_27","q":"다음 중 확정급여채무 장부금액의 현재가치 증감 항목으로 옳지 않은 것은?","a":["당기근무원가","확정급여채무의 이자원가","확정급여채무에서 발생한 재측정요소","사외적립자산의 이자수익"],"c":3,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '사외적립자산의 이자수익'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_28","q":"㈜삼일은 20X1년 1월 1일에 기술책임자인 홍길동 이사에게 다음과 같은 조건의 현금결제형 주가차액보\n상권 300개를 부여하였다. 이 경우 20X2년 포괄손익계산서에 계상될 당기보상비용은 얼마인가(단, 홍\n길동 이사는 20X3년 12월 31일 이전에 퇴사하지 않을 것으로 예상된다)?\nㄱ. 기본조건 : 20X3년 12월 31일까지 의무적으로 근무할 것\nㄴ. 행사가능기간 : 20X4년 1월 1일 ~ 20X5년 12월 31일\nㄷ. 20X1년 말 추정한 주가차액보상권의 공정가치 : 25,000원/개\nㄹ. 20X2년 말 추정한 주가차액보상권의 공정가치 : 20,000원/개","a":["1,000,000원","1,125,000원","1,500,000원","2,500,000원"],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (1,500,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_29","q":"다음 중 재무상태표상 자산·부채의 장부금액과 세무회계상 자산·부채의 가액인 세무기준액의 일시적\n차이를 발생시키는 항목으로 옳지 않은 것은?","a":["당기손익-공정가치측정 금융자산 평가이익","기부금 한도초과액","정기적금 미수이자","감가상각비 한도초과액"],"c":1,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '기부금 한도초과액'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_30","q":"다음은 ㈜삼일의 20X1년과 20X2년 말의 이연법인세자산·부채의 내역이다. ㈜삼일이 20X2년에 인식할\n법인세비용을 계산하면 얼마인가(20X2년 과세소득에 대하여 부담할 법인세액은 200,000원이다)?\n<각 회계연도 말 재무상태표 금액>\n구 분 20X1년 말 20X2년 말\n이연법인세자산 200,000원 50,000원\n이연법인세부채 50,000원 150,000원","a":["200,000원","400,000원","450,000원","650,000원"],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (450,000원). 이연법인세자산/부채 = 일시적차이 × 세율. 차감할 일시적차이는 이연법인세자산, 가산할 일시적차이는 이연법인세부채를 인식합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_31","q":"㈜삼일은 20X1 년 1 월 1 일 기계장치(내용연수: 5 년, 잔존가치: 0 원, 정액법 상각)를 1,000,000 원\n에 취득하였다. ㈜삼일은 20X3 년 1 월 1 일 감가상각방법을 연수합계법으로 변경하였다. 이 변경이 정\n액법을 적용할 경우에 비하여 20X3 년 재무제표에 미치는 영향으로 옳지 않은 것은?","a":["투자활동현금흐름은 변동이 없다.","부채비율은 증가한다.","당기순이익은 감소한다.","유형자산의 장부금액은 증가한다."],"c":3,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '유형자산의 장부금액은 증가한다.'는 잘못된 설명입니다. 실제로는 증가가 아니라 감소하는 관계입니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_32","q":"㈜삼일의 20X1년 주식수의 변동내역이 다음과 같을 경우 가중평균유통보통주식수를 계산하면 얼마인가\n(단, 편의상 월할계산한다)?\n구 분 주식수\n20X1년 초 60,000주\n5월 1일 유상증자 납입＊ 27,000주\n5월 1일 자기주식 구입 (18,000)주\n20X1년 말 69,000주\n＊5월 1일 유상증자시 시가로 유상증자하였다.","a":["51,000주","60,000주","66,000주","69,000주"],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '66,000주'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_5_재무_33","q":"다음 중 지분법 회계처리에 관한 설명으로 옳지 않은 것은?","a":["지분법은 취득시점에서 관계기업투자주식을 공정가치로 기록한다.","관계기업투자주식의 장부금액에 포함된 영업권은 별도로 표시하지 않는다.","피투자회사의 당기순이익 중 투자회사의 지분에 해당하는 금액은 투자회사의 지분법이익으로 보고된 다.","투자자와 관계기업 사이의 내부거래에서 발생한 당기손익에 대하여 투자자는 그 관계기업에 대한 투 자지분과 무관한 손익까지만 투자자의 재무제표에 인식한다."],"c":0,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '지분법은 취득시점에서 관계기업투자주식을 공정가치로 기록한다.'는 잘못된 설명입니다. 자산/부채의 측정기준(역사적원가, 공정가치 등)을 정확히 이해해야 합니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_34","q":"20X1년 초 ㈜삼일은 ㈜한양의 보통주 30 % 를 500,000원에 취득하여 유의적인 영향력을 행사하게 되었\n다. 주식취득일 현재 ㈜한양의 순자산장부금액은 2,000,000원으로 공정가치와 동일하였다. ㈜한양의\n20X1년 당기순이익이 300,000원이라 할 때 상기 관계기업투자 관련 회계처리가 ㈜삼일의 20X1년 당기\n순이익에 미치는 영향은 얼마인가?","a":["90,000원 손실","190,000원 손실","90,000원 이익","190,000원 이익"],"c":3,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번 (190,000원 이익). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_35","q":"외화거래를 최초로 인식하는 경우 거래일의 외화와 기능통화 사이의 현물환율을 외화금액에 적용하여\n기능통화로 기록한다. 다음의 외화자산 및 부채 중 보고기간 말의 마감환율을 적용하여 환산하여야 할\n화폐성항목으로 옳지 않은 것은?","a":["선급금","매입채무","매출채권","장기차입금"],"c":0,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '선급금'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_재무_36","q":"㈜삼일은 상품을 $2,000에 외상으로 매출하고, 대금을 9개월 후에 달러($)로 지급받기로 하였다. 이\n경우 외화매출채권 $2,000은 환율변동위험에 노출되게 되어 ㈜삼일은 이를 회피하기 위한 방안을 고려\n중이다. 이와 관련된 위험회피 방안으로 적절한 것은?","a":["달러($)를 매입하는 선도계약 체결","달러($)를 기초자산으로 하는 풋옵션 매입","달러($)를 기초자산으로 하는 콜옵션 매입","달러($)를 기초자산으로 하는 풋옵션 매도"],"c":1,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '달러($)를 기초자산으로 하는 풋옵션 매입'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_재무_37","q":"다음 중 리스에 관한 설명으로 옳은 것은?","a":["리스이용자의 입장에서 보증잔존가치와 무보증잔존가치는 모두 리스료에 포함한다.","금융리스에서 리스제공자가 리스채권으로 인식할 금액은 리스료의 현재가치와 보증잔존가치의 현재 가치를 합한 금액이다.","지수나 요율(이율)에 따라 달라지는 변동리스료는 리스료에 포함된다.","리스이용자는 각 리스를 운용리스나 금융리스로 분류한다."],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '지수나 요율(이율)에 따라 달라지는 변동리스료는 리스료에 포함된다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_재무_38","q":"현금흐름표의 작성방법에는 직접법과 간접법이 있다. 다음 중 현금흐름표의 작성방법에 관한 설명으로\n옳은 것은?","a":["간접법은 현금흐름을 개별 항목별로 파악할 수 있기 때문에 거래유형별 현금흐름의 내용을 쉽게 파 악할 수 있다.","간접법은 당기순이익과 영업활동으로 인한 현금흐름과의 차이를 명확하게 보여준다.","직접법으로 영업활동현금흐름을 작성하더라도 이자 및 배당금수취, 이자지급 및 법인세 납부는 간접 법을 적용한 것처럼 별도로 표시해야 한다.","직접법과 간접법은 영업활동뿐만 아니라 투자활동 및 재무활동도 현금흐름표상의 표시방법이 다르 다."],"c":1,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '간접법은 당기순이익과 영업활동으로 인한 현금흐름과의 차이를 명확하게 보여준다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_재무_39","q":"다음은 ㈜삼일의 비교표시 재무상태표와 포괄손익계산서에서 추출한 자료이다. 주어진 자료만을 이용하\n여 영업활동현금흐름을 간접법으로 계산하면 얼마인가?\nㄱ. 당기순이익 500,000원 ㄴ. 감가상각비 40,000원\nㄷ. 유형자산처분이익 15,000원 ㄹ. 매출채권 증가 50,000원\nㅁ. 재고자산 감소 30,000원 ㅂ. 매입채무 증가 20,000원","a":["485,000원","500,000원","525,000원","555,000원"],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번 (525,000원). 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수(정액법). 상각 방법에 따라 연간 상각액이 달라집니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 3번이 정답입니다.","src":"cbt"},{"id":"jg_5_재무_40","q":"다음 중 재무활동으로 인한 현금흐름으로 분류되지 않는 것은?","a":["주식 발행에 따른 현금유입","차입금의 상환에 따른 현금유출","매입채무의 상환에 따른 현금유출","자기주식의 취득에 따른 현금유출"],"c":2,"s":"재무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '매입채무의 상환에 따른 현금유출'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_5_세무_1","q":"다음 중 조세의 분류기준에 따른 구분과 세목을 연결한 것으로 옳지 않은 것은?\n분류기준 구분 조세항목\n국세 법인세, 소득세, 부가가치세","a":["과세권자 지방세 취득세, 재산세, 주민세 보통세 법인세, 소득세, 부가가치세","사용용도의 특정여부 목적세 교육세, 농어촌특별세 종량세 등록면허세","과세물건측정 단위 종가세 법인세, 소득세 직접세 법인세, 소득세","조세부담의 전가여부 간접세 부가가치세, 개별소비세"],"c":2,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '과세물건측정 단위 종가세 법인세, 소득세 직접세 법인세, 소득세'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_2","q":"다음 중 국세기본법상 서류의 송달에 관한 설명으로 옳은 것은?","a":["교부 또는 우편에 따라 송달하는 서류는 송달받아야 할 자에게 도달한 때부터 효력이 발생한다.","국세기본법 또는 세법에 규정하는 서류는 그 명의인의 주소에만 송달하여야 한다.","정보통신망의 장애로 납세고지서의 전자송달이 불가능한 경우에는 교부에 의해서만 송달할 수 있다.","납세고지서를 공시송달하는 경우 서류의 주요 내용을 공고한 날부터 10일이 지나면 서류 송달이 된 것으로 본다."],"c":0,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '교부 또는 우편에 따라 송달하는 서류는 송달받아야 할 자에게 도달한 때부터 효력이 발생한다.'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_세무_3","q":"다음 중 국세기본법상 국세부과의 원칙에 관한 설명으로 옳지 않은 것은?","a":["신의·성실은 세무공무원이 직무를 수행할 때에 적용되는 원칙이므로 납세자가 그 의무를 이행할 때 에는 적용되지 아니한다.","세무서장이 종합소득 과세표준과 세액을 경정하는 경우 거주자가 추계 신고한 경우에도 소득금액을 계산할 수 있는 장부 기타 증빙서류를 비치, 기장하고 있는 때에는 그 장부 기타 증빙서류에 근거하 여 실지조사 결정하여야 한다.","정부는 국세를 감면한 경우에 그 감면의 취지를 성취하거나 국가정책을 수행하기 위하여 필요하다고 인정하면 세법에서 정하는 바에 따라 감면한 세액에 상당하는 자금 또는 자산의 운용 범위를 정할 수 있다.","명의신탁부동산을 매각처분한 경우에는 양도의 주체 및 납세의무자는 원칙적으로 명의수탁자가 아니 고 명의신탁자이다."],"c":0,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '신의·성실은 세무공무원이 직무를 수행할 때에 적용되는 원칙이므로 납세자가 그 의무를 이행할 때 에는 적용되지'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_4","q":"다음 중 국세기본법상 가산세의 감면에 관한 설명으로 옳은 것은?","a":["국세를 감면하는 경우에 가산세는 그 감면하는 국세에 포함한다.","과세표준과 세액을 경정할 것을 미리 알고 과세표준수정신고서를 제출한 경우에는 법정신고기한이 지난 후 1개월 이내에 수정신고한 경우에만 가산세를 감면한다.","납세자가 의무를 이행하지 아니한 데에 정당한 사유가 있는 경우에는 가산세의 90 % 에 상당하는 금 액을 감면한다.","과세표준신고서를 법정신고기한까지 제출하지 아니한 자가 법정신고기한이 지난 후 1개월 이내에 기 한 후 신고를 한 경우에는 무신고가산세의 50 % 에 상당하는 금액을 감면한다."],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '과세표준신고서를 법정신고기한까지 제출하지 아니한 자가 법정신고기한이 지난 후 1개월 이내에 기 한 후 신고를'이 올바른 설명입니다. 세법에서 정한 과세요건을 충족하는 경우에 해당합니다. 과세/비과세/면세 기준을 정확히 파악해야 합니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_세무_5","q":"다음 중 법인세법상 사업연도에 관한 설명으로 옳지 않은 것은?","a":["사업연도는 법령이나 법인의 정관(定款) 등에서 정하는 1회계기간으로 하되, 그 기간은 1년을 초 과하지 못한다.","내국법인의 최초 사업연도개시일은 설립등기일로 한다.","사업연도를 변경하려는 법인은 그 법인의 해당 사업연도 종료일 이전 3개월이 되는 날까지 납세지 관할 세무서장에게 이를 신고하여야 한다.","최초 사업연도의 개시일전에 생긴 손익을 사실상 그 법인에 귀속시킨 것이 있는 경우 조세포탈의 우려가 없을 때에는 최초 사업연도의 기간이 1년을 초과하지 아니하는 범위내에서 이를 당해 법인 의 최초사업연도의 손익에 산입할 수 있다."],"c":2,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '사업연도를 변경하려는 법인은 그 법인의 해당 사업연도 종료일 이전 3개월이 되는 날까지 납세지 관할 세무서장'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_6","q":"다음의 세무조정사항 중에서 귀속자에 대한 추가적인 과세나 사후관리가 불필요한 소득처분에 해당하는\n것은?","a":["기업업무추진비 한도초과액","감가상각비 한도초과액","퇴직급여충당금 한도초과액","임원퇴직급여 한도초과액"],"c":0,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '기업업무추진비 한도초과액'. 세무조정은 기업회계 이익을 세법상 과세소득으로 전환하는 과정으로, 익금산입·손금불산입 등을 통해 조정합니다. ","src":"cbt"},{"id":"jg_5_세무_7","q":"다음 중 법인세법상 익금으로 인정되는 금액은 얼마인가?\nㄱ. 감자차익 5,000,000원\nㄴ. 자산수증이익(세무상 이월결손금의 보전에 충당하는 금액 없음) 2,000,000원\nㄷ. 국세ᆞㆍ지방세 과오납금의 환급금 이자 6,000,000원\nㄹ. 자기주식의 양도금액 4,000,000원","a":["4,000,000원","6,000,000원","12,000,000원","13,000,000원"],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (6,000,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_세무_8","q":"다음 중 법인세법상 손금으로 인정되는 금액은 얼마인가(단, 손금인정을 위한 기타 요건은 갖추었다고\n가정한다)?\nㆍ 업무와 관련하여 발생한 교통사고 벌과금 5,000,000원\nㆍ 주식할인발행차금 3,000,000원\nㆍ ⌜국민건강보험법 에 따라\n⌟\n사용자로서 부담하는 국민건강보험료 1,500,000원\nㆍ 직장회식비 3,700,000원","a":["1,500,000원","5,200,000원","7,200,000원","10,200,000원"],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (5,200,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_세무_9","q":"㈜삼일은 2024년에 업무용 토지에 대한 종합부동산세 840,000원(가산세 40,000원 포함)을 신고기한 경\n과 후 납부하고 아래와 같이 회계처리하였다. 이에 대한 세무조정으로 옳은 것은?\n(차) 세금과공과 840,000원 (대) 현금 840,000원","a":["(손금불산입) 세금과공과 840,000원(기타사외유출)","(손금불산입) 세금과공과 800,000원(기타사외유출)","(손금불산입) 세금과공과 40,000원(기타사외유출)","(손금불산입) 세금과공과 40,000원(상여)"],"c":2,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '(손금불산입) 세금과공과 40,000원(기타사외유출)'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_세무_10","q":"제조업을 영위하는 ㈜삼일이 제24기(2024년 1월 1일 ~ 2024년 12월 31일)에 1년 만기 해외 예금(만\n기: 2025년 6월 30일)에 대한 기간경과분 이자수익 4억원을 수익으로 계상한 경우 세무조정으로 옳은\n것은(단, 해외예금 이자는 법인세법상 원천징수대상에 해당하지 않는다)?","a":["(익금산입) 이자수익 4억원 (유보)","(익금불산입) 이자수익 2억원 (△유보)","(익금불산입) 이자수익 4억원 (△유보)","세무조정 없음"],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '세무조정 없음'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_11","q":"다음은 ㈜삼일이 2024년 7월 1일에 취득한 기계장치에 관한 자료이다. 이 자료를 기초로 제24기\n(2024년 1월 1일 ~ 2024년 12월 31일) 사업연도의 기계장치 상각범위액을 계산하면 얼마인가?\nㄱ. 기계장치의 취득가액: 2억원\nㄴ. 2024.10.1에 발생한 기계장치에 대한 자본적 지출: 1억원\nㄷ. 감가상각방법: 정액법\nㄹ. 신고내용연수: 5년(정액법 상각률 0.2)","a":["25,000,000원","30,000,000원","35,000,000원","40,000,000원"],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (30,000,000원). 정액법 감가상각비 = (취득원가 - 잔존가치) ÷ 내용연수. 매년 동일한 금액을 상각합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_세무_12","q":"다음 중 법인세법상 수익적 지출인 것은?","a":["내용연수 연장을 위한 개조를 위한 지출","엘리베이터의 설치를 위한 지출","빌딩의 피난시설 설치를 위한 지출","기계의 소모된 부속품 및 벨트의 대체를 위한 지출"],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '기계의 소모된 부속품 및 벨트의 대체를 위한 지출'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_5_세무_13","q":"다음 중 법인세법상 기부금에 관한 설명으로 옳지 않은 것은?","a":["특수관계인 외의 자에게 정당한 사유 없이 자산을 정상가액보다 낮은 가액으로 양도하는 경우 정상 가액과 양도가액의 차액은 기부금에 포함한다.","법인이 특수관계인이 아닌 자에게 현물로 기부한 일반기부금은 기부했을 때의 장부가액과 시가 중 큰 금액으로 해당 자산가액을 산정한다.","일반기부금한도초과액은 해당 사업연도의 다음 사업연도 개시일부터 10년 이내에 끝나는 각 사업연 도로 이월하여 그 이월된 사업연도의 소득금액을 계산할 때 손금산입한도액의 범위에서 손금에 산입 한다.","내국법인이 각 사업연도에 지출하는 기부금을 이연계상한 경우에는 이를 그 지출한 사업연도의 기부 금으로 하고, 그 후의 사업연도에 있어서는 이를 기부금으로 보지 아니한다."],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '법인이 특수관계인이 아닌 자에게 현물로 기부한 일반기부금은 기부했을 때의 장부가액과 시가 중 큰 금액으로 해'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_14","q":"다음은 제조업을 영위하는 ㈜삼일의 제24 기 사업연도(2024 년 1 월 1 일 ~ 2024 년 12 월 31 일)의 기\n업업무추진비에 관한 자료이다. 기업업무추진비 한도초과액은 얼마인가?\nㄱ. 기업업무추진비 지출액 : 73,000,000 원\n(문화 기업업무추진비와 전통시장 기업업무추진비는 없음)\nㄴ. 매 출 액 : 12,000,000,000 원(특수관계인간 거래분은 없음)\nㄷ. ㈜삼일은 중소기업이고, 법인세법상 특정법인은 아니다.\nㄹ. 수입금액 적용률\n수입금액 적용율\n100억원 이하분 0.3 %\n100억원 초과 500억원 이하 3천만원＋100억원 초과분×0.2 %\n500억원 초과분 1억 1천만원＋500억원 초과분×0.03 %","a":["1,000,000원","3,000,000원","4,000,000원","5,000,000원"],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (3,000,000원). 산출세액 = 과세표준 × 세율. 누진세율 구조이므로 구간별로 계산하여 합산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_세무_15","q":"다음 중 법인세법상 지급이자의 손금불산입에 관한 설명으로 옳지 않은 것은?","a":["채권자가 불분명한 사채의 이자는 손금불산입하여 대표자 상여로 소득처분하되, 그에 대한 원천징수 세액에 상당하는 금액은 기타사외유출로 소득처분한다.","건설자금이자의 계상대상에 유형자산과 무형자산뿐만 아니라 투자자산과 제조 등에 장기간이 소요되 는 재고자산도 포함한다.","비실명 채권·증권의 이자상당액은 건설자금이자보다 우선하여 지급이자 손금불산입 규정을 적용한 다.","업무무관자산 등에 대한 지급이자를 계산할 때, 업무무관자산가액은 취득가액에 의하여 계산한다."],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '건설자금이자의 계상대상에 유형자산과 무형자산뿐만 아니라 투자자산과 제조 등에 장기간이 소요되 는 재고자산도 '는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_16","q":"다음 중 법인세법상 퇴직급여충당금에 관한 설명으로 옳지 않은 것은?","a":["퇴직급여충당금 설정액 중 한도초과액은 손금불산입하여 유보로 소득처분한다.","퇴직급여충당금은 법인의 장부에 비용으로 계상한 경우에만 손금에 산입할 수 있는 결산조정사항이 다.","퇴직금추계액은 일시퇴직기준 퇴직급여추계액과 보험수리적기준에 의한 퇴직급여추계액 중 큰 금액 으로 한다.","퇴직급여충당금 한도액 계산시 기준이 되는 총급여액이란 근로제공으로 인한 봉급·상여·수당·인 정상여의 합계액을 말한다."],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '퇴직급여충당금 한도액 계산시 기준이 되는 총급여액이란 근로제공으로 인한 봉급·상여·수당·인 정상여의 합계액을'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_17","q":"다음 중 법인세법상 손금으로 인정되는 준비금으로 옳지 않은 것은?","a":["책임준비금","투자준비금","고유목적사업준비금","해약환급금준비금"],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '투자준비금'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_18","q":"㈜삼일은 2024년 1월 1일에 회사의 전무이사로부터 시가 10억원인 토지를 14억원에 매입하며 다음과\n같이 회계처리하였다. 토지 매입과 관련하여 2024년에 필요한 세무조정으로 옳은 것은?\n(차변) 토지 14 억원 (대변) 현금 14 억원","a":["(손금산입) 토지 1억원(△유보) (손금불산입) 고가매입액 1억원(상여)","(손금산입) 토지 3억원(△유보) (손금불산입) 고가매입액 3억원(상여)","(손금산입) 토지 4억원(△유보) (손금불산입) 고가매입액 4억원(상여)","(손금불산입) 고가매입액 4억원(상여)"],"c":2,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '(손금산입) 토지 4억원(△유보) (손금불산입) 고가매입액 4억원(상여)'이 올바른 설명입니다. 이 개념은 해당 과목의 핵심 내용입니다. 나머지 보기들은 내용에 오류가 있어 오답입니다.","src":"cbt"},{"id":"jg_5_세무_19","q":"다음 중 법인세법상 과세표준 계산에 관한 설명으로 옳지 않은 것은?","a":["각 사업연도 소득에 대한 법인세의 과세표준은 각 사업연도 소득의 범위에서 이월결손금, 비과세소 득, 소득공제액을 차례로 공제한 금액으로 한다.","중소기업과 회생계획을 이행 중인 기업 등 법령으로 정하는 법인을 제외한 내국법인의 경우 이월결 손금 금액에 대한 공제의 범위는 각 사업연도 소득의 100분의 80으로 한다.","결손금 공제 중 이월공제는 신청을 요건으로 하지 않는다.","자산수증이익과 채무면제이익으로 보전에 충당된 이월결손금도 과세표준 계산상 공제할 수 있다."],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '자산수증이익과 채무면제이익으로 보전에 충당된 이월결손금도 과세표준 계산상 공제할 수 있다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_20","q":"다음 중 법인세 신고·납부에 관한 설명으로 옳지 않은 것은?","a":["성실신고확인대상이 아닌 내국법인은 사업연도 종료일이 속하는 달의 말일부터 3개월 이내에 법인 세 과세표준과 세액을 신고하여야 한다.","중소기업의 납부할 법인세액이 2,400만원인 경우 1,400만원을 납부기한이 지난 날부터 2개월 이내 에 분납할 수 있다.","법인세의 과세표준과 세액을 신고할 때 기업회계기준을 준용하여 작성한 개별 내국법인의 재무상태 표·포괄손익계산서·이익잉여금처분계산서(또는 결손금처리계산서) 및 법인세 과세표준 및 세액조 정계산서를 신고서에 첨부하지 아니하면 신고로 보지 아니한다.","중간예납의무자는 중간예납기간이 지난 날부터 2개월 이내에 중간예납세액을 납부하여야 한다."],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '중소기업의 납부할 법인세액이 2,400만원인 경우 1,400만원을 납부기한이 지난 날부터 2개월 이내 에 분'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_21","q":"다음 중 소득세법상 과세기간 및 납세지에 대한 설명으로 옳지 않은 것은?","a":["비거주자의 납세지는 국내사업장의 소재지로 하되, 국내사업장이 없는 경우에는 국내원천소득이 발 생하는 장소로 한다.","거주자가 폐업하는 경우에는 1월 1일부터 폐업일까지를 과세기간으로 한다.","거주자의 납세지는 주소지로 하되, 주소지가 없으면 거소지로 한다.","거주자가 사망한 경우에는 1월 1일부터 사망일까지를 과세기간으로 한다."],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '거주자가 폐업하는 경우에는 1월 1일부터 폐업일까지를 과세기간으로 한다.'는 잘못된 설명입니다. 과세/면세/비과세 항목의 구분 기준을 정확히 파악해야 합니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_22","q":"다음 중 소득세법상 무조건 분리과세대상 금융소득인 것은?","a":["직장공제회 초과반환금","국내금융소득 중 원천징수하지 않은 금융소득","출자공동사업자의 배당소득","국외에서 받은 배당소득(국내 대리인이 원천징수한 것은 제외)"],"c":0,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '직장공제회 초과반환금'. 이 개념은 해당 과목의 핵심 출제 포인트입니다. 관련 법규와 기준을 정확히 숙지해야 합니다. ","src":"cbt"},{"id":"jg_5_세무_23","q":"다음 자료를 이용하여 개인사업자 김삼일씨(복식부기의무자 아님)의 2024년도 사업소득금액을 계산하면\n얼마인가?\nㄱ. 손익계산서상 당기순이익 100,000,000원\nㄴ. 손익계산서에는 다음과 같은 수익과 비용이 포함되어 있다.\n- 본인에 대한 급여 5,000,000원\n- 사업자금의 예치로 인한 정기예금이자 3,000,000원\n- 공장건물의 처분이익 4,000,000원","a":["95,000,000원","98,000,000원","101,000,000원","103,000,000원"],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (98,000,000원). 당기순이익 = 수익총액 - 비용총액. 법인세 차감 후 금액입니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_세무_24","q":"다음 자료에 의하여 거주자 김삼일 대리의 2024년 근로소득금액을 계산하면 얼마인가(단, 김삼일 대리\n는 2024년 1년 동안 계속 근무하였다)?\nㄱ. 월급여 : 3,000,000원(상여, 자가운전보조금, 식사대 제외)\nㄴ. 상여 : 월급여의 400 %\nㄷ. 실비변상적 성격의 자가운전보조금 : 월 300,000원\nㄹ. 식사대 : 월 200,000원(별도의 식사를 제공함)\n연간급여액 근로소득공제액\n4,500만원 초과 1억원 이하 1,200만원 + 4,500만원 초과액 × 5 %","a":["33,520,000원","36,250,000원","37,300,000원","39,270,000원"],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번 (39,270,000원). 문제에서 주어진 수치를 해당 공식에 대입하여 계산합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 4번이 정답입니다.","src":"cbt"},{"id":"jg_5_세무_25","q":"다음 중 기타소득에 해당하지 않는 것은?","a":["주택입주 지체상금","일시적인 문예창작소득","퇴직한 후 주식매수선택권을 행사하여 얻은 이익","지상권의 설정 또는 대여로 인한 소득(공익사업과 관련 없음)"],"c":3,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 4번. '지상권의 설정 또는 대여로 인한 소득(공익사업과 관련 없음)'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 3번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_26","q":"다음 중 소득세법상 결손금 및 이월결손금 공제에 관한 설명으로 옳지 않은 것은?","a":["해당 과세기간의 소득금액을 추계신고 및 추계조사결정하는 경우에는 이월결손금을 공제할 수 없다.","사업소득의 결손금은 소득세 법령에 따라 공제한다.","부동산임대업(주거용 건물임대업 포함)에서 발생한 결손금은 해당 과세기간의 다른 소득에서 공제할 수 없다.","결손금은 발생한 과세기간 종료일부터 15년(2020. 1. 1. 전에 개시한 과세기간에 발생한 결손금은 10년) 내에 종료하는 과세기간의 소득금액 계산시 먼저 발생한 것부터 순차로 공제한다."],"c":2,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '부동산임대업(주거용 건물임대업 포함)에서 발생한 결손금은 해당 과세기간의 다른 소득에서 공제할 수 없다.'는 잘못된 설명입니다. 실제로는 포함되지 않는 항목입니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_27","q":"다음 중 의료비 세액공제 대상 의료비지출액에 해당하지 않는 것은?","a":["미용을 위한 성형수술비","뇌졸중환자 휠체어를 구입하기 위한 비용","보청기 구입을 위해 지출한 비용","시력보정용 안경 또는 콘택트렌즈 구입을 위하여 지출한 비용(1인당 연 50만원 이내의 금액)"],"c":0,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 1번. '미용을 위한 성형수술비'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 2번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_28","q":"다음 중 근로소득 연말정산에 관한 설명으로 옳지 않은 것은?","a":["중도퇴직자가 아닌 근로자인 경우에는 다음 해 2월분 급여를 지급하는 때에 1년간의 총급여에 대한 연말정산을 한다.","중도 퇴직한 경우에는 퇴직한 달의 급여를 지급하는 때 정산한다.","연간 소득금액이 100만원을 초과하는 배우자에 대한 의료비는 세액공제대상이 아니다.","해외에서 지출한 신용카드 사용액은 신용카드소득공제 대상이 아니다."],"c":2,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 3번. '연간 소득금액이 100만원을 초과하는 배우자에 대한 의료비는 세액공제대상이 아니다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 2번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_29","q":"다음 자료를 이용하여 등기된 토지의 양도로 인한 양도소득세 과세표준을 계산하면 얼마인가?\nㄱ. 양도가액 : 100,000,000 원\nㄴ. 취득가액 : 60,000,000 원\nㄷ. 양도비용 : 2,000,000 원\nㄹ. 보유기간 : 2014 년 5 월 8 일에 취득하여 2024 년 7 월 10 일에 양도\nㅁ. 장기보유특별공제율(10 년 이상 11 년 미만 보유) : 20 %\nㅂ. 2024년에 위 토지 외의 다른 양도소득세 과세대상 자산을 양도하지 아니함.","a":["26,700,000원","27,900,000원","29,700,000원","30,400,000원"],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번 (27,900,000원). 종합소득세 = 종합소득과세표준 × 세율 - 누진공제액. 소득공제를 차감한 후 세율을 적용합니다. 각 보기의 수치를 비교하여 계산 결과와 일치하는 2번이 정답입니다.","src":"cbt"},{"id":"jg_5_세무_30","q":"다음 중 소득세법상 신고납부에 관한 설명으로 옳지 않은 것은?","a":["토지를 양도한 거주자는 양도일이 속하는 달의 말일부터 2개월 이내에 양도소득과세표준 예정신고 를 하여야 한다.","근로소득과 퇴직소득만 있는 자는 적법하게 원천징수된 경우에도 소득세 확정신고의무가 있다.","공적연금소득만 있는 자는 적법하게 원천징수된 경우 종합소득과세표준 확정신고는 하지 아니할 수 있다.","사업소득이 있는 자는 6개월간의 소득세를 미리 납부하는 중간예납제도 적용대상으로서, 11월 말까 지 중간예납하여야 한다."],"c":1,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답 2번. '근로소득과 퇴직소득만 있는 자는 적법하게 원천징수된 경우에도 소득세 확정신고의무가 있다.'는 잘못된 설명입니다. 이 보기의 내용은 해당 분야의 정확한 개념이나 규정과 다릅니다. 나머지 1번, 3번, 4번은 모두 올바른 설명입니다.","src":"cbt"},{"id":"jg_5_세무_31","q":"다음 중 부가가치세에 관한 설명으로 옳지 않은 주장을 하는 사람은 누구인가?","a":["김철수 : 사업자란 사업목적이 영리이든 비영리이든 관계없이 사업상 독립적으로 재화 또는 용역을 공급하는 자를 말합니다.","박다혜 : 부가가치세는 납세의무자와 담세자가 다를 것으로 예정된 조세이므로 간접세에 해당합니 다.","김영희 : 중소기업은 부가가치세 조기환급 신청이 가능합니다.","정민지 : 세금계산서의 필요적 기재사항의 전부 또는 일부가 기재되지 아니하거나 사실과 다를 경우 적법한 세금계산서로 보지 않으며, 가산세 등의 불이익이 있습니다."],"c":2,"s":"세무회계","y":"2024년 5월","exam":"jaegyeong","exp":"정답
